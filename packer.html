<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MG Packing System</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:16px; min-height:100vh; }
    h1 { text-align:center; color:#90caf9; margin:12px 0 4px; font-size:1.5rem; }
    .subtitle { text-align:center; color:#888; font-size:0.85rem; margin-bottom:20px; }
    .card { background:#1e1e1e; border:1px solid #333; border-radius:12px; padding:16px; margin-bottom:16px; }
    .card-title { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#666; margin-bottom:12px; }
    label { display:block; margin:10px 0 5px; font-weight:600; color:#90caf9; font-size:0.9rem; }
    input[type="text"],input[type="number"] { width:100%; padding:11px 12px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:16px; text-transform:uppercase; }
    .scan-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
    .scan-row input { flex:1; }
    button { background:#3f51b5; color:white; border:none; padding:11px 14px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:0.88rem; }
    .match-badge { display:block; padding:6px; border-radius:6px; font-size:0.8rem; font-weight:bold; margin-top:4px; text-align:center; }
    .pending { background:#333; color:#888; }
    .ok { background:#1b5e20; color:#a5d6a7; }
    .fail { background:#b71c1c; color:#ef9a9a; }
    .no-bc { background:#4a3000; color:#ffcc80; }
    #reader { width:100%; max-width:400px; margin:10px auto; border-radius:8px; overflow:hidden; }
    .photo-btn { width:100%; padding:14px; background:#37474f; border:none; color:white; border-radius:8px; margin-top:8px; display:flex; justify-content:space-between; }
    .preview { width:100%; margin-top:8px; border-radius:8px; display:none; border:1px solid #444; }
    .submit-btn { width:100%; padding:20px; font-size:1.1rem; font-weight:bold; border-radius:12px; border:none; margin-top:20px; }
    .ready { background:#2e7d32; color:white; }
    .blocked { background:#333; color:#666; cursor:not-allowed; }
    #status { padding:15px; border-radius:8px; margin-top:10px; text-align:center; display:none; }
    .success { background:#2e7d32; color:white; display:block !important; }
    .error { background:#c62828; color:white; display:block !important; }
    .info { background:#1565c0; color:white; display:block !important; }
  </style>
</head>
<body>

<h1>MG Packing System</h1>
<p class="subtitle">Manual/Scan P/I Mode</p>

<div class="card">
  <div class="card-title">Staff & Order</div>
  <label>Packed By</label>
  <div class="scan-row"><input type="text" id="packedBy"><button onclick="startScanner('packedBy')">SCAN</button></div>
  <label>Checker By</label>
  <div class="scan-row"><input type="text" id="checkerBy"><button onclick="startScanner('checkerBy')">SCAN</button></div>
  <label>Carton ID</label>
  <div class="scan-row"><input type="text" id="cartonId"><button onclick="startScanner('cartonId')">SCAN</button></div>
</div>

<div class="card">
  <div class="card-title">Validation Fields</div>
  <label>P/I No. (Manual or Scan)</label>
  <div class="scan-row"><input type="text" id="pi" placeholder="Fill this first if manual"><button onclick="startScanner('pi')">SCAN</button></div>
  <label>Part No.</label>
  <div class="scan-row"><input type="text" id="partNo"><button onclick="startScanner('partNo')">SCAN</button></div>
  <label>Customer</label>
  <input type="text" id="customer" readonly style="opacity:0.6">
</div>

<div class="card">
  <div class="card-title">Barcode Check</div>
  <label>1. Bag Barcode</label>
  <div class="scan-row"><input type="text" id="bag"><button onclick="startScanner('bag')">SCAN</button></div>
  <div id="bagBadge" class="match-badge pending">Waiting for scan</div>

  <label>2. Inner Barcode</label>
  <div class="scan-row"><input type="text" id="inner"><button onclick="startScanner('inner')">SCAN</button></div>
  <div id="innerBadge" class="match-badge pending">Waiting...</div>

  <label>3. Outer Barcode</label>
  <div class="scan-row"><input type="text" id="outer"><button onclick="startScanner('outer')">SCAN</button></div>
  <div id="outerBadge" class="match-badge pending">Waiting...</div>
</div>

<div id="scanner-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; padding:20px;">
  <div id="reader"></div>
  <button onclick="stopScanner()" style="width:100%; background:#f44336; margin-top:20px;">CANCEL SCAN</button>
</div>

<div class="card">
  <div class="card-title">Photos</div>
  <button class="photo-btn" onclick="document.getElementById('fBag').click()"><span>Bag + Part</span><span id="stBag">📸</span></button>
  <input type="file" id="fBag" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevBag','imgBag','stBag')">
  <img id="prevBag" class="preview">

  <button class="photo-btn" onclick="document.getElementById('fInner').click()"><span>Inner Box</span><span id="stInner">📸</span></button>
  <input type="file" id="fInner" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevInner','imgInner','stInner')">
  <img id="prevInner" class="preview">

  <button class="photo-btn" onclick="document.getElementById('fCarton').click()"><span>Outer Carton</span><span id="stCarton">📸</span></button>
  <input type="file" id="fCarton" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevCarton','imgCarton','stCarton')">
  <img id="prevCarton" class="preview">
</div>

<div class="card">
  <label>Quantity</label>
  <input type="number" id="qty" value="1">
</div>

<button id="submitBtn" class="submit-btn blocked" disabled onclick="submitData()">SUBMIT DATA</button>
<div id="status"></div>

<script>
  const SCRIPT_URL = "YOUR_DEPLOYED_URL_HERE";

  let html5QrCode = null;
  let masterData = null;
  let matchState = { bag:null, inner:null, outer:null };
  let photoData  = { imgBag:null, imgInner:null, imgCarton:null };

  function startScanner(fieldId) {
    document.getElementById('scanner-container').style.display = 'block';
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode:"environment" }, { fps:20, qrbox:250 }, (decoded) => {
      document.getElementById(fieldId).value = decoded.trim().toUpperCase();
      stopScanner();
      handleInput(fieldId);
    });
  }

  function stopScanner() {
    if (html5QrCode) html5QrCode.stop();
    document.getElementById('scanner-container').style.display = 'none';
  }

  async function handleInput(fieldId) {
    const val = document.getElementById(fieldId).value.trim().toUpperCase();
    if (fieldId === 'bag') {
      await lookupMaster(val);
    } else if (fieldId === 'inner' || fieldId === 'outer') {
      validateSequence(fieldId, val);
    }
    updateUI();
  }

  async function lookupMaster(bagBC) {
    if (bagBC === "NO") {
      matchState.bag = true;
      updateBadge('bag', 'no-bc', 'Skipped');
      return;
    }

    updateBadge('bag', 'pending', 'Searching...');
    const pi = document.getElementById('pi').value;
    const pn = document.getElementById('partNo').value;
    
    try {
      const resp = await fetch(`${SCRIPT_URL}?action=lookup&barcode=${bagBC}&pi=${pi}&partNo=${pn}`);
      const res = await resp.json();
      if (res.found) {
        masterData = res;
        matchState.bag = true;
        document.getElementById('customer').value = res.customer;
        if (!pi) document.getElementById('pi').value = res.pi;
        if (!pn) document.getElementById('partNo').value = res.partNo;
        updateBadge('bag', 'ok', 'Match Found');
      } else {
        matchState.bag = false;
        updateBadge('bag', 'fail', 'No Match (Check P/I)');
      }
    } catch (e) { updateBadge('bag', 'fail', 'Error'); }
  }

  function validateSequence(type, val) {
    if (!masterData && val !== "NO") return;
    const expected = type === 'inner' ? masterData.innerBarcode : masterData.outerBarcode;
    const ok = (val === "NO" || val === String(expected).toUpperCase());
    matchState[type] = ok;
    updateBadge(type, ok ? (val === "NO" ? "no-bc" : "ok") : "fail", ok ? "Match" : "Wrong Barcode");
  }

  function updateBadge(id, cls, txt) {
    const b = document.getElementById(id + 'Badge');
    b.className = 'match-badge ' + cls;
    b.textContent = txt;
  }

  function processPhoto(input, prevId, key, statusId) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = (img.height/img.width)*800;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        photoData[key] = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
        document.getElementById(prevId).src = canvas.toDataURL('image/jpeg');
        document.getElementById(prevId).style.display = 'block';
        document.getElementById(statusId).textContent = '✅';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function updateUI() {
    const isReady = matchState.bag && matchState.inner && matchState.outer;
    const btn = document.getElementById('submitBtn');
    btn.disabled = !isReady;
    btn.className = isReady ? 'submit-btn ready' : 'submit-btn blocked';
  }

  async function submitData() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    showStatus('Uploading...', 'info');

    const payload = {
      action: 'submit',
      packedBy: document.getElementById('packedBy').value,
      checkerBy: document.getElementById('checkerBy').value,
      cartonId: document.getElementById('cartonId').value,
      pi: document.getElementById('pi').value,
      customer: document.getElementById('customer').value,
      partNo: document.getElementById('partNo').value,
      bag: document.getElementById('bag').value,
      inner: document.getElementById('inner').value,
      outer: document.getElementById('outer').value,
      qty: document.getElementById('qty').value,
      bagMatch: matchState.bag,
      innerMatch: matchState.inner,
      outerMatch: matchState.outer,
      base64: photoData.imgBag // Simplified for demo, repeat for others
    };

    const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) });
    const res = await resp.json();
    if (res.success) {
      showStatus('Saved!', 'success');
      setTimeout(() => location.reload(), 2000);
    }
  }

  function showStatus(m, c) {
    const s = document.getElementById('status');
    s.textContent = m; s.className = c;
  }
</script>
</body>
</html>
