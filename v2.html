<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MG Packing — Checker</title>
  <style>
    * { box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:0; min-height:100vh; }
    h1 { text-align:center; color:#ffb74d; margin:12px 0 4px; font-size:1.4rem; }

    /* PIN SCREEN */
    #pinScreen { max-width:340px; margin:80px auto; background:#1e1e1e; border:1px solid #333; border-radius:16px; padding:32px 24px; text-align:center; }
    #pinInput { width:100%; padding:14px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:22px; text-align:center; letter-spacing:0.3em; margin-bottom:12px; }

    /* TABS */
    #mainScreen { display:none; }
    .main-tabs { display:flex; background:#161616; border-bottom:1px solid #333; position:sticky; top:0; z-index:50; }
    .main-tab { flex:1; padding:14px 8px; text-align:center; font-size:0.82rem; font-weight:700; color:#666; cursor:pointer; border-bottom:3px solid transparent; }
    .main-tab.active { color:#ffb74d; border-bottom-color:#ffb74d; background:#1a1a1a; }
    .tab-content { display:none; padding:16px; }
    .tab-content.active { display:block; }

    /* STATS & FILTER BUTTONS */
    .stats-row { display:flex; gap:8px; margin-bottom:10px; }
    .stat-box { flex:1; background:#1e1e1e; border:1px solid #333; border-radius:8px; padding:8px 4px; text-align:center; cursor:pointer; transition: 0.2s; }
    .stat-box:active { background: #333; }
    .stat-box.active-filter { border-color: #ffb74d; background: #252525; box-shadow: 0 0 10px rgba(255,183,77,0.2); }
    .stat-num { font-size:1.2rem; font-weight:700; display:block; }
    .stat-lbl { font-size:0.6rem; color:#888; text-transform:uppercase; }

    .toolbar { display:flex; gap:10px; margin-bottom:12px; }
    .toolbar input { flex:1; padding:12px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; }
    .refresh-btn { background:#455a64; border:none; color:white; padding:10px 16px; border-radius:8px; cursor:pointer; font-weight:bold; }

    /* CARDS */
    .record-card { background:#1e1e1e; border:1px solid #333; border-left:4px solid #555; border-radius:12px; padding:14px; margin-bottom:10px; cursor:pointer; }
    .record-card.verified { border-left-color:#4caf50; }
    .record-card.rejected { border-left-color:#f44336; }
    .record-card.pending  { border-left-color:#ff9800; }
    .record-header { display:flex; justify-content:space-between; align-items:center; }
    .record-customer { font-weight:700; color:#ffb74d; font-size:1rem; }
    .status-pill { padding:3px 8px; border-radius:10px; font-size:0.7rem; font-weight:bold; color:white; }
    .status-pill.verified { background:#2e7d32; }
    .status-pill.rejected { background:#b71c1c; }
    .status-pill.pending  { background:#e65100; }

    /* DETAIL MODAL */
    #detailModal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:100; overflow-y:auto; padding:10px; display:none; }
    .modal-card { background:#1e1e1e; border-radius:14px; padding:20px; max-width:800px; margin:0 auto 40px; border:1px solid #333; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .detail-item label { display:block; font-size:0.65rem; color:#666; text-transform:uppercase; }
    .detail-item span { font-size:0.95rem; font-weight:bold; color:#eee; }

    /* BARCODES */
    .barcode-check { display:flex; align-items:center; background:#2a2a2a; border-radius:8px; padding:10px; margin-bottom:6px; gap:10px; }
    .bc-badge { font-size:0.7rem; font-weight:bold; padding:4px 8px; border-radius:6px; min-width:90px; text-align:center; }
    .bc-badge.ok { color:#4caf50; background:rgba(76,175,80,0.15); border:1px solid #4caf50; }
    .bc-badge.fail { color:#f44336; background:rgba(244,67,54,0.15); border:1px solid #f44336; }
    .bc-badge.nobc { color:#ff9800; background:rgba(255,152,0,0.15); border:1px solid #ff9800; }

    /* PHOTOS - ONE ROW SCROLLABLE */
    .photo-row-container { 
      display: flex; 
      overflow-x: auto; 
      gap: 15px; 
      padding-bottom: 15px; 
      margin-bottom: 20px;
      scrollbar-width: thin;
      scrollbar-color: #ffb74d #1e1e1e;
    }
    .photo-wrap { 
      flex: 0 0 280px; /* Width of each photo box */
      text-align:center; 
      background:#111; 
      padding:10px; 
      border-radius:12px; 
      border:1px solid #333; 
    }
    .photo-wrap img { width:100%; height:250px; object-fit:contain; border-radius:8px; cursor:pointer; background:#000; }
    .photo-lbl { font-size:0.8rem; font-weight:bold; margin-bottom:8px; color:#ffb74d; }

    /* ACTIONS */
    .verdict-row { display:flex; gap:10px; margin-bottom:15px; }
    .verdict-btn { flex:1; padding:16px; border:none; border-radius:10px; font-weight:bold; opacity:0.3; color:white; cursor:pointer; }
    .verdict-btn.selected { opacity:1; outline:3px solid white; }
    .checker-input { width:100%; padding:14px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; margin-bottom:12px; }
    textarea { width:100%; height:80px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; padding:12px; }

    #lightbox { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:200; display:none; align-items:center; justify-content:center; }
    #lightbox img { max-width:98%; max-height:95%; }
  </style>
</head>
<body>

<div id="pinScreen">
  <h2 style="color:#ffb74d">MG CHECKER</h2>
  <input type="password" id="pinInput" maxlength="4" oninput="checkPin(this.value)" inputmode="numeric" placeholder="PIN">
</div>

<div id="mainScreen">
  <h1>MG Packing System</h1>
  <div class="main-tabs">
    <div class="main-tab active" id="tabVerify" onclick="switchTab('verify')">CHECK LIST</div>
    <div class="main-tab" id="tabStamp" onclick="switchTab('stamp')">STAMPING</div>
  </div>

  <div class="tab-content active" id="contentVerify">
    <!-- RESTORED FILTER BUTTONS -->
    <div class="stats-row">
      <div class="stat-box" id="fAll" onclick="setFilter('all')"><span class="stat-num" id="vStatTotal">-</span><span class="stat-lbl">ALL</span></div>
      <div class="stat-box" id="fPending" onclick="setFilter('pending')"><span class="stat-num" id="vStatPending">-</span><span class="stat-lbl">PENDING</span></div>
      <div class="stat-box" id="fVerified" onclick="setFilter('verified')"><span class="stat-num" id="vStatVerified">-</span><span class="stat-lbl">PASS</span></div>
      <div class="stat-box" id="fRejected" onclick="setFilter('rejected')"><span class="stat-num" id="vStatRejected">-</span><span class="stat-lbl">FAIL</span></div>
    </div>
    
    <div class="toolbar">
      <input type="text" id="vSearch" placeholder="Search Customer or PI..." oninput="renderVerifyList()">
      <button class="refresh-btn" onclick="loadRecords()">↻</button>
    </div>
    <div id="verifyList"></div>
  </div>

  <div class="tab-content" id="contentStamp">
    <div id="stampList"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detailModal">
  <div class="modal-card">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h2 id="modalTitle" style="margin:0; color:#ffb74d;"></h2>
      <button onclick="closeModal()" style="background:#444; color:white; border:none; padding:8px 15px; border-radius:6px;">CLOSE</button>
    </div>

    <div class="detail-grid" id="detailGrid"></div>
    <div id="barcodeChecks" style="margin-bottom:20px;"></div>

    <div style="margin-bottom:10px;"><label class="stat-lbl">Photos (Swipe Side to Side)</label></div>
    <!-- PHOTOS IN ONE ROW -->
    <div class="photo-row-container" id="photosGrid"></div>

    <div style="border-top:1px solid #333; padding-top:20px;">
      <div class="verdict-row">
        <button class="verdict-btn" id="btnVerified" style="background:#2e7d32;" onclick="selectVerdict('Verified')">APPROVE</button>
        <button class="verdict-btn" id="btnRejected" style="background:#b71c1c;" onclick="selectVerdict('Rejected')">REJECT</button>
      </div>
      <input type="text" class="checker-input" id="checkerNameInput" placeholder="CHECKER NAME">
      <textarea id="remarksInput" placeholder="REMARKS"></textarea>
      <button id="saveVerifyBtn" onclick="saveVerification()" style="width:100%; padding:18px; background:#1565c0; color:white; border:none; border-radius:12px; font-weight:bold; margin-top:15px;">SAVE</button>
    </div>
  </div>
</div>

<div id="lightbox" onclick="this.style.display='none'"><img id="lightboxImg"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJNbH09bwWqsO0lnM8j_xHA7ALfPFKpSjSFwUK4SRugrHqMWIhds7KhyUHN7kXR28/exec";
  let allRecords = [];
  let currentFilter = 'all';
  let currentRecord = null;
  let selectedVerdict = null;

  function checkPin(val) {
    if (val === "1234") {
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      loadRecords();
    }
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active-filter'));
    document.getElementById('f' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active-filter');
    renderVerifyList();
  }

  async function loadRecords() {
    const r = await fetch(SCRIPT_URL + '?action=records');
    const d = await r.json();
    allRecords = d.records || [];
    updateStats();
    renderVerifyList();
    renderStampList();
  }

  function updateStats() {
    const total = allRecords.length;
    const ok = allRecords.filter(r => (r.status||'').includes('Verified')).length;
    const fail = allRecords.filter(r => (r.status||'').includes('Rejected')).length;
    document.getElementById('vStatTotal').textContent = total;
    document.getElementById('vStatPending').textContent = total - ok - fail;
    document.getElementById('vStatVerified').textContent = ok;
    document.getElementById('vStatRejected').textContent = fail;
  }

  function renderVerifyList() {
    const search = document.getElementById('vSearch').value.toLowerCase();
    const html = allRecords.filter(r => {
      const matchesSearch = (r.customer||'').toLowerCase().includes(search) || (r.pi||'').toLowerCase().includes(search);
      const s = (r.status||'').toLowerCase();
      if (currentFilter === 'pending') return matchesSearch && !s.includes('verified') && !s.includes('rejected');
      if (currentFilter === 'verified') return matchesSearch && s.includes('verified');
      if (currentFilter === 'rejected') return matchesSearch && s.includes('rejected');
      return matchesSearch;
    }).map(r => {
      const s = (r.status||'').toLowerCase();
      const cls = s.includes('verified') ? 'verified' : s.includes('rejected') ? 'rejected' : 'pending';
      return `<div class="record-card ${cls}" onclick="openRecord(${r.row})">
        <div class="record-header">
          <span class="record-customer">${r.customer}</span>
          <span class="status-pill ${cls}">${r.status || 'Pending'}</span>
        </div>
        <div style="font-size:0.75rem; color:#888; margin-top:8px;">PI: ${r.pi} | Team: ${r.checkerBy || 'N/A'} | Date: ${r.packedDate}</div>
      </div>`;
    }).join('');
    document.getElementById('verifyList').innerHTML = html;
  }

  async function openRecord(row) {
    document.getElementById('detailModal').style.display = 'block';
    const res = await fetch(SCRIPT_URL + '?action=record&row=' + row);
    const r = await res.json();
    currentRecord = r;
    document.getElementById('modalTitle').textContent = r.customer;
    document.getElementById('detailGrid').innerHTML = `
      <div class="detail-item"><label>PI</label><span>${r.pi}</span></div>
      <div class="detail-item"><label>Team</label><span>${r.checkerBy || 'N/A'}</span></div>
      <div class="detail-item"><label>Date</label><span>${r.packedDate}</span></div>
      <div class="detail-item"><label>Carton</label><span>${r.cartonId}</span></div>
    `;

    const ms = r.matchStatus || '';
    const barcodes = [
      {l:'BAG', v:r.bag, ok:ms.includes('Bag:✅'), no:(r.bag||'').toUpperCase()==='NO'},
      {l:'INNER', v:r.inner, ok:ms.includes('Inner:✅'), no:(r.inner||'').toUpperCase()==='NO'},
      {l:'OUTER', v:r.outer, ok:ms.includes('Outer:✅'), no:(r.outer||'').toUpperCase()==='NO'}
    ];
    document.getElementById('barcodeChecks').innerHTML = barcodes.map(b => `
      <div class="barcode-check">
        <span style="font-size:0.7rem; width:50px;">${b.l}</span>
        <span style="flex:1; font-weight:bold; text-align:center;">${b.v || '-'}</span>
        <span class="bc-badge ${b.no?'nobc':b.ok?'ok':'fail'}">${b.no?'NO BC':b.ok?'MATCH':'FAIL'}</span>
      </div>
    `).join('');

    const photos = [
      {lbl:'BAG', url: r.imgBagUrl},
      {lbl:'INNER', url: r.imgInnerUrl},
      {lbl:'CARTON', url: r.imgCartonUrl}
    ];
    document.getElementById('photosGrid').innerHTML = photos.map(p => {
      const id = (p.url||'').match(/[-\w]{25,}/);
      const thumb = id ? `https://drive.google.com/thumbnail?id=${id[0]}&sz=w800` : '';
      return `<div class="photo-wrap">
        <div class="photo-lbl">${p.lbl}</div>
        <img src="${thumb}" onclick="openLightbox('${thumb}')">
        <a href="${p.url}" target="_blank" style="color:#90caf9; font-size:0.7rem; text-decoration:none; display:block; margin-top:5px;">Open Original ↗</a>
      </div>`;
    }).join('');
  }

  function selectVerdict(v) {
    selectedVerdict = v;
    document.getElementById('btnVerified').classList.toggle('selected', v==='Verified');
    document.getElementById('btnRejected').classList.toggle('selected', v==='Rejected');
  }

  async function saveVerification() {
    const name = document.getElementById('checkerNameInput').value;
    if(!name || !selectedVerdict) return alert("Enter name and select Approve/Reject");
    await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({
      action:'verify', row:currentRecord.row, checker:name, status:selectedVerdict==='Verified'?'Verified ✅':'Rejected ❌', remarks:document.getElementById('remarksInput').value
    })});
    closeModal(); loadRecords();
  }

  function closeModal() { document.getElementById('detailModal').style.display='none'; }
  function openLightbox(s) { document.getElementById('lightboxImg').src=s; document.getElementById('lightbox').style.display='flex'; }
  function switchTab(t) { /* existing tab logic */ }
</script>
</body>
</html>
