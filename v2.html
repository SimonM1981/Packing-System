<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MG Packing — Checker</title>
  <style>
    * { box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:0; min-height:100vh; }
    h1 { text-align:center; color:#ffb74d; margin:12px 0 4px; font-size:1.4rem; }
    .subtitle { text-align:center; color:#888; font-size:0.82rem; margin-bottom:16px; }

    /* PIN */
    #pinScreen { max-width:340px; margin:80px auto; background:#1e1e1e; border:1px solid #333; border-radius:16px; padding:32px 24px; text-align:center; }
    #pinScreen h2 { color:#ffb74d; margin:0 0 8px; }
    #pinScreen p  { color:#888; font-size:0.9rem; margin:0 0 24px; }
    #pinInput { width:100%; padding:14px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:22px; text-align:center; letter-spacing:0.3em; margin-bottom:12px; }
    #pinError { color:#f44336; font-size:0.85rem; margin-top:8px; display:none; }

    /* MAIN TABS */
    #mainScreen { display:none; }
    .main-tabs { display:flex; background:#161616; border-bottom:1px solid #333; position:sticky; top:0; z-index:50; }
    .main-tab { flex:1; padding:14px 8px; text-align:center; font-size:0.82rem; font-weight:700; color:#666; cursor:pointer; border-bottom:3px solid transparent; transition:all 0.2s; }
    .main-tab.active { color:#ffb74d; border-bottom-color:#ffb74d; background:#1a1a1a; }
    .tab-content { display:none; padding:16px; }
    .tab-content.active { display:block; }

    /* TOOLBAR */
    .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .toolbar input { flex:1; min-width:160px; padding:10px 12px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:15px; }
    .refresh-btn { background:#455a64; border:none; color:white; padding:10px 16px; border-radius:8px; cursor:pointer; font-size:0.88rem; white-space:nowrap; }
    .filter-row { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .filter-btn { padding:9px 14px; border-radius:8px; border:none; cursor:pointer; font-size:0.82rem; font-weight:600; white-space:nowrap; opacity:0.55; }
    .filter-btn.active { opacity:1; outline:2px solid white; }
    .filter-btn.all      { background:#455a64; color:white; }
    .filter-btn.pending  { background:#e65100; color:white; }
    .filter-btn.verified { background:#2e7d32; color:white; }
    .filter-btn.rejected { background:#b71c1c; color:white; }
    .filter-btn.stamped  { background:#1565c0; color:white; }

    /* STATS */
    .stats-row { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .stat-box { flex:1; min-width:60px; background:#1e1e1e; border:1px solid #333; border-radius:8px; padding:10px 6px; text-align:center; }
    .stat-num { font-size:1.3rem; font-weight:700; }
    .stat-lbl { font-size:0.65rem; color:#666; margin-top:2px; }
    .stat-box.total    .stat-num { color:#90caf9; }
    .stat-box.pending  .stat-num { color:#ff9800; }
    .stat-box.verified .stat-num { color:#4caf50; }
    .stat-box.rejected .stat-num { color:#f44336; }
    .stat-box.stamped  .stat-num { color:#42a5f5; }

    /* RECORD CARDS — Verification tab */
    .record-card { background:#1e1e1e; border:1px solid #333; border-left:4px solid #555; border-radius:12px; padding:14px; margin-bottom:10px; cursor:pointer; }
    .record-card.verified { border-left-color:#4caf50; }
    .record-card.rejected { border-left-color:#f44336; }
    .record-card.pending  { border-left-color:#ff9800; }
    .record-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
    .record-customer { font-weight:700; font-size:1rem; color:#ffb74d; }
    .record-sub  { font-size:0.8rem; color:#888; margin-top:2px; }
    .record-meta { font-size:0.76rem; color:#666; margin-top:6px; }
    .status-pill { padding:3px 10px; border-radius:12px; font-size:0.75rem; font-weight:700; white-space:nowrap; flex-shrink:0; }
    .status-pill.verified { background:#2e7d32; color:#a5d6a7; }
    .status-pill.rejected { background:#b71c1c; color:#ef9a9a; }
    .status-pill.pending  { background:#e65100; color:#ffcc80; }
    .match-tag { padding:2px 8px; border-radius:8px; background:#2a2a2a; display:inline-block; font-size:0.78rem; margin-top:6px; }

    /* STAMP CARDS */
    .stamp-card { background:#1e1e1e; border:1px solid #333; border-left:4px solid #1565c0; border-radius:12px; padding:14px; margin-bottom:10px; }
    .stamp-card.stamped { border-left-color:#42a5f5; opacity:0.7; }
    .stamp-card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:10px; }
    .stamp-customer { font-weight:700; font-size:1rem; color:#ffb74d; }
    .stamp-sub { font-size:0.8rem; color:#888; margin-top:2px; }
    .stamp-pill { padding:3px 10px; border-radius:12px; font-size:0.75rem; font-weight:700; white-space:nowrap; flex-shrink:0; }
    .stamp-pill.pending { background:#e65100; color:#ffcc80; }
    .stamp-pill.stamped { background:#1565c0; color:#90caf9; }
    .stamp-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .stamp-info-item { background:#2a2a2a; border-radius:6px; padding:8px 10px; }
    .stamp-info-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.06em; color:#666; margin-bottom:2px; }
    .stamp-info-value { font-size:0.95rem; font-weight:700; color:#e0e0e0; }
    .stamp-btn { width:100%; padding:14px; background:#1565c0; color:white; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; }
    .stamp-btn:disabled { background:#333; color:#666; cursor:not-allowed; }
    .stamp-btn.done { background:#0d3b6e; color:#64b5f6; }
    .stamp-date { font-size:0.75rem; color:#64b5f6; text-align:center; margin-top:6px; }

    /* DETAIL MODAL */
    #detailModal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:100; overflow-y:auto; padding:16px; display:none; }
    .modal-card { background:#1e1e1e; border:1px solid #444; border-radius:14px; padding:20px; max-width:560px; margin:0 auto 40px; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .modal-header h2 { color:#ffb74d; margin:0; font-size:1.15rem; }
    .close-btn { background:#444; border:none; color:white; padding:8px 14px; border-radius:8px; cursor:pointer; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .detail-item label { display:block; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.06em; color:#666; margin-bottom:3px; }
    .detail-item span  { font-size:0.9rem; color:#e0e0e0; font-weight:600; word-break:break-all; }
    .section-lbl { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.06em; color:#666; display:block; margin-bottom:8px; }
    .barcode-check { display:flex; align-items:center; background:#2a2a2a; border-radius:8px; padding:10px 12px; margin-bottom:6px; gap:8px; }
    .bc-label { font-size:0.8rem; color:#aaa; flex-shrink:0; width:50px; }
    .bc-value { font-size:0.88rem; font-weight:700; flex:1; text-align:center; word-break:break-all; }
    .bc-badge { font-size:0.85rem; font-weight:700; flex-shrink:0; }
    .bc-badge.ok   { color:#4caf50; }
    .bc-badge.fail { color:#f44336; }
    .bc-badge.nobc { color:#ff9800; }
    .photos-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px; }
    .photo-wrap { text-align:center; }
    .photo-wrap img { width:100%; border-radius:8px; border:1px solid #444; cursor:pointer; }
    .photo-wrap .photo-lbl { font-size:0.7rem; color:#777; margin-top:4px; }
    .open-link { display:block; font-size:0.7rem; color:#90caf9; text-decoration:none; margin-top:2px; }
    .no-photo { background:#2a2a2a; border-radius:8px; height:70px; display:flex; align-items:center; justify-content:center; color:#555; font-size:0.72rem; border:1px solid #333; }
    .verify-section { border-top:1px solid #333; padding-top:16px; margin-top:8px; }
    .verify-section h3 { color:#ffb74d; margin:0 0 12px; font-size:1rem; }
    .verdict-row { display:flex; gap:10px; margin-bottom:12px; }
    .verdict-btn { flex:1; padding:14px; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; opacity:0.5; }
    .verdict-btn.verified { background:#2e7d32; color:white; }
    .verdict-btn.rejected { background:#b71c1c; color:white; }
    .verdict-btn.selected { opacity:1; outline:3px solid white; }
    .checker-input { width:100%; padding:11px 12px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:16px; text-transform:uppercase; margin-bottom:10px; }
    .checker-input::placeholder { text-transform:none; color:#555; }
    textarea { width:100%; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; padding:10px; font-size:15px; resize:vertical; min-height:70px; text-transform:uppercase; }
    textarea::placeholder { text-transform:none; color:#555; }
    .save-verify-btn { width:100%; padding:16px; font-size:1rem; font-weight:700; background:#1565c0; color:white; border:none; border-radius:10px; cursor:pointer; margin-top:12px; }
    .save-verify-btn:disabled { background:#333; color:#666; cursor:not-allowed; }

    .empty-state { text-align:center; color:#555; padding:60px 20px; font-size:0.9rem; }
    .loading { text-align:center; color:#888; padding:40px; }

    /* LIGHTBOX */
    #lightbox { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:200; display:none; align-items:center; justify-content:center; padding:16px; }
    #lightbox.open { display:flex; }
    #lightboxImg { max-width:100%; max-height:90vh; border-radius:8px; }
  </style>
</head>
<body>

<!-- PIN -->
<div id="pinScreen">
  <h2>🔐 Checker Access</h2>
  <p>Enter your PIN to continue</p>
  <input type="password" id="pinInput" placeholder="••••" maxlength="6" oninput="checkPin(this.value)" inputmode="numeric">
  <div id="pinError">Incorrect PIN. Try again.</div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <h1>MG Packing System</h1>
  <p class="subtitle">Checker Panel</p>

  <!-- MAIN TABS -->
  <div class="main-tabs">
    <div class="main-tab active" id="tabVerify" onclick="switchTab('verify')">✅ Verification</div>
    <div class="main-tab" id="tabStamp"  onclick="switchTab('stamp')">🔖 Stamp Carton</div>
  </div>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TAB 1: VERIFICATION                                      -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <div class="tab-content active" id="contentVerify">
    <div class="stats-row" style="margin-top:12px;">
      <div class="stat-box total"><div class="stat-num" id="vStatTotal">—</div><div class="stat-lbl">Total</div></div>
      <div class="stat-box pending"><div class="stat-num" id="vStatPending">—</div><div class="stat-lbl">Pending</div></div>
      <div class="stat-box verified"><div class="stat-num" id="vStatVerified">—</div><div class="stat-lbl">Verified</div></div>
      <div class="stat-box rejected"><div class="stat-num" id="vStatRejected">—</div><div class="stat-lbl">Rejected</div></div>
    </div>
    <div class="toolbar">
      <input type="text" id="vSearch" placeholder="Search customer, P/I, part, carton..." oninput="renderVerifyList()">
      <button class="refresh-btn" onclick="loadRecords()">↻</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn all active" id="vfAll"      onclick="setVFilter('all')">All</button>
      <button class="filter-btn pending"    id="vfPending"  onclick="setVFilter('pending')">Pending</button>
      <button class="filter-btn verified"   id="vfVerified" onclick="setVFilter('verified')">Verified</button>
      <button class="filter-btn rejected"   id="vfRejected" onclick="setVFilter('rejected')">Rejected</button>
    </div>
    <div id="verifyList"><div class="loading">Loading...</div></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TAB 2: STAMP CARTON                                      -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <div class="tab-content" id="contentStamp">
    <div class="stats-row" style="margin-top:12px;">
      <div class="stat-box pending"><div class="stat-num" id="sStatPending">—</div><div class="stat-lbl">Pending Stamp</div></div>
      <div class="stat-box stamped"><div class="stat-num" id="sStatStamped">—</div><div class="stat-lbl">Stamped</div></div>
      <div class="stat-box total"><div class="stat-num" id="sStatTotal">—</div><div class="stat-lbl">Total</div></div>
    </div>
    <div class="toolbar">
      <input type="text" id="sSearch" placeholder="Search customer, P/I, carton..." oninput="renderStampList()">
      <button class="refresh-btn" onclick="loadRecords()">↻</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn pending active" id="sfPending" onclick="setSFilter('pending')">Pending Stamp</button>
      <button class="filter-btn stamped"        id="sfStamped" onclick="setSFilter('stamped')">Stamped</button>
      <button class="filter-btn all"            id="sfAll"     onclick="setSFilter('all')">All</button>
    </div>
    <div id="stampList"><div class="loading">Loading...</div></div>
  </div>
</div>

<!-- DETAIL MODAL (Verification) -->
<div id="detailModal">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modalTitle">Record Detail</h2>
      <button class="close-btn" onclick="closeModal()">✕ Close</button>
    </div>
    <div class="detail-grid" id="detailGrid"></div>
    <div style="margin-bottom:14px;">
      <span class="section-lbl">Barcode Verification</span>
      <div id="barcodeChecks"></div>
    </div>
    <div style="margin-bottom:16px;">
      <span class="section-lbl">Photos</span>
      <div class="photos-grid" id="photosGrid"></div>
    </div>
    <div class="verify-section">
      <h3>Verification Decision</h3>
      <div class="verdict-row">
        <button class="verdict-btn verified" id="btnVerified" onclick="selectVerdict('Verified')">✅ Verified</button>
        <button class="verdict-btn rejected" id="btnRejected" onclick="selectVerdict('Rejected')">❌ Rejected</button>
      </div>
      <label style="display:block;font-size:0.85rem;color:#90caf9;margin-bottom:6px;">Your Name (Checker)</label>
      <input type="text" class="checker-input" id="checkerNameInput" placeholder="Enter your name...">
      <label style="display:block;font-size:0.85rem;color:#90caf9;margin-bottom:6px;">Remarks (required if Rejected)</label>
      <textarea id="remarksInput" placeholder="Enter remarks..."></textarea>
      <button class="save-verify-btn" id="saveVerifyBtn" onclick="saveVerification()" disabled>Save Verification</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="Full photo">
</div>

<script>
  const SCRIPT_URL  = "https://script.google.com/macros/s/AKfycbxJNbH09bwWqsO0lnM8j_xHA7ALfPFKpSjSFwUK4SRugrHqMWIhds7KhyUHN7kXR28/exec";
  const CHECKER_PIN = "1234"; // ← Change this

  let allRecords     = [];
  let currentVFilter = 'all';
  let currentSFilter = 'pending';
  let currentRecord  = null;
  let selectedVerdict = null;
  let activeTab      = 'verify';

  // AUTO UPPERCASE
  ['checkerNameInput','remarksInput'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', function() {
      const pos = this.selectionStart;
      this.value = this.value.toUpperCase();
      try { this.setSelectionRange(pos,pos); } catch(e){}
    });
  });

  // ── PIN ───────────────────────────────────────────────────
  function checkPin(val) {
    if (val === CHECKER_PIN) {
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      loadRecords();
    } else if (val.length === CHECKER_PIN.length) {
      document.getElementById('pinError').style.display = 'block';
      document.getElementById('pinInput').value = '';
    }
  }

  // ── TAB SWITCH ────────────────────────────────────────────
  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tabVerify').classList.toggle('active', tab === 'verify');
    document.getElementById('tabStamp').classList.toggle('active',  tab === 'stamp');
    document.getElementById('contentVerify').classList.toggle('active', tab === 'verify');
    document.getElementById('contentStamp').classList.toggle('active',  tab === 'stamp');
  }

  // ── LOAD RECORDS ──────────────────────────────────────────
  async function loadRecords() {
    document.getElementById('verifyList').innerHTML = '<div class="loading">Loading...</div>';
    document.getElementById('stampList').innerHTML  = '<div class="loading">Loading...</div>';
    try {
      const resp = await fetch(SCRIPT_URL + '?action=records');
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      allRecords = data.records || [];
      updateVerifyStats();
      updateStampStats();
      renderVerifyList();
      renderStampList();
    } catch(err) {
      const msg = '<div class="empty-state">Failed to load: ' + err.message + '</div>';
      document.getElementById('verifyList').innerHTML = msg;
      document.getElementById('stampList').innerHTML  = msg;
    }
  }

  // ── VERIFY STATS ──────────────────────────────────────────
  function updateVerifyStats() {
    const total    = allRecords.length;
    const verified = allRecords.filter(r => (r.status||'').includes('Verified')).length;
    const rejected = allRecords.filter(r => (r.status||'').includes('Rejected')).length;
    const pending  = total - verified - rejected;
    document.getElementById('vStatTotal').textContent    = total;
    document.getElementById('vStatPending').textContent  = pending;
    document.getElementById('vStatVerified').textContent = verified;
    document.getElementById('vStatRejected').textContent = rejected;
  }

  // ── STAMP STATS ───────────────────────────────────────────
  function updateStampStats() {
    // Only count Verified records for stamp stats
    const verifiedRecs = allRecords.filter(r => (r.status||'').includes('Verified'));
    const stamped      = verifiedRecs.filter(r => (r.stampStatus||'').includes('Stamped')).length;
    const pending      = verifiedRecs.length - stamped;
    document.getElementById('sStatPending').textContent = pending;
    document.getElementById('sStatStamped').textContent = stamped;
    document.getElementById('sStatTotal').textContent   = verifiedRecs.length;
  }

  // ── VERIFY FILTER ─────────────────────────────────────────
  function setVFilter(f) {
    currentVFilter = f;
    ['all','pending','verified','rejected'].forEach(k => {
      const btn = document.getElementById('vf' + k.charAt(0).toUpperCase() + k.slice(1));
      if (btn) btn.classList.toggle('active', k === f);
    });
    renderVerifyList();
  }

  // ── STAMP FILTER ──────────────────────────────────────────
  function setSFilter(f) {
    currentSFilter = f;
    ['pending','stamped','all'].forEach(k => {
      const btn = document.getElementById('sf' + k.charAt(0).toUpperCase() + k.slice(1));
      if (btn) btn.classList.toggle('active', k === f);
    });
    renderStampList();
  }

  // ── RENDER VERIFY LIST ────────────────────────────────────
  function renderVerifyList() {
    const search = document.getElementById('vSearch').value.toLowerCase();
    let records  = allRecords;

    if (currentVFilter !== 'all') {
      records = records.filter(r => {
        const s = (r.status||'').toLowerCase();
        if (currentVFilter === 'pending')  return !s.includes('verified') && !s.includes('rejected');
        if (currentVFilter === 'verified') return s.includes('verified');
        if (currentVFilter === 'rejected') return s.includes('rejected');
        return true;
      });
    }
    if (search) records = records.filter(r =>
      (r.customer||'').toLowerCase().includes(search) ||
      (r.pi||'').toLowerCase().includes(search) ||
      (r.partNo||'').toLowerCase().includes(search) ||
      (r.cartonId||'').toLowerCase().includes(search) ||
      (r.packedBy||'').toLowerCase().includes(search)
    );

    if (!records.length) { document.getElementById('verifyList').innerHTML = '<div class="empty-state">No records found.</div>'; return; }

    document.getElementById('verifyList').innerHTML = records.map(r => {
      const s   = (r.status||'').toLowerCase();
      const cls = s.includes('verified') ? 'verified' : s.includes('rejected') ? 'rejected' : 'pending';
      const lbl = s.includes('verified') ? 'Verified ✅' : s.includes('rejected') ? 'Rejected ❌' : 'Pending ⏳';
      return `<div class="record-card ${cls}" onclick="openRecord(${r.row})">
        <div class="record-header">
          <div>
            <div class="record-customer">${r.customer||'Unknown'}</div>
            <div class="record-sub">P/I: ${r.pi||'—'} &nbsp;|&nbsp; Part: ${r.partNo||'—'}</div>
            <div class="record-sub">Carton: ${r.cartonId||'—'}</div>
          </div>
          <span class="status-pill ${cls}">${lbl}</span>
        </div>
        <div class="record-meta">📅 ${r.packedDate||'—'} &nbsp;|&nbsp; 👤 ${r.packedBy||'—'} &nbsp;|&nbsp; 📦 Qty: ${r.qty||'—'}</div>
        ${r.matchStatus ? `<div><span class="match-tag">${r.matchStatus}</span></div>` : ''}
      </div>`;
    }).join('');
  }

  // ── RENDER STAMP LIST ─────────────────────────────────────
  function renderStampList() {
    const search = document.getElementById('sSearch').value.toLowerCase();

    // Only show Verified records in stamp tab
    let records = allRecords.filter(r => (r.status||'').includes('Verified'));

    if (currentSFilter === 'pending') {
      records = records.filter(r => !(r.stampStatus||'').includes('Stamped'));
    } else if (currentSFilter === 'stamped') {
      records = records.filter(r => (r.stampStatus||'').includes('Stamped'));
    }

    if (search) records = records.filter(r =>
      (r.customer||'').toLowerCase().includes(search) ||
      (r.pi||'').toLowerCase().includes(search) ||
      (r.cartonId||'').toLowerCase().includes(search)
    );

    if (!records.length) {
      const msg = currentSFilter === 'pending'
        ? '<div class="empty-state">🎉 All cartons have been stamped!</div>'
        : '<div class="empty-state">No records found.</div>';
      document.getElementById('stampList').innerHTML = msg;
      return;
    }

    document.getElementById('stampList').innerHTML = records.map(r => {
      const isStamped = (r.stampStatus||'').includes('Stamped');
      const cls       = isStamped ? 'stamped' : '';
      const pillCls   = isStamped ? 'stamped' : 'pending';
      const pillLbl   = isStamped ? 'Stamped ✅' : 'Pending Stamp 🔖';
      return `<div class="stamp-card ${cls}">
        <div class="stamp-card-header">
          <div>
            <div class="stamp-customer">${r.customer||'Unknown'}</div>
            <div class="stamp-sub">P/I: ${r.pi||'—'} &nbsp;|&nbsp; Part: ${r.partNo||'—'}</div>
          </div>
          <span class="stamp-pill ${pillCls}">${pillLbl}</span>
        </div>
        <div class="stamp-info-grid">
          <div class="stamp-info-item"><div class="stamp-info-label">Carton ID</div><div class="stamp-info-value">${r.cartonId||'—'}</div></div>
          <div class="stamp-info-item"><div class="stamp-info-label">QTY</div><div class="stamp-info-value">${r.qty||'—'}</div></div>
          <div class="stamp-info-item"><div class="stamp-info-label">Packed Date</div><div class="stamp-info-value" style="font-size:0.8rem">${r.packedDate||'—'}</div></div>
          <div class="stamp-info-item"><div class="stamp-info-label">Verified By</div><div class="stamp-info-value" style="font-size:0.8rem">${r.checker||'—'}</div></div>
        </div>
        ${isStamped
          ? `<div class="stamp-date">Stamped on: ${r.stampDate||'—'}</div>`
          : `<button class="stamp-btn" id="stampBtn_${r.row}" onclick="markStamped(${r.row}, this)">🔖 Mark as Stamped</button>`
        }
      </div>`;
    }).join('');
  }

  // ── MARK AS STAMPED ───────────────────────────────────────
  async function markStamped(rowNum, btn) {
    if (!confirm('Mark this carton as stamped?')) return;
    btn.disabled = true;
    btn.textContent = 'Saving...';
    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'stamp', row: rowNum })
      });
      const result = await resp.json();
      if (result.success) {
        // Update local record so it moves to stamped list
        const rec = allRecords.find(r => r.row === rowNum);
        if (rec) { rec.stampStatus = 'Stamped ✅'; rec.stampDate = result.stampDate || ''; }
        updateStampStats();
        renderStampList();
      } else {
        throw new Error(result.error || 'Unknown error');
      }
    } catch(err) {
      alert('Error: ' + err.message);
      btn.disabled = false;
      btn.textContent = '🔖 Mark as Stamped';
    }
  }

  // ── OPEN RECORD DETAIL ────────────────────────────────────
  async function openRecord(rowNum) {
    document.getElementById('detailModal').style.display = 'block';
    document.getElementById('detailGrid').innerHTML = '<div style="color:#888;grid-column:span 2;">Loading...</div>';
    try {
      const resp = await fetch(SCRIPT_URL + '?action=record&row=' + rowNum);
      const r    = await resp.json();
      if (r.error) throw new Error(r.error);
      currentRecord = r;
      renderDetail(r);
    } catch(err) {
      document.getElementById('detailGrid').innerHTML = '<div style="color:#f44336;grid-column:span 2;">Failed: ' + err.message + '</div>';
    }
  }

  function renderDetail(r) {
    document.getElementById('modalTitle').textContent = (r.customer||'Record') + ' — ' + (r.cartonId||'');
    document.getElementById('detailGrid').innerHTML = [
      ['Customer',    r.customer],
      ['P/I No.',     r.pi||'(none)'],
      ['Part No.',    r.partNo],
      ['Carton ID',   r.cartonId],
      ['Packed Date', r.packedDate],
      ['Packed By',   r.packedBy],
      ['Packing Team',r.checkerBy],
      ['Qty',         r.qty]
    ].map(([l,v]) => `<div class="detail-item"><label>${l}</label><span>${v||'—'}</span></div>`).join('');

    const ms      = r.matchStatus || '';
    const bagOk   = ms.includes('Bag:✅');
    const innerOk = ms.includes('Inner:✅');
    const outerOk = ms.includes('Outer:✅');
    const bagNo   = (r.bag||'').toUpperCase()   === 'NO';
    const innerNo = (r.inner||'').toUpperCase() === 'NO';
    const outerNo = (r.outer||'').toUpperCase() === 'NO';
    document.getElementById('barcodeChecks').innerHTML = [
      ['Bag',   r.bag,   bagOk,   bagNo],
      ['Inner', r.inner, innerOk, innerNo],
      ['Outer', r.outer, outerOk, outerNo]
    ].map(([l,v,ok,isNo]) => `<div class="barcode-check">
      <span class="bc-label">${l}</span>
      <span class="bc-value">${v||'—'}</span>
      <span class="bc-badge ${isNo?'nobc':ok?'ok':'fail'}">${isNo?'⚠ No Barcode':ok?'✅ Match':'❌ Mismatch'}</span>
    </div>`).join('');

    document.getElementById('photosGrid').innerHTML = [
      ['Bag+Part',  r.imgBagUrl],
      ['Inner Box', r.imgInnerUrl],
      ['Carton',    r.imgCartonUrl]
    ].map(([lbl, url]) => {
      if (!url) return `<div class="photo-wrap"><div class="no-photo">No photo</div><div class="photo-lbl">${lbl}</div></div>`;
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)\//);
      const fid   = match ? match[1] : null;
      const thumb = fid ? 'https://drive.google.com/thumbnail?id=' + fid + '&sz=w400' : url;
      return `<div class="photo-wrap">
        <img src="${thumb}" alt="${lbl}" onclick="openLightbox('${thumb}')" onerror="this.parentElement.innerHTML='<div class=\\'no-photo\\'>View in Drive</div>'">
        <a class="open-link" href="${url}" target="_blank">Open ↗</a>
        <div class="photo-lbl">${lbl}</div>
      </div>`;
    }).join('');

    selectedVerdict = null;
    document.getElementById('checkerNameInput').value = r.checker || '';
    document.getElementById('remarksInput').value     = r.remarks || '';
    document.getElementById('saveVerifyBtn').disabled = true;
    document.getElementById('btnVerified').classList.remove('selected');
    document.getElementById('btnRejected').classList.remove('selected');
    document.getElementById('btnVerified').style.opacity = '0.5';
    document.getElementById('btnRejected').style.opacity = '0.5';
    if (r.status && (r.status.includes('Verified') || r.status.includes('Rejected'))) {
      selectVerdict(r.status.includes('Verified') ? 'Verified' : 'Rejected');
    }
  }

  function selectVerdict(v) {
    selectedVerdict = v;
    document.getElementById('btnVerified').classList.toggle('selected', v === 'Verified');
    document.getElementById('btnRejected').classList.toggle('selected', v === 'Rejected');
    document.getElementById('btnVerified').style.opacity = v === 'Verified' ? '1' : '0.5';
    document.getElementById('btnRejected').style.opacity = v === 'Rejected' ? '1' : '0.5';
    document.getElementById('saveVerifyBtn').disabled = false;
  }

  async function saveVerification() {
    if (!selectedVerdict || !currentRecord) return;
    const checkerName = document.getElementById('checkerNameInput').value.trim();
    const remarks     = document.getElementById('remarksInput').value.trim();
    if (!checkerName) { alert('Please enter your name.'); return; }
    if (selectedVerdict === 'Rejected' && !remarks) { alert('Please enter a remark for rejection.'); return; }

    const btn = document.getElementById('saveVerifyBtn');
    btn.disabled = true; btn.textContent = 'Saving...';

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action:  'verify',
          row:     currentRecord.row,
          checker: checkerName.toUpperCase(),
          status:  selectedVerdict === 'Verified' ? 'Verified ✅' : 'Rejected ❌',
          remarks: remarks.toUpperCase()
        })
      });
      const result = await resp.json();
      if (result.success) {
        // Update local record
        const rec = allRecords.find(r => r.row === currentRecord.row);
        if (rec) {
          rec.checker = checkerName.toUpperCase();
          rec.status  = selectedVerdict === 'Verified' ? 'Verified ✅' : 'Rejected ❌';
          rec.remarks = remarks.toUpperCase();
        }
        alert('Verification saved!');
        closeModal();
        updateVerifyStats();
        updateStampStats();
        renderVerifyList();
        renderStampList();
      } else {
        throw new Error(result.error || 'Unknown error');
      }
    } catch(err) {
      alert('Error: ' + err.message);
      btn.disabled = false; btn.textContent = 'Save Verification';
    }
  }

  function closeModal() {
    document.getElementById('detailModal').style.display = 'none';
    currentRecord = null; selectedVerdict = null;
  }

  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
</script>
</body>
</html>
