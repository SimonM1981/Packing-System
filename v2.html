<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carton Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            background: #fafafa;
        }

        .input-group input:focus {
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }

        .range-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .range-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        .range-sep {
            padding-bottom: 14px;
            color: #888;
            font-weight: bold;
            font-size: 18px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(102,126,234,0.5);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            box-shadow: 0 8px 25px rgba(17,153,142,0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            color: white;
            box-shadow: 0 8px 25px rgba(235,51,73,0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 25px rgba(102,126,234,0.3);
        }

        .stat-box.pending {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            box-shadow: 0 8px 25px rgba(235,51,73,0.3);
        }

        .stat-box.progress {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            box-shadow: 0 8px 25px rgba(17,153,142,0.3);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .progress-outer {
            background: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-inner {
            height: 100%;
            background: linear-gradient(90deg, #11998e, #38ef7d);
            border-radius: 10px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(17,153,142,0.3);
        }

        .cartons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 10px;
        }

        .carton {
            background: #fff;
            border: 3px solid #ff6b6b;
            border-radius: 16px;
            padding: 18px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            box-shadow: 0 4px 15px rgba(255,107,107,0.2);
        }

        .carton:active {
            transform: scale(0.92);
        }

        .carton.checked {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border-color: #11998e;
            color: white;
            box-shadow: 0 4px 20px rgba(17,153,142,0.4);
        }

        .carton-number {
            font-size: 15px;
            font-weight: 800;
            display: block;
        }

        .carton-status {
            font-size: 9px;
            margin-top: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .carton.checked .carton-status {
            opacity: 1;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .controls .btn {
            flex: 1;
            margin-top: 0;
            font-size: 13px;
            padding: 12px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-pill {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .job-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .job-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .job-card:hover {
            border-color: #667eea;
            background: #fff;
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(102,126,234,0.2);
        }

        .job-title {
            font-weight: 700;
            color: #333;
            font-size: 15px;
        }

        .job-meta {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }

        .sync-badge {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: white;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .sync-badge.online {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .sync-badge.offline {
            background: linear-gradient(135deg, #eb3349, #f45c43);
        }

        .sync-badge.syncing {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .back-btn {
            background: #666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #333;
        }

        .hidden { display: none !important; }

        @media (max-width: 500px) {
            .cartons-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 8px;
            }
            .carton {
                padding: 14px 4px;
            }
            .carton-number {
                font-size: 13px;
            }
            .stats-grid {
                gap: 10px;
            }
            .stat-value {
                font-size: 24px;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
<base target="_blank">
</head>
<body>

    <div class="sync-badge online" id="syncBadge">Online</div>

    <div class="container">

        <!-- Setup Screen -->
        <div id="setupScreen">
            <div class="card">
                <h1>Carton Tracker</h1>
                
                <div class="input-group">
                    <label>Staff Name</label>
                    <input type="text" id="staffName" placeholder="Enter your name">
                </div>
                
                <div class="input-group">
                    <label>Customer Name</label>
                    <input type="text" id="customerName" placeholder="Enter customer name">
                </div>
                
                <div class="input-group">
                    <label>Shipment Date</label>
                    <input type="date" id="shipmentDate">
                </div>
                
                <div class="input-group">
                    <label>Carton Range</label>
                    <div class="range-row">
                        <div class="input-group">
                            <input type="text" id="prefix" placeholder="Prefix" value="A">
                        </div>
                        <span class="range-sep">-</span>
                        <div class="input-group">
                            <input type="number" id="startNum" placeholder="Start" value="1" min="0">
                        </div>
                        <span class="range-sep">to</span>
                        <div class="input-group">
                            <input type="number" id="endNum" placeholder="End" value="100" min="0">
                        </div>
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="createJob()">Create Job</button>
            </div>

            <div class="card">
                <h3 style="margin-bottom:15px;color:#555;">Existing Jobs</h3>
                <div id="jobListContent">
                    <div class="loading-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tracking Screen -->
        <div id="trackingScreen" class="hidden">
            <button class="back-btn" onclick="backToSetup()">← Back to Jobs</button>
            
            <div class="card">
                <div class="info-bar">
                    <span class="info-pill" id="dispCustomer">-</span>
                    <span class="info-pill" id="dispDate">-</span>
                    <span class="info-pill" id="dispTotal">-</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="checkedCount">0</div>
                    <div class="stat-label">Checked</div>
                </div>
                <div class="stat-box pending">
                    <div class="stat-value" id="pendingCount">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-box progress">
                    <div class="stat-value" id="percentCount">0%</div>
                    <div class="stat-label">Progress</div>
                </div>
            </div>

            <div class="progress-outer">
                <div class="progress-inner" id="progressFill" style="width:0%"></div>
            </div>

            <div class="card">
                <div class="controls">
                    <button class="btn btn-success" onclick="markAll(true)">Check All</button>
                    <button class="btn btn-danger" onclick="markAll(false)">Uncheck All</button>
                    <button class="btn btn-warning" onclick="refreshData()">Refresh</button>
                </div>
            </div>

            <div class="card">
                <div class="cartons-grid" id="cartonsGrid"></div>
            </div>
        </div>

    </div>

    <script>
        // ============================================
        // CONFIG - REPLACE WITH YOUR GAS WEB APP URL
        // ============================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbwE0haYDWfHsae6mFtJ2UK4smuKC_aHPzCC5VfmLH1s-HME-kHDo7_QnQnMCqPKLW0RyA/exec';
        
        let currentJobId = null;
        let cartonData = {};
        let cartons = [];

        function setSync(status) {
            const el = document.getElementById('syncBadge');
            el.className = 'sync-badge ' + status;
            if (status === 'syncing') el.textContent = 'Syncing...';
            else if (status === 'online') el.textContent = 'Online';
            else el.textContent = 'Offline';
        }

        async function api(action, data) {
            setSync('syncing');
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(Object.assign({action: action}, data))
                });
                
                // no-cors mode doesn't allow reading response
                // So we assume success and refresh data
                setSync('online');
                return {success: true};
            } catch(err) {
                setSync('offline');
                console.error('API Error:', err);
                return {success: false, error: err.message};
            }
        }

        // Alternative: Use a CORS proxy
        async function apiWithProxy(action, data) {
            setSync('syncing');
            try {
                // Using corsproxy.io as example - you can use any CORS proxy
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);
                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(Object.assign({action: action}, data))
                });
                const result = await response.json();
                setSync('online');
                return result;
            } catch(err) {
                setSync('offline');
                console.error('API Error:', err);
                // Fallback: assume success for write operations
                return {success: true};
            }
        }

        async function createJob() {
            const staff = document.getElementById('staffName').value.trim();
            const customer = document.getElementById('customerName').value.trim();
            const date = document.getElementById('shipmentDate').value;
            const prefix = document.getElementById('prefix').value.trim().toUpperCase();
            const start = parseInt(document.getElementById('startNum').value) || 1;
            const end = parseInt(document.getElementById('endNum').value) || 100;

            if (!staff) { alert('Please enter your name'); return; }
            if (!customer || !date) { alert('Please fill Customer Name and Shipment Date'); return; }
            if (end < start) { alert('End must be greater than start'); return; }
            if (end - start > 5000) { alert('Maximum 5000 cartons'); return; }

            const cartonsArr = [];
            for (let i = start; i <= end; i++) {
                cartonsArr.push(prefix + String(i).padStart(3, '0'));
            }

            const result = await apiWithProxy('createJob', {
                customer, shipmentDate: date, prefix, startNum: start, endNum: end,
                totalCartons: cartonsArr.length, cartons: cartonsArr
            });

            if (result.success) {
                localStorage.setItem('staffName', staff);
                // Since we can't read response with no-cors, we need to get job list to find new job
                await loadJobList();
                alert('Job created! Please select it from the list below.');
            } else {
                alert('Error: ' + (result.error || 'Unknown'));
            }
        }

        async function loadJob(jobId) {
            const result = await apiWithProxy('getJob', {jobId});
            
            if (!result.success || !result.job) {
                // Fallback: create local job data from sheet
                alert('Loading job... Please refresh if data appears incomplete.');
                return;
            }

            currentJobId = jobId;
            const job = result.job;
            cartons = result.cartons.map(c => c.cartonNo);
            cartonData = {};
            result.cartons.forEach(c => cartonData[c.cartonNo] = c.checked);

            document.getElementById('dispCustomer').textContent = job.customer;
            document.getElementById('dispDate').textContent = job.shipmentDate;
            document.getElementById('dispTotal').textContent = job.totalCartons + ' cartons';

            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('trackingScreen').classList.remove('hidden');

            renderCartons();
            updateStats();
        }

        async function loadJobList() {
            const result = await apiWithProxy('getAllJobs', {});
            const container = document.getElementById('jobListContent');
            
            if (!result.success || !result.jobs || result.jobs.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No jobs yet. Create one above!</p></div>';
                return;
            }

            container.innerHTML = '';
            result.jobs.forEach(job => {
                const div = document.createElement('div');
                div.className = 'job-card';
                div.onclick = () => loadJob(job.jobId);
                
                div.innerHTML = `
                    <div class="job-title">${job.customer}</div>
                    <div class="job-meta">${job.shipmentDate} • ${job.prefix}${job.startNum}-${job.endNum} • ${job.totalCartons} cartons</div>
                `;
                
                container.appendChild(div);
            });
        }

        function backToSetup() {
            document.getElementById('trackingScreen').classList.add('hidden');
            document.getElementById('setupScreen').classList.remove('hidden');
            currentJobId = null;
            loadJobList();
        }

        function renderCartons() {
            const grid = document.getElementById('cartonsGrid');
            grid.innerHTML = '';

            cartons.forEach(num => {
                const div = document.createElement('div');
                div.className = 'carton' + (cartonData[num] ? ' checked' : '');
                div.onclick = () => toggleCarton(num);
                div.id = 'carton-' + num;
                
                div.innerHTML = `
                    <span class="carton-number">${num}</span>
                    <span class="carton-status">${cartonData[num] ? '✓ CHECKED' : 'PENDING'}</span>
                `;
                
                grid.appendChild(div);
            });
        }

        async function toggleCarton(num) {
            const staff = localStorage.getItem('staffName') || 'Unknown';
            const newChecked = !cartonData[num];
            
            await apiWithProxy('toggleCarton', {
                jobId: currentJobId,
                cartonNo: num,
                checked: newChecked,
                checkedBy: staff
            });

            // Update UI optimistically
            cartonData[num] = newChecked;
            const div = document.getElementById('carton-' + num);
            div.className = 'carton' + (newChecked ? ' checked' : '');
            div.querySelector('.carton-status').textContent = newChecked ? '✓ CHECKED' : 'PENDING';
            
            updateStats();
        }

        async function markAll(checked) {
            if (!confirm(checked ? 'Mark all as checked?' : 'Mark all as unchecked?')) return;
            
            const staff = localStorage.getItem('staffName') || 'Unknown';
            
            await apiWithProxy('markAll', {
                jobId: currentJobId,
                checked: checked,
                checkedBy: staff
            });

            cartons.forEach(c => cartonData[c] = checked);
            renderCartons();
            updateStats();
        }

        async function refreshData() {
            if (!currentJobId) return;
            await loadJob(currentJobId);
        }

        function updateStats() {
            const checked = Object.values(cartonData).filter(v => v).length;
            const total = cartons.length;
            const pending = total - checked;
            const percent = total > 0 ? Math.round((checked / total) * 100) : 0;

            document.getElementById('checkedCount').textContent = checked;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('percentCount').textContent = percent + '%';
            document.getElementById('progressFill').style.width = percent + '%';
        }

        // Init
        const savedStaff = localStorage.getItem('staffName');
        if (savedStaff) document.getElementById('staffName').value = savedStaff;
        document.getElementById('shipmentDate').valueAsDate = new Date();
        loadJobList();
    </script>

</body>
</html>
