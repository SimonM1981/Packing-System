<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MG Packing — Checker</title>
  <style>
    * { box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:0; min-height:100vh; }
    h1 { text-align:center; color:#ffb74d; margin:12px 0 4px; font-size:1.4rem; }
    .subtitle { text-align:center; color:#888; font-size:0.82rem; margin-bottom:16px; }

    /* PIN SCREEN */
    #pinScreen { max-width:340px; margin:80px auto; background:#1e1e1e; border:1px solid #333; border-radius:16px; padding:32px 24px; text-align:center; }
    #pinInput { width:100%; padding:14px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:22px; text-align:center; letter-spacing:0.3em; margin-bottom:12px; }
    #pinError { color:#f44336; font-size:0.85rem; margin-top:8px; display:none; }

    /* TABS */
    #mainScreen { display:none; }
    .main-tabs { display:flex; background:#161616; border-bottom:1px solid #333; position:sticky; top:0; z-index:50; }
    .main-tab { flex:1; padding:14px 8px; text-align:center; font-size:0.82rem; font-weight:700; color:#666; cursor:pointer; border-bottom:3px solid transparent; }
    .main-tab.active { color:#ffb74d; border-bottom-color:#ffb74d; background:#1a1a1a; }
    .tab-content { display:none; padding:16px; }
    .tab-content.active { display:block; }

    /* STATS & TOOLS */
    .stats-row { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .stat-box { flex:1; min-width:60px; background:#1e1e1e; border:1px solid #333; border-radius:8px; padding:10px 6px; text-align:center; }
    .stat-num { font-size:1.2rem; font-weight:700; }
    .stat-lbl { font-size:0.6rem; color:#666; text-transform:uppercase; }
    .toolbar { display:flex; gap:10px; margin-bottom:12px; }
    .toolbar input { flex:1; padding:10px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; }
    .refresh-btn { background:#455a64; border:none; color:white; padding:10px 16px; border-radius:8px; cursor:pointer; }

    /* CARDS */
    .record-card { background:#1e1e1e; border:1px solid #333; border-left:4px solid #555; border-radius:12px; padding:14px; margin-bottom:10px; cursor:pointer; }
    .record-card.verified { border-left-color:#4caf50; }
    .record-card.rejected { border-left-color:#f44336; }
    .record-card.pending  { border-left-color:#ff9800; }
    .record-header { display:flex; justify-content:space-between; align-items:center; }
    .record-customer { font-weight:700; color:#ffb74d; font-size:1rem; }
    .status-pill { padding:3px 8px; border-radius:10px; font-size:0.7rem; font-weight:bold; color:white; }
    .status-pill.verified { background:#2e7d32; }
    .status-pill.rejected { background:#b71c1c; }
    .status-pill.pending  { background:#e65100; }

    /* DETAIL MODAL */
    #detailModal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:100; overflow-y:auto; padding:16px; display:none; }
    .modal-card { background:#1e1e1e; border-radius:14px; padding:20px; max-width:600px; margin:0 auto 40px; border:1px solid #333; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .detail-item label { display:block; font-size:0.65rem; color:#666; text-transform:uppercase; margin-bottom:2px; }
    .detail-item span { font-size:0.95rem; font-weight:bold; color:#eee; }

    /* BARCODES */
    .barcode-check { display:flex; align-items:center; background:#2a2a2a; border-radius:8px; padding:10px; margin-bottom:6px; gap:10px; border:1px solid #333; }
    .bc-label { width:50px; font-size:0.75rem; color:#aaa; font-weight:bold; }
    .bc-value { flex:1; font-size:0.85rem; font-weight:bold; text-align:center; color:#fff; }
    .bc-badge { font-size:0.7rem; font-weight:bold; padding:4px 8px; border-radius:6px; min-width:85px; text-align:center; }
    .bc-badge.ok { color:#4caf50; background:rgba(76,175,80,0.15); border:1px solid #4caf50; }
    .bc-badge.fail { color:#f44336; background:rgba(244,67,54,0.15); border:1px solid #f44336; }
    .bc-badge.nobc { color:#ff9800; background:rgba(255,152,0,0.15); border:1px solid #ff9800; }

    /* PHOTOS - 50% LARGER (2 COLUMNS) */
    .photos-grid { display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:10px; margin-bottom:25px; }
    .photo-wrap { text-align:center; background:#111; padding:10px; border-radius:12px; border:1px solid #333; }
    .photo-wrap img { width:100%; height:220px; object-fit:contain; border-radius:8px; cursor:pointer; background:#000; }
    .photo-lbl { font-size:0.8rem; font-weight:bold; margin-bottom:8px; color:#ffb74d; }
    .open-link { display:block; font-size:0.75rem; color:#90caf9; text-decoration:none; padding:8px; border:1px solid #333; border-radius:6px; margin-top:8px; background:#1a1a1a; }

    /* VERIFICATION ACTIONS */
    .verdict-row { display:flex; gap:10px; margin-bottom:15px; }
    .verdict-btn { flex:1; padding:16px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; opacity:0.3; color:white; font-size:0.9rem; }
    .verdict-btn.verified { background:#2e7d32; }
    .verdict-btn.rejected { background:#b71c1c; }
    .verdict-btn.selected { opacity:1; outline:3px solid white; }
    .checker-input { width:100%; padding:14px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; margin-bottom:12px; font-size:1rem; }
    textarea { width:100%; height:90px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; padding:12px; font-size:0.95rem; }
    
    #lightbox { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:200; display:none; align-items:center; justify-content:center; }
    #lightbox img { max-width:98%; max-height:95%; border:2px solid #444; }
  </style>
</head>
<body>

<div id="pinScreen">
  <h2 style="color:#ffb74d">MG CHECKER</h2>
  <p style="color:#888; font-size:0.9rem;">Enter PIN to Access System</p>
  <input type="password" id="pinInput" maxlength="4" oninput="checkPin(this.value)" inputmode="numeric" autofocus>
  <div id="pinError">Invalid Access Code</div>
</div>

<div id="mainScreen">
  <h1>MG Packing System</h1>
  <div class="main-tabs">
    <div class="main-tab active" id="tabVerify" onclick="switchTab('verify')">CHECK LIST</div>
    <div class="main-tab" id="tabStamp" onclick="switchTab('stamp')">STAMPING</div>
  </div>

  <div class="tab-content active" id="contentVerify">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="vStatTotal">-</div><div class="stat-lbl">Total</div></div>
      <div class="stat-box"><div class="stat-num" id="vStatPending">-</div><div class="stat-lbl">Wait</div></div>
      <div class="stat-box"><div class="stat-num" id="vStatVerified">-</div><div class="stat-lbl">Pass</div></div>
      <div class="stat-box"><div class="stat-num" id="vStatRejected">-</div><div class="stat-lbl">Fail</div></div>
    </div>
    <div class="toolbar">
      <input type="text" id="vSearch" placeholder="Search Customer or PI..." oninput="renderVerifyList()">
      <button class="refresh-btn" onclick="loadRecords()">REFRESH</button>
    </div>
    <div id="verifyList"></div>
  </div>

  <div class="tab-content" id="contentStamp">
    <div id="stampList"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detailModal">
  <div class="modal-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:10px;">
      <h2 id="modalTitle" style="margin:0; color:#ffb74d; font-size:1.2rem;"></h2>
      <button onclick="closeModal()" style="background:#f44336; color:white; border:none; padding:8px 16px; border-radius:6px; font-weight:bold; cursor:pointer;">CLOSE</button>
    </div>

    <div class="detail-grid" id="detailGrid"></div>

    <div style="margin-bottom:10px;"><label class="stat-lbl">Barcode Verification</label></div>
    <div id="barcodeChecks" style="margin-bottom:25px;"></div>

    <div style="margin-bottom:10px;"><label class="stat-lbl">Inspection Photos</label></div>
    <div class="photos-grid" id="photosGrid"></div>

    <div style="border-top:1px solid #333; padding-top:20px;">
      <div class="verdict-row">
        <button class="verdict-btn verified" id="btnVerified" onclick="selectVerdict('Verified')">APPROVE ✅</button>
        <button class="verdict-btn rejected" id="btnRejected" onclick="selectVerdict('Rejected')">REJECT ❌</button>
      </div>
      <input type="text" class="checker-input" id="checkerNameInput" placeholder="CHECKER FULL NAME">
      <textarea id="remarksInput" placeholder="ADD NOTES OR REJECTION REASON HERE..."></textarea>
      <button id="saveVerifyBtn" onclick="saveVerification()" style="width:100%; padding:18px; background:#1565c0; color:white; border:none; border-radius:12px; font-weight:bold; margin-top:15px; font-size:1rem; cursor:pointer;">SUBMIT VERIFICATION</button>
    </div>
  </div>
</div>

<div id="lightbox" onclick="this.style.display='none'"><img id="lightboxImg"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJNbH09bwWqsO0lnM8j_xHA7ALfPFKpSjSFwUK4SRugrHqMWIhds7KhyUHN7kXR28/exec";
  const CHECKER_PIN = "1234"; 

  let allRecords = [];
  let currentRecord = null;
  let selectedVerdict = null;

  function checkPin(val) {
    if (val === CHECKER_PIN) {
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      loadRecords();
    }
  }

  function switchTab(tab) {
    document.getElementById('tabVerify').classList.toggle('active', tab === 'verify');
    document.getElementById('tabStamp').classList.toggle('active', tab === 'stamp');
    document.getElementById('contentVerify').classList.toggle('active', tab === 'verify');
    document.getElementById('contentStamp').classList.toggle('active', tab === 'stamp');
  }

  async function loadRecords() {
    try {
      const r = await fetch(SCRIPT_URL + '?action=records');
      const d = await r.json();
      allRecords = d.records || [];
      renderVerifyList();
      renderStampList();
      updateStats();
    } catch(e) { alert("Data Sync Error"); }
  }

  function updateStats() {
    const total = allRecords.length;
    const ok = allRecords.filter(r => (r.status||'').includes('Verified')).length;
    const fail = allRecords.filter(r => (r.status||'').includes('Rejected')).length;
    document.getElementById('vStatTotal').textContent = total;
    document.getElementById('vStatPending').textContent = total - ok - fail;
    document.getElementById('vStatVerified').textContent = ok;
    document.getElementById('vStatRejected').textContent = fail;
  }

  function renderVerifyList() {
    const search = document.getElementById('vSearch').value.toLowerCase();
    const html = allRecords.filter(r => (r.customer||'').toLowerCase().includes(search) || (r.pi||'').toLowerCase().includes(search))
      .map(r => {
        const s = (r.status||'').toLowerCase();
        const cls = s.includes('verified') ? 'verified' : s.includes('rejected') ? 'rejected' : 'pending';
        return `<div class="record-card ${cls}" onclick="openRecord(${r.row})">
          <div class="record-header">
            <span class="record-customer">${r.customer}</span>
            <span class="status-pill ${cls}">${r.status || 'Pending'}</span>
          </div>
          <div style="font-size:0.75rem; color:#888; margin-top:8px;">PI: ${r.pi} | Team: ${r.checkerBy || 'N/A'} | Date: ${r.packedDate}</div>
        </div>`;
      }).join('');
    document.getElementById('verifyList').innerHTML = html || '<div class="empty-state">No items found</div>';
  }

  function renderStampList() {
    const v = allRecords.filter(r => (r.status||'').includes('Verified') && !(r.stampStatus||'').includes('Stamped'));
    document.getElementById('stampList').innerHTML = v.map(r => `
      <div class="stamp-card">
        <div class="record-customer">${r.customer}</div>
        <div style="font-size:0.85rem; color:#aaa; margin:5px 0;">Carton: ${r.cartonId} | PI: ${r.pi}</div>
        <button class="stamp-btn" onclick="markStamped(${r.row})">MARK AS STAMPED</button>
      </div>
    `).join('') || '<div class="empty-state">Nothing to stamp</div>';
  }

  async function openRecord(row) {
    document.getElementById('detailModal').style.display = 'block';
    const res = await fetch(SCRIPT_URL + '?action=record&row=' + row);
    const r = await res.json();
    currentRecord = r;

    document.getElementById('modalTitle').textContent = r.customer + " [" + r.cartonId + "]";
    document.getElementById('detailGrid').innerHTML = `
      <div class="detail-item"><label>PI Number</label><span>${r.pi}</span></div>
      <div class="detail-item"><label>Packed Date</label><span>${r.packedDate}</span></div>
      <div class="detail-item"><label>Packing Team</label><span>${r.checkerBy || 'N/A'}</span></div>
      <div class="detail-item"><label>Packer Name</label><span>${r.packedBy}</span></div>
      <div class="detail-item"><label>Carton ID</label><span>${r.cartonId}</span></div>
      <div class="detail-item"><label>Quantity</label><span>${r.qty}</span></div>
    `;

    // Barcode Badges - Restoration of Logic
    const ms = r.matchStatus || '';
    const items = [
      {l:'BAG', v:r.bag, ok:ms.includes('Bag:✅'), no: (r.bag||'').toUpperCase()==='NO'},
      {l:'INNER', v:r.inner, ok:ms.includes('Inner:✅'), no: (r.inner||'').toUpperCase()==='NO'},
      {l:'OUTER', v:r.outer, ok:ms.includes('Outer:✅'), no: (r.outer||'').toUpperCase()==='NO'}
    ];
    document.getElementById('barcodeChecks').innerHTML = items.map(i => `
      <div class="barcode-check">
        <span class="bc-label">${i.l}</span>
        <span class="bc-value">${i.v || '-'}</span>
        <span class="bc-badge ${i.no?'nobc':i.ok?'ok':'fail'}">${i.no?'NO BARCODE':i.ok?'MATCH ✅':'MISMATCH ❌'}</span>
      </div>
    `).join('');

    // Photos - High Res Thumbnails & Bigger Display
    const photos = [
      {lbl:'BAG & PART', url: r.imgBagUrl},
      {lbl:'INNER BOX', url: r.imgInnerUrl},
      {lbl:'CARTON PHOTO', url: r.imgCartonUrl}
    ];
    document.getElementById('photosGrid').innerHTML = photos.map(p => {
      const match = (p.url||'').match(/[-\w]{25,}/);
      const thumb = match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=w800` : '';
      return `
        <div class="photo-wrap">
          <div class="photo-lbl">${p.lbl}</div>
          ${thumb ? `<img src="${thumb}" onclick="openLightbox('${thumb}')">` : `<div style="height:100px; color:#555; display:flex; align-items:center; justify-content:center;">No Photo Found</div>`}
          <a class="open-link" href="${p.url}" target="_blank">View Original ↗</a>
        </div>
      `;
    }).join('');

    selectedVerdict = null;
    document.getElementById('saveVerifyBtn').disabled = true;
    document.getElementById('btnVerified').classList.remove('selected');
    document.getElementById('btnRejected').classList.remove('selected');
    document.getElementById('checkerNameInput').value = r.checker || '';
    document.getElementById('remarksInput').value = r.remarks || '';
  }

  function selectVerdict(v) {
    selectedVerdict = v;
    document.getElementById('btnVerified').classList.toggle('selected', v === 'Verified');
    document.getElementById('btnRejected').classList.toggle('selected', v === 'Rejected');
    document.getElementById('saveVerifyBtn').disabled = false;
  }

  async function saveVerification() {
    const name = document.getElementById('checkerNameInput').value.trim();
    if(!name) return alert("Checker Name Required");
    
    document.getElementById('saveVerifyBtn').innerText = "SUBMITTING...";
    const body = {
      action: 'verify',
      row: currentRecord.row,
      checker: name.toUpperCase(),
      status: selectedVerdict === 'Verified' ? 'Verified ✅' : 'Rejected ❌',
      remarks: document.getElementById('remarksInput').value.toUpperCase()
    };
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(body) });
    closeModal();
    loadRecords();
    document.getElementById('saveVerifyBtn').innerText = "SUBMIT VERIFICATION";
  }

  async function markStamped(row) {
    if(!confirm("Are you sure you want to stamp this?")) return;
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({action:'stamp', row:row}) });
    loadRecords();
  }

  function closeModal() { document.getElementById('detailModal').style.display='none'; }
  function openLightbox(s) { document.getElementById('lightboxImg').src=s; document.getElementById('lightbox').style.display='flex'; }
</script>
</body>
</html>
