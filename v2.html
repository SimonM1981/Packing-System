<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carton Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 10px;
            min-height: 100vh;
        }

        .header {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 20px;
            color: #333;
            margin-bottom: 12px;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #4CAF50;
        }

        .range-inputs {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .range-inputs .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        .range-inputs span {
            padding-bottom: 10px;
            color: #666;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-primary {
            background: #2196F3;
            color: white;
        }

        .btn-primary:hover {
            background: #1976D2;
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-warning {
            background: #FF9800;
            color: white;
        }

        .stats-bar {
            background: #fff;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
        }

        .stat.checked .stat-value {
            color: #4CAF50;
        }

        .stat.pending .stat-value {
            color: #f44336;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4CAF50;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .cartons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
        }

        .carton {
            background: #fff;
            border: 2px solid #f44336;
            border-radius: 10px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .carton:active {
            transform: scale(0.95);
        }

        .carton.checked {
            background: #4CAF50;
            border-color: #4CAF50;
            color: white;
        }

        .carton-number {
            font-size: 14px;
            font-weight: bold;
            display: block;
        }

        .carton-status {
            font-size: 10px;
            margin-top: 2px;
            opacity: 0.7;
        }

        .carton.checked .carton-status {
            opacity: 1;
        }

        .controls {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .controls h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn-group .btn {
            flex: 1;
            margin-top: 0;
            font-size: 13px;
            padding: 10px;
        }

        .hidden {
            display: none !important;
        }

        .info-display {
            background: #fff;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #888;
            font-size: 13px;
        }

        .info-value {
            color: #333;
            font-weight: 600;
            font-size: 13px;
        }

        .job-list {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .job-list h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .job-item {
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .job-item:hover {
            background: #f8f8f8;
            border-color: #2196F3;
        }

        .job-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job-item-title {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .job-item-meta {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .job-progress {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2196F3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .sync-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            z-index: 1000;
        }

        .sync-status.online {
            background: #4CAF50;
            color: white;
        }

        .sync-status.offline {
            background: #f44336;
            color: white;
        }

        .sync-status.syncing {
            background: #FF9800;
            color: white;
        }

        .back-btn {
            background: #666;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        @media (max-width: 400px) {
            .cartons-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 6px;
            }
            .carton {
                padding: 12px 3px;
            }
            .carton-number {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="sync-status online" id="syncStatus">Online</div>

    <!-- Setup Screen -->
    <div id="setupScreen">
        <div class="header">
            <h1>Carton Tracker</h1>
            
            <div class="input-group">
                <label>Staff Name</label>
                <input type="text" id="staffName" placeholder="Enter your name">
            </div>
            
            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="customerName" placeholder="Enter customer name">
            </div>
            
            <div class="input-group">
                <label>Shipment Date</label>
                <input type="date" id="shipmentDate">
            </div>
            
            <div class="input-group">
                <label>Carton Range</label>
                <div class="range-inputs">
                    <div class="input-group">
                        <input type="text" id="prefix" placeholder="Prefix (e.g. A)" value="A">
                    </div>
                    <span>-</span>
                    <div class="input-group">
                        <input type="number" id="startNum" placeholder="Start" value="1" min="0">
                    </div>
                    <span>to</span>
                    <div class="input-group">
                        <input type="number" id="endNum" placeholder="End" value="100" min="0">
                    </div>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="createJob()">Create Job</button>
        </div>

        <div class="job-list" id="jobList">
            <h3>Existing Jobs</h3>
            <div id="jobListContent">Loading...</div>
        </div>
    </div>

    <!-- Tracking Screen -->
    <div id="trackingScreen" class="hidden">
        <button class="back-btn" onclick="backToSetup()">Back to Jobs</button>
        
        <div class="info-display">
            <div class="info-item">
                <span class="info-label">Customer</span>
                <span class="info-value" id="dispCustomer">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Shipment Date</span>
                <span class="info-value" id="dispDate">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Total Cartons</span>
                <span class="info-value" id="dispTotal">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Job ID</span>
                <span class="info-value" id="dispJobId" style="font-size: 11px;">-</span>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat checked">
                <div class="stat-value" id="checkedCount">0</div>
                <div class="stat-label">Checked</div>
            </div>
            <div class="stat pending">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="percentCount">0%</div>
                <div class="stat-label">Progress</div>
            </div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

        <div class="controls">
            <h3>Quick Actions</h3>
            <div class="btn-group">
                <button class="btn btn-success" onclick="markAll(true)">Check All</button>
                <button class="btn btn-danger" onclick="markAll(false)">Uncheck All</button>
                <button class="btn btn-warning" onclick="refreshData()">Refresh</button>
            </div>
        </div>

        <div class="cartons-grid" id="cartonsGrid"></div>
    </div>

    <script>
        // ============================================
        // CONFIG - REPLACE WITH YOUR GAS WEB APP URL
        // ============================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbxTycndiDagxI2y-e1NeXzK2fEBeL-XeXecZo4lsavz0MKCTP_Ptl-UyL9YulSzmcNmRQ/exec';
        
        let currentJobId = null;
        let cartonData = {};
        let cartons = [];
        let isSyncing = false;

        // ============================================
        // API CALLS
        // ============================================

        async function apiCall(action, data) {
            setSyncStatus('syncing');
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(Object.assign({action: action}, data))
                });
                const result = await response.json();
                setSyncStatus('online');
                return result;
            } catch(err) {
                setSyncStatus('offline');
                console.error('API Error:', err);
                alert('Connection error. Please check your internet.');
                return {success: false, error: err.message};
            }
        }

        function setSyncStatus(status) {
            const el = document.getElementById('syncStatus');
            el.className = 'sync-status ' + status;
            if (status === 'syncing') el.textContent = 'Syncing...';
            else if (status === 'online') el.textContent = 'Online';
            else el.textContent = 'Offline';
        }

        // ============================================
        // JOB MANAGEMENT
        // ============================================

        async function createJob() {
            const staff = document.getElementById('staffName').value.trim();
            const customer = document.getElementById('customerName').value.trim();
            const date = document.getElementById('shipmentDate').value;
            const prefix = document.getElementById('prefix').value.trim().toUpperCase();
            const start = parseInt(document.getElementById('startNum').value) || 1;
            const end = parseInt(document.getElementById('endNum').value) || 100;

            if (!staff) {
                alert('Please enter your name');
                return;
            }
            if (!customer || !date) {
                alert('Please fill in Customer Name and Shipment Date');
                return;
            }
            if (end < start) {
                alert('End number must be greater than start number');
                return;
            }
            if (end - start > 5000) {
                alert('Maximum 5000 cartons allowed');
                return;
            }

            // Generate cartons array
            cartons = [];
            for (let i = start; i <= end; i++) {
                cartons.push(prefix + String(i).padStart(3, '0'));
            }

            const result = await apiCall('createJob', {
                customer: customer,
                shipmentDate: date,
                prefix: prefix,
                startNum: start,
                endNum: end,
                totalCartons: cartons.length,
                cartons: cartons
            });

            if (result.success) {
                currentJobId = result.jobId;
                // Save staff name for later
                localStorage.setItem('staffName', staff);
                loadJob(currentJobId);
            } else {
                alert('Error: ' + (result.error || 'Unknown error'));
            }
        }

        async function loadJob(jobId) {
            const result = await apiCall('getJob', {jobId: jobId});
            
            if (!result.success) {
                alert('Error loading job: ' + result.error);
                return;
            }

            currentJobId = jobId;
            const job = result.job;
            cartons = result.cartons.map(c => c.cartonNo);
            
            // Build carton data map
            cartonData = {};
            result.cartons.forEach(c => {
                cartonData[c.cartonNo] = c.checked;
            });

            // Update display
            document.getElementById('dispCustomer').textContent = job.customer;
            document.getElementById('dispDate').textContent = job.shipmentDate;
            document.getElementById('dispTotal').textContent = job.totalCartons;
            document.getElementById('dispJobId').textContent = job.jobId;

            // Show tracking screen
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('trackingScreen').classList.remove('hidden');

            renderCartons();
            updateStats();
        }

        async function loadJobList() {
            const result = await apiCall('getAllJobs', {});
            const container = document.getElementById('jobListContent');
            
            if (!result.success || !result.jobs || result.jobs.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align: center;">No jobs yet. Create one above.</p>';
                return;
            }

            container.innerHTML = '';
            result.jobs.forEach(job => {
                const div = document.createElement('div');
                div.className = 'job-item';
                div.onclick = () => loadJob(job.jobId);
                
                div.innerHTML = `
                    <div class="job-item-header">
                        <span class="job-item-title">${job.customer}</span>
                        <span style="font-size: 11px; color: #888;">${job.shipmentDate}</span>
                    </div>
                    <div class="job-item-meta">${job.prefix}${job.startNum}-${job.endNum} (${job.totalCartons} cartons)</div>
                `;
                
                container.appendChild(div);
            });
        }

        function backToSetup() {
            document.getElementById('trackingScreen').classList.add('hidden');
            document.getElementById('setupScreen').classList.remove('hidden');
            currentJobId = null;
            loadJobList();
        }

        // ============================================
        // CARTON GRID
        // ============================================

        function renderCartons() {
            const grid = document.getElementById('cartonsGrid');
            grid.innerHTML = '';

            cartons.forEach(num => {
                const div = document.createElement('div');
                div.className = 'carton' + (cartonData[num] ? ' checked' : '');
                div.onclick = () => toggleCarton(num);
                div.id = 'carton-' + num;
                
                div.innerHTML = `
                    <span class="carton-number">${num}</span>
                    <span class="carton-status">${cartonData[num] ? '✓ CHECKED' : 'PENDING'}</span>
                `;
                
                grid.appendChild(div);
            });
        }

        async function toggleCarton(num) {
            const staff = localStorage.getItem('staffName') || 'Unknown';
            const newChecked = !cartonData[num];
            
            const result = await apiCall('toggleCarton', {
                jobId: currentJobId,
                cartonNo: num,
                checked: newChecked,
                checkedBy: staff
            });

            if (result.success) {
                cartonData[num] = newChecked;
                
                // Update DOM only (fast)
                const div = document.getElementById('carton-' + num);
                div.className = 'carton' + (newChecked ? ' checked' : '');
                div.querySelector('.carton-status').textContent = newChecked ? '✓ CHECKED' : 'PENDING';
                
                updateStats();
            }
        }

        async function markAll(checked) {
            if (!confirm(checked ? 'Mark all cartons as checked?' : 'Mark all cartons as unchecked?')) return;
            
            const staff = localStorage.getItem('staffName') || 'Unknown';
            
            const result = await apiCall('markAll', {
                jobId: currentJobId,
                checked: checked,
                checkedBy: staff
            });

            if (result.success) {
                cartons.forEach(c => cartonData[c] = checked);
                renderCartons();
                updateStats();
            }
        }

        async function refreshData() {
            if (!currentJobId) return;
            await loadJob(currentJobId);
        }

        function updateStats() {
            const checked = Object.values(cartonData).filter(v => v).length;
            const total = cartons.length;
            const pending = total - checked;
            const percent = total > 0 ? Math.round((checked / total) * 100) : 0;

            document.getElementById('checkedCount').textContent = checked;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('percentCount').textContent = percent + '%';
            document.getElementById('progressFill').style.width = percent + '%';
        }

        // ============================================
        // INIT
        // ============================================

        // Load saved staff name
        const savedStaff = localStorage.getItem('staffName');
        if (savedStaff) {
            document.getElementById('staffName').value = savedStaff;
        }

        // Set today's date
        document.getElementById('shipmentDate').valueAsDate = new Date();

        // Load job list on start
        loadJobList();
    </script>

</body>
</html>
