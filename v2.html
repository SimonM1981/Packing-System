<style>
/* ── Reset & Base ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--card:#141414;--border:#272727;--muted:#1e1e1e;
  --text:#e8e8e8;--muted-fg:#666;--primary:#22c55e;--primary-dim:rgba(34,197,94,.12);
  --primary-border:rgba(34,197,94,.35);--danger:#ef4444;--danger-dim:rgba(239,68,68,.12);
  --danger-border:rgba(239,68,68,.35);--amber:#f59e0b;--amber-dim:rgba(245,158,11,.12);
  --amber-border:rgba(245,158,11,.35);--font:'JetBrains Mono',ui-monospace,monospace;
  --radius:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--font)}
input,textarea,select{font-family:var(--font)}
img{max-width:100%;display:block}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;overflow-y:auto;padding:28px 32px}
@media(max-width:700px){
  #app{flex-direction:column}
  #sidebar{width:100%;flex-direction:row;flex-wrap:wrap;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:8px}
  #main{padding:16px}
  #sidebar .brand{display:none}
  #sidebar .section-label{display:none}
  #sidebar nav{display:flex;flex-wrap:wrap;gap:4px}
}
.brand{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.brand-name{font-weight:700;font-size:15px;letter-spacing:.1em;text-transform:uppercase;color:var(--primary)}
.brand-sub{font-size:10px;color:var(--muted-fg);letter-spacing:.15em;text-transform:uppercase;margin-top:2px}
.section-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-fg);padding:16px 16px 4px}
nav a{display:flex;align-items:center;gap:9px;padding:8px 14px;border-radius:6px;margin:2px 8px;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted-fg);transition:background .15s,color .15s}
nav a svg{width:15px;height:15px;flex-shrink:0}
nav a:hover{background:var(--muted);color:var(--text)}
nav a.active{background:var(--primary-dim);color:var(--primary)}
nav a.danger{color:var(--danger)}
nav a.danger.active{background:var(--danger-dim);color:var(--danger)}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:24px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.page-title svg{width:22px;height:22px;color:var(--primary);flex-shrink:0}
.page-subtitle{font-size:12px;color:var(--muted-fg);margin-top:4px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden}
.stat-card .icon{position:absolute;right:12px;top:12px;opacity:.08;width:48px;height:48px}
.stat-card .label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted-fg)}
.stat-card .value{font-size:34px;font-weight:700;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border:none;transition:opacity .15s,background .15s;cursor:pointer}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#000}
.btn-primary:hover:not(:disabled){background:#16a34a}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover:not(:disabled){background:#dc2626}
.btn-danger-outline{background:transparent;color:var(--danger);border:1px solid var(--danger-border)}
.btn-danger-outline:hover:not(:disabled){background:var(--danger-dim)}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-icon{padding:6px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted-fg)}
.btn-icon:hover{border-color:var(--primary);color:var(--primary)}
.btn-full{width:100%;justify-content:center}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-fg)}
.form-label .req{color:var(--primary)}
input[type=text],input[type=number],textarea,select{
  width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
  padding:7px 10px;border-radius:6px;font-size:13px;outline:none;transition:border-color .15s;
  font-family:var(--font);text-transform:uppercase
}
textarea{text-transform:none}
input:focus,textarea:focus,select:focus{border-color:var(--primary)}
input.match-ok{border-color:var(--primary);background:rgba(34,197,94,.06)}
input.match-fail{border-color:var(--danger);background:rgba(239,68,68,.06)}
input.match-amber{border-color:var(--amber);background:var(--amber-dim)}
.form-error{font-size:11px;color:var(--danger)}
.input-wrap{display:flex;gap:6px;align-items:stretch}
.input-wrap input{flex:1}
.table-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:rgba(255,255,255,.03)}
th{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-fg);padding:9px 12px;text-align:left;white-space:nowrap}
td{padding:10px 12px;border-top:1px solid var(--border);font-size:12px;vertical-align:top}
tr:hover td{background:rgba(255,255,255,.02)}
tr.rejected td{border-left:3px solid var(--danger)}
tr.clickable{cursor:pointer}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid}
.badge-green{background:var(--primary-dim);color:var(--primary);border-color:var(--primary-border)}
.badge-red{background:var(--danger-dim);color:var(--danger);border-color:var(--danger-border)}
.badge-amber{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-border)}
.badge-muted{background:var(--muted);color:var(--muted-fg);border-color:var(--border)}
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius);border:1px solid;font-size:12px;margin-bottom:14px}
.alert svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
.alert-danger{background:var(--danger-dim);border-color:var(--danger-border);color:var(--danger)}
.alert-success{background:var(--primary-dim);border-color:var(--primary-border);color:var(--primary)}
.alert-amber{background:var(--amber-dim);border-color:var(--amber-border);color:var(--amber)}
.section-title{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-fg);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-body{padding:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
@media(max-width:600px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-sm{max-width:400px}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
#camera-modal .modal{max-width:440px}
#camera-video{width:100%;display:block;background:#000;max-height:300px;object-fit:cover}
.scan-overlay{position:relative}
.scan-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-frame-inner{border:2px solid rgba(34,197,94,.5);border-radius:8px;width:220px;height:110px}
.photo-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--muted);color:var(--muted-fg);cursor:pointer;transition:border-color .15s,color .15s,background .15s;text-align:left}
.photo-btn.has-photo{border-color:var(--primary-border);background:var(--primary-dim);color:var(--primary)}
.photo-btn svg{width:18px;height:18px;flex-shrink:0}
.photo-thumb{width:100%;max-height:110px;object-fit:cover;border-radius:6px;border:1px solid var(--border);margin-top:6px}
.form-panel{border:1px solid var(--primary-border);border-radius:var(--radius);background:var(--card);overflow:hidden;margin-top:16px}
.form-panel.danger-panel{border-color:var(--danger-border)}
.form-panel-header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.form-panel-header.primary-bg{background:var(--primary-dim);border-bottom:1px solid var(--primary-border)}
.form-panel-header.danger-bg{background:var(--danger-dim);border-bottom:1px solid var(--danger-border)}
.form-panel-body{padding:16px}
.match-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px;border:1px solid;white-space:nowrap}
.match-badge.ok{background:var(--primary-dim);color:var(--primary);border-color:var(--primary-border)}
.match-badge.fail{background:var(--danger-dim);color:var(--danger);border-color:var(--danger-border)}
.match-badge.no-bc{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-border)}
.match-badge.checking{background:var(--muted);color:var(--muted-fg);border-color:var(--border)}
.info-row{display:flex;flex-wrap:wrap;gap:6px 24px;font-size:11px;color:var(--muted-fg);padding:8px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
.info-row strong{color:var(--text)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--muted-fg);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes pulse-anim{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse-anim 1.4s ease-in-out infinite}
.online-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--primary);background:var(--primary-dim);padding:4px 10px;border-radius:20px;border:1px solid var(--primary-border)}
.ping-dot{position:relative;width:8px;height:8px;flex-shrink:0}
.ping-dot::before{content:'';position:absolute;inset:0;border-radius:50%;background:var(--primary);animation:ping 1s ease-in-out infinite;opacity:.75}
.ping-dot::after{content:'';position:absolute;inset:0;border-radius:50%;background:var(--primary)}
.detail-kv{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:500px){.detail-kv{grid-template-columns:1fr 1fr}}
.kv-box{background:var(--muted);border-radius:6px;padding:10px 12px}
.kv-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-fg);margin-bottom:3px}
.kv-value{font-size:13px;font-weight:700}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:200;display:flex;align-items:center;justify-content:center;cursor:pointer}
#lightbox img{max-width:94vw;max-height:94vh;object-fit:contain;border-radius:8px}
#lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.search-wrap{position:relative;display:inline-flex;align-items:center}
.search-wrap svg{position:absolute;left:8px;width:14px;height:14px;color:var(--muted-fg);pointer-events:none}
.search-wrap input{padding-left:28px;text-transform:none}
#toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:12px;color:var(--text);max-width:320px;pointer-events:auto;opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s}
.toast.show{opacity:1;transform:none}
.toast.success{border-color:var(--primary-border);color:var(--primary)}
.toast.error{border-color:var(--danger-border);color:var(--danger)}
.empty-state{text-align:center;padding:48px 16px;color:var(--muted-fg)}
.empty-state svg{width:40px;height:40px;margin:0 auto 10px;opacity:.3}
.gap-8{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.gap-8.right{justify-content:flex-end}
.spacer{flex:1}
.text-primary{color:var(--primary)}
.text-danger{color:var(--danger)}
.text-amber{color:var(--amber)}
.text-muted{color:var(--muted-fg)}
.text-sm{font-size:11px}
.text-xs{font-size:10px}
.font-bold{font-weight:700}
.mt-4{margin-top:4px}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.hidden{display:none!important}
.record-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.record-card:hover{border-color:var(--primary)}
</style>
</head>

const GAS_URL = 'https://script.google.com/macros/s/AKfycbxJNbH09bwWqsO0lnM8j_xHA7ALfPFKpSjSFwUK4SRugrHqMWIhds7KhyUHN7kXR28/exec';
let currentPage = '';
let currentListId = null;
let cameraCallback = null;
let cameraReader = null;
let pendingEditRow = null;
let allRecords = [];
let masterData = [];

const LS_LISTS = 'mg_packing_lists_v2';
let LISTS = [];

function saveLists() { localStorage.setItem(LS_LISTS, JSON.stringify(LISTS)); }
function loadLists() {
  try { LISTS = JSON.parse(localStorage.getItem(LS_LISTS) || '[]'); } catch { LISTS = []; }
}

async function gasGet(params) {
  if (!GAS_URL) return null;
  const url = GAS_URL + '?' + new URLSearchParams(params);
  try {
    const r = await fetch(url);
    return await r.json();
  } catch(e) {
    console.warn('gasGet failed:', e.message);
    return null;
  }
}

async function gasPost(data) {
  if (!GAS_URL) return null;
  try {
    const r = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    });
    return await r.json();
  } catch(e) {
    console.warn('gasPost failed:', e.message);
    return null;
  }
}

function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  requestAnimationFrame(() => { el.classList.add('show'); });
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

function nav(page, listId=null) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  currentPage = page;
  const el = document.getElementById('page-' + (page === 'list-detail' ? 'list-detail' : page));
  if (el) el.classList.remove('hidden');
  const link = document.querySelector(`nav a[data-page="${page}"]`);
  if (link) link.classList.add('active');

  if (page === 'dashboard') renderDashboard();
  else if (page === 'packing-lists') renderPackingLists();
  else if (page === 'list-detail') { currentListId = listId; renderListDetail(); }
  else if (page === 'checker') renderChecker();
  else if (page === 'master') renderMaster();
  else if (page === 'rejects') renderRejects();
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  if (isNaN(d)) return String(ts).slice(0, 16);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit' })
       + ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
function fmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  if (isNaN(d)) return String(ts).slice(11, 16);
  return d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

function compressImage(file, maxPx=800, q=0.7) {
  return new Promise((res, rej) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w=img.width, h=img.height;
      if (w>h && w>maxPx) { h=Math.round(h*maxPx/w); w=maxPx; }
      else if (h>maxPx) { w=Math.round(w*maxPx/h); h=maxPx; }
      const c = document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg', q));
    };
    img.onerror = rej;
    img.src = url;
  });
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.remove('hidden');
}
function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }

async function openCamera(label, cb) {
  cameraCallback = cb;
  document.getElementById('camera-label').textContent = 'Scan — ' + label;
  document.getElementById('camera-error').classList.add('hidden');
  document.getElementById('camera-modal').classList.remove('hidden');

  const errEl = document.getElementById('camera-error');

  try {
    if (typeof Html5Qrcode === 'undefined') {
      throw new Error('Scanner library not loaded. Check internet connection.');
    }

    if (cameraReader) {
      try { await cameraReader.stop(); } catch(e){}
      try { await cameraReader.clear(); } catch(e){}
      cameraReader = null;
    }

    await new Promise(r => setTimeout(r, 300));

    cameraReader = new Html5Qrcode('camera-video');

    const devices = await Html5Qrcode.getCameras();
    if (!devices || devices.length === 0) throw new Error('No camera found');

    const back = devices.find(d =>
      d.label.toLowerCase().includes('back') ||
      d.label.toLowerCase().includes('rear') ||
      d.label.toLowerCase().includes('environment')
    );
    const cameraId = back ? { deviceId: back.id } : { facingMode: 'environment' };

    await cameraReader.start(
      cameraId,
      { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
      (decodedText) => {
        const val = decodedText.trim().toUpperCase();
        closeCamera();
        cb(val);
      },
      () => {}
    );
  } catch(e) {
    errEl.textContent = e.message.includes('Permission')
      ? 'Camera permission denied. Allow camera access or use a barcode scanner.'
      : 'Camera unavailable: ' + e.message;
    errEl.classList.remove('hidden');
  }
}

function closeCamera() {
  document.getElementById('camera-modal').classList.add('hidden');
  if (cameraReader) {
    try { cameraReader.stop().catch(()=>{}); } catch(e){}
    try { cameraReader.clear().catch(()=>{}); } catch(e){}
    setTimeout(() => { cameraReader = null; }, 100);
  }
}

async function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  el.innerHTML = `
    <div class="page-header">
      <div>

    </div>
    <div class="stat-grid" id="stat-grid"><div class="pulse text-muted text-sm">Loading stats...</div></div>`;

  let records = [];
  try {
    const res = await gasGet({ action: 'records' });
    if (res && res.records) { records = res.records; allRecords = records; }
  } catch(_) {}

  const today = new Date().toDateString();
  const todayEntries = records.filter(r => new Date(r.timestamp).toDateString() === today).length;
  const pending = records.filter(r => !r.status || r.status.toLowerCase() === '').length;
  const approved = records.filter(r => r.status && r.status.toLowerCase().includes('approved')).length;
  const rejected = records.filter(r => r.status && r.status.toLowerCase().includes('rejected')).length;

  document.getElementById('stat-grid').innerHTML = [
    { label: "Today's Entries", value: todayEntries, icon: 'ic-activity', color: '#3b82f6' },
    { label: 'Pending Review', value: pending, icon: 'ic-clock', color: 'var(--amber)' },
    { label: 'Approved', value: approved, icon: 'ic-check', color: 'var(--primary)' },
    { label: 'Rejected', value: rejected, icon: 'ic-alert', color: 'var(--danger)' },
    { label: 'Total Cartons', value: records.length, icon: 'ic-box', color: 'var(--muted-fg)' },
  ].map(s => `
    <div class="stat-card">
      <svg class="icon" style="color:${s.color}"><use href="#${s.icon}"/></svg>
      <div class="label">${s.label}</div>
      <div class="value" style="color:${s.color}">${s.value}</div>
    </div>`).join('');
}

function nextListRef() {
  const max = LISTS.reduce((m, l) => {
    const n = parseInt((l.listRef || '').replace('PL-', '') || '0');
    return Math.max(m, n);
  }, 0);
  return 'PL-' + String(max + 1).padStart(4, '0');
}

function restoreFormValues() {

async function handlePhoto(which, input) {

let lookupCache = {};
const lookupDebounce = {};

function onBarcodeInput(which) {
  const el = document.getElementById('f-' + which);
  if (!el) return;
  const val = el.value.trim().toUpperCase();
  if (which === 'bag') formState.bag.value = val;
  if (which === 'inner') formState.inner.value = val;
  if (which === 'outer') formState.outer.value = val;
  el.value = val;
  if (!val) { setMatchBadge(which, null); updateSubmitBtn(); return; }
  if (val === 'NO') { setMatchBadge(which, 'no'); updateSubmitBtn(); return; }
  clearTimeout(lookupDebounce[which]);
  setMatchBadge(which, 'checking');
  lookupDebounce[which] = setTimeout(() => doLookup(which, val), 500);
}

function onOrderFieldChange(field) {
  const val = (document.getElementById(field === 'partNo' ? 'f-partNo' : 'f-pi')||{}).value || '';
  if (field === 'partNo') formState.partNo = val.trim().toUpperCase();
  if (field === 'pi') formState.pi = val.trim().toUpperCase();
  const inp = document.getElementById(field === 'partNo' ? 'f-partNo' : 'f-pi');
  if (inp) inp.value = formState[field];
  lookupCache = {};
  ['bag','inner','outer'].forEach(w => {
    const bc = formState[w] && formState[w].value;
    if (bc && bc !== 'NO') {
      clearTimeout(lookupDebounce[w]);
      setMatchBadge(w, 'checking');
      lookupDebounce[w] = setTimeout(() => doLookup(w, bc), 400);
    }
  });
}

async function doLookup(which, barcode) {
  const partNo = ((document.getElementById('f-partNo')||{}).value || '').trim().toUpperCase();
  const pi     = ((document.getElementById('f-pi')||{}).value || '').trim().toUpperCase();
  const key    = `${barcode}|${partNo}|${pi}`;
  if (lookupCache[key] !== undefined) {
    applyLookupResult(which, barcode, lookupCache[key]);
    return;
  }
  if (!GAS_URL) {
    setMatchBadge(which, 'error');
    updateSubmitBtn();
    return;
  }
  try {
    const res = await gasGet({ action:'lookup', barcode, pi, partNo });
    if (res === null) { setMatchBadge(which, 'error'); updateSubmitBtn(); return; }
    lookupCache[key] = res;
    applyLookupResult(which, barcode, res);
  } catch(e) {
    setMatchBadge(which, 'error');
    updateSubmitBtn();
  }
}

function applyLookupResult(which, barcode, res) {
  if (res && res.found) {
    if (which === 'bag') {
      if (res.partNo) {
        const pnEl = document.getElementById('f-partNo');
        if (pnEl && !pnEl.value) {
          pnEl.value = String(res.partNo).toUpperCase();
          formState.partNo = pnEl.value;
          lookupCache = {};
          ['inner','outer'].forEach(w => {
            const bc = formState[w] && formState[w].value;
            if (bc && bc !== 'NO') {
              clearTimeout(lookupDebounce[w]);
              setMatchBadge(w, 'checking');
              lookupDebounce[w] = setTimeout(() => doLookup(w, bc), 400);
            }
          });
        }
      }
      if (res.pi) {
        const piEl = document.getElementById('f-pi');
        if (piEl && !piEl.value) {
          piEl.value = String(res.pi).toUpperCase();
          formState.pi = piEl.value;
        }
      }
    }
    formState[which].match = true;
    setMatchBadge(which, true);
  } else {
    formState[which].match = false;
    setMatchBadge(which, false);
  }
  updateSubmitBtn();
}

function setMatchBadge(which, state) {
  if (which === 'bag' || which === 'inner' || which === 'outer') {
    formState[which].match = (state === 'no') ? 'no' : state;
  }
  const badge = document.getElementById('match-badge-' + which);
  const input = document.getElementById('f-' + which);
  if (!badge || !input) return;
  input.className = '';
  badge.style.display = '';
  if (state === null) { badge.style.display='none'; return; }
  if (state === true) { badge.textContent='✅ MATCH'; badge.className='match-badge ok'; input.className='match-ok'; }
  else if (state === false) { badge.textContent='❌ MISMATCH'; badge.className='match-badge fail'; input.className='match-fail'; }
  else if (state === 'error') { badge.textContent='⚠️ CANNOT VERIFY'; badge.className='match-badge checking'; input.className='match-amber'; }
  else if (state === 'no') { badge.textContent='NO BARCODE'; badge.className='match-badge no-bc'; input.className='match-amber'; }
  else if (state === 'checking') { badge.textContent='CHECKING...'; badge.className='match-badge checking'; }
}

function updateSubmitBtn() {
  const btn = document.getElementById('btn-submit');
  const warn = document.getElementById('mismatch-warn');
  const hint = document.getElementById('verify-hint');
  if (!btn) return;
  const {bag, inner, outer} = formState;
  const hasMismatch = bag.match===false || inner.match===false || outer.match===false;
  const hasError    = bag.match==='error' || inner.match==='error' || outer.match==='error';
  const done = m => m===true || m==='no' || m==='error';
  const allVerified = done(bag.match) && done(inner.match) && done(outer.match);
  if (warn) {
    const warnText = warn.querySelector('div') || warn;
    if (hasMismatch) {
      warnText.textContent = 'Mismatch detected — please recheck barcodes before submitting.';
      warn.classList.remove('hidden');
    } else if (hasError) {
      warnText.textContent = '⚠️ Some barcodes could not be verified (server unreachable). Proceed with caution.';
      warn.classList.remove('hidden');
      warn.style.borderColor = 'var(--amber)';
      warn.style.color = 'var(--amber)';
    } else {
      warn.classList.add('hidden');
      warn.style.borderColor = '';
      warn.style.color = '';
    }
  }
  if (hint) hint.style.display = allVerified ? 'none' : '';
  btn.disabled = hasMismatch || !allVerified;
}

function cancelForm() {
  resetFormState();
  renderListDetail();
}

async function submitEntry(isEdit) {
  loadLists();
  const list = LISTS[currentListId];
  const cartonId = (document.getElementById('f-cartonId')||{}).value?.trim() || '';
  const partNo = (document.getElementById('f-partNo')||{}).value?.trim().toUpperCase() || '';
  const pi = (document.getElementById('f-pi')||{}).value?.trim().toUpperCase() || '';
  const qty = parseInt((document.getElementById('f-qty')||{}).value || '1');
  if (!cartonId || !partNo || !qty) { toast('Fill all required fields', 'error'); return; }

  const btn = document.getElementById('btn-submit');
  const lbl = document.getElementById('btn-submit-label');
  if (btn) btn.disabled = true;
  if (lbl) lbl.textContent = 'Saving...';

  const matchBool = m => m===true || m==='no';

  async function maybeUpload(dataUri, filename) {
    if (!dataUri || !dataUri.startsWith('data:')) return dataUri || '';
    if (!GAS_URL) return dataUri;
    try {
      const res = await gasPost({ action:'uploadPhoto', base64: dataUri, filename });
      return (res && res.url) ? res.url : dataUri;
    } catch { return dataUri; }
  }

  const [imgBagUrl, imgInnerUrl, imgCartonUrl] = await Promise.all([
    maybeUpload(formState.photos.bag, `bag_${cartonId}.jpg`),
    maybeUpload(formState.photos.inner, `inner_${cartonId}.jpg`),
    maybeUpload(formState.photos.carton, `carton_${cartonId}.jpg`),
  ]);

  const now = new Date().toISOString();
  const existingMax = (list.cartons||[]).reduce((m,c)=>{
    const n=parseInt((c.cartonRef||'').replace('CTN-',''));
    return isNaN(n)?m:Math.max(m,n);
  },0);
  const globalMax = LISTS.reduce((m,l)=>(l.cartons||[]).reduce((m2,c)=>{
    const n=parseInt((c.cartonRef||'').replace('CTN-',''));
    return isNaN(n)?m2:Math.max(m2,n);
  },m),0);
  const nextNum = Math.max(existingMax, globalMax) + (isEdit ? 0 : 1);
  const cartonRef = isEdit && pendingEditRow
    ? (list.cartons[pendingEditRow.cartonIdx]?.cartonRef || 'CTN-'+String(nextNum).padStart(3,'0'))
    : 'CTN-' + String(nextNum).padStart(3,'0');

  const payload = {
    cartonRef, cartonId, partNo, pi, qty,
    bagBarcode: formState.bag.value,
    innerBarcode: formState.inner.value,
    outerBarcode: formState.outer.value,
    bagMatch: matchBool(formState.bag.match),
    innerMatch: matchBool(formState.inner.match),
    outerMatch: matchBool(formState.outer.match),
    imgBagUrl, imgInnerUrl, imgCartonUrl,
    status: 'pending',
    rejectionReason: null,
    checkedBy: null,
    createdAt: now,
    row: null,
  };

  if (GAS_URL) {
    const gasPayload = {
      cartonId, partNo, pi, qty,
      bag: formState.bag.value, inner: formState.inner.value, outer: formState.outer.value,
      bagMatch: payload.bagMatch, innerMatch: payload.innerMatch, outerMatch: payload.outerMatch,
      imgBagUrl, imgInnerUrl, imgCartonUrl,
      customer: list.customer, packedBy: list.createdBy, checkerBy: '', packedDate: '',
    };
    try {
      if (isEdit && pendingEditRow?.row) {
        await gasPost({ action:'resubmit', ...gasPayload, row: pendingEditRow.row });
      } else {
        await gasPost({ action:'submit', ...gasPayload });
      }
    } catch(e) {}
  }

  if (isEdit && pendingEditRow !== null) {
    const ci = pendingEditRow.cartonIdx;
    list.cartons[ci] = { ...list.cartons[ci], ...payload };
    list.cartons[ci].status = 'pending';
    list.cartons[ci].rejectionReason = null;
  } else {
    if (!list.cartons) list.cartons = [];
    list.cartons.push(payload);
  }
  LISTS[currentListId] = list;
  saveLists();

  resetFormState();
  renderListDetail();

  const banner = document.getElementById('success-banner');
  if (banner) {
    banner.classList.remove('hidden');
    banner.innerHTML = `<div class="alert alert-success" style="margin-bottom:12px">
      <svg><use href="#ic-check"/></svg>
      <div><strong>${isEdit?'Resubmitted':'Entry saved'} — ${cartonRef}</strong><br/>
      <span class="text-sm">Carton ID: ${cartonId} — ${list.listRef}</span></div>
      <button class="btn-icon" style="margin-left:auto" onclick="this.closest('.alert').parentElement.classList.add('hidden')"><svg style="width:12px;height:12px"><use href="#ic-x"/></svg></button>
    </div>`;
  }
}

let checkerFilter = 'pending';
let checkerSearch = '';
let checkerRecords = [];
let currentCheckerRecord = null;

async function renderChecker() {
  const el = document.getElementById('page-checker');
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title"><svg><use href="#ic-check-sq"/></svg>Checker View</div>
        <div class="page-subtitle">Review carton submissions and approve or reject.</div>
      </div>
      <div class="gap-8">
        <div class="search-wrap">
          <svg><use href="#ic-search"/></svg>
          <input type="text" id="checker-search" placeholder="Search..." style="width:180px" oninput="checkerSearch=this.value;renderCheckerTable()" />
        </div>
        <select onchange="checkerFilter=this.value;renderCheckerTable()" style="width:130px;text-transform:uppercase;font-size:11px">
          <option value="pending">PENDING</option>
          <option value="approved">APPROVED</option>
          <option value="rejected">REJECTED</option>
          <option value="all">ALL</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="loadCheckerRecords()"><svg><use href="#ic-refresh"/></svg>Refresh</button>
      </div>
    </div>
    <div id="checker-stats" class="stat-grid" style="margin-bottom:20px"></div>
    <div id="checker-table-wrap"><div class="pulse text-muted text-sm">Loading...</div></div>
    <div id="checker-modal-wrap"></div>`;
  await loadCheckerRecords();
}

async function loadCheckerRecords() {
  checkerRecords = [];
  if (GAS_URL) {
    try {
      const res = await gasGet({ action:'records' });
      if (res && res.records) {
        checkerRecords = res.records;
        allRecords = res.records;
      }
    } catch(e) {
      console.warn('Failed to load checker records:', e);
    }
  }
  renderCheckerStats();
  renderCheckerTable();
}

function renderCheckerStats() {
  const now = Date.now();
  const sevenDaysAgo = now - 7 * 24 * 3600 * 1000;
  const total = checkerRecords.length;
  const pending = checkerRecords.filter(r => !r.status || r.status.toLowerCase() === '').length;
  const approved = checkerRecords.filter(r => (r.status||'').toLowerCase().includes('approved')).length;
  const rejected = checkerRecords.filter(r => (r.status||'').toLowerCase().includes('rejected')).length;
  const recentRejected = checkerRecords.filter(r => {
    const s = (r.status||'').toLowerCase();
    if (!s.includes('rejected')) return false;
    const d = new Date(r.timestamp||r.createdAt).getTime();
    return d > sevenDaysAgo;
  }).length;

  const statsEl = document.getElementById('checker-stats');
  if (!statsEl) return;
  statsEl.innerHTML = [
    { label: "Total Records", value: total, icon: 'ic-box', color: 'var(--muted-fg)' },
    { label: "Pending", value: pending, icon: 'ic-clock', color: 'var(--amber)' },
    { label: "Approved", value: approved, icon: 'ic-check', color: 'var(--primary)' },
    { label: "Rejected", value: rejected, icon: 'ic-alert', color: 'var(--danger)' },
    { label: "Rejected (7d)", value: recentRejected, icon: 'ic-alert', color: '#ff5722' },
  ].map(s => `
    <div class="stat-card">
      <svg class="icon" style="color:${s.color}"><use href="#${s.icon}"/></svg>
      <div class="label">${s.label}</div>
      <div class="value" style="color:${s.color}">${s.value}</div>
    </div>`).join('');
}

function renderCheckerTable() {
  let recs = checkerRecords;
  if (checkerFilter !== 'all') {
    recs = recs.filter(r => {
      const s = (r.status||'').toLowerCase();
      if (checkerFilter === 'pending') return !s || s === '' || s === 'pending';
      if (checkerFilter === 'approved') return s.includes('approved');
      if (checkerFilter === 'rejected') return s.includes('rejected');
      return true;
    });
  }
  if (checkerSearch) {
    const q = checkerSearch.toLowerCase();
    recs = recs.filter(r =>
      (r.cartonId||'').toLowerCase().includes(q) ||
      (r.cartonRef||'').toLowerCase().includes(q) ||
      (r.customer||'').toLowerCase().includes(q) ||
      (r.partNo||'').toLowerCase().includes(q) ||
      (r.packedBy||'').toLowerCase().includes(q)
    );
  }

  const wrap = document.getElementById('checker-table-wrap');
  if (!wrap) return;
  if (recs.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><svg><use href="#ic-check-sq"/></svg><p>No records found</p></div>';
    return;
  }

  wrap.innerHTML = '<div style="display:flex;flex-direction:column;gap:10px">' + recs.map(r => {
    const s = (r.status||'').toLowerCase();
    const isApproved = s.includes('approved');
    const isRejected = s.includes('rejected');
    const statusColor = isApproved ? 'var(--primary)' : isRejected ? 'var(--danger)' : 'var(--amber)';
    const statusBg = isApproved ? 'var(--primary-dim)' : isRejected ? 'var(--danger-dim)' : 'var(--amber-dim)';
    const statusBorder = isApproved ? 'var(--primary-border)' : isRejected ? 'var(--danger-border)' : 'var(--amber-border)';
    const statusText = isApproved ? 'APPROVED' : isRejected ? 'REJECTED' : 'PENDING';
    
    const photos = [];
    if (r.imgBagUrl) photos.push({url: r.imgBagUrl, lbl: 'Bag'});
    if (r.imgInnerUrl) photos.push({url: r.imgInnerUrl, lbl: 'Inner'});
    if (r.imgCartonUrl) photos.push({url: r.imgCartonUrl, lbl: 'Carton'});
    
    const photoHtml = photos.length > 0 
      ? '<div style="display:flex;gap:6px;margin-top:8px">' + photos.map(p => {
          const id = (p.url||'').match(/[-\\w]{25,}/);
          const thumb = id ? `https://drive.google.com/thumbnail?id=${id[0]}&sz=200` : p.url;
          return `<img src="${thumb}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer" onclick="event.stopPropagation();openLightbox('${p.url}')" />`;
        }).join('') + '</div>'
      : '';
    
    return `<div class="record-card ${isRejected ? 'rejected' : ''}" style="cursor:pointer;padding:14px;border-left:4px solid ${statusColor}" onclick="openCheckerDetail(${r.row})">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-weight:700;font-size:1rem;color:${statusColor}">${escHtml(r.customer||'Unknown')}</span>
        <span class="badge" style="background:${statusBg};color:${statusColor};border-color:${statusBorder}">${statusText}</span>
      </div>
      <div style="font-size:0.85rem;color:var(--muted-fg);margin-bottom:4px">
        PI: ${escHtml(r.pi||'—')} | Carton: ${escHtml(r.cartonId||'—')} | Part: ${escHtml(r.partNo||'—')}
      </div>
      <div style="font-size:0.8rem;color:var(--muted-fg)">
        Packed: ${escHtml(r.packedBy||'—')} | Qty: ${r.qty||'0'} pcs | ${fmtDate(r.timestamp||r.createdAt)}
      </div>
      ${isRejected && r.remarks ? `<div style="font-size:0.8rem;color:var(--danger);margin-top:6px;font-style:italic">💬 ${escHtml(r.remarks)}</div>` : ''}
      ${photoHtml}
    </div>`;
  }).join('') + '</div>';
}

async function openCheckerDetail(rowNum) {
  try {
    const res = await gasGet({ action: 'record', row: rowNum });
    if (!res || res.error) {
      toast('Failed to load record details', 'error');
      return;
    }
    currentCheckerRecord = res;
    showCheckerDetailModal(res);
  } catch(e) {
    toast('Error loading record', 'error');
  }
}

function showCheckerDetailModal(r) {
  const s = (r.status||'').toLowerCase();
  const isApproved = s.includes('approved');
  const isRejected = s.includes('rejected');
  const isPending = !isApproved && !isRejected;
  const wrap = document.getElementById('checker-modal-wrap');
  
  const photos = [
    {lbl: 'Bag', url: r.imgBagUrl},
    {lbl: 'Inner', url: r.imgInnerUrl},
    {lbl: 'Carton', url: r.imgCartonUrl}
  ];
  const photoSection = photos.some(p => p.url) ? `
    <div class="section-title">Photos</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      ${photos.map(p => {
        if (!p.url) return '';
        const id = (p.url||'').match(/[-\\w]{25,}/);
        const thumb = id ? `https://drive.google.com/thumbnail?id=${id[0]}&sz=400` : p.url;
        return `<div style="text-align:center">
          <img src="${thumb}" style="width:100px;height:100px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer" onclick="openLightbox('${p.url}')" />
          <div style="font-size:0.7rem;color:var(--muted-fg);margin-top:4px">${p.lbl}</div>
        </div>`;
      }).join('')}
    </div>
  ` : '';
  
  const barcodes = [
    {lbl: 'Bag', val: r.bag, match: (r.matchStatus||'').includes('Bag:✅')},
    {lbl: 'Inner', val: r.inner, match: (r.matchStatus||'').includes('Inner:✅')},
    {lbl: 'Outer', val: r.outer, match: (r.matchStatus||'').includes('Outer:✅')}
  ];
  const barcodeSection = `
    <div class="section-title">Barcode Verification</div>
    <div style="margin-bottom:16px">
      ${barcodes.map(b => {
        const isNo = String(b.val||'').toUpperCase() === 'NO';
        const ok = b.match || isNo;
        return `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--muted);border-radius:6px;margin-bottom:6px">
          <span style="font-size:0.9rem">${ok ? '✅' : '❌'}</span>
          <span style="font-size:0.85rem;flex:1"><strong>${b.lbl}:</strong> ${escHtml(b.val||'—')}</span>
          <span style="font-size:0.75rem;color:${ok ? 'var(--primary)' : 'var(--danger)'}">${isNo ? 'NO BARCODE' : ok ? 'MATCH' : 'MISMATCH'}</span>
        </div>`;
      }).join('')}
    </div>
  `;
  
  const stampSection = isApproved ? `
    <div class="section-title">Stamping</div>
    <div style="margin-bottom:16px">
      ${(r.stampStatus||'').includes('Stamped') 
        ? `<div style="padding:10px 14px;background:var(--primary-dim);border:1px solid var(--primary-border);border-radius:8px;color:var(--primary);font-weight:700">
            ✅ STAMPED on ${escHtml(r.stampDate||'N/A')}
          </div>`
        : `<button class="btn btn-primary btn-full" onclick="checkerMarkStamped(${r.row})">
            <svg><use href="#ic-check"/></svg>Mark as Stamped
          </button>`
      }
    </div>
  ` : '';
  
  const verdictSection = isPending ? `
    <div class="section-title" style="border-top:1px solid var(--border);padding-top:16px">Checker Decision</div>
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <button class="btn btn-primary" style="flex:1" id="btnApprove" onclick="checkerSelectVerdict('Approved')">
        <svg><use href="#ic-check"/></svg>Approve
      </button>
      <button class="btn btn-danger-outline" style="flex:1" id="btnReject" onclick="checkerSelectVerdict('Rejected')">
        <svg><use href="#ic-file-x"/></svg>Reject
      </button>
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label class="form-label">Checker Name <span class="req">*</span></label>
      <input type="text" id="checker-name" placeholder="Enter your name..." />
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Remarks / Rejection Reason</label>
      <textarea id="checker-remarks" rows="3" placeholder="Enter remarks or rejection reason..." style="text-transform:none"></textarea>
    </div>
    <button class="btn btn-primary btn-full" id="btnSubmitVerdict" onclick="checkerSubmitVerdict()">Submit Decision</button>
  ` : '';
  
  const rejectedInfo = isRejected ? `
    <div class="alert alert-danger" style="margin-bottom:16px">
      <svg><use href="#ic-alert"/></svg>
      <div><strong>Rejected by ${escHtml(r.checker||'Checker')}</strong><br/><em>${escHtml(r.remarks||'No reason given')}</em></div>
    </div>
  ` : '';
  
  wrap.innerHTML = `<div class="modal-backdrop" id="checker-detail-modal" onclick="if(event.target===this)closeCheckerDetail()">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <div class="modal-title">
          <svg style="width:16px;height:16px"><use href="#ic-check-sq"/></svg>
          ${escHtml(r.customer||'Record')}
          <span class="badge ${isApproved ? 'badge-green' : isRejected ? 'badge-red' : 'badge-amber'}" style="margin-left:8px">${isApproved ? 'APPROVED' : isRejected ? 'REJECTED' : 'PENDING'}</span>
        </div>
        <button class="btn-icon" onclick="closeCheckerDetail()"><svg style="width:14px;height:14px"><use href="#ic-x"/></svg></button>
      </div>
      <div class="modal-body">
        <div class="detail-kv" style="margin-bottom:14px">
          <div class="kv-box"><div class="kv-label">Carton ID</div><div class="kv-value">${escHtml(r.cartonId||'—')}</div></div>
          <div class="kv-box"><div class="kv-label">Part No</div><div class="kv-value">${escHtml(r.partNo||'—')}</div></div>
          <div class="kv-box"><div class="kv-label">PI No</div><div class="kv-value">${escHtml(r.pi||'—')}</div></div>
          <div class="kv-box"><div class="kv-label">Qty</div><div class="kv-value">${r.qty||'—'}</div></div>
          <div class="kv-box"><div class="kv-label">Packed By</div><div class="kv-value">${escHtml(r.packedBy||'—')}</div></div>
          <div class="kv-box"><div class="kv-label">Date</div><div class="kv-value">${fmtDate(r.timestamp||r.createdAt)}</div></div>
        </div>
        ${rejectedInfo}
        ${barcodeSection}
        ${photoSection}
        ${stampSection}
        ${verdictSection}
      </div>
    </div>
  </div>`;
}

function closeCheckerDetail() {
  document.getElementById('checker-modal-wrap').innerHTML = '';
  currentCheckerRecord = null;
}

let selectedCheckerVerdict = null;

function checkerSelectVerdict(verdict) {
  selectedCheckerVerdict = verdict;
  const btnA = document.getElementById('btnApprove');
  const btnR = document.getElementById('btnReject');
  if (btnA) {
    btnA.className = verdict === 'Approved' ? 'btn btn-primary' : 'btn btn-outline';
    btnA.style.flex = '1';
  }
  if (btnR) {
    btnR.className = verdict === 'Rejected' ? 'btn btn-danger' : 'btn btn-danger-outline';
    btnR.style.flex = '1';
  }
}

async function checkerSubmitVerdict() {
  const name = document.getElementById('checker-name').value.trim();
  const remarks = document.getElementById('checker-remarks').value.trim();
  if (!name) { toast('Please enter Checker Name', 'error'); return; }
  if (!selectedCheckerVerdict) { toast('Please select Approve or Reject', 'error'); return; }
  
  const btn = document.getElementById('btnSubmitVerdict');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }
  
  const statusStr = selectedCheckerVerdict === 'Approved' ? 'Verified ✅' : 'Rejected ❌';
  
  try {
    const res = await gasPost({ 
      action: 'verify', 
      row: currentCheckerRecord.row, 
      checker: name.toUpperCase(), 
      status: statusStr, 
      remarks: remarks.toUpperCase() 
    });
    
    if (res && res.success) {
      toast(`Record ${selectedCheckerVerdict.toLowerCase()}d ✅`, 'success');
      closeCheckerDetail();
      await loadCheckerRecords();
    } else {
      throw new Error(res?.error || 'Unknown error');
    }
  } catch(e) {
    toast('Submit failed: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Submit Decision'; }
  }
}

async function checkerMarkStamped(row) {
  const staff = prompt('ENTER STAMPING STAFF NAME:');
  if (!staff) return;
  try {
    const res = await gasPost({ action: 'stamp', row: row, staff: staff.toUpperCase() });
    if (res && res.success) {
      toast('Stamped successfully ✅', 'success');
      closeCheckerDetail();
      await loadCheckerRecords();
    } else {
      throw new Error(res?.error || 'Unknown error');
    }
  } catch(e) {
    toast('Stamp failed: ' + e.message, 'error');
  }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const LS_MASTER = 'mg_master_records';
let masterRecords = [];

function loadMasterRecords() {
  try { masterRecords = JSON.parse(localStorage.getItem(LS_MASTER)||'[]'); } catch{ masterRecords=[]; }
}
function saveMasterRecords() { localStorage.setItem(LS_MASTER, JSON.stringify(masterRecords)); }

function renderMaster() {
  loadMasterRecords();
  const el = document.getElementById('page-master');
  let searchVal = '';
  renderMasterContent(el, searchVal);
}

function renderMasterContent(el, searchVal) {
  const filtered = masterRecords.filter(r =>
    !searchVal ||
    (r.partNo||'').toLowerCase().includes(searchVal) ||
    (r.customer||'').toLowerCase().includes(searchVal)
  );

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title"><svg><use href="#ic-db"/></svg>Master Register</div>
        <div class="page-subtitle">Manage approved barcodes for validation.</div>
      </div>
      <div class="gap-8">
        <div class="search-wrap">
          <svg><use href="#ic-search"/></svg>
          <input type="text" id="master-search" placeholder="Search part / customer..." style="width:200px" value="${searchVal}"
            oninput="renderMasterContent(document.getElementById('page-master'),this.value.toLowerCase())" />
        </div>
        <button class="btn btn-primary" onclick="showAddMasterModal()"><svg><use href="#ic-plus"/></svg>New Record</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Part No</th><th>Customer</th><th>PI</th><th>Bag Barcode</th><th>Inner Barcode</th><th>Outer Barcode</th><th></th>
        </tr></thead>
        <tbody>
        ${filtered.length===0 ? `<tr><td colspan="7"><div class="empty-state"><svg><use href="#ic-db"/></svg><p>No records yet — add your first barcode set</p></div></td></tr>` :
          filtered.map((r,i)=>`<tr>
            <td class="font-bold text-primary">${r.partNo}</td>
            <td>${r.customer}</td>
            <td class="text-muted text-xs">${r.pi||'—'}</td>
            <td class="text-xs text-muted" style="max-width:120px;overflow:hidden;text-overflow:ellipsis" title="${r.bagBarcode}">${r.bagBarcode}</td>
            <td class="text-xs text-muted" style="max-width:120px;overflow:hidden;text-overflow:ellipsis" title="${r.innerBarcode}">${r.innerBarcode}</td>
            <td class="text-xs text-muted" style="max-width:120px;overflow:hidden;text-overflow:ellipsis" title="${r.outerBarcode}">${r.outerBarcode}</td>
            <td><button class="btn-icon" onclick="deleteMasterRecord(${i})" title="Delete"><svg style="width:13px;height:13px;color:var(--danger)"><use href="#ic-trash"/></svg></button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div id="add-master-modal-wrap"></div>`;
}

function showAddMasterModal() {
  const wrap = document.getElementById('add-master-modal-wrap');
  wrap.innerHTML = `<div class="modal-backdrop">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div class="modal-title"><svg style="width:16px;height:16px"><use href="#ic-db"/></svg>Add Master Record</div>
        <button class="btn-icon" onclick="this.closest('.modal-backdrop').remove()"><svg style="width:14px;height:14px"><use href="#ic-x"/></svg></button>
      </div>
      <div class="modal-body" style="display:flex;flex-direction:column;gap:12px">
        <div class="form-group"><label class="form-label">Customer <span class="req">*</span></label><input type="text" id="mr-customer" /></div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Part No <span class="req">*</span></label><input type="text" id="mr-partNo" /></div>
          <div class="form-group"><label class="form-label">PI (Optional)</label><input type="text" id="mr-pi" /></div>
        </div>
        <div class="form-group"><label class="form-label">Bag Barcode <span class="req">*</span></label><input type="text" id="mr-bag" /></div>
        <div class="form-group"><label class="form-label">Inner Barcode <span class="req">*</span></label><input type="text" id="mr-inner" /></div>
        <div class="form-group"><label class="form-label">Outer Barcode <span class="req">*</span></label><input type="text" id="mr-outer" /></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" style="flex:1" onclick="this.closest('.modal-backdrop').remove()">Cancel</button>
        <button class="btn btn-primary" style="flex:1" onclick="saveMasterRecord()">Save Record</button>
      </div>
    </div>
  </div>`;
}

function saveMasterRecord() {
  const customer = document.getElementById('mr-customer')?.value.trim();
  const partNo = document.getElementById('mr-partNo')?.value.trim().toUpperCase();
  const pi = document.getElementById('mr-pi')?.value.trim().toUpperCase() || '';
  const bag = document.getElementById('mr-bag')?.value.trim().toUpperCase();
  const inner = document.getElementById('mr-inner')?.value.trim().toUpperCase();
  const outer = document.getElementById('mr-outer')?.value.trim().toUpperCase();

  if (!customer||!partNo||!bag||!inner||!outer) { toast('Fill all required fields','error'); return; }

  loadMasterRecords();
  masterRecords.push({ customer, partNo, pi, bagBarcode:bag, innerBarcode:inner, outerBarcode:outer, createdAt:new Date().toISOString() });
  saveMasterRecords();
  toast('Master record saved','success');
  document.querySelector('.modal-backdrop')?.remove();
  renderMaster();
}

function deleteMasterRecord(i) {
  if (!confirm('Delete this master record?')) return;
  loadMasterRecords();
  masterRecords.splice(i,1);
  saveMasterRecords();
  toast('Record deleted');
  renderMaster();
}

async function renderRejects() {
  const el = document.getElementById('page-rejects');
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title" style="color:var(--danger)"><svg style="color:var(--danger)"><use href="#ic-alert"/></svg>Reject List</div>
        <div class="page-subtitle">Cartons rejected by checker — staff must correct and resubmit from the packing list.</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="renderRejects()"><svg><use href="#ic-refresh"/></svg>Refresh</button>
    </div>
    <div id="reject-content"><div class="pulse text-muted text-sm">Loading...</div></div>`;

  loadLists();
  let rejected = [];
  LISTS.forEach(list => {
    (list.cartons||[]).filter(c=>c.status==='rejected').forEach(c => {
      rejected.push({...c, listRef:list.listRef, customer:list.customer, packedBy:list.createdBy, team:list.team, _listIdx:LISTS.indexOf(list)});
    });
  });

  if (GAS_URL) {
    try {
      const res = await gasGet({ action:'records' });
      if (res && res.records) {
        res.records.filter(r=>(r.status||'').toLowerCase().includes('rejected')).forEach(r=>{
          const dup = rejected.find(x=>x.cartonId===r.cartonId&&x.cartonRef===r.cartonRef);
          if (!dup) rejected.push({...r,_source:'gas'});
        });
      }
    } catch(_){}
  }

  const now = Date.now();
  const recent = rejected.filter(r=>{
    const d=new Date(r.timestamp||r.createdAt); return (now-d)<7*24*3600*1000;
  }).length;

  const el2 = document.getElementById('reject-content');
  el2.innerHTML = `
    <div class="grid-2" style="max-width:400px;margin-bottom:20px">
      <div class="stat-card"><div class="label">Total Rejected</div><div class="value text-danger">${rejected.length}</div></div>
      <div class="stat-card"><div class="label">Last 7 Days</div><div class="value text-amber">${recent}</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Ref / List</th><th>Customer / PI</th><th>Carton ID / Part No</th><th>Packed By</th><th>Qty</th><th>Rejection Reason</th><th>Action</th>
        </tr></thead>
        <tbody>
        ${rejected.length===0 ? `<tr><td colspan="7"><div class="empty-state"><svg><use href="#ic-alert"/></svg><p>No rejected entries — great job!</p></div></td></tr>` :
          rejected.map(r=>`<tr class="rejected">
            <td><div class="font-bold text-danger text-sm">${r.cartonRef||r.cartonId||'—'}</div>
                <div class="text-xs text-muted">${r.listRef||'—'}</div>
                <div class="text-xs text-muted">${fmtDate(r.timestamp||r.createdAt)}</div></td>
            <td><div class="text-sm">${r.customer||'—'}</div><div class="text-xs text-muted">${r.pi||'—'}</div></td>
            <td><div class="text-xs">${r.cartonId||'—'}</div><div class="font-bold text-sm">${r.partNo||'—'}</div></td>
            <td><div class="text-xs">${r.packedBy||r.checkerBy||'—'}</div><div class="text-xs text-muted">${r.team||'—'}</div></td>
            <td style="text-align:center;font-weight:700">${r.qty||'—'}</td>
            <td><div class="text-xs text-danger" style="font-style:italic;max-width:200px">${r.rejectionReason||r.remarks||'No reason given'}</div>
                ${r.checkedBy||r.checker?`<div class="text-xs text-muted mt-4">By: ${r.checkedBy||r.checker}</div>`:''}
            </td>
            <td>
              ${r._listIdx!==undefined ?
                `<button class="btn btn-outline btn-sm" onclick="nav('list-detail',${r._listIdx})" title="Go to packing list to edit">
                  <svg><use href="#ic-external"/></svg>Edit
                </button>` :
                `<span class="text-xs text-muted">Edit in packing list</span>`}
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

loadLists();
nav('dashboard');
</script>
