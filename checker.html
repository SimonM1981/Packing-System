<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MG Packing — Checker</title>
  <style>
    /* UI Styling */
    * { box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:16px; }
    h1 { text-align:center; color:#ffb74d; margin:12px 0 4px; font-size:1.5rem; }
    .subtitle { text-align:center; color:#888; font-size:0.85rem; margin-bottom:20px; }
    
    /* Search & Tools */
    .toolbar { display:flex; gap:10px; margin-bottom:12px; }
    .toolbar input { flex:1; padding:12px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; }
    .refresh-btn { background:#455a64; color:white; border:none; padding:10px 16px; border-radius:8px; cursor:pointer; }

    /* Record Cards */
    .record-card { background:#1e1e1e; border:1px solid #333; border-left:4px solid #555; border-radius:12px; padding:14px; margin-bottom:10px; cursor:pointer; }
    .record-card.verified { border-left-color:#4caf50; }
    .record-card.rejected { border-left-color:#f44336; }
    .record-header { display:flex; justify-content:space-between; align-items:flex-start; }
    .status-pill { padding:3px 8px; border-radius:10px; font-size:0.7rem; font-weight:bold; }
    .status-pill.verified { background:#2e7d32; color:#a5d6a7; }
    .status-pill.rejected { background:#b71c1c; color:#ef9a9a; }
    .status-pill.pending { background:#e65100; color:#ffcc80; }

    /* Modal Styling */
    #detailModal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; display:none; overflow-y:auto; padding:15px; }
    .modal-card { background:#1e1e1e; border-radius:12px; padding:20px; max-width:550px; margin:auto; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0; }
    .detail-item label { display:block; font-size:0.65rem; color:#666; text-transform:uppercase; }
    .detail-item span { font-weight:bold; font-size:0.9rem; }

    /* Photo Grid */
    .photo-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:15px 0; }
    .photo-box { text-align:center; }
    .photo-box img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; border:1px solid #333; background:#000; }
    .photo-label { font-size:0.7rem; color:#777; margin-top:4px; }

    /* Verification Actions */
    .verdict-row { display:flex; gap:10px; margin:15px 0; }
    .v-btn { flex:1; padding:14px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; opacity:0.4; }
    .v-btn.active { opacity:1; outline:2px solid white; }
    .save-btn { width:100%; padding:16px; background:#1565c0; color:white; border:none; border-radius:10px; font-weight:bold; font-size:1rem; }
    
    #pinScreen { max-width:340px; margin:80px auto; background:#1e1e1e; padding:30px; border-radius:16px; text-align:center; }
    #pinInput { width:100%; padding:15px; font-size:24px; text-align:center; background:#2a2a2a; border:1px solid #444; color:white; border-radius:8px; }
  </style>
</head>
<body>

<div id="pinScreen">
  <h2 style="color:#ffb74d">🔐 Access Required</h2>
  <input type="password" id="pinInput" placeholder="Enter PIN" oninput="checkPin(this.value)">
</div>

<div id="mainScreen" style="display:none;">
  <h1>MG Packing System</h1>
  <p class="subtitle">Checker Verification</p>
  
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search P/I, Part, or User..." oninput="renderList()">
    <button class="refresh-btn" onclick="loadRecords()">↻</button>
  </div>

  <div id="recordList"></div>
</div>

<!-- Detailed View Modal -->
<div id="detailModal">
  <div class="modal-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 id="modalHeader" style="color:#ffb74d; margin:0;">Packing Detail</h2>
      <button onclick="closeModal()" style="background:none; border:none; color:#888; font-size:1.5rem; cursor:pointer;">&times;</button>
    </div>

    <div id="modalBody">
      <!-- Data populated by JavaScript -->
    </div>

    <div class="verdict-row">
      <button id="btnVerify" class="v-btn" style="background:#2e7d32; color:white;" onclick="setVerdict('VERIFIED')">APPROVE</button>
      <button id="btnReject" class="v-btn" style="background:#b71c1c; color:white;" onclick="setVerdict('REJECTED')">REJECT</button>
    </div>

    <textarea id="remarks" style="width:100%; background:#2a2a2a; color:white; border:1px solid #444; border-radius:8px; padding:10px; min-height:60px;" placeholder="Add remarks here..."></textarea>
    
    <button class="save-btn" style="margin-top:15px;" onclick="saveVerification()">SAVE VERIFICATION</button>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJNbH09bwWqsO0lnM8j_xHA7ALfPFKpSjSFwUK4SRugrHqMWIhds7KhyUHN7kXR28/exec";
  let allRecords = [];
  let currentRecord = null;
  let selectedVerdict = "";

  function checkPin(val) {
    if (val === "1234") {
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      loadRecords();
    }
  }

  async function loadRecords() {
    const list = document.getElementById('recordList');
    list.innerHTML = '<div style="text-align:center; padding:20px; color:#666;">Fetching records...</div>';
    try {
      const resp = await fetch(SCRIPT_URL + "?action=records");
      const data = await resp.json();
      allRecords = data.records || [];
      renderList();
    } catch (e) { list.innerHTML = "Load Error."; }
  }

  function renderList() {
    const term = document.getElementById('searchInput').value.toUpperCase();
    const list = document.getElementById('recordList');
    const filtered = allRecords.filter(r => 
      String(r.pi).toUpperCase().includes(term) || 
      String(r.partNo).toUpperCase().includes(term) || 
      String(r.packedBy).toUpperCase().includes(term)
    );

    list.innerHTML = filtered.map(r => `
      <div class="record-card ${(r.status || 'PENDING').toLowerCase()}" onclick="openDetails(${r.row})">
        <div class="record-header">
          <div>
            <b style="color:#ffb74d">P/I: ${r.pi}</b><br>
            <small style="color:#aaa">Part: ${r.partNo}</small>
          </div>
          <span class="status-pill ${(r.status || 'PENDING').toLowerCase()}">${r.status || 'PENDING'}</span>
        </div>
        <div style="font-size:0.75rem; margin-top:8px; color:#888;">
          Packed By: ${r.packedBy} | Status: ${r.matchStatus}
        </div>
      </div>
    `).join('');
  }

  async function openDetails(rowId) {
    document.getElementById('detailModal').style.display = 'block';
    const body = document.getElementById('modalBody');
    body.innerHTML = "Loading full details...";
    
    try {
      // Fetch full row data from code.gs
      const resp = await fetch(SCRIPT_URL + "?action=record&row=" + rowId);
      currentRecord = await resp.json();
      
      // Note: We access row indices based on your sheet structure
      // Your code.gs 'getRecord' currently returns limited fields, 
      // but we can show the primary info and status logic.
      
      body.innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><label>P/I No.</label><span>${currentRecord.pi}</span></div>
          <div class="detail-item"><label>Part No.</label><span>${currentRecord.partNo}</span></div>
          <div class="detail-item"><label>Packed By</label><span>${currentRecord.packedBy}</span></div>
          <div class="detail-item"><label>Verification</label><span>${currentRecord.matchStatus}</span></div>
        </div>
        
        <p style="font-size:0.7rem; color:#666; margin:0;">Note: Photos and full barcodes are managed via the Google Sheet packing log.</p>
        
        <div class="photo-grid">
          <div class="photo-box"><img src="${currentRecord.imgBagUrl || ''}" onerror="this.src='https://placehold.co/100x100?text=No+Photo'"><div class="photo-label">Bag</div></div>
          <div class="photo-box"><img src="${currentRecord.imgInnerUrl || ''}" onerror="this.src='https://placehold.co/100x100?text=No+Photo'"><div class="photo-label">Inner</div></div>
          <div class="photo-box"><img src="${currentRecord.imgCartonUrl || ''}" onerror="this.src='https://placehold.co/100x100?text=No+Photo'"><div class="photo-label">Carton</div></div>
        </div>
      `;
      
      setVerdict(currentRecord.status || "");
      document.getElementById('remarks').value = currentRecord.remarks || "";
    } catch (e) { body.innerHTML = "Error loading row data."; }
  }

  function setVerdict(v) {
    selectedVerdict = v;
    document.getElementById('btnVerify').classList.toggle('active', v === 'VERIFIED');
    document.getElementById('btnReject').classList.toggle('active', v === 'REJECTED');
  }

  async function saveVerification() {
    if (!selectedVerdict) return alert("Please select Approve or Reject");
    
    const payload = {
      action: "verify",
      row: currentRecord.row,
      status: selectedVerdict,
      remarks: document.getElementById('remarks').value.toUpperCase(),
      checker: "MANAGER"
    };

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const res = await resp.json();
      if (res.success) {
        closeModal();
        loadRecords();
      }
    } catch (e) { alert("Save failed."); }
  }

  function closeModal() {
    document.getElementById('detailModal').style.display = 'none';
    selectedVerdict = "";
  }
</script>
</body>
</html>
