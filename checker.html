<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MG Packing — Checker</title>
  <style>
    /* ... (Your existing CSS remains exactly the same) ... */
    * { box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:16px; min-height:100vh; }
    h1 { text-align:center; color:#ffb74d; margin:12px 0 4px; font-size:1.5rem; }
    .subtitle { text-align:center; color:#888; font-size:0.85rem; margin-bottom:20px; }
    #pinScreen { max-width:340px; margin:80px auto; background:#1e1e1e; border:1px solid #333; border-radius:16px; padding:32px 24px; text-align:center; }
    #pinScreen h2 { color:#ffb74d; margin:0 0 8px; }
    #pinScreen p  { color:#888; font-size:0.9rem; margin:0 0 24px; }
    #pinInput { width:100%; padding:14px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:22px; text-align:center; letter-spacing:0.3em; margin-bottom:12px; }
    #pinError { color:#f44336; font-size:0.85rem; margin-top:8px; display:none; }
    #mainScreen { display:none; }
    .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .toolbar input { flex:1; min-width:160px; padding:10px 12px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:15px; }
    .filter-row { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .filter-btn { padding:9px 14px; border-radius:8px; border:none; cursor:pointer; font-size:0.82rem; font-weight:600; white-space:nowrap; opacity:0.55; }
    .filter-btn.active { opacity:1; outline:2px solid white; }
    .filter-btn.all      { background:#455a64; color:white; }
    .filter-btn.pending  { background:#e65100; color:white; }
    .filter-btn.verified { background:#2e7d32; color:white; }
    .filter-btn.rejected { background:#b71c1c; color:white; }
    .refresh-btn { background:#455a64; border:none; color:white; padding:10px 16px; border-radius:8px; cursor:pointer; font-size:0.88rem; white-space:nowrap; }
    .stats-row { display:flex; gap:8px; margin-bottom:14px; }
    .stat-box { flex:1; background:#1e1e1e; border:1px solid #333; border-radius:8px; padding:10px; text-align:center; }
    .stat-num { font-size:1.4rem; font-weight:700; }
    .stat-lbl { font-size:0.7rem; color:#666; }
    .stat-box.pending  .stat-num { color:#ff9800; }
    .stat-box.verified .stat-num { color:#4caf50; }
    .stat-box.rejected .stat-num { color:#f44336; }
    .stat-box.total    .stat-num { color:#90caf9; }
    .record-card { background:#1e1e1e; border:1px solid #333; border-left:4px solid #555; border-radius:12px; padding:14px; margin-bottom:10px; cursor:pointer; }
    .record-card.verified { border-left-color:#4caf50; }
    .record-card.rejected { border-left-color:#f44336; }
    .record-card.pending  { border-left-color:#ff9800; }
    .record-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
    .record-customer { font-weight:700; font-size:1rem; color:#ffb74d; }
    .record-sub  { font-size:0.8rem; color:#888; margin-top:2px; }
    .record-meta { font-size:0.76rem; color:#666; margin-top:6px; }
    .status-pill { padding:3px 10px; border-radius:12px; font-size:0.75rem; font-weight:700; white-space:nowrap; flex-shrink:0; }
    .status-pill.verified { background:#2e7d32; color:#a5d6a7; }
    .status-pill.rejected { background:#b71c1c; color:#ef9a9a; }
    .status-pill.pending  { background:#e65100; color:#ffcc80; }
    .match-tag { padding:2px 8px; border-radius:8px; background:#2a2a2a; display:inline-block; font-size:0.78rem; margin-top:6px; }
    #detailModal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.88); z-index:100; overflow-y:auto; padding:16px; display:none; }
    .modal-card { background:#1e1e1e; border:1px solid #444; border-radius:14px; padding:20px; max-width:560px; margin:0 auto 40px; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .modal-header h2 { color:#ffb74d; margin:0; font-size:1.15rem; }
    .close-btn { background:#444; border:none; color:white; padding:8px 14px; border-radius:8px; cursor:pointer; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .detail-item label { display:block; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.06em; color:#666; margin-bottom:3px; }
    .detail-item span  { font-size:0.9rem; color:#e0e0e0; font-weight:600; word-break:break-all; }
    .section-lbl { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.06em; color:#666; display:block; margin-bottom:8px; }
    .barcode-check { display:flex; align-items:center; background:#2a2a2a; border-radius:8px; padding:10px 12px; margin-bottom:6px; gap:8px; }
    .bc-label { font-size:0.8rem; color:#aaa; flex-shrink:0; width:50px; }
    .bc-value { font-size:0.88rem; font-weight:700; flex:1; text-align:center; word-break:break-all; }
    .bc-badge { font-size:0.85rem; font-weight:700; flex-shrink:0; }
    .bc-badge.ok   { color:#4caf50; }
    .bc-badge.fail { color:#f44336; }
    .bc-badge.nobc { color:#ff9800; }
    .photos-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px; }
    .photo-wrap { text-align:center; }
    .photo-wrap img { width:100%; border-radius:8px; border:1px solid #444; }
    .photo-wrap .photo-lbl { font-size:0.7rem; color:#777; margin-top:4px; }
    .open-link { display:block; font-size:0.7rem; color:#90caf9; text-decoration:none; margin-top:2px; }
    .no-photo { background:#2a2a2a; border-radius:8px; height:70px; display:flex; align-items:center; justify-content:center; color:#555; font-size:0.72rem; border:1px solid #333; }
    .verify-section { border-top:1px solid #333; padding-top:16px; }
    .verify-section h3 { color:#ffb74d; margin:0 0 12px; font-size:1rem; }
    .verdict-row { display:flex; gap:10px; margin-bottom:12px; }
    .verdict-btn { flex:1; padding:14px; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; opacity:0.5; }
    .verdict-btn.verified { background:#2e7d32; color:white; }
    .verdict-btn.rejected { background:#b71c1c; color:white; }
    .verdict-btn.selected { opacity:1; outline:3px solid white; }
    textarea { width:100%; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; padding:10px; font-size:15px; resize:vertical; min-height:70px; text-transform:uppercase; }
    textarea::placeholder { text-transform:none; color:#555; }
    .save-verify-btn { width:100%; padding:16px; font-size:1rem; font-weight:700; background:#1565c0; color:white; border:none; border-radius:10px; cursor:pointer; margin-top:12px; }
    .save-verify-btn:disabled { background:#333; color:#666; cursor:not-allowed; }
    .empty-state { text-align:center; color:#555; padding:60px 20px; }
    .loading     { text-align:center; color:#888; padding:40px; }
  </style>
</head>
<body>

<div id="pinScreen">
  <h2>🔐 Checker Access</h2>
  <p>Enter your PIN to continue</p>
  <input type="password" id="pinInput" placeholder="••••" maxlength="6" oninput="checkPin(this.value)" inputmode="numeric">
  <div id="pinError">Incorrect PIN. Try again.</div>
</div>

<div id="mainScreen">
  <h1>MG Packing System</h1>
  <p class="subtitle">Checker Verification</p>
  <div class="stats-row">
    <div class="stat-box total"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat-box pending"><div class="stat-num" id="statPending">0</div><div class="stat-lbl">Pending</div></div>
    <div class="stat-box verified"><div class="stat-num" id="statVerified">0</div><div class="stat-lbl">Verified</div></div>
    <div class="stat-box rejected"><div class="stat-num" id="statRejected">0</div><div class="stat-lbl">Rejected</div></div>
  </div>
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search customer, P/I, part..." oninput="renderList()">
    <button class="refresh-btn" onclick="loadRecords()">↻ Refresh</button>
  </div>
  <div class="filter-row">
    <button class="filter-btn all active" id="fAll" onclick="setFilter('all')">All</button>
    <button class="filter-btn pending" id="fPending" onclick="setFilter('pending')">Pending</button>
    <button class="filter-btn verified" id="fVerified" onclick="setFilter('verified')">Verified</button>
    <button class="filter-btn rejected" id="fRejected" onclick="setFilter('rejected')">Rejected</button>
  </div>
  <div id="recordList"></div>
</div>

<div id="detailModal">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modalTitle">Record Details</h2>
      <button class="close-btn" onclick="closeModal()">CLOSE</button>
    </div>
    <div id="modalContent">
      <!-- Content populated by JS -->
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJNbH09bwWqsO0lnM8j_xHA7ALfPFKpSjSFwUK4SRugrHqMWIhds7KhyUHN7kXR28/exec";
  const ACCESS_PIN = "1234"; // Set your preferred PIN here
  
  let allRecords = [];
  let currentFilter = 'all';

  function checkPin(val) {
    if (val === ACCESS_PIN) {
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      loadRecords();
    } else if (val.length >= 4) {
      document.getElementById('pinError').style.display = 'block';
      setTimeout(() => { document.getElementById('pinInput').value = ''; }, 500);
    }
  }

  async function loadRecords() {
    const listEl = document.getElementById('recordList');
    listEl.innerHTML = '<div class="loading">Loading records from Google Sheets...</div>';
    
    try {
      const resp = await fetch(SCRIPT_URL + '?action=getRecords');
      const data = await resp.json();
      allRecords = data.records || [];
      updateStats();
      renderList();
    } catch (e) {
      listEl.innerHTML = '<div class="empty-state">Error loading data: ' + e.message + '</div>';
    }
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allRecords.length;
    document.getElementById('statPending').textContent = allRecords.filter(r => !r.status || r.status === 'PENDING').length;
    document.getElementById('statVerified').textContent = allRecords.filter(r => r.status === 'VERIFIED').length;
    document.getElementById('statRejected').textContent = allRecords.filter(r => r.status === 'REJECTED').length;
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('f' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
    renderList();
  }

  function renderList() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const listEl = document.getElementById('recordList');
    
    let filtered = allRecords.filter(r => {
      const matchSearch = (r.customer + r.pi + r.partNo + r.cartonId).toLowerCase().includes(term);
      const status = (r.status || 'PENDING').toLowerCase();
      if (currentFilter === 'all') return matchSearch;
      return matchSearch && status === currentFilter;
    });

    if (filtered.length === 0) {
      listEl.innerHTML = '<div class="empty-state">No records found.</div>';
      return;
    }

    listEl.innerHTML = filtered.map((r, idx) => `
      <div class="record-card ${ (r.status || 'PENDING').toLowerCase() }" onclick="openDetails(${allRecords.indexOf(r)})">
        <div class="record-header">
          <div>
            <div class="record-customer">${r.customer}</div>
            <div class="record-sub">P/I: ${r.pi} | Part: ${r.partNo}</div>
          </div>
          <div class="status-pill ${ (r.status || 'PENDING').toLowerCase() }">${r.status || 'PENDING'}</div>
        </div>
        <div class="record-meta">Carton ID: ${r.cartonId} | Packed by: ${r.packedBy}</div>
        ${r.bagMatch && r.innerMatch && r.outerMatch ? '<div class="match-tag">✅ Barcodes Match</div>' : '<div class="match-tag" style="color:#f44336">⚠️ Verification Issue</div>'}
      </div>
    `).join('');
  }

  function openDetails(index) {
    const r = allRecords[index];
    const modal = document.getElementById('detailModal');
    const content = document.getElementById('modalContent');
    
    modal.style.display = 'block';
    content.innerHTML = `
      <div class="detail-grid">
        <div class="detail-item"><label>Customer</label><span>${r.customer}</span></div>
        <div class="detail-item"><label>P/I No.</label><span>${r.pi}</span></div>
        <div class="detail-item"><label>Part No.</label><span>${r.partNo}</span></div>
        <div class="detail-item"><label>Carton ID</label><span>${r.cartonId}</span></div>
        <div class="detail-item"><label>Qty</label><span>${r.qty} pcs</span></div>
        <div class="detail-item"><label>Packed By</label><span>${r.packedBy}</span></div>
      </div>

      <span class="section-lbl">Barcode Checks</span>
      <div class="barcode-check"><span class="bc-label">BAG</span><span class="bc-value">${r.bag}</span><span class="bc-badge ${r.bagMatch ? 'ok' : 'fail'}">${r.bagMatch ? 'MATCH' : 'FAIL'}</span></div>
      <div class="barcode-check"><span class="bc-label">INNER</span><span class="bc-value">${r.inner}</span><span class="bc-badge ${r.innerMatch ? 'ok' : 'fail'}">${r.innerMatch ? 'MATCH' : 'FAIL'}</span></div>
      <div class="barcode-check"><span class="bc-label">OUTER</span><span class="bc-value">${r.outer}</span><span class="bc-badge ${r.outerMatch ? 'ok' : 'fail'}">${r.outerMatch ? 'MATCH' : 'FAIL'}</span></div>

      <span class="section-lbl">Photos</span>
      <div class="photos-grid">
        ${renderPhoto('Bag', r.imgBagUrl)}
        ${renderPhoto('Inner', r.imgInnerUrl)}
        ${renderPhoto('Carton', r.imgCartonUrl)}
      </div>

      <div class="verify-section">
        <h3>Final Verdict</h3>
        <div class="verdict-row">
          <button id="vApprove" class="verdict-btn verified" onclick="selectVerdict('VERIFIED')">APPROVE</button>
          <button id="vReject" class="verdict-btn rejected" onclick="selectVerdict('REJECTED')">REJECT</button>
        </div>
        <textarea id="checkerNote" placeholder="ADD REMARKS/NOTES (OPTIONAL)">${r.remarks || ''}</textarea>
        <button class="save-verify-btn" onclick="saveVerification(${index})">SAVE VERIFICATION</button>
      </div>
    `;
  }

  function renderPhoto(label, url) {
    if (!url || url === "") return `<div class="photo-wrap"><div class="no-photo">No Photo</div><div class="photo-lbl">${label}</div></div>`;
    return `
      <div class="photo-wrap">
        <a href="${url}" target="_blank"><img src="${url}"></a>
        <div class="photo-lbl">${label}</div>
      </div>
    `;
  }

  let selectedStatus = '';
  function selectVerdict(status) {
    selectedStatus = status;
    document.getElementById('vApprove').classList.toggle('selected', status === 'VERIFIED');
    document.getElementById('vReject').classList.toggle('selected', status === 'REJECTED');
  }

  async function saveVerification(index) {
    if (!selectedStatus) { alert("Please select Approve or Reject"); return; }
    
    const r = allRecords[index];
    const btn = document.querySelector('.save-verify-btn');
    btn.disabled = true;
    btn.textContent = "SAVING...";

    const payload = {
      action: 'verify',
      rowId: r.rowId, // Ensure your GAS script sends back the row number/ID
      status: selectedStatus,
      remarks: document.getElementById('checkerNote').value.toUpperCase(),
      checkerName: "MANAGER" // You can add a field for this
    };

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      const res = await resp.json();
      if (res.success) {
        closeModal();
        loadRecords();
      } else {
        alert("Error: " + res.error);
        btn.disabled = false;
      }
    } catch (e) {
      alert("Network Error");
      btn.disabled = false;
    }
  }

  function closeModal() { document.getElementById('detailModal').style.display = 'none'; selectedStatus = ''; }
</script>
</body>
</html>
