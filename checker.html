<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MG Packing — Checker</title>
  <style>
    /* CSS remains the same as your previous version */
    * { box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:16px; min-height:100vh; }
    h1 { text-align:center; color:#ffb74d; margin:12px 0 4px; font-size:1.5rem; }
    .subtitle { text-align:center; color:#888; font-size:0.85rem; margin-bottom:20px; }
    #pinScreen { max-width:340px; margin:80px auto; background:#1e1e1e; border:1px solid #333; border-radius:16px; padding:32px 24px; text-align:center; }
    #pinInput { width:100%; padding:14px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:22px; text-align:center; margin-bottom:12px; }
    #mainScreen { display:none; }
    .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .toolbar input { flex:1; padding:10px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; }
    .refresh-btn { background:#455a64; color:white; border:none; padding:10px 16px; border-radius:8px; cursor:pointer; }
    .record-card { background:#1e1e1e; border:1px solid #333; border-left:4px solid #555; border-radius:12px; padding:14px; margin-bottom:10px; cursor:pointer; }
    .record-card.verified { border-left-color:#4caf50; }
    .record-card.rejected { border-left-color:#f44336; }
    .record-header { display:flex; justify-content:space-between; align-items:flex-start; }
    .status-pill { padding:3px 8px; border-radius:10px; font-size:0.7rem; font-weight:bold; text-transform:uppercase; }
    .status-pill.verified { background:#2e7d32; color:#a5d6a7; }
    .status-pill.rejected { background:#b71c1c; color:#ef9a9a; }
    .status-pill.pending { background:#e65100; color:#ffcc80; }
    #detailModal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; display:none; overflow-y:auto; padding:20px; }
    .modal-card { background:#1e1e1e; border-radius:12px; padding:20px; max-width:500px; margin:auto; }
    .verdict-btn { flex:1; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin:5px; opacity:0.6; }
    .verdict-btn.selected { opacity:1; outline:2px solid white; }
    .save-btn { width:100%; padding:15px; background:#1565c0; color:white; border:none; border-radius:8px; margin-top:15px; font-weight:bold; }
  </style>
</head>
<body>

<div id="pinScreen">
  <h2>🔐 Checker Access</h2>
  <input type="password" id="pinInput" placeholder="PIN" oninput="checkPin(this.value)">
</div>

<div id="mainScreen">
  <h1>MG Packing System</h1>
  <p class="subtitle">Verification Dashboard</p>
  
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search P/I or Part..." oninput="renderList()">
    <button class="refresh-btn" onclick="loadRecords()">↻</button>
  </div>

  <div id="recordList"></div>
</div>

<!-- Modal for Verification -->
<div id="detailModal">
  <div class="modal-card">
    <h2 id="modalTitle" style="color:#ffb74d">Verify Packing</h2>
    <div id="modalInfo" style="margin-bottom:15px; line-height:1.6"></div>
    <hr style="border:0; border-top:1px solid #333">
    
    <div style="display:flex; margin-top:15px;">
      <button id="btnApprove" class="verdict-btn" style="background:#2e7d32; color:white" onclick="selectVerdict('VERIFIED')">APPROVE</button>
      <button id="btnReject" class="verdict-btn" style="background:#b71c1c; color:white" onclick="selectVerdict('REJECTED')">REJECT</button>
    </div>
    
    <textarea id="remarks" style="width:100%; background:#2a2a2a; color:white; border:1px solid #444; border-radius:8px; padding:10px; margin-top:10px;" placeholder="Notes/Remarks..."></textarea>
    
    <button class="save-btn" onclick="submitVerification()">SAVE CHANGES</button>
    <button onclick="closeModal()" style="width:100%; background:transparent; color:#888; border:none; margin-top:10px; cursor:pointer;">CANCEL</button>
  </div>
</div>

<script>
  // UPDATE THIS URL
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJNbH09bwWqsO0lnM8j_xHA7ALfPFKpSjSFwUK4SRugrHqMWIhds7KhyUHN7kXR28/exec";
  
  let allRecords = [];
  let activeRecord = null;
  let selectedStatus = "";

  function checkPin(val) {
    if (val === "1234") { // Replace with your desired PIN
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      loadRecords();
    }
  }

  async function loadRecords() {
    const list = document.getElementById('recordList');
    list.innerHTML = "Loading...";
    try {
      // MATCHES code.gs: action=records
      const resp = await fetch(SCRIPT_URL + "?action=records");
      const data = await resp.json();
      allRecords = data.records || [];
      renderList();
    } catch (e) {
      list.innerHTML = "Error: " + e.message;
    }
  }

  function renderList() {
    const term = document.getElementById('searchInput').value.toUpperCase();
    const list = document.getElementById('recordList');
    
    const filtered = allRecords.filter(r => 
      String(r.pi).toUpperCase().includes(term) || 
      String(r.partNo).toUpperCase().includes(term)
    );

    list.innerHTML = filtered.map(r => {
      const status = r.status || "PENDING";
      return `
        <div class="record-card ${status.toLowerCase()}" onclick="openModal(${r.row})">
          <div class="record-header">
            <div>
              <b style="color:#ffb74d">P/I: ${r.pi}</b><br>
              <small>Part: ${r.partNo}</small>
            </div>
            <span class="status-pill ${status.toLowerCase()}">${status}</span>
          </div>
          <div style="font-size:0.8rem; margin-top:8px; color:#aaa;">
            Packed By: ${r.packedBy} | ${r.matchStatus}
          </div>
        </div>
      `;
    }).join('');
  }

  async function openModal(rowId) {
    // MATCHES code.gs: action=record&row=X
    const resp = await fetch(SCRIPT_URL + "?action=record&row=" + rowId);
    activeRecord = await resp.json();
    
    document.getElementById('modalInfo').innerHTML = `
      <b>Row:</b> ${activeRecord.row}<br>
      <b>P/I:</b> ${activeRecord.pi}<br>
      <b>Part:</b> ${activeRecord.partNo}<br>
      <b>Match Status:</b> ${activeRecord.matchStatus}<br>
      <b>Current Status:</b> ${activeRecord.status || 'PENDING'}
    `;
    document.getElementById('remarks').value = activeRecord.remarks || "";
    selectVerdict(activeRecord.status || "");
    document.getElementById('detailModal').style.display = 'block';
  }

  function selectVerdict(st) {
    selectedStatus = st;
    document.getElementById('btnApprove').classList.toggle('selected', st === 'VERIFIED');
    document.getElementById('btnReject').classList.toggle('selected', st === 'REJECTED');
  }

  async function submitVerification() {
    if (!selectedStatus) return alert("Select Status");
    
    const payload = {
      action: "verify",
      row: activeRecord.row,
      status: selectedStatus,
      remarks: document.getElementById('remarks').value,
      checker: "MANAGER" // You can customize this
    };

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const res = await resp.json();
      if (res.success) {
        closeModal();
        loadRecords();
      }
    } catch (e) { alert("Save failed"); }
  }

  function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
</script>
</body>
</html>
