        ${isEdit ? `Edit & Resubmit \u2014 ${list.listRef}` : `New Carton \u2014 ${list.listRef}`}
      </span>
      <button class="btn-icon" onclick="cancelForm()"><svg style="width:12px;height:12px"><use href="#ic-x"/></svg></button>
    </div>
    <div class="info-row">
      <span><strong>Customer:</strong> ${escHtml(list.customer)}</span>
      <span><strong>Packed By:</strong> ${escHtml(list.createdBy)}</span>
      <span><strong>Team:</strong> ${escHtml(list.team)}</span>
    </div>
    <div class="form-panel-body">

      <div class="section-title">Carton Info</div>
      <div class="grid-2" style="margin-bottom:12px">
        <div class="form-group">
          <label class="form-label">Carton ID <span class="req">*</span></label>
          <div class="input-wrap">
            <input type="text" id="f-cartonId" placeholder="Scan or type carton ID..." value="${escHtml(formState.cartonId)}" />
            <button type="button" class="btn-icon" onclick="openCamera('Carton ID',v=>{document.getElementById('f-cartonId').value=v;formState.cartonId=v;})"><svg style="width:14px;height:14px"><use href="#ic-camera"/></svg></button>
          </div>
        </div>
      </div>

      <div style="margin-bottom:16px">
        <label class="form-label">Contents Type <span class="req">*</span></label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button type="button" class="btn ${formState.cartonType==='single'?'btn-primary':'btn-outline'}" style="flex:1" id="btn-type-single" onclick="setCartonType('single')">Single Item</button>
          <button type="button" class="btn ${formState.cartonType==='kit'?'btn-primary':'btn-outline'}" style="flex:1" id="btn-type-kit" onclick="setCartonType('kit')">Kit</button>
          <button type="button" class="btn ${formState.cartonType==='multiple'?'btn-primary':'btn-outline'}" style="flex:1" id="btn-type-multiple" onclick="setCartonType('multiple')">Multiple Parts</button>
        </div>
        <div class="text-xs text-muted mt-4">
          ${formState.cartonType==='single' ? 'One item with its own PI, Qty, barcodes and photos.' :
            formState.cartonType==='kit' ? 'Multiple items sharing ONE PI and ONE Qty (e.g. 10 different parts in one kit box).' :
            'Each item has its own PI and Qty.'}
        </div>
      </div>

      <div id="kit-level-fields" class="${formState.cartonType==='kit'?'':'hidden'}" style="margin-bottom:16px">
        <div class="grid-3">
          <div class="form-group">
            <label class="form-label">PI No <span class="req">*</span></label>
            <div class="input-wrap">
              <input type="text" id="f-cartonPi" placeholder="123456/26..." value="${escHtml(formState.cartonPi)}" oninput="formState.cartonPi=this.value.trim().toUpperCase()" />
              <button type="button" class="btn-icon" onclick="openCamera('PI No',v=>{document.getElementById('f-cartonPi').value=v;formState.cartonPi=v.trim().toUpperCase();syncKitPiToParts();})"><svg style="width:14px;height:14px"><use href="#ic-camera"/></svg></button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Qty (pcs) <span class="req">*</span></label>
            <input type="number" id="f-cartonQty" min="1" value="${formState.cartonQty}" oninput="formState.cartonQty=this.value;syncKitQtyToParts();" />
          </div>
        </div>
      </div>

      <div class="section-title">
        ${formState.cartonType==='single' ? 'Item Details' : formState.cartonType==='kit' ? 'Items in this Kit' : 'Parts in this Carton'}
        ${formState.cartonType !== 'single' ? `<span style="float:right"><button class="btn btn-primary btn-xs" onclick="addNewPart()"><svg><use href="#ic-plus"/></svg>Add ${formState.cartonType==='kit'?'Item':'Part'}</button></span>` : ''}
      </div>
      <div id="parts-container"></div>

      ${formState.cartonType === 'kit' ? `
      <div style="font-size:10px;color:var(--muted-fg);margin:16px 0 10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-top:1px solid var(--border);padding-top:14px">Shared Barcodes (All Parts)</div>
      <div class="grid-2" style="margin-bottom:16px">
        <div class="form-group">
          <div style="display:flex;align-items:center;justify-content:space-between;min-height:22px;margin-bottom:4px">
            <span class="form-label">Inner Box Barcode <span class="req">*</span></span>
            <span id="match-badge-kit-inner" class="match-badge" style="display:none"></span>
          </div>
          <div class="input-wrap">
            <input type="text" id="f-kit-inner" placeholder="Scan or type... (NO if none)" value="${escHtml(formState.cartonInner)}" oninput="onCartonBarcodeInput('inner')" />
            <button type="button" class="btn-icon" onclick="openCamera('Inner Box Barcode',v=>{document.getElementById('f-kit-inner').value=v;onCartonBarcodeInput('inner');})"><svg style="width:14px;height:14px"><use href="#ic-camera"/></svg></button>
          </div>
        </div>
        <div class="form-group">
          <div style="display:flex;align-items:center;justify-content:space-between;min-height:22px;margin-bottom:4px">
            <span class="form-label">Outer Carton Barcode <span class="req">*</span></span>
            <span id="match-badge-kit-outer" class="match-badge" style="display:none"></span>
          </div>
          <div class="input-wrap">
            <input type="text" id="f-kit-outer" placeholder="Scan or type... (NO if none)" value="${escHtml(formState.cartonOuter)}" oninput="onCartonBarcodeInput('outer')" />
            <button type="button" class="btn-icon" onclick="openCamera('Outer Carton Barcode',v=>{document.getElementById('f-kit-outer').value=v;onCartonBarcodeInput('outer');})"><svg style="width:14px;height:14px"><use href="#ic-camera"/></svg></button>
          </div>
        </div>
      </div>

      <div style="font-size:10px;color:var(--muted-fg);margin:16px 0 10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-top:1px solid var(--border);padding-top:14px">Kit Photos</div>
      <div class="grid-3" style="margin-bottom:16px">
        ${buildKitPhotoField('allParts', 'All Parts Laid Out')}
        ${buildKitPhotoField('innerBox', 'Inner Box / Label')}
        ${buildKitPhotoField('cartonLabel', 'Carton / Label')}
      </div>
      ` : ''}

      <div id="mismatch-warn" class="alert alert-danger hidden">
        <svg><use href="#ic-alert"/></svg>
        <div>Barcode MISMATCH detected \u2014 you cannot submit until all barcodes match.</div>
      </div>
      <div id="server-warn" class="alert alert-amber hidden">
        <svg><use href="#ic-alert"/></svg>
        <div>Server unreachable \u2014 barcode verification unavailable. Proceed with caution.</div>
      </div>
      <div id="form-error" class="hidden" style="color:var(--danger);font-size:12px;margin-bottom:8px;font-weight:600"></div>

      <div style="display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;gap:10px">
        <div id="verify-hint" class="text-xs text-muted">All barcodes must be verified (MATCH or NO) before submitting.</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline" onclick="cancelForm()">Cancel</button>
          <button class="btn ${isEdit?'btn-danger':'btn-primary'}" id="btn-submit" disabled onclick="submitEntry(${isEdit})">
            <svg><use href="${isEdit?'#ic-rotate':'#ic-box'}"/></svg>
            <span id="btn-submit-label">${isEdit ? 'Resubmit Corrected' : 'Save Entry'}</span>
          </button>
        </div>
      </div>

    </div>
  </div>`;

  renderPartCards();
}

// ── Part Cards ───────────────────────────────────────────────
function renderPartCards() {
  const container = document.getElementById('parts-container');
  if (!container) return;
  const isKit = formState.cartonType === 'kit';
  const isSingle = formState.cartonType === 'single';

  container.innerHTML = formState.parts.map((part, idx) => `
    <div class="part-card" id="part-card-${idx}">
      <div class="part-card-header">
        <span class="part-number">${isSingle ? 'Item' : isKit ? 'Kit Item' : 'Part'} ${idx + 1}</span>
        ${formState.parts.length > 1 ? `<button class="part-remove" onclick="removePartFromForm(${idx})"><svg style="width:12px;height:12px;vertical-align:middle;margin-right:2px"><use href="#ic-trash"/></svg>Remove</button>` : ''}
      </div>
      ${!isKit ? `
      <div class="grid-2" style="margin-bottom:12px">
        <div class="form-group">
          <label class="form-label">Part No <span class="req">*</span></label>
          <div class="input-wrap">
            <input type="text" id="f-partNo-${idx}" placeholder="Scan or type..." value="${escHtml(part.partNo)}" oninput="onPartFieldChange(${idx},'partNo')" />
            <button type="button" class="btn-icon" onclick="openCamera('Part ${idx+1} No',v=>{document.getElementById('f-partNo-${idx}').value=v;onPartFieldChange(${idx},'partNo');})"><svg style="width:16px;height:16px"><use href="#ic-camera"/></svg></button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">PI No</label>
          <div class="input-wrap">
            <input type="text" id="f-pi-${idx}" placeholder="123456/26..." value="${escHtml(part.pi)}" oninput="onPartFieldChange(${idx},'pi')" />
            <button type="button" class="btn-icon" onclick="openCamera('PI No',v=>{document.getElementById('f-pi-${idx}').value=v;onPartFieldChange(${idx},'pi');})"><svg style="width:16px;height:16px"><use href="#ic-camera"/></svg></button>
          </div>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px;max-width:120px">
        <label class="form-label">Qty <span class="req">*</span></label>
        <input type="number" id="f-qty-${idx}" min="1" value="${part.qty}" oninput="onPartFieldChange(${idx},'qty')" />
      </div>
      ` : `
      <div class="form-group" style="margin-bottom:12px;max-width:none">
        <label class="form-label">Part No <span class="req">*</span></label>
        <div class="input-wrap">
          <input type="text" id="f-partNo-${idx}" placeholder="Scan or type..." value="${escHtml(part.partNo)}" oninput="onPartFieldChange(${idx},'partNo')" />
          <button type="button" class="btn-icon" onclick="openCamera('Part ${idx+1} No',v=>{document.getElementById('f-partNo-${idx}').value=v;onPartFieldChange(${idx},'partNo');})"><svg style="width:16px;height:16px"><use href="#ic-camera"/></svg></button>
        </div>
      </div>
      `}
      ${isKit ? `
      <div class="grid-1" style="max-width:none">
        ${buildPartBarcodeField(idx, 'bag', 'Bag Barcode')}
      </div>
      ` : `
      <div style="font-size:10px;color:var(--muted-fg);margin-bottom:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Barcode Verification \u2014 Type NO if none</div>
      <div class="grid-3">
        ${buildPartBarcodeField(idx, 'bag', '1. Bag Barcode')}
        ${buildPartBarcodeField(idx, 'inner', '2. Inner Barcode')}
        ${buildPartBarcodeField(idx, 'outer', '3. Outer Barcode')}
      </div>
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:10px;color:var(--muted-fg);margin-bottom:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Photos for Part ${idx+1}</div>
        <div class="grid-3">
          ${buildPartPhotoField(idx, 'bag', 'Bag with Part')}
          ${buildPartPhotoField(idx, 'inner', 'Inner Box / Label')}
          ${buildPartPhotoField(idx, 'outer', 'Outer / Carton Label')}
        </div>
      </div>
      `}
    </div>
  `).join('');

  formState.parts.forEach((part, idx) => {
    setMatchBadgeOnCard(idx, 'bag', part.bagMatch);
    if (!isKit) {
      setMatchBadgeOnCard(idx, 'inner', part.innerMatch);
      setMatchBadgeOnCard(idx, 'outer', part.outerMatch);
      if (part.photos) {
        ['bag','inner','outer'].forEach(w => { if (part.photos[w]) renderPartPhotoThumb(idx, w, part.photos[w]); });
      }
    }
  });

  if (isKit) {
    setKitMatchBadge('inner', formState.cartonInnerMatch);
    setKitMatchBadge('outer', formState.cartonOuterMatch);
    if (formState.cartonPhotos) {
      if (formState.cartonPhotos.allParts) renderKitPhotoThumb('allParts', formState.cartonPhotos.allParts);
      if (formState.cartonPhotos.innerBox) renderKitPhotoThumb('innerBox', formState.cartonPhotos.innerBox);
      if (formState.cartonPhotos.cartonLabel) renderKitPhotoThumb('cartonLabel', formState.cartonPhotos.cartonLabel);
    }
  }
  updateSubmitBtn();
}

function buildPartBarcodeField(partIdx, which, label) {
  return `<div class="form-group">
    <div style="display:flex;align-items:center;justify-content:space-between;min-height:22px;margin-bottom:4px">
      <span class="form-label">${label}</span>
      <span id="match-badge-${partIdx}-${which}" class="match-badge" style="display:none"></span>
    </div>
    <div class="input-wrap">
      <input type="text" id="f-${which}-${partIdx}" placeholder="Scan or type..."
        value="${escHtml(formState.parts[partIdx]?.[which]||'')}"
        oninput="onPartBarcodeInput(${partIdx},'${which}')" />
      <button type="button" class="btn-icon" onclick="openCamera('${label}',v=>{document.getElementById('f-${which}-${partIdx}').value=v;onPartBarcodeInput(${partIdx},'${which}')})">
        <svg style="width:14px;height:14px"><use href="#ic-camera"/></svg>
      </button>
    </div>
  </div>`;
}

function buildPartPhotoField(partIdx, which, label) {
  return `<div class="form-group" id="photo-group-${partIdx}-${which}">
    <label class="form-label">${label}</label>
    <input type="file" id="photo-input-${partIdx}-${which}" accept="image/*" capture="environment" style="display:none" onchange="handlePartPhoto(${partIdx},'${which}',this)" />
    <button type="button" class="photo-btn" id="photo-btn-${partIdx}-${which}" onclick="document.getElementById('photo-input-${partIdx}-${which}').click()">
      <svg><use href="#ic-camera"/></svg>
      <div>
        <div class="text-sm font-bold">${label}</div>
        <div class="text-xs text-muted mt-4">Tap to capture</div>
      </div>
    </button>
    <div id="photo-thumb-${partIdx}-${which}"></div>
  </div>`;
}

async function handlePartPhoto(partIdx, which, input) {
  const file = input.files[0];
  if (!file) return;
  const dataUri = await compressImage(file);
  if (!formState.parts[partIdx].photos) formState.parts[partIdx].photos = { bag:null, inner:null, outer:null };
  formState.parts[partIdx].photos[which] = dataUri;
  renderPartPhotoThumb(partIdx, which, dataUri);
  input.value = '';
}

function renderPartPhotoThumb(partIdx, which, dataUri) {
  const btn = document.getElementById('photo-btn-' + partIdx + '-' + which);
  const thumb = document.getElementById('photo-thumb-' + partIdx + '-' + which);
  if (btn) btn.classList.add('has-photo');
  if (thumb) {
    thumb.innerHTML = `<img class="photo-thumb" src="${dataUri}" alt="Photo" onclick="openLightbox('${dataUri}')" />`;
  }
}

function setCartonType(type) {
  formState.cartonType = type;
  if (type === 'kit') { if (!formState.cartonPhotos) formState.cartonPhotos = { allParts: null, innerBox: null, cartonLabel: null }; }
  if (type === 'single') { if (formState.parts.length !== 1) { formState.parts = []; addPartToForm(); } }
  showEntryForm(pendingEditRow !== null);
}

function syncKitPiToParts() {
  if (formState.cartonType !== 'kit') return;
  const pi = formState.cartonPi;
  formState.parts.forEach(p => { p.pi = pi; });
  lookupCache = {};
  formState.parts.forEach((p, idx) => {
    ['bag','inner','outer'].forEach(w => {
      if (p[w] && p[w] !== 'NO') {
        clearTimeout(lookupDebounce[`${idx}-${w}`]);
        lookupDebounce[`${idx}-${w}`] = setTimeout(() => doPartLookup(idx, w, p[w]), 300);
      }
    });
  });
}

function syncKitQtyToParts() {
  if (formState.cartonType !== 'kit') return;
  formState.parts.forEach(p => { p.qty = formState.cartonQty; });
}

function addNewPart() {
  addPartToForm();
  renderPartCards();
  setTimeout(() => {
    const container = document.getElementById('parts-container');
    if (container) container.lastElementChild?.scrollIntoView({ behavior: 'smooth' });
  }, 50);
}

function onPartFieldChange(idx, field) {
  const el = document.getElementById(`f-${field}-${idx}`);
  if (!el) return;
  let val = el.value;
  if (field !== 'qty') val = val.trim().toUpperCase();
  formState.parts[idx][field] = val;
  if (field !== 'qty') el.value = val;

  if (field === 'partNo' || field === 'pi') {
    lookupCache = {};
    ['bag','inner','outer'].forEach(w => {
      const bc = formState.parts[idx][w];
      if (bc && bc !== 'NO') {
        clearTimeout(lookupDebounce[`${idx}-${w}`]);
        setMatchBadgeOnCard(idx, w, 'checking');
        lookupDebounce[`${idx}-${w}`] = setTimeout(() => doPartLookup(idx, w, bc), 400);
      }
    });
  }
}

function onPartBarcodeInput(idx, which) {
  const el = document.getElementById(`f-${which}-${idx}`);
  if (!el) return;
  const val = el.value.trim().toUpperCase();
  formState.parts[idx][which] = val;
  el.value = val;
  if (!val) { formState.parts[idx][which + 'Match'] = null; setMatchBadgeOnCard(idx, which, null); updateSubmitBtn(); return; }
  if (val === 'NO') { formState.parts[idx][which + 'Match'] = 'no'; setMatchBadgeOnCard(idx, which, 'no'); updateSubmitBtn(); return; }
  clearTimeout(lookupDebounce[`${idx}-${which}`]);
  setMatchBadgeOnCard(idx, which, 'checking');
  lookupDebounce[`${idx}-${which}`] = setTimeout(() => doPartLookup(idx, which, val), 450);
}

async function doPartLookup(partIdx, which, barcode) {
  const part = formState.parts[partIdx];
  const key = `${barcode}|${part.pi||''}|${part.partNo||''}|${which}`;
  if (lookupCache[key] !== undefined) { applyPartLookupResult(partIdx, which, barcode, lookupCache[key]); return; }
  if (!GAS_URL || GAS_URL.includes('AKfycbxJNbH09bw')) { setMatchBadgeOnCard(partIdx, which, 'no-server'); updateSubmitBtn(); return; }
  try {
    const res = await gasGet({ action:'lookup', barcode, pi:part.pi||'', partNo:part.partNo||'' });
    if (res === null) { setMatchBadgeOnCard(partIdx, which, 'no-server'); updateSubmitBtn(); return; }
    lookupCache[key] = res;
    applyPartLookupResult(partIdx, which, barcode, res);
  } catch { setMatchBadgeOnCard(partIdx, which, 'no-server'); updateSubmitBtn(); }
}

function applyPartLookupResult(partIdx, which, barcode, res) {
  const part = formState.parts[partIdx];
  if (part[which] === 'NO') { part[`${which}Match`] = 'no'; setMatchBadgeOnCard(partIdx, which, 'no'); updateSubmitBtn(); return; }
  if (res && res.found) {
    const bc = String(barcode).toUpperCase();
    if (which === 'bag' && res.matchedType === 'bag') {
      if (res.partNo && !part.partNo) { part.partNo = String(res.partNo).toUpperCase(); const pnEl = document.getElementById(`f-partNo-${partIdx}`); if (pnEl) pnEl.value = part.partNo; }
      if (res.pi && !part.pi) { part.pi = String(res.pi).toUpperCase(); const piEl = document.getElementById(`f-pi-${partIdx}`); if (piEl) piEl.value = part.pi; }
    }
    const bagBC = String(res.bagBarcode||'').toUpperCase();
    const innerBC = String(res.innerBarcode||'').toUpperCase();
    const outerBC = String(res.outerBarcode||'').toUpperCase();
    let isMatch = false;
    if (which === 'bag') isMatch = (bc === bagBC);
    else if (which === 'inner') isMatch = (bc === innerBC);
    else if (which === 'outer') isMatch = (bc === outerBC);
    part[`${which}Match`] = isMatch;
    setMatchBadgeOnCard(partIdx, which, isMatch);
  } else {
    part[`${which}Match`] = false;
    setMatchBadgeOnCard(partIdx, which, false);
  }
  updateSubmitBtn();
}

function onCartonBarcodeInput(which) {
  const el = document.getElementById(`f-kit-${which}`);
  if (!el) return;
  const val = el.value.trim().toUpperCase();
  formState[`carton${which.charAt(0).toUpperCase() + which.slice(1)}`] = val;
  el.value = val;
  if (!val) { formState[`carton${which.charAt(0).toUpperCase() + which.slice(1)}Match`] = null; setKitMatchBadge(which, null); updateSubmitBtn(); return; }
  if (val === 'NO') { formState[`carton${which.charAt(0).toUpperCase() + which.slice(1)}Match`] = 'no'; setKitMatchBadge(which, 'no'); updateSubmitBtn(); return; }
  clearTimeout(lookupDebounce[`kit-${which}`]);
  setKitMatchBadge(which, 'checking');
  lookupDebounce[`kit-${which}`] = setTimeout(() => doCartonLookup(which, val), 450);
}

async function doCartonLookup(which, barcode) {
  const key = `${barcode}|${formState.cartonPi||''}|kit-${which}`;
  if (lookupCache[key] !== undefined) { applyCartonLookupResult(which, barcode, lookupCache[key]); return; }
  if (!GAS_URL || GAS_URL.includes('AKfycbxJNbH09bw')) { setKitMatchBadge(which, 'no-server'); updateSubmitBtn(); return; }
  try {
    const repPartNo = formState.parts[0]?.partNo || '';
    const res = await gasGet({ action:'lookup', barcode, pi:formState.cartonPi||'', partNo:repPartNo });
    if (res === null) { setKitMatchBadge(which, 'no-server'); updateSubmitBtn(); return; }
    lookupCache[key] = res;
    applyCartonLookupResult(which, barcode, res);
  } catch { setKitMatchBadge(which, 'no-server'); updateSubmitBtn(); }
}

function applyCartonLookupResult(which, barcode, res) {
  if (formState[`carton${which.charAt(0).toUpperCase() + which.slice(1)}`] === 'NO') {
    formState[`carton${which.charAt(0).toUpperCase() + which.slice(1)}Match`] = 'no';
    setKitMatchBadge(which, 'no'); updateSubmitBtn(); return;
  }
  if (res && res.found) {
    const bc = String(barcode).toUpperCase();
    const innerBC = String(res.innerBarcode||'').toUpperCase();
    const outerBC = String(res.outerBarcode||'').toUpperCase();
    let isMatch = false;
    if (which === 'inner') isMatch = (bc === innerBC);
    else if (which === 'outer') isMatch = (bc === outerBC);
    formState[`carton${which.charAt(0).toUpperCase() + which.slice(1)}Match`] = isMatch;
    setKitMatchBadge(which, isMatch);
  } else {
    formState[`carton${which.charAt(0).toUpperCase() + which.slice(1)}Match`] = false;
    setKitMatchBadge(which, false);
  }
  updateSubmitBtn();
}

function setKitMatchBadge(which, state) {
  const badge = document.getElementById(`match-badge-kit-${which}`);
  const input = document.getElementById(`f-kit-${which}`);
  if (!badge || !input) return;
  input.className = '';
  badge.style.display = '';
  if (state === null) { badge.style.display='none'; return; }
  if (state === true) { badge.textContent='\u2705 MATCH'; badge.className='match-badge ok'; input.className='match-ok'; }
  else if (state === false) { badge.textContent='\u274C MISMATCH'; badge.className='match-badge fail'; input.className='match-fail'; }
  else if (state === 'no') { badge.textContent='NO BARCODE'; badge.className='match-badge no-bc'; input.className='match-amber'; }
  else if (state === 'checking') { badge.textContent='CHECKING...'; badge.className='match-badge checking'; }
  else if (state === 'no-server') { badge.textContent='\u26A0 SERVER OFFLINE'; badge.className='match-badge checking'; input.className='match-amber'; }
}

function buildKitPhotoField(which, label) {
  return `<div class="form-group" id="kit-photo-group-${which}">
    <label class="form-label">${label}</label>
    <input type="file" id="kit-photo-input-${which}" accept="image/*" capture="environment" style="display:none" onchange="handleKitPhoto('${which}',this)" />
    <label for="kit-photo-input-${which}" class="photo-btn" id="kit-photo-btn-${which}">
      <svg><use href="#ic-camera"/></svg>
      <div>
        <div class="text-sm font-bold">${label}</div>
        <div class="text-xs text-muted mt-4">Tap to capture</div>
      </div>
    </label>
    <div id="kit-photo-thumb-${which}"></div>
  </div>`;
}

async function handleKitPhoto(which, input) {
  try {
    const file = input.files[0];
    if (!file) return;
    if (!formState.cartonPhotos) formState.cartonPhotos = { allParts: null, innerBox: null, cartonLabel: null };
    const dataUri = await compressImage(file);
    formState.cartonPhotos[which] = dataUri;
    renderKitPhotoThumb(which, dataUri);
    input.value = '';
  } catch(err) { console.error('Kit photo error:', err); toast('Photo failed: ' + err.message, 'error'); }
}

function renderKitPhotoThumb(which, dataUri) {
  const btn = document.getElementById('kit-photo-btn-' + which);
  const thumb = document.getElementById('kit-photo-thumb-' + which);
  if (btn) btn.classList.add('has-photo');
  if (thumb && dataUri) {
    const thumbSrc = dataUri.startsWith('data:') ? dataUri : getThumbUrl(dataUri, 400);
    thumb.innerHTML = `<img class="photo-thumb" src="${thumbSrc}" alt="Photo" onclick="openLightbox('${dataUri}')" />`;
  }
}

function setMatchBadgeOnCard(partIdx, which, state) {
  const badge = document.getElementById(`match-badge-${partIdx}-${which}`);
  const input = document.getElementById(`f-${which}-${partIdx}`);
  if (!badge || !input) return;
  input.className = '';
  badge.style.display = '';
  if (state === null) { badge.style.display='none'; return; }
  if (state === true) { badge.textContent='\u2705 MATCH'; badge.className='match-badge ok'; input.className='match-ok'; }
  else if (state === false) { badge.textContent='\u274C MISMATCH'; badge.className='match-badge fail'; input.className='match-fail'; }
  else if (state === 'error') { badge.textContent='\u26A0 CANNOT VERIFY'; badge.className='match-badge checking'; input.className='match-amber'; }
  else if (state === 'no') { badge.textContent='NO BARCODE'; badge.className='match-badge no-bc'; input.className='match-amber'; }
  else if (state === 'checking') { badge.textContent='CHECKING...'; badge.className='match-badge checking'; }
  else if (state === 'no-server') { badge.textContent='\u26A0 SERVER OFFLINE'; badge.className='match-badge checking'; input.className='match-amber'; }
}

function updateSubmitBtn() {
  const btn = document.getElementById('btn-submit');
  const mismatchWarn = document.getElementById('mismatch-warn');
  const serverWarn = document.getElementById('server-warn');
  const hint = document.getElementById('verify-hint');
  if (!btn) return;

  let hasMismatch = false;
  let hasNoServer = false;
  let allVerified = true;
  const isKit = formState.cartonType === 'kit';

  formState.parts.forEach(p => {
    const checks = isKit ? ['bag'] : ['bag','inner','outer'];
    checks.forEach(w => {
      const m = p[`${w}Match`];
      if (m === false) hasMismatch = true;
      if (m === 'no-server') hasNoServer = true;
      const done = m===true || m==='no' || m==='error' || m==='no-server';
      if (!done) allVerified = false;
    });
  });

  if (isKit) {
    ['inner','outer'].forEach(w => {
      const m = formState[`carton${w.charAt(0).toUpperCase() + w.slice(1)}Match`];
      if (m === false) hasMismatch = true;
      if (m === 'no-server') hasNoServer = true;
      const done = m===true || m==='no' || m==='error' || m==='no-server';
      if (!done) allVerified = false;
    });
  }

  if (mismatchWarn) mismatchWarn.classList.toggle('hidden', !hasMismatch);
  if (serverWarn) {
    if (hasNoServer && !hasMismatch) { serverWarn.classList.remove('hidden'); }
    else { serverWarn.classList.add('hidden'); }
  }
  if (hint) hint.style.display = allVerified ? 'none' : '';
  btn.disabled = hasMismatch || !allVerified;
}

function cancelForm() {
  resetFormState();
  renderListDetail();
}

// ═══════════════════════════════════════════════════════════════
//  SUBMIT ENTRY (Fixed: edit saves to same row)
// ═══════════════════════════════════════════════════════════════
async function submitEntry(isEdit) {
  const list = LISTS.find(l => l.listRef === currentListId);
  if (!list) { toast('List not found', 'error'); return; }
  const cartonId = (document.getElementById('f-cartonId')||{}).value?.trim() || '';
  if (!cartonId) { toast('Carton ID is required', 'error'); return; }

  if (formState.cartonType === 'kit') {
    const kitPi = (document.getElementById('f-cartonPi')||{}).value?.trim().toUpperCase() || formState.cartonPi;
    const kitQty = (document.getElementById('f-cartonQty')||{}).value || formState.cartonQty;
    if (!kitPi) { toast('PI No is required for Kit mode', 'error'); return; }
    if (!kitQty || parseInt(kitQty) < 1) { toast('Qty is required for Kit mode', 'error'); return; }
    formState.cartonPi = kitPi;
    formState.cartonQty = kitQty;
    formState.parts.forEach(p => { p.pi = kitPi; p.qty = kitQty; });
  }

  const isKit = formState.cartonType === 'kit';
  for (let i = 0; i < formState.parts.length; i++) {
    const p = formState.parts[i];
    if (!p.partNo) { toast(`Part ${i+1}: Part No is required`, 'error'); return; }
    if (p.bagMatch === false) { toast(`Part ${i+1}: Bag barcode mismatch.`, 'error'); return; }
    if (!isKit) {
      if (!p.qty || parseInt(p.qty) < 1) { toast(`Part ${i+1}: Qty must be at least 1`, 'error'); return; }
      if (p.innerMatch === false || p.outerMatch === false) { toast(`Part ${i+1}: Barcode mismatch.`, 'error'); return; }
    }
  }
  if (isKit) {
    if (formState.cartonInnerMatch === false) { toast('Inner box barcode mismatch.', 'error'); return; }
    if (formState.cartonOuterMatch === false) { toast('Outer carton barcode mismatch.', 'error'); return; }
  }

  const btn = document.getElementById('btn-submit');
  const lbl = document.getElementById('btn-submit-label');
  if (btn) btn.disabled = true;
  if (lbl) lbl.textContent = 'Saving...';

  const cleanBarcode = v => (v||'').toUpperCase() === 'NO' ? '' : (v||'');
  const matchBool = m => m===true || m==='no';

  async function maybeUpload(dataUri, filename) {
    if (!dataUri || !dataUri.startsWith('data:')) return dataUri || '';
    if (!GAS_URL) return dataUri;
    try {
      const res = await gasPost({ action:'uploadPhoto', base64: dataUri, filename });
      return (res && res.url) ? res.url : dataUri;
    } catch { return dataUri; }
  }

  let imgBagUrl, imgInnerUrl, imgCartonUrl;
  if (isKit) {
    [imgBagUrl, imgInnerUrl, imgCartonUrl] = await Promise.all([
      maybeUpload(formState.cartonPhotos.allParts, `kit_allparts_${cartonId}_${Date.now()}.jpg`),
      maybeUpload(formState.cartonPhotos.innerBox, `kit_inner_${cartonId}_${Date.now()}.jpg`),
      maybeUpload(formState.cartonPhotos.cartonLabel, `kit_carton_${cartonId}_${Date.now()}.jpg`),
    ]);
  } else {
    const firstPart = formState.parts[0];
    const firstPhotos = firstPart.photos || { bag:null, inner:null, outer:null };
    [imgBagUrl, imgInnerUrl, imgCartonUrl] = await Promise.all([
      maybeUpload(firstPhotos.bag, `bag_${cartonId}_${Date.now()}.jpg`),
      maybeUpload(firstPhotos.inner, `inner_${cartonId}_${Date.now()}.jpg`),
      maybeUpload(firstPhotos.outer, `carton_${cartonId}_${Date.now()}.jpg`),
    ]);
    // Upload per-part photos so each part gets its own photos in Packing Log
    for (let pi = 0; pi < formState.parts.length; pi++) {
      const p = formState.parts[pi];
      if (!p.photos) p.photos = { bag:null, inner:null, outer:null };
      if (pi === 0) {
        p._imgBagUrl = imgBagUrl; p._imgInnerUrl = imgInnerUrl; p._imgCartonUrl = imgCartonUrl;
      } else {
        const [pb, pin, pout] = await Promise.all([
          maybeUpload(p.photos.bag, `bag_${cartonId}_p${pi}_${Date.now()}.jpg`),
          maybeUpload(p.photos.inner, `inner_${cartonId}_p${pi}_${Date.now()}.jpg`),
          maybeUpload(p.photos.outer, `carton_${cartonId}_p${pi}_${Date.now()}.jpg`),
        ]);
        p._imgBagUrl = pb; p._imgInnerUrl = pin; p._imgCartonUrl = pout;
      }
    }
  }

  const now = new Date().toISOString();
  const existingCartons = await gasGetCartons(list.listRef);
  const existingMax = existingCartons.reduce((m,c)=>{ const n=parseInt((c.cartonRef||'').replace('CTN-','')); return isNaN(n)?m:Math.max(m,n); },0);
  const nextNum = existingMax + (isEdit ? 0 : 1);
  const cartonRef = isEdit && pendingEditRow?.cartonRef ? pendingEditRow.cartonRef : 'CTN-' + String(nextNum).padStart(3,'0');

  let parts;
  if (isKit) {
    const kitPi = (formState.cartonPi||'').toUpperCase();
    const kitQty = parseInt(formState.cartonQty) || 1;
    parts = formState.parts.map(p => ({
      partNo: p.partNo.toUpperCase(), pi: kitPi, qty: kitQty,
      bag: cleanBarcode(p.bag), inner: cleanBarcode(formState.cartonInner), outer: cleanBarcode(formState.cartonOuter),
      bagMatch: matchBool(p.bagMatch), innerMatch: matchBool(formState.cartonInnerMatch), outerMatch: matchBool(formState.cartonOuterMatch),
    }));
  } else {
    parts = formState.parts.map(p => ({
      partNo: p.partNo.toUpperCase(), pi: (p.pi||'').toUpperCase(), qty: parseInt(p.qty) || 1,
      bag: cleanBarcode(p.bag), inner: cleanBarcode(p.inner), outer: cleanBarcode(p.outer),
      bagMatch: matchBool(p.bagMatch), innerMatch: matchBool(p.innerMatch), outerMatch: matchBool(p.outerMatch),
      photos: p.photos || { bag:null, inner:null, outer:null },
      _imgBagUrl: p._imgBagUrl, _imgInnerUrl: p._imgInnerUrl, _imgCartonUrl: p._imgCartonUrl,
    }));
  }

  // Save carton — use existing row number for edit
  const cartonRow = isEdit && pendingEditRow?.row ? pendingEditRow.row : null;
  const cartonSaveData = {
    row: cartonRow, listRef: list.listRef, cartonRef, cartonId,
    cartonType: formState.cartonType, cartonPI: formState.cartonPi, cartonQty: formState.cartonQty,
    parts, imgBagUrl, imgInnerUrl, imgCartonUrl, createdAt: now, status: 'pending'
  };
  if (isKit) {
    cartonSaveData.cartonInner = cleanBarcode(formState.cartonInner);
    cartonSaveData.cartonOuter = cleanBarcode(formState.cartonOuter);
    cartonSaveData.cartonInnerMatch = matchBool(formState.cartonInnerMatch);
    cartonSaveData.cartonOuterMatch = matchBool(formState.cartonOuterMatch);
  }
  const cartonRes = await gasSaveCarton(cartonSaveData);
  const savedRow = cartonRes && cartonRes.row ? cartonRes.row : cartonRow;

  // ── Packing Log: CRITICAL FIX for edit/resubmit same row ──
  let gasRows = [];

  // For edits: ensure we have gasRows. If empty, do a fresh fetch now.
  let editGasRows = (isEdit && pendingEditRow?.gasRows) ? pendingEditRow.gasRows : [];
  if (isEdit && editGasRows.length === 0 && pendingEditRow) {
    // Fresh fetch using original cartonId (before any edit changes)
    const searchId = pendingEditRow.originalCartonId || cartonId;
    editGasRows = await fetchGasRowsForCarton(searchId, pendingEditRow.cartonRef);
  }

  if (GAS_URL) {
    try {
      if (isKit) {
        const allPartNos = parts.map(p => p.partNo).join(', ');
        const combinedBag = parts.map(p => p.bag).filter(Boolean).join(', ') || '';
        if (isEdit && editGasRows.length > 0) {
          // Update existing Packing Log row(s)
          for (const gasRow of editGasRows) {
            await gasPost({ action:'resubmit', row: gasRow, cartonId, cartonRef,
              customer: list.customer, packedBy: list.createdBy, checkerBy: '', partNo: allPartNos,
              pi: formState.cartonPi||'', qty: formState.cartonQty||1, bag: combinedBag,
              inner: cleanBarcode(formState.cartonInner), outer: cleanBarcode(formState.cartonOuter),
              bagMatch: true, innerMatch: matchBool(formState.cartonInnerMatch), outerMatch: matchBool(formState.cartonOuterMatch),
              imgBagUrl, imgInnerUrl, imgCartonUrl,
            });
          }
          gasRows = editGasRows;
        } else {
          // Create new Packing Log row
          const res = await gasPost({ action:'submit', cartonId, cartonRef, partNo: allPartNos,
            pi: formState.cartonPi||'', qty: formState.cartonQty||1, bag: combinedBag,
            inner: cleanBarcode(formState.cartonInner), outer: cleanBarcode(formState.cartonOuter),
            bagMatch: true, innerMatch: matchBool(formState.cartonInnerMatch), outerMatch: matchBool(formState.cartonOuterMatch),
            imgBagUrl, imgInnerUrl, imgCartonUrl, customer: list.customer, packedBy: list.createdBy, checkerBy: '', packedDate: '',
          });
          if (res && res.row) gasRows.push(res.row);
        }
      } else {
        // Non-kit mode — each part gets its own photos
        if (isEdit && editGasRows.length > 0) {
          // Update each existing Packing Log row
          for (let i = 0; i < editGasRows.length; i++) {
            const rp = parts[i] || parts[0];
            const pBagUrl = rp._imgBagUrl || imgBagUrl;
            const pInnerUrl = rp._imgInnerUrl || imgInnerUrl;
            const pCartonUrl = rp._imgCartonUrl || imgCartonUrl;
            await gasPost({ action:'resubmit', row: editGasRows[i], cartonId, cartonRef,
              customer: list.customer, packedBy: list.createdBy, checkerBy: '', partNo: rp.partNo||'', pi: rp.pi||'', qty: rp.qty||1,
              bag: rp.bag||'', inner: rp.inner||'', outer: rp.outer||'',
              bagMatch: rp.bagMatch, innerMatch: rp.innerMatch, outerMatch: rp.outerMatch,
              imgBagUrl: pBagUrl, imgInnerUrl: pInnerUrl, imgCartonUrl: pCartonUrl,
            });
          }
          gasRows = editGasRows;
        } else {
          // Create new Packing Log rows — each part with its own photos
          for (const part of parts) {
            const pBagUrl = part._imgBagUrl || imgBagUrl;
            const pInnerUrl = part._imgInnerUrl || imgInnerUrl;
            const pCartonUrl = part._imgCartonUrl || imgCartonUrl;
            const res = await gasPost({ action:'submit', cartonId, cartonRef, partNo: part.partNo, pi: part.pi, qty: part.qty,
              bag: part.bag, inner: part.inner, outer: part.outer,
              bagMatch: part.bagMatch, innerMatch: part.innerMatch, outerMatch: part.outerMatch,
              imgBagUrl: pBagUrl, imgInnerUrl: pInnerUrl, imgCartonUrl: pCartonUrl, customer: list.customer, packedBy: list.createdBy, checkerBy: '', packedDate: '',
            });
            if (res && res.row) gasRows.push(res.row);
          }
        }
      }
    } catch(e) { console.warn('GAS Packing Log submit warning:', e); }
  }

  if (savedRow) { LIST_CARTONS[list.listRef] = await gasGetCartons(list.listRef); }

  resetFormState();
  renderListDetail();

  const banner = document.getElementById('success-banner');
  if (banner) {
    banner.classList.remove('hidden');
    banner.innerHTML = `<div class="alert alert-success" style="margin-bottom:12px">
      <svg><use href="#ic-check"/></svg>
      <div><strong>${isEdit?'Resubmitted':'Saved'} \u2014 ${cartonRef}</strong><br/>
      <span class="text-sm">Carton ID: ${escHtml(cartonId)} \u2014 ${parts.length} part(s) \u2014 ${list.listRef}</span></div>
      <button class="btn-icon" style="margin-left:auto" onclick="this.closest('.alert').parentElement.classList.add('hidden')"><svg style="width:12px;height:12px"><use href="#ic-x"/></svg></button>
    </div>`;
  }
}


// ═══════════════════════════════════════════════════════════════
//  CHECKER VIEW
// ═══════════════════════════════════════════════════════════════
let checkerFilter = 'pending';
let checkerSearch = '';
let checkerRecords = [];
let currentCheckerRecord = null;
let checkerViewMode = 'review';
let stampSearch = '';
let stampRecordsCache = [];
const checkerRecordCache = new Map();
let checkerAuthenticated = false;

function cacheCheckerRecords(records) { records.forEach(r => { if (r.row) checkerRecordCache.set(r.row, r); }); }
function getCachedCheckerRecord(row) { return checkerRecordCache.get(row) || null; }

function showCheckerPasswordGate() {
  const el = document.getElementById('page-checker');
  el.innerHTML = `
    <div class="password-gate">
      <div class="password-gate-inner">
        <svg class="password-gate-icon" style="margin:0 auto 20px;display:block"><use href="#ic-lock"/></svg>
        <div class="password-gate-title">Checker Access</div>
        <div class="password-gate-sub">Enter password to access the checker view.</div>
        <div style="display:flex;gap:8px">
          <input type="password" id="checker-pw" placeholder="Password..." style="flex:1" onkeydown="if(event.key==='Enter')checkCheckerPassword()" />
          <button class="btn btn-primary" onclick="checkCheckerPassword()">Enter</button>
        </div>
        <div id="checker-pw-error" style="color:var(--danger);font-size:12px;margin-top:10px;font-weight:600;display:none">Incorrect password. Try again.</div>
      </div>
    </div>`;
}

function checkCheckerPassword() {
  const pw = document.getElementById('checker-pw')?.value || '';
  if (pw === 'MG2026') { checkerAuthenticated = true; renderCheckerContent(); }
  else {
    const err = document.getElementById('checker-pw-error');
    if (err) { err.style.display = ''; err.textContent = 'Incorrect password. Try again.'; }
    const input = document.getElementById('checker-pw');
    if (input) { input.value = ''; input.focus(); }
  }
}

async function renderChecker() {
  if (!checkerAuthenticated) { showCheckerPasswordGate(); return; }
  renderCheckerContent();
}

async function renderCheckerContent() {
  const el = document.getElementById('page-checker');
  const isReview = checkerViewMode === 'review';
  const isStamp = checkerViewMode === 'stamp';

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title"><svg><use href="#ic-check-sq"/></svg>Checker View</div>
        <div class="page-subtitle">${isReview?'Review submissions and approve or reject.':'Mark verified cartons as physically stamped.'}</div>
      </div>
      <div class="gap-8">
        ${isStamp ? `
        <div class="search-wrap">
          <svg><use href="#ic-search"/></svg>
          <input type="text" id="stamp-search" placeholder="Search customer, carton, part, PI..." style="width:220px" oninput="stampSearch=this.value;renderStampCards(stampRecordsCache||[],'')" />
        </div>` : `
        <div class="search-wrap">
          <svg><use href="#ic-search"/></svg>
          <input type="text" id="checker-search" placeholder="Search customer, carton, part, PI..." style="width:200px" oninput="checkerSearch=this.value;renderCheckerTable()" />
        </div>`}
        <button class="btn ${isReview?'btn-primary':'btn-outline'} btn-sm" onclick="checkerViewMode='review';renderCheckerContent();"><svg><use href="#ic-check-sq"/></svg>Review</button>
        <button class="btn ${isStamp?'btn-primary':'btn-outline'} btn-sm" onclick="checkerViewMode='stamp';renderCheckerContent();"><svg><use href="#ic-stamp"/></svg>Stamp</button>
        <button class="btn btn-outline btn-sm" onclick="${isReview?'loadCheckerRecords()':'loadStampRecords()'}"><svg><use href="#ic-refresh"/></svg>Refresh</button>
        <button class="btn btn-outline btn-sm" onclick="checkerAuthenticated=false;showCheckerPasswordGate();"><svg><use href="#ic-lock"/></svg>Lock</button>
      </div>
    </div>
    <div id="checker-stats" class="stat-grid" style="margin-bottom:20px"></div>
    <div id="checker-table-wrap"><div class="pulse text-muted text-sm">Loading...</div></div>
    <div id="checker-modal-wrap"></div>`;

  if (isReview) await loadCheckerRecords();
  else await loadStampRecords();
}

async function loadCheckerRecords() {
  checkerRecords = [];
  let errorMsg = '';
  if (GAS_URL) {
    try {
      const res = await gasGet({ action:'records' });
      if (res && res.records) { checkerRecords = res.records; allRecords = res.records; cacheCheckerRecords(res.records); }
      else if (res && res.error) errorMsg = 'Server error: ' + res.error;
      else errorMsg = 'No records from server.';
    } catch(e) { errorMsg = 'Connection failed.'; }
  } else { errorMsg = 'GAS_URL not configured.'; }
  renderCheckerStats();
  renderCheckerTable(errorMsg);
}

async function loadStampRecords() {
  let records = [];
  let errorMsg = '';
  if (GAS_URL) {
    try {
      const res = await gasGet({ action: 'records' });
      if (res && res.records) {
        cacheCheckerRecords(res.records);
        records = res.records.filter(r => { const s = (r.status || '').toLowerCase(); return s.includes('verified') || s.includes('approved'); });
      }
      else if (res && res.error) errorMsg = 'Server error: ' + res.error;
      else errorMsg = 'No records from server.';
    } catch(e) { errorMsg = 'Connection failed.'; }
  } else { errorMsg = 'GAS_URL not configured.'; }
  stampRecordsCache = records;
  renderStampStats(records);
  renderStampCards(records, errorMsg);
}

function renderStampStats(records) {
  const el = document.getElementById('checker-stats');
  if (!el) return;
  const stamped = records.filter(r => (r.stamped||'') === 'Y' || r.stamped === true || r.stamped === 'true').length;
  const pending = records.length - stamped;
  el.innerHTML = `
    <div class="stat-card"><div class="label">Total Verified</div><div class="value">${records.length}</div></div>
    <div class="stat-card"><div class="label" style="color:var(--amber)">Pending Stamp</div><div class="value" style="color:var(--amber)">${pending}</div></div>
    <div class="stat-card"><div class="label" style="color:var(--primary)">Stamped</div><div class="value text-primary">${stamped}</div></div>`;
}

function renderStampCards(records, errorMsg) {
  const wrap = document.getElementById('checker-table-wrap');
  if (!wrap) return;
  if (errorMsg) { wrap.innerHTML = '<div class="empty-state"><svg><use href="#ic-alert"/></svg><p>' + errorMsg + '</p></div>'; return; }
  let filtered = records;
  if (stampSearch) {
    const q = stampSearch.toLowerCase();
    filtered = records.filter(r => (r.customer || '').toLowerCase().includes(q) || (r.cartonId || '').toLowerCase().includes(q) || (r.partNo || '').toLowerCase().includes(q) || (r.pi || '').toLowerCase().includes(q));
  }
  if (filtered.length === 0) { wrap.innerHTML = '<div class="empty-state"><svg><use href="#ic-stamp"/></svg><p>' + (stampSearch ? 'No matches for "' + escHtml(stampSearch) + '"' : 'No verified cartons waiting to be stamped') + '</p></div>'; return; }

  // Group by cartonId
  const groups = {};
  for (const r of filtered) {
    const cid = r.cartonId || 'unknown';
    if (!groups[cid]) groups[cid] = [];
    groups[cid].push(r);
  }

  wrap.innerHTML = '<div style="display:flex;flex-direction:column;gap:10px">' + Object.values(groups).map(grecs => {
    const first = grecs[0];
    const partCount = grecs.length;
    const isStamped = grecs.every(r => (r.stamped||'') === 'Y' || r.stamped === true || r.stamped === 'true');

function renderCheckerStats() {

  const approved = checkerRecords.filter(r => (r.status||'').toLowerCase().includes('verified')).length;
  const rejected = checkerRecords.filter(r => (r.status||'').toLowerCase().includes('rejected')).length;
  const el = document.getElementById('checker-stats');
  if (!el) return;
  el.innerHTML = [
    { label: 'Total', value: total, icon: 'ic-box', color: 'var(--muted-fg)' },
    { label: 'Pending', value: pending, icon: 'ic-clock', color: 'var(--amber)' },
    { label: 'Approved', value: approved, icon: 'ic-check', color: 'var(--green)' },

  ].map(s => `

function getThumbUrl(url, size) {
  if (!url) return '';
  if (url.startsWith('data:')) return url;
  if (url.includes('drive.google.com') || url.includes('googleusercontent')) {
    const m = url.match(/[-\w]{25,}/);
    if (m) return `https://drive.google.com/thumbnail?id=${m[0]}&sz=w${size}`;
  }
  return url;
}

async function openCheckerDetail(rowNum) {
  const cached = getCachedCheckerRecord(rowNum);
  if (cached) { currentCheckerRecord = cached; showCheckerDetailModal(cached); return; }
  try {
    const res = await gasGet({ action: 'record', row: rowNum });
    if (!res || res.error) { toast('Failed to load record', 'error'); return; }
    currentCheckerRecord = res;
    checkerRecordCache.set(rowNum, res);
    showCheckerDetailModal(res);
  } catch { toast('Error loading record', 'error'); }
}

async function openCheckerDetailGroup(rowNums) {
  const nums = rowNums.split(',').map(n => parseInt(n.trim())).filter(Boolean);
  if (nums.length === 0) return;
  if (nums.length === 1) { openCheckerDetail(nums[0]); return; }
  // Fetch all records for this carton
  const records = [];
  for (const n of nums) {
    const cached = getCachedCheckerRecord(n);
    if (cached) { records.push(cached); continue; }
    try {
      const res = await gasGet({ action: 'record', row: n });
      if (res && !res.error) { records.push(res); checkerRecordCache.set(n, res); }
    } catch { /* skip */ }
  }
  if (records.length === 0) { toast('Failed to load records', 'error'); return; }
  if (records.length === 1) { showCheckerDetailModal(records[0]); return; }
  showCheckerDetailModalGroup(records);
}

}

async function submitTransferRequest() {
  const list = LISTS.find(l => l.listRef === currentListId);
  if (!list) return;
  const checkboxes = document.querySelectorAll('.tf-checkbox:checked');
  if (checkboxes.length === 0) { toast('Please select at least one carton', 'error'); return; }
  const destType = document.getElementById('tf-dest-type').value;
  const newRef = destType === 'new' ? document.getElementById('tf-new-ref').value.trim() : destType;
  const newPrefix = document.getElementById('tf-new-prefix').value.trim().toUpperCase();
  const reason = document.getElementById('tf-reason').value.trim();
  if (!newPrefix) { toast('New Carton ID Prefix is required', 'error'); return; }
  if (!reason) { toast('Reason is required', 'error'); return; }

  const cartons = LIST_CARTONS[list.listRef] || [];
  const selectedCartons = [];
  checkboxes.forEach(cb => {
    const idx = parseInt(cb.dataset.index);
    if (cartons[idx]) {
      selectedCartons.push({ cartonRef: cartons[idx].cartonRef, cartonId: cartons[idx].cartonId, parts: cartons[idx].parts, cartonPi: cartons[idx].cartonPi, row: cartons[idx].row });
    }
  });

  try {
    const res = await gasPost({ action: 'createTransfer', fromListRef: list.listRef, toListRef: newRef, cartons: selectedCartons, newPrefix: newPrefix, reason: reason, requestedBy: list.createdBy || 'Staff' });
    if (res && res.success) { closeTransferForm(); toast('Transfer request ' + res.transferId + ' submitted for approval', 'success'); }
    else { throw new Error(res?.error || 'Unknown error'); }
  } catch(e) { toast('Transfer submit failed: ' + e.message, 'error'); }
}

async function approveTransfer(transferRow) {
  const manager = prompt('ENTER MANAGER NAME TO APPROVE:');
  if (!manager) return;

  // Get carton rows from transfer data map
  const transferData = transferDataMap[transferRow];
  const cartonRows = transferData ? (transferData.cartons || []).map(c => c.row).filter(Boolean) : [];
  const cartonIds = transferData ? (transferData.cartons || []).map(c => c.cartonId).filter(Boolean) : [];
  const toListRef = transferData ? transferData.toListRef : '';

  try {
    const res = await gasPost({
      action: 'approveTransfer', transferRow: transferRow, manager: manager.toUpperCase(),
      cartonRows: cartonRows, cartonIds: cartonIds, toListRef: toListRef
    });
    if (res && res.success) {
      toast('Transfer approved. New list: ' + (res.toListRef || toListRef), 'success');

      // CRITICAL: Reset transferred cartons from 'verified' back to 'pending'
      // so checker must review them again at the destination
      if (cartonRows.length > 0) {
        await resetTransferredCartonsStatus(cartonRows, cartonIds);
      }

      renderTransfer();
    } else { throw new Error(res?.error || 'Unknown error'); }
  } catch(e) { toast('Approve failed: ' + e.message, 'error'); }
}

// Reset transferred carton status to 'pending' in both Cartons sheet and Packing Log
async function resetTransferredCartonsStatus(cartonRows, cartonIds) {
  if ((!cartonRows || cartonRows.length === 0) && (!cartonIds || cartonIds.length === 0)) return;
  try {
    await gasPost({
      action: 'resetTransferStatus',
      cartonRows: cartonRows || [],
      cartonIds: cartonIds || []
    });
  } catch(e) { console.warn('Status reset warning (backend may not support resetTransferStatus yet):', e); }
}

async function rejectTransfer(transferRow) {
  const manager = prompt('ENTER MANAGER NAME TO REJECT:');
  if (!manager) return;
  const reason = prompt('ENTER REJECTION REASON:');
  if (!reason) return;
  try {
    const res = await gasPost({ action: 'rejectTransfer', transferRow: transferRow, manager: manager.toUpperCase(), reason: reason.toUpperCase() });
    if (res && res.success) { toast('Transfer rejected', 'error'); renderTransfer(); }
    else { throw new Error(res?.error || 'Unknown error'); }
  } catch(e) { toast('Reject failed: ' + e.message, 'error'); }
}

    <div class="table-wrap">
      <table class="table-responsive">
        <thead><tr><th>Part No</th><th>Customer</th><th>PI</th><th>Bag Barcode</th><th>Inner Barcode</th><th>Outer Barcode</th><th></th></tr></thead>
        <tbody>
        ${filtered.length===0 ? `<tr><td colspan="7"><div class="empty-state"><svg><use href="#ic-db"/></svg><p>No records \u2014 add your first barcode set</p></div></td></tr>` :
          filtered.map((r,i)=>`<tr>
            <td data-label="Part No" class="font-bold text-primary">${escHtml(r.partNo)}</td>
            <td data-label="Customer">${escHtml(r.customer)}</td>
            <td data-label="PI" class="text-muted text-xs">${escHtml(r.pi||'\u2014')}</td>
            <td data-label="Bag" class="text-xs" style="font-family:var(--font-mono)">${escHtml(r.bagBarcode)}</td>
            <td data-label="Inner" class="text-xs" style="font-family:var(--font-mono)">${escHtml(r.innerBarcode)}</td>
            <td data-label="Outer" class="text-xs" style="font-family:var(--font-mono)">${escHtml(r.outerBarcode)}</td>
            <td><button class="btn-icon" onclick="deleteMasterRecord(${i})" title="Delete"><svg style="width:13px;height:13px;color:var(--danger)"><use href="#ic-trash"/></svg></button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div id="add-master-modal-wrap"></div>`;
}

function showAddMasterModal() {
  const wrap = document.getElementById('add-master-modal-wrap');
  wrap.innerHTML = `<div class="modal-backdrop" onclick="if(event.target===this)this.remove()">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div class="modal-title"><svg style="width:16px;height:16px"><use href="#ic-db"/></svg>Add Master Record</div>
        <button class="btn-icon" onclick="this.closest('.modal-backdrop').remove()"><svg style="width:14px;height:14px"><use href="#ic-x"/></svg></button>
      </div>
      <div class="modal-body" style="display:flex;flex-direction:column;gap:12px">
        <div class="form-group"><label class="form-label">Customer <span class="req">*</span></label><input type="text" id="mr-customer" placeholder="e.g. ABC Corp" /></div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Part No <span class="req">*</span></label><input type="text" id="mr-partNo" placeholder="e.g. P12345" /></div>
          <div class="form-group"><label class="form-label">PI (Optional)</label><input type="text" id="mr-pi" placeholder="e.g. 12345/26" /></div>
        </div>
        <div class="form-group"><label class="form-label">Bag Barcode <span class="req">*</span></label><input type="text" id="mr-bag" placeholder="Scan or type..." /></div>
        <div class="form-group"><label class="form-label">Inner Barcode <span class="req">*</span></label><input type="text" id="mr-inner" placeholder="Scan or type..." /></div>
        <div class="form-group"><label class="form-label">Outer Barcode <span class="req">*</span></label><input type="text" id="mr-outer" placeholder="Scan or type..." /></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" style="flex:1" onclick="this.closest('.modal-backdrop').remove()">Cancel</button>
        <button class="btn btn-primary" style="flex:1" onclick="saveMasterRecord()">Save Record</button>
      </div>
    </div>
  </div>`;
}

function saveMasterRecord() {
  const customer = document.getElementById('mr-customer')?.value.trim();
  const partNo = document.getElementById('mr-partNo')?.value.trim().toUpperCase();
  const pi = document.getElementById('mr-pi')?.value.trim().toUpperCase() || '';
  const bag = document.getElementById('mr-bag')?.value.trim().toUpperCase();
  const inner = document.getElementById('mr-inner')?.value.trim().toUpperCase();
  const outer = document.getElementById('mr-outer')?.value.trim().toUpperCase();
  if (!customer||!partNo||!bag||!inner||!outer) { toast('Fill all required fields','error'); return; }
  loadMasterRecords();
  masterRecords.push({ customer, partNo, pi, bagBarcode:bag, innerBarcode:inner, outerBarcode:outer, createdAt:new Date().toISOString() });
  saveMasterRecords();
  toast('Master record saved','success');
  document.querySelector('#add-master-modal-wrap .modal-backdrop')?.remove();
  renderMaster();
}

function deleteMasterRecord(i) {
  if (!confirm('Delete this master record?')) return;
  loadMasterRecords();
  masterRecords.splice(i,1);
  saveMasterRecords();
  toast('Record deleted');
  renderMaster();
}

// ═══════════════════════════════════════════════════════════════
//  REJECT LIST
// ═══════════════════════════════════════════════════════════════
async function renderRejects() {
  const el = document.getElementById('page-rejects');
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title" style="color:var(--danger)"><svg style="color:var(--danger)"><use href="#ic-alert"/></svg>Reject List</div>
        <div class="page-subtitle">Cartons rejected by checker \u2014 must be corrected and resubmitted.</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="renderRejects()"><svg><use href="#ic-refresh"/></svg>Refresh</button>
    </div>
    <div id="reject-content"><div class="empty-state"><div class="spinner" style="width:24px;height:24px;margin:0 auto 12px;display:block"></div><p>Loading rejected entries...</p></div></div>`;

  let rejected = [];
  if (GAS_URL) {
    try {
      const res = await gasGet({ action: 'records' });
      if (res && res.records) rejected = res.records.filter(r => (r.status || '').toLowerCase().includes('rejected'));
    } catch (e) { console.warn('Failed to fetch Packing Log for rejects', e); }
  }

  const lists = await gasGetPackingLists();
  const listMap = new Map();
  const cartonToList = new Map();
  for (const list of lists) {
    listMap.set(list.listRef, list);
    try {
      const cartons = await gasGetCartons(list.listRef);
      cartons.forEach(c => { if (c.cartonId) cartonToList.set(c.cartonId, list.listRef); });
    } catch (e) { /* skip */ }
  }

  const el2 = document.getElementById('reject-content');
  el2.innerHTML = `
    <div class="stat-grid" style="max-width:300px;margin-bottom:20px">
      <div class="stat-card"><div class="label">Total Rejected</div><div class="value text-danger">${rejected.length}</div></div>
    </div>
    <div class="table-wrap">
      <table class="table-responsive">
        <thead><tr><th>Carton ID</th><th>Customer / PI</th><th>Part No.</th><th>Qty</th><th>Reason</th><th>Checker</th><th>Action</th></tr></thead>
        <tbody>
        ${rejected.length===0 ? `<tr><td colspan="7"><div class="empty-state"><svg><use href="#ic-alert"/></svg><p>No rejected entries \u2014 great job!</p></div></td></tr>` :
          rejected.map(r=>{
            const lr = cartonToList.get(r.cartonId || '') || '';
            return `<tr class="rejected">
              <td data-label="Carton ID"><div class="font-bold text-danger text-sm">${escHtml(r.cartonId||'\u2014')}</div></td>
              <td data-label="Customer"><div class="text-sm">${escHtml(r.customer||'\u2014')}</div><div class="text-xs text-muted">${escHtml(r.pi||'\u2014')}</div></td>
              <td data-label="Part No."><div class="font-bold text-sm">${escHtml(r.partNo||'\u2014')}</div></td>
              <td data-label="Qty" style="text-align:center;font-weight:700">${escHtml(r.qty||'\u2014')}</td>
              <td data-label="Reason"><div class="text-xs text-danger" style="font-style:italic;max-width:180px">${escHtml(r.remarks||'No reason')}</div></td>
              <td data-label="Checker" class="text-xs text-muted">${escHtml(r.checker||'\u2014')}</td>
              <td data-label="Action">${lr ? `<button class="btn btn-outline btn-xs" onclick="nav('list-detail','${lr}')"><svg><use href="#ic-edit"/></svg>Edit</button>` : '<span class="text-xs text-muted">-</span>'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ─────────────────────────────────────────────────────
LISTS = [];
nav('dashboard');
</script>
