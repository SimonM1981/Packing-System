    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carton Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); }
        h1 { font-size: 28px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; outline: none; transition: all 0.3s; background: #fafafa; }
        .input-group input:focus { border-color: #667eea; background: #fff; box-shadow: 0 0 0 4px rgba(102,126,234,0.1); }
        .range-row { display: flex; gap: 12px; align-items: flex-end; }
        .range-row .input-group { flex: 1; margin-bottom: 0; }
        .range-sep { padding-bottom: 14px; color: #888; font-weight: bold; font-size: 18px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(102,126,234,0.5); }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; box-shadow: 0 8px 25px rgba(17,153,142,0.4); }
        .btn-danger { background: linear-gradient(135deg, #eb3349, #f45c43); color: white; box-shadow: 0 8px 25px rgba(235,51,73,0.4); }
        .btn-warning { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .btn-info { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; box-shadow: 0 8px 25px rgba(79,172,254,0.4); }
        .btn-complete { background: linear-gradient(135deg, #00b09b, #96c93d); color: white; box-shadow: 0 8px 25px rgba(0,176,155,0.4); }
        .btn-complete:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; padding: 20px; text-align: center; color: white; box-shadow: 0 8px 25px rgba(102,126,234,0.3); }
        .stat-box.pending { background: linear-gradient(135deg, #eb3349, #f45c43); box-shadow: 0 8px 25px rgba(235,51,73,0.3); }
        .stat-box.progress { background: linear-gradient(135deg, #11998e, #38ef7d); box-shadow: 0 8px 25px rgba(17,153,142,0.3); }
        .stat-value { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }
        .progress-outer { background: #e0e0e0; border-radius: 10px; height: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-inner { height: 100%; background: linear-gradient(90deg, #11998e, #38ef7d); border-radius: 10px; transition: width 0.5s ease; box-shadow: 0 0 10px rgba(17,153,142,0.3); }
        .cartons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; }
        .carton { background: #fff; border: 3px solid #ff6b6b; border-radius: 16px; padding: 18px 6px; text-align: center; cursor: pointer; transition: all 0.3s; user-select: none; -webkit-tap-highlight-color: transparent; box-shadow: 0 4px 15px rgba(255,107,107,0.2); }
        .carton:active { transform: scale(0.92); }
        .carton.checked { background: linear-gradient(135deg, #11998e, #38ef7d); border-color: #11998e; color: white; box-shadow: 0 4px 20px rgba(17,153,142,0.4); }
        .carton-number { font-size: 15px; font-weight: 800; display: block; }
        .carton-status { font-size: 9px; margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; }
        .carton.checked .carton-status { opacity: 1; }
        .carton-hint { font-size: 8px; margin-top: 2px; opacity: 0.5; font-style: italic; }
        .carton.checked .carton-hint { display: none; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .controls .btn { flex: 1; margin-top: 0; font-size: 13px; padding: 12px; }
        .info-bar { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .info-pill { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .job-card { background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s; position: relative; }
        .job-card:hover { border-color: #667eea; background: #fff; transform: translateX(5px); box-shadow: 0 4px 15px rgba(102,126,234,0.2); }
        .job-card.completed { border-color: #00b09b; background: linear-gradient(135deg, #f0fff4, #e6fffa); }
        .job-card.completed .job-title { color: #00b09b; }
        .job-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-left: 8px; }
        .job-badge.complete { background: #00b09b; color: white; }
        .job-badge.incomplete { background: #eb3349; color: white; }
        .job-title { font-weight: 700; color: #333; font-size: 15px; }
        .job-meta { color: #888; font-size: 12px; margin-top: 4px; }
        .job-stats { display: flex; gap: 12px; margin-top: 8px; font-size: 12px; }
        .job-stat { display: flex; align-items: center; gap: 4px; }
        .job-stat-dot { width: 8px; height: 8px; border-radius: 50%; }
        .job-stat-dot.checked { background: #11998e; }
        .job-stat-dot.pending { background: #eb3349; }
        .job-stat-val { font-weight: 700; }
        .job-actions { display: flex; gap: 8px; margin-top: 10px; }
        .job-actions .btn { margin-top: 0; font-size: 11px; padding: 8px; border-radius: 8px; }
        .sync-badge { position: fixed; top: 15px; right: 15px; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .sync-badge.online { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .sync-badge.offline { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .sync-badge.syncing { background: linear-gradient(135deg, #f093fb, #f5576c); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
        .back-btn { background: #666; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 15px; }
        .hidden { display: none !important; }
        .empty-state { text-align: center; padding: 40px; color: #888; }
        .loading-dots { display: inline-flex; gap: 4px; }
        .loading-dots span { width: 8px; height: 8px; background: #667eea; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
        .edit-badge { position: absolute; top: 10px; right: 10px; background: #FF9800; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
        .warning-box { background: #fff3cd; border: 2px solid #ffc107; border-radius: 10px; padding: 12px; margin-bottom: 15px; color: #856404; font-size: 13px; }
        .warning-box strong { display: block; margin-bottom: 4px; font-size: 14px; }
        .danger-box { background: #f8d7da; border: 2px solid #f5c6cb; border-radius: 10px; padding: 12px; margin-bottom: 15px; color: #721c24; font-size: 13px; }
        .danger-box strong { display: block; margin-bottom: 4px; font-size: 14px; }
        .info-box { background: #d1ecf1; border: 2px solid #bee5eb; border-radius: 10px; padding: 12px; margin-bottom: 15px; color: #0c5460; font-size: 13px; }
        .info-box strong { display: block; margin-bottom: 4px; font-size: 14px; }
        /* DASHBOARD SUMMARY */
        .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .dash-box { border-radius: 16px; padding: 20px 10px; text-align: center; color: white; box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .dash-box.total { background: linear-gradient(135deg, #667eea, #764ba2); }
        .dash-box.open { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .dash-box.pending { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .dash-box.complete { background: linear-gradient(135deg, #00b09b, #96c93d); }
        .dash-value { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
        .dash-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }
        @media (max-width: 600px) { .dash-grid { grid-template-columns: repeat(2, 1fr); } .dash-value { font-size: 22px; } }
        @media (max-width: 500px) { .cartons-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; } .carton { padding: 14px 4px; } .carton-number { font-size: 13px; } .stats-grid { gap: 10px; } .stat-value { font-size: 24px; } .job-actions { flex-direction: column; } }
    </style>

<body>

    <div class="sync-badge online" id="syncBadge">Online</div>

    <div class="container">

        <div id="setupScreen">
            <div class="card">
                <h1>Carton Tracker</h1>
                <div class="input-group"><label>Staff Name</label><input type="text" id="staffName" placeholder="Enter your name"></div>
                <div class="input-group"><label>Customer Name</label><input type="text" id="customerName" placeholder="Enter customer name"></div>
                <div class="input-group"><label>Shipment Date</label><input type="date" id="shipmentDate"></div>
                <div class="input-group"><label>Carton Range</label>
                    <div class="range-row">
                        <div class="input-group"><input type="text" id="prefix" placeholder="Prefix" value="A"></div>
                        <span class="range-sep">-</span>
                        <div class="input-group"><input type="number" id="startNum" placeholder="Start" value="1" min="0"></div>
                        <span class="range-sep">to</span>
                        <div class="input-group"><input type="number" id="endNum" placeholder="End" value="100" min="0"></div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="createJob()">Create Job</button>
            </div>

            <div class="card" id="dashboardCard" style="display:none;">
                <h3 style="margin-bottom:15px;color:#555;text-align:center;">Dashboard Summary</h3>
                <div class="dash-grid" id="dashGrid">
                    <div class="dash-box total"><div class="dash-value" id="dashTotal">0</div><div class="dash-label">Total Jobs</div></div>
                    <div class="dash-box open"><div class="dash-value" id="dashOpen">0</div><div class="dash-label">Open</div></div>
                    <div class="dash-box pending"><div class="dash-value" id="dashPending">0</div><div class="dash-label">Pending Cartons</div></div>
                    <div class="dash-box complete"><div class="dash-value" id="dashComplete">0</div><div class="dash-label">Complete</div></div>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom:15px;color:#555;">Existing Jobs</h3>
                <div id="jobListContent"><div class="loading-dots"><span></span><span></span><span></span></div></div>
            </div>
        </div>

        <div id="trackingScreen" class="hidden">
            <button class="back-btn" onclick="backToSetup()">Back to Jobs</button>
            <div class="card">
                <div class="info-bar">
                    <span class="info-pill" id="dispCustomer">-</span>
                    <span class="info-pill" id="dispDate">-</span>
                    <span class="info-pill" id="dispTotal">-</span>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-value" id="checkedCount">0</div><div class="stat-label">Checked</div></div>
                <div class="stat-box pending"><div class="stat-value" id="pendingCount">0</div><div class="stat-label">Pending</div></div>
                <div class="stat-box progress"><div class="stat-value" id="percentCount">0%</div><div class="stat-label">Progress</div></div>
            </div>
            <div class="progress-outer"><div class="progress-inner" id="progressFill" style="width:0%"></div></div>
            <div class="card">
                <div class="controls">
                    <button class="btn btn-success" onclick="markAll(true)">Check All</button>
                    <button class="btn btn-danger" onclick="markAll(false)">Uncheck All</button>
                    <button class="btn btn-warning" onclick="refreshData()">Refresh</button>
                </div>
            </div>
            <div class="card"><div class="cartons-grid" id="cartonsGrid"></div></div>
        </div>

        <div id="editModal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:center;justify-content:center;">
            <div style="background:white;border-radius:20px;padding:25px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                    <span style="font-size:20px;font-weight:700;color:#333;">Edit Job</span>
                    <button onclick="closeEditModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#888;">&times;</button>
                </div>
                <div class="input-group"><label>Customer Name</label><input type="text" id="editCustomer"></div>
                <div class="input-group"><label>Shipment Date</label><input type="date" id="editDate"></div>
                <div class="input-group"><label>Current Range</label><input type="text" id="editCurrentRange" readonly style="background:#eee;"></div>
                <div class="input-group"><label>Additional Cartons (+ to add / - to remove)</label><input type="number" id="editAdditional" placeholder="e.g. 20 to add 20 more, or -5 to remove 5"></div>
                <p style="font-size:12px;color:#888;margin-top:-5px;margin-bottom:10px;">Enter positive number to ADD, negative to REMOVE</p>
                <div id="editWarning" class="hidden"></div>
                <div style="display:flex;gap:10px;margin-top:20px;">
                    <button class="btn btn-primary" onclick="saveEditJob()" style="flex:1;">Save Changes</button>
                    <button class="btn btn-danger" onclick="closeEditModal()" style="flex:1;">Cancel</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwFFMjhp9JR4mBS-R_Xp470vtOj-6S3Zd_9MlEYHSDNLsoupwjQTJBZK-MogA0DkotsnQ/exec';

        let currentJobId = null;
        let cartonData = {};
        let cartons = [];
        let editingJob = null;

        function setSync(status) {
            const el = document.getElementById('syncBadge');
            el.className = 'sync-badge ' + status;
            if (status === 'syncing') el.textContent = 'Syncing...';
            else if (status === 'online') el.textContent = 'Online';
            else el.textContent = 'Offline';
        }

        async function apiCall(action, data) {
            setSync('syncing');
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'text/plain;charset=utf-8'},
                    body: JSON.stringify(Object.assign({action: action}, data))
                });
                const result = await response.json();
                setSync('online');
                return result;
            } catch(err) {
                setSync('offline');
                console.error('API Error:', err);
                alert('Error: ' + err.message);
                return {success: false, error: err.message};
            }
        }

        async function createJob() {
            const staff = document.getElementById('staffName').value.trim();
            const customer = document.getElementById('customerName').value.trim();
            const date = document.getElementById('shipmentDate').value;
            const prefix = document.getElementById('prefix').value.trim().toUpperCase();
            const start = parseInt(document.getElementById('startNum').value) || 1;
            const end = parseInt(document.getElementById('endNum').value) || 100;

            if (!staff) { alert('Please enter your name'); return; }
            if (!customer || !date) { alert('Please fill Customer Name and Shipment Date'); return; }
            if (end < start) { alert('End must be greater than start'); return; }
            if (end - start > 5000) { alert('Maximum 5000 cartons'); return; }

            const cartonsArr = [];
            for (let i = start; i <= end; i++) {
                cartonsArr.push(prefix + String(i).padStart(3, '0'));
            }

            const result = await apiCall('createJob', {
                customer: customer,
                shipmentDate: date,
                prefix: prefix,
                startNum: start,
                endNum: end,
                totalCartons: cartonsArr.length,
                cartons: cartonsArr
            });

            if (result.success) {
                currentJobId = result.jobId;
                localStorage.setItem('staffName', staff);
                loadJob(currentJobId);
            } else {
                alert('Error: ' + (result.error || 'Unknown'));
            }
        }

        function openEditModal(job) {
            editingJob = job;
            document.getElementById('editCustomer').value = job.customer;
            document.getElementById('editDate').value = job.shipmentDate;
            document.getElementById('editCurrentRange').value = job.prefix + job.startNum + ' to ' + job.endNum + ' (' + job.totalCartons + ' cartons)';
            document.getElementById('editAdditional').value = '';
            document.getElementById('editAdditional').placeholder = 'Current: ' + job.totalCartons + ' cartons';
            document.getElementById('editWarning').className = 'hidden';
            document.getElementById('editWarning').innerHTML = '';
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            editingJob = null;
        }

        function checkWarning() {
            if (!editingJob) return;
            const additional = parseInt(document.getElementById('editAdditional').value);
            const warningDiv = document.getElementById('editWarning');
            if (isNaN(additional)) {
                warningDiv.className = 'hidden';
                return;
            }
            const currentTotal = editingJob.totalCartons;
            const newTotal = currentTotal + additional;
            if (newTotal < 1) {
                warningDiv.className = 'danger-box';
                warningDiv.innerHTML = '<strong>ERROR: Invalid total</strong>Total cartons cannot be less than 1.';
                return;
            }
            if (newTotal > 5000) {
                warningDiv.className = 'danger-box';
                warningDiv.innerHTML = '<strong>ERROR: Too many cartons</strong>Maximum 5000 cartons allowed. You are trying to reach ' + newTotal + ' cartons.';
                return;
            }
            if (additional > 0) {
                warningDiv.className = 'warning-box';
                warningDiv.innerHTML = '<strong>Adding ' + additional + ' new cartons</strong>Total will become ' + newTotal + ' cartons (' + editingJob.prefix + (editingJob.endNum + 1) + ' to ' + editingJob.prefix + (editingJob.endNum + additional) + '). New cartons will be unchecked.';
            } else if (additional < 0) {
                const removed = Math.abs(additional);
                warningDiv.className = 'danger-box';
                warningDiv.innerHTML = '<strong>WARNING: Removing ' + removed + ' cartons</strong>Total will become ' + newTotal + ' cartons. Cartons ' + editingJob.prefix + (newTotal + 1) + ' to ' + editingJob.prefix + editingJob.endNum + ' will be DELETED permanently with all checked data.';
            } else {
                warningDiv.className = 'info-box';
                warningDiv.innerHTML = '<strong>No change</strong>Total stays at ' + currentTotal + ' cartons. Only Customer/Date will update.';
            }
        }

        async function saveEditJob() {
            if (!editingJob) return;
            const additional = parseInt(document.getElementById('editAdditional').value);
            const customer = document.getElementById('editCustomer').value.trim();
            const date = document.getElementById('editDate').value;
            if (!customer || !date) { alert('Please fill all fields'); return; }
            if (isNaN(additional)) { alert('Please enter a valid number'); return; }
            const currentTotal = editingJob.totalCartons;
            const newTotal = currentTotal + additional;
            if (newTotal < 1) { alert('Total cartons cannot be less than 1'); return; }
            if (newTotal > 5000) { alert('Maximum 5000 cartons allowed'); return; }
            const newEndNum = editingJob.endNum + additional;
            if (newEndNum < editingJob.startNum) { alert('Cannot remove below start number: ' + editingJob.startNum); return; }
            if (additional < 0) {
                const removed = Math.abs(additional);
                if (!confirm('DANGER: This will permanently delete ' + removed + ' cartons and all their checked data.\n\nAre you absolutely sure?')) return;
            }
            const staff = localStorage.getItem('staffName') || 'Unknown';
            const result = await apiCall('editJob', {
                jobId: editingJob.jobId,
                customer: customer,
                shipmentDate: date,
                newEndNum: newEndNum,
                editedBy: staff
            });
            if (result.success) {
                alert('Job updated!\n' + result.message);
                closeEditModal();
                loadJobList();
            } else {
                alert('Error: ' + (result.error || 'Unknown'));
            }
        }

        async function loadJob(jobId) {
            const result = await apiCall('getJob', {jobId: jobId});
            if (!result.success) { alert('Error: ' + result.error); return; }
            currentJobId = jobId;
            const job = result.job;
            cartons = result.cartons.map(c => c.cartonNo);
            cartonData = {};
            result.cartons.forEach(c => cartonData[c.cartonNo] = c.checked);
            document.getElementById('dispCustomer').textContent = job.customer;
            document.getElementById('dispDate').textContent = job.shipmentDate;
            document.getElementById('dispTotal').textContent = job.totalCartons + ' cartons';
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('trackingScreen').classList.remove('hidden');
            renderCartons();
            updateStats();
        }

        async function loadJobList() {
            const result = await apiCall('getAllJobs', {});
            const container = document.getElementById('jobListContent');
            if (!result.success || !result.jobs || result.jobs.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No jobs yet. Create one above!</p></div>';
                document.getElementById('dashboardCard').style.display = 'none';
                return;
            }

            // Update dashboard
            const summary = result.summary || {total: 0, open: 0, pendingCartons: 0, complete: 0};
            document.getElementById('dashTotal').textContent = summary.total;
            document.getElementById('dashOpen').textContent = summary.open;
            document.getElementById('dashPending').textContent = summary.pendingCartons;
            document.getElementById('dashComplete').textContent = summary.complete;
            document.getElementById('dashboardCard').style.display = 'block';

            container.innerHTML = '';
            result.jobs.forEach(job => {
                const div = document.createElement('div');
                const isComplete = job.completed === true || job.completed === 'TRUE';
                div.className = 'job-card' + (isComplete ? ' completed' : '');
                const badgeClass = isComplete ? 'complete' : 'incomplete';
                const badgeText = isComplete ? 'COMPLETE' : 'INCOMPLETE';

                const checked = job.checkedCount || 0;
                const pending = job.pendingCount || 0;
                const statsHtml = '<div class="job-stats"><span class="job-stat"><span class="job-stat-dot checked"></span><span class="job-stat-val">' + checked + ' checked</span></span><span class="job-stat"><span class="job-stat-dot pending"></span><span class="job-stat-val">' + pending + ' pending</span></span></div>';

                div.innerHTML = '<div class="job-title">' + job.customer + '<span class="job-badge ' + badgeClass + '">' + badgeText + '</span></div><div class="job-meta">' + job.shipmentDate + ' &bull; ' + job.prefix + job.startNum + '-' + job.endNum + ' &bull; ' + job.totalCartons + ' cartons</div>' + statsHtml;

                const actions = document.createElement('div');
                actions.className = 'job-actions';
                if (isComplete) {
                    actions.innerHTML = '<button class="btn btn-success" style="flex:1;">Open</button><button class="btn btn-info" style="flex:1;">Edit</button>';
                } else {
                    const canComplete = checked > 0 && pending === 0;
                    const completeBtn = canComplete ? '<button class="btn btn-complete" style="flex:1;">Complete</button>' : '<button class="btn btn-complete" style="flex:1;" disabled title="All cartons must be checked first">Complete</button>';
                    actions.innerHTML = '<button class="btn btn-success" style="flex:1;">Open</button>' + completeBtn + '<button class="btn btn-info" style="flex:1;">Edit</button>';
                    if (canComplete) {
                        actions.children[1].onclick = function(e) { e.stopPropagation(); markJobComplete(job.jobId); };
                    }
                    actions.children[2].onclick = function(e) { e.stopPropagation(); openEditModal(job); };
                }
                actions.children[0].onclick = function(e) { e.stopPropagation(); loadJob(job.jobId); };
                if (isComplete) {
                    actions.children[1].onclick = function(e) { e.stopPropagation(); openEditModal(job); };
                }
                div.appendChild(actions);
                container.appendChild(div);
            });
        }

        async function markJobComplete(jobId) {
            const staff = localStorage.getItem('staffName') || 'Unknown';
            if (!confirm('Mark this job as COMPLETE?\n\nThis will lock the job and prevent further edits.')) return;
            const result = await apiCall('markJobComplete', {jobId: jobId, completedBy: staff});
            if (result.success) {
                alert('Job marked as COMPLETE!');
                loadJobList();
            } else {
                alert('Error: ' + (result.error || 'Unknown'));
            }
        }

        function backToSetup() {
            document.getElementById('trackingScreen').classList.add('hidden');
            document.getElementById('setupScreen').classList.remove('hidden');
            currentJobId = null;
            loadJobList();
        }

        function renderCartons() {
            const grid = document.getElementById('cartonsGrid');
            grid.innerHTML = '';
            cartons.forEach(num => {
                const div = document.createElement('div');
                div.className = 'carton' + (cartonData[num] ? ' checked' : '');
                div.ondblclick = () => toggleCarton(num);
                div.id = 'carton-' + num;
                div.innerHTML = '<span class="carton-number">' + num + '</span><span class="carton-status">' + (cartonData[num] ? 'CHECKED' : 'PENDING') + '</span><span class="carton-hint">double-click</span>';
                grid.appendChild(div);
            });
        }

        async function toggleCarton(num) {
            const staff = localStorage.getItem('staffName') || 'Unknown';
            const newChecked = !cartonData[num];
            const result = await apiCall('toggleCarton', {
                jobId: currentJobId,
                cartonNo: num,
                checked: newChecked,
                checkedBy: staff
            });
            if (result.success) {
                cartonData[num] = newChecked;
                const div = document.getElementById('carton-' + num);
                div.className = 'carton' + (newChecked ? ' checked' : '');
                div.querySelector('.carton-status').textContent = newChecked ? 'CHECKED' : 'PENDING';
                updateStats();
            }
        }

        async function markAll(checked) {
            if (!confirm(checked ? 'Mark all as checked?' : 'Mark all as unchecked?')) return;
            const staff = localStorage.getItem('staffName') || 'Unknown';
            const result = await apiCall('markAll', {
                jobId: currentJobId,
                checked: checked,
                checkedBy: staff
            });
            if (result.success) {
                cartons.forEach(c => cartonData[c] = checked);
                renderCartons();
                updateStats();
            }
        }

        async function refreshData() {
            if (!currentJobId) return;
            await loadJob(currentJobId);
        }

        function updateStats() {
            const checked = Object.values(cartonData).filter(v => v).length;
            const total = cartons.length;
            const pending = total - checked;
            const percent = total > 0 ? Math.round((checked / total) * 100) : 0;
            document.getElementById('checkedCount').textContent = checked;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('percentCount').textContent = percent + '%';
            document.getElementById('progressFill').style.width = percent + '%';
        }

        const savedStaff = localStorage.getItem('staffName');
        if (savedStaff) document.getElementById('staffName').value = savedStaff;
        document.getElementById('shipmentDate').valueAsDate = new Date();
        document.getElementById('editAdditional').addEventListener('input', checkWarning);
        loadJobList();
    </script>

</body>
</html>
