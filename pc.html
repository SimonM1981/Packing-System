<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>MG Logistics System</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:16px; min-height:100vh; }
    h1 { text-align:center; color:#90caf9; margin:12px 0 4px; font-size:1.5rem; }
    
    .main-tabs { display:flex; background:#161616; margin-bottom:15px; border-radius:12px; overflow:hidden; border:1px solid #333; }
    .main-tab { flex:1; padding:15px; text-align:center; cursor:pointer; font-weight:bold; color:#666; transition: 0.3s; border-bottom: 3px solid transparent; font-size: 0.85rem; }
    .main-tab.active { color:#90caf9; border-bottom-color:#90caf9; background:#1a1a1a; }
    #fixCount { background:#f44336; color:white; padding:2px 7px; border-radius:10px; font-size:0.75rem; margin-left:5px; }

    .card { background:#1e1e1e; border:1px solid #333; border-radius:12px; padding:16px; margin-bottom:16px; }
    .card-title { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#666; margin-bottom:12px; }
    label { display:block; margin:10px 0 5px; font-weight:600; color:#90caf9; font-size:0.9rem; }
    
    input { width:100%; padding:11px 12px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:16px; text-transform:uppercase; }
    input:focus { outline:none; border-color:#90caf9; }
    
    input.match      { border-color:#4caf50 !important; background:#1a2e1a; }
    input.mismatch   { border-color:#f44336 !important; background:#2e1a1a; }
    input.no-barcode { border-color:#ff9800 !important; background:#2e2200; }

    .scan-row { display:flex; gap:8px; align-items:center; }
    .scan-row input { flex:1; }
    button { background:#3f51b5; color:white; border:none; padding:11px 14px; border-radius:8px; font-weight:bold; cursor:pointer; }
    
    .match-badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:700; margin-top:5px; }
    .match-badge.ok      { background:#1b5e20; color:#a5d6a7; }
    .match-badge.fail    { background:#b71c1c; color:#ef9a9a; }
    .match-badge.pending { background:#333; color:#888; }
    .match-badge.no-bc   { background:#4a3000; color:#ffcc80; }

    .photo-btn { width:100%; padding:15px; margin:8px 0; background:#37474f; border-radius:10px; border:none; color:white; cursor:pointer; text-align:left; display:flex; align-items:center; gap:10px; }
    .photo-btn.has-photo .done-badge { display:inline; background:#2e7d32; padding:2px 8px; border-radius:10px; font-size: 0.7rem; }
    .done-badge { display:none; }
    
    .preview { width:100%; max-height:250px; object-fit:contain; border-radius:8px; margin-top:10px; display:none; border:1px solid #555; }
    
    .submit-btn { width:100%; padding:18px; font-size:1.1rem; font-weight:bold; border-radius:10px; border:none; cursor:pointer; margin-top:8px; }
    .submit-btn.ready   { background:#2e7d32; color:white; }
    .submit-btn.blocked { background:#333; color:#666; cursor:not-allowed; }
    
    #status { margin:12px 0; padding:12px; border-radius:8px; font-weight:bold; text-align:center; display:none; }
    #status.info    { background:#1565c0; display:block; color:white; }
    #status.success { background:#2e7d32; display:block; color:white; }
    #status.error   { background:#c62828; display:block; color:white; }

    #scanner-container { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000; padding:20px; }
    .fix-item { background:#1e1e1e; border:1px solid #333; border-left:5px solid #f44336; padding:16px; border-radius:12px; margin-bottom:12px; cursor:pointer; }
  </style>
</head>
<body>

<h1>MG Logistics System</h1>

<div class="main-tabs">
  <div class="main-tab active" id="tabNew" onclick="switchMainTab('new')">NEW ENTRY</div>
  <div class="main-tab" id="tabFix" onclick="switchMainTab('fix')">FIX REJECTS <span id="fixCount" style="display:none;">0</span></div>
</div>

<div id="formContainer">
  <div class="card">
    <div class="card-title">Basic Info</div>
    <label>Packed By</label>
    <div class="scan-row"><input type="text" id="packedBy"><button onclick="startScanner('packedBy')">SCAN</button></div>
    <label>Carton ID</label>
    <div class="scan-row"><input type="text" id="cartonId"><button onclick="startScanner('cartonId')">SCAN</button></div>
  </div>

  <div class="card">
    <div class="card-title">Order Details</div>
    <label>Customer / PI / Part No</label>
    <input type="text" id="customer" placeholder="Customer Name" style="margin-bottom:8px;">
    <input type="text" id="pi" placeholder="PI Number" style="margin-bottom:8px;">
    <input type="text" id="partNo" placeholder="Part Number">
    <label>Qty</label>
    <input type="number" id="qty" value="1" style="text-transform:none;">
  </div>

  <div class="card">
    <div class="card-title">Barcode Verification</div>
    <label>Bag Barcode</label>
    <div class="scan-row"><input type="text" id="bag"><button onclick="startScanner('bag')">SCAN</button></div>
    <div class="match-badge pending" id="bagBadge">Not Checked</div>

    <label>Inner Barcode</label>
    <div class="scan-row"><input type="text" id="inner"><button onclick="startScanner('inner')">SCAN</button></div>
    <div class="match-badge pending" id="innerBadge">Not Checked</div>

    <label>Outer Barcode</label>
    <div class="scan-row"><input type="text" id="outer"><button onclick="startScanner('outer')">SCAN</button></div>
    <div class="match-badge pending" id="outerBadge">Not Checked</div>
  </div>

  <div class="card">
    <div class="card-title">Photos</div>
    <button class="photo-btn" id="btnBag" onclick="document.getElementById('fBag').click()">📸 Bag Photo <span class="done-badge">DONE</span></button>
    <input type="file" id="fBag" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevBag','imgBag','btnBag')">
    <img id="prevBag" class="preview">

    <button class="photo-btn" id="btnInner" onclick="document.getElementById('fInner').click()">📸 Inner Photo <span class="done-badge">DONE</span></button>
    <input type="file" id="fInner" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevInner','imgInner','btnInner')">
    <img id="prevInner" class="preview">

    <button class="photo-btn" id="btnCarton" onclick="document.getElementById('fCarton').click()">📸 Outer Photo <span class="done-badge">DONE</span></button>
    <input type="file" id="fCarton" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevCarton','imgCarton','btnCarton')">
    <img id="prevCarton" class="preview">
  </div>

  <button class="submit-btn blocked" id="submitBtn" onclick="submitData()" disabled>SUBMIT DATA</button>
</div>

<div id="fixListContainer" style="display:none;">
  <div id="rejectedItemsList"></div>
</div>

<div id="scanner-container">
  <div id="reader"></div>
  <button onclick="stopScanner()" style="width:100%; padding:20px; background:#444; margin-top:20px;">CANCEL</button>
</div>
<div id="status"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJNbH09bwWqsO0lnM8j_xHA7ALfPFKpSjSFwUK4SRugrHqMWIhds7KhyUHN7kXR28/exec";
  
  let html5QrCode = null;
  let activeField = null;
  let masterData = null;
  let editingRow = null;
  let matchState = { bag: false, inner: false, outer: false };
  let photoData = { imgBag: null, imgInner: null, imgCarton: null };
  let existingPhotos = { bag: "", inner: "", carton: "" };

  function switchMainTab(mode) {
    document.getElementById('tabNew').classList.toggle('active', mode==='new');
    document.getElementById('tabFix').classList.toggle('active', mode==='fix');
    document.getElementById('formContainer').style.display = (mode==='new' ? 'block' : 'none');
    document.getElementById('fixListContainer').style.display = (mode==='fix' ? 'block' : 'none');
    if(mode==='fix') loadRejectedItems();
  }

  // --- SCAN & MATCH LOGIC ---
  async function startScanner(fId) {
    activeField = fId;
    document.getElementById('scanner-container').style.display = 'block';
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode:"environment" }, { fps:20, qrbox:250 }, (txt) => {
      document.getElementById(activeField).value = txt.trim().toUpperCase();
      stopScanner();
      onBarcodeEntered(activeField, txt.trim().toUpperCase());
    }).catch(e => stopScanner());
  }
  function stopScanner() { if(html5QrCode) html5QrCode.stop(); document.getElementById('scanner-container').style.display='none'; }

  async function onBarcodeEntered(id, val) {
    if (id === 'bag') await lookupMaster(val);
    else if (id === 'inner' || id === 'outer') checkMatch(id, val);
    validateForm();
  }

  async function lookupMaster(barcode) {
    if (barcode === 'NO') { matchState.bag = true; setBadge('bag','no-bc','No Barcode'); return; }
    setBadge('bag','pending','Searching...');
    try {
      const r = await fetch(SCRIPT_URL + '?action=lookup&barcode=' + encodeURIComponent(barcode));
      const res = await r.json();
      if (res.found) {
        masterData = res;
        document.getElementById('partNo').value = res.partNo;
        matchState.bag = true; setBadge('bag','ok','Match OK');
        if(document.getElementById('inner').value) checkMatch('inner', document.getElementById('inner').value);
        if(document.getElementById('outer').value) checkMatch('outer', document.getElementById('outer').value);
      } else {
        matchState.bag = false; setBadge('bag','fail','Not Found');
      }
    } catch(e) { setBadge('bag','fail','Error'); }
  }

  function checkMatch(id, val) {
    if (val === 'NO') { matchState[id] = true; setBadge(id,'no-bc','No Barcode'); return; }
    if (!masterData) return;
    const target = (id === 'inner' ? masterData.innerBarcode : masterData.outerBarcode);
    const ok = (val === String(target).toUpperCase());
    matchState[id] = ok;
    setBadge(id, ok ? 'ok' : 'fail', ok ? 'Match OK' : 'Mismatch');
  }

  function setBadge(id, cls, txt) {
    const b = document.getElementById(id+'Badge');
    b.className = 'match-badge ' + cls; b.textContent = txt;
  }

  // --- PHOTO LOGIC ---
  function processPhoto(input, prevId, key, btnId) {
    if(!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById(prevId).src = e.target.result;
      document.getElementById(prevId).style.display = 'block';
      document.getElementById(btnId).classList.add('has-photo');
      photoData[key] = { base64: e.target.result.split(',')[1], filename: key + '_' + Date.now() + '.jpg' };
      validateForm();
    };
    reader.readAsDataURL(input.files[0]);
  }

  async function uploadPhoto(key) {
    if(!photoData[key]) return "";
    const r = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'uploadPhoto', base64: photoData[key].base64, filename: photoData[key].filename })
    });
    const res = await r.json();
    return res.url || "";
  }

  // --- FIX REJECT LOGIC ---
  async function loadRejectedItems() {
    const list = document.getElementById('rejectedItemsList');
    list.innerHTML = "<p style='text-align:center'>Checking for rejects...</p>";
    try {
      const r = await fetch(SCRIPT_URL + "?action=records");
      const data = await r.json();
      const rejects = data.records.filter(x => (x.status || "").includes("Rejected"));
      document.getElementById('fixCount').textContent = rejects.length;
      document.getElementById('fixCount').style.display = rejects.length ? 'inline' : 'none';
      
      list.innerHTML = rejects.map(item => `
        <div class="fix-item" onclick='editItem(${JSON.stringify(item)})'>
          <div style="color:#90caf9; font-weight:bold">${item.customer || 'No Customer'}</div>
          <div style="font-size:0.8rem">Carton: ${item.cartonId} | PI: ${item.pi}</div>
          <div style="color:#ef9a9a; font-size:0.8rem; margin-top:5px;">Reason: ${item.remarks || 'Check details'}</div>
        </div>
      `).join('') || "<p style='text-align:center'>No rejected items.</p>";
    } catch(e) { list.innerHTML = "Error loading list"; }
  }

  function editItem(item) {
    editingRow = item.row;
    // Map data to fields
    document.getElementById('packedBy').value = item.packedBy || "";
    document.getElementById('cartonId').value = item.cartonId || "";
    document.getElementById('customer').value = item.customer || "";
    document.getElementById('pi').value = item.pi || "";
    document.getElementById('partNo').value = item.partNo || "";
    document.getElementById('qty').value = item.qty || 1;
    document.getElementById('bag').value = item.bag || "";
    document.getElementById('inner').value = item.inner || "";
    document.getElementById('outer').value = item.outer || "";
    
    // Handle existing photos
    existingPhotos = { bag: item.imgBagUrl || "", inner: item.imgInnerUrl || "", carton: item.imgCartonUrl || "" };
    
    ['Bag', 'Inner', 'Carton'].forEach(type => {
      const url = item['img' + type + 'Url'];
      const prev = document.getElementById('prev' + type);
      const btn = document.getElementById('btn' + type);
      if(url) {
        prev.src = url; prev.style.display = 'block';
        btn.classList.add('has-photo');
      } else {
        prev.style.display = 'none';
        btn.classList.remove('has-photo');
      }
    });

    document.getElementById('submitBtn').textContent = "FIX & RE-SUBMIT (ROW " + item.row + ")";
    switchMainTab('new');
    
    // Auto-trigger master lookup to restore badges
    if(item.bag) onBarcodeEntered('bag', item.bag);
  }

  // --- FINAL SUBMISSION ---
  function validateForm() {
    const btn = document.getElementById('submitBtn');
    const hasBagPhoto = photoData.imgBag || existingPhotos.bag;
    const hasInnerPhoto = photoData.imgInner || existingPhotos.inner;
    const hasCartonPhoto = photoData.imgCarton || existingPhotos.carton;
    
    const ok = matchState.bag && matchState.inner && matchState.outer && 
               document.getElementById('packedBy').value && 
               hasBagPhoto && hasInnerPhoto && hasCartonPhoto;
               
    btn.disabled = !ok;
    btn.className = 'submit-btn ' + (ok ? 'ready' : 'blocked');
  }

  async function submitData() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = "UPLOADING...";
    showStatus("Saving updates...", "info");

    try {
      const urls = {
        bag: photoData.imgBag ? await uploadPhoto('imgBag') : existingPhotos.bag,
        inner: photoData.imgInner ? await uploadPhoto('imgInner') : existingPhotos.inner,
        carton: photoData.imgCarton ? await uploadPhoto('imgCarton') : existingPhotos.carton
      };

      const payload = {
        action: 'submit',
        row: editingRow,
        packedBy: document.getElementById('packedBy').value,
        cartonId: document.getElementById('cartonId').value,
        customer: document.getElementById('customer').value,
        pi: document.getElementById('pi').value,
        partNo: document.getElementById('partNo').value,
        qty: document.getElementById('qty').value,
        bag: document.getElementById('bag').value,
        inner: document.getElementById('inner').value,
        outer: document.getElementById('outer').value,
        imgBagUrl: urls.bag,
        imgInnerUrl: urls.inner,
        imgCartonUrl: urls.carton,
        status: 'Pending' // Reset to pending after fix
      };

      await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
      showStatus("Fix Submitted Successfully!", "success");
      setTimeout(() => location.reload(), 1500);
    } catch(e) {
      showStatus("Upload failed", "error");
      btn.disabled = false;
      btn.textContent = "SUBMIT DATA";
    }
  }

  function showStatus(txt, cls) {
    const s = document.getElementById('status');
    s.textContent = txt; s.className = cls; s.style.display = 'block';
  }

  loadRejectedItems();
</script>
</body>
</html>
