<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>MG Packing System</title>

  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    * { box-sizing:border-box; }

    body{
      margin:0;
      padding:16px;
      background:#0f0f0f;
      color:#e0e0e0;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      min-height:100vh;
    }

    h1{
      text-align:center;
      color:#90caf9;
      margin:12px 0 4px;
      font-size:1.5rem;
    }

    .subtitle{
      text-align:center;
      color:#888;
      margin-bottom:20px;
      font-size:0.85rem;
    }

    .card{
      background:#1e1e1e;
      border:1px solid #333;
      border-radius:12px;
      padding:16px;
      margin-bottom:16px;
    }

    .card-title{
      font-size:0.75rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:0.08em;
      color:#666;
      margin-bottom:12px;
    }

    label{
      display:block;
      margin:10px 0 5px;
      font-weight:600;
      color:#90caf9;
      font-size:0.9rem;
    }

    .required-label::after{
      content:" *";
      color:#ff5722;
    }

    input[type="text"],
    input[type="number"]{
      width:100%;
      padding:11px 12px;
      background:#2a2a2a;
      border:1px solid #444;
      border-radius:8px;
      color:white;
      font-size:16px;
      text-transform:uppercase;
    }

    input[type="number"]{
      text-transform:none;
    }

    input:focus{
      outline:none;
      border-color:#90caf9;
    }

    input.match{
      border-color:#4caf50 !important;
      background:#1a2e1a;
    }

    input.mismatch{
      border-color:#f44336 !important;
      background:#2e1a1a;
    }

    input.no-barcode{
      border-color:#ff9800 !important;
      background:#2e2200;
    }

    input.required-empty{
      border-color:#ff5722 !important;
      box-shadow:0 0 0 2px rgba(255,87,34,0.3);
    }

    .scan-row{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .scan-row input{
      flex:1;
    }

    button{
      background:#3f51b5;
      color:white;
      border:none;
      padding:11px 14px;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
      font-size:0.88rem;
      white-space:nowrap;
      flex-shrink:0;
    }

    button.type-btn{
      background:#455a64;
    }

    button:disabled{
      opacity:0.4;
      cursor:not-allowed;
    }

    .match-badge{
      display:inline-flex;
      align-items:center;
      padding:4px 10px;
      border-radius:20px;
      font-size:0.8rem;
      font-weight:700;
      margin-top:5px;
      min-height:26px;
    }

    .match-badge.ok{
      background:#1b5e20;
      color:#a5d6a7;
    }

    .match-badge.fail{
      background:#b71c1c;
      color:#ef9a9a;
    }

    .match-badge.pending{
      background:#333;
      color:#888;
    }

    .match-badge.no-bc{
      background:#4a3000;
      color:#ffcc80;
    }

    .hint{
      color:#777;
      font-size:0.82rem;
      margin-top:6px;
    }

    #scanner-container{
      margin:12px 0;
      text-align:center;
      display:none;
    }

    #reader{
      width:100%;
      max-width:480px;
      margin:0 auto;
      border:2px solid #444;
      border-radius:10px;
      overflow:hidden;
      background:#000;
    }

    .photo-btn{
      width:100%;
      padding:15px;
      margin:8px 0;
      font-size:1rem;
      background:#37474f;
      border-radius:10px;
      border:none;
      color:white;
      cursor:pointer;
      text-align:left;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .photo-btn .icon{
      font-size:1.3rem;
    }

    .photo-btn .photo-label{
      flex:1;
    }

    .photo-btn .done-badge{
      background:#2e7d32;
      color:#a5d6a7;
      font-size:0.75rem;
      font-weight:700;
      padding:2px 8px;
      border-radius:10px;
      display:none;
    }

    .photo-btn.has-photo .done-badge{
      display:inline;
    }

    .preview{
      width:100%;
      max-height:140px;
      object-fit:cover;
      border-radius:8px;
      margin-top:6px;
      display:none;
      border:1px solid #555;
    }

    .submit-btn{
      width:100%;
      padding:18px;
      font-size:1.1rem;
      font-weight:bold;
      border-radius:10px;
      border:none;
      cursor:pointer;
      margin-top:8px;
    }

    .submit-btn.ready{
      background:#2e7d32;
      color:white;
    }

    .submit-btn.blocked{
      background:#333;
      color:#666;
      cursor:not-allowed;
    }

    #status{
      margin:12px 0;
      padding:12px;
      border-radius:8px;
      font-weight:bold;
      text-align:center;
      display:none;
    }

    #status.success{
      background:#2e7d32;
      color:white;
      display:block;
    }

    #status.error{
      background:#c62828;
      color:white;
      display:block;
    }

    #status.info{
      background:#1565c0;
      color:white;
      display:block;
    }

    .upload-status{
      font-size:0.78rem;
      color:#aaa;
      margin-top:4px;
      min-height:18px;
    }

    .upload-status.ok{
      color:#4caf50;
    }

    .upload-status.err{
      color:#f44336;
    }

    .blocker-notice{
      background:#b71c1c;
      color:#ef9a9a;
      border-radius:8px;
      padding:10px 14px;
      font-size:0.85rem;
      font-weight:600;
      margin-top:10px;
      display:none;
    }

    .missing-notice{
      background:#4a2000;
      color:#ffab91;
      border-radius:8px;
      padding:10px 14px;
      font-size:0.85rem;
      font-weight:600;
      margin-top:10px;
      display:none;
    }

    .step-bar{
      display:flex;
      gap:6px;
      margin-bottom:14px;
    }

    .step{
      flex:1;
      height:4px;
      border-radius:2px;
      background:#333;
    }

    .step.done{
      background:#4caf50;
    }

    .step.active{
      background:#90caf9;
    }
  </style>
</head>

<body>

<h1>MG Packing System</h1>
<p class="subtitle">Packer Entry</p>

<div class="step-bar">
  <div class="step" id="step1"></div>
  <div class="step" id="step2"></div>
  <div class="step" id="step3"></div>
  <div class="step" id="step4"></div>
</div>

<div class="card">

  <div class="card-title">Staff Info</div>

  <label class="required-label">Packed By</label>
  <div class="scan-row">
    <input type="text" id="packedBy" placeholder="Name or scan ID">
    <button onclick="startScanner('packedBy')">SCAN</button>
    <button class="type-btn" onclick="focusField('packedBy')">TYPE</button>
  </div>

  <label class="required-label">Packing Team</label>
  <div class="scan-row">
    <input type="text" id="checkerBy" placeholder="Team name or scan ID">
    <button onclick="startScanner('checkerBy')">SCAN</button>
    <button class="type-btn" onclick="focusField('checkerBy')">TYPE</button>
  </div>

</div>

<div class="card">

  <div class="card-title">Order Info</div>

  <label class="required-label">Carton ID</label>
  <div class="scan-row">
    <input type="text" id="cartonId" placeholder="Scan or type Carton ID">
    <button onclick="startScanner('cartonId')">SCAN</button>
    <button class="type-btn" onclick="focusField('cartonId')">TYPE</button>
  </div>

  <label class="required-label">Customer Name</label>
  <div class="scan-row">
    <input type="text" id="customer" placeholder="Customer Name">
    <button onclick="startScanner('customer')">SCAN</button>
    <button class="type-btn" onclick="focusField('customer')">TYPE</button>
  </div>

  <label class="required-label">P/I No.</label>
  <div class="scan-row">
    <input type="text" id="pi" placeholder="P/I No">
    <button onclick="startScanner('pi')">SCAN</button>
    <button class="type-btn" onclick="focusField('pi')">TYPE</button>
  </div>

  <label class="required-label">Part No.</label>
  <div class="scan-row">
    <input type="text" id="partNo" placeholder="Auto-fill or type">
    <button onclick="startScanner('partNo')">SCAN</button>
    <button class="type-btn" onclick="focusField('partNo')">TYPE</button>
  </div>

</div>

<div class="card">

  <div class="card-title">Barcode Verification</div>

  <p class="hint">
    Scan order: Bag → Inner → Outer<br>
    Type NO if item has no barcode
  </p>

  <label class="required-label">1. Bag Barcode</label>
  <div class="scan-row">
    <input type="text" id="bag" placeholder="Scan or type">
    <button onclick="startScanner('bag')">SCAN</button>
    <button class="type-btn" onclick="focusField('bag')">TYPE</button>
  </div>
  <div class="match-badge pending" id="bagBadge">Not checked</div>

  <label class="required-label">2. Inner Barcode</label>
  <div class="scan-row">
    <input type="text" id="inner" placeholder="Scan or type">
    <button onclick="startScanner('inner')">SCAN</button>
    <button class="type-btn" onclick="focusField('inner')">TYPE</button>
  </div>
  <div class="match-badge pending" id="innerBadge">Not checked</div>

  <label class="required-label">3. Outer Barcode</label>
  <div class="scan-row">
    <input type="text" id="outer" placeholder="Scan or type">
    <button onclick="startScanner('outer')">SCAN</button>
    <button class="type-btn" onclick="focusField('outer')">TYPE</button>
  </div>
  <div class="match-badge pending" id="outerBadge">Not checked</div>

  <div class="blocker-notice" id="blockerNotice">
    Barcode mismatch detected.
  </div>

  <div class="missing-notice" id="missingNotice">
    Please fill all required fields.
  </div>

  <div id="scanner-container">
    <div id="reader"></div>

    <button
      onclick="stopScanner()"
      style="margin-top:10px;background:#555;width:100%;">
      Close Scanner
    </button>
  </div>

</div>

<div class="card">

  <div class="card-title">Photos</div>

  <button class="photo-btn" id="btnBag"
    onclick="document.getElementById('fBag').click()">
    <span class="icon">📸</span>
    <span class="photo-label">Bag Photo</span>
    <span class="done-badge">DONE</span>
  </button>

  <input
    type="file"
    id="fBag"
    accept="image/*"
    capture="environment"
    style="display:none"
    onchange="processPhoto(this,'prevBag','imgBag','btnBag','uploadBag')">

  <img id="prevBag" class="preview">
  <div class="upload-status" id="uploadBag"></div>

  <button class="photo-btn" id="btnInner"
    onclick="document.getElementById('fInner').click()">
    <span class="icon">📸</span>
    <span class="photo-label">Inner Box</span>
    <span class="done-badge">DONE</span>
  </button>

  <input
    type="file"
    id="fInner"
    accept="image/*"
    capture="environment"
    style="display:none"
    onchange="processPhoto(this,'prevInner','imgInner','btnInner','uploadInner')">

  <img id="prevInner" class="preview">
  <div class="upload-status" id="uploadInner"></div>

  <button class="photo-btn" id="btnCarton"
    onclick="document.getElementById('fCarton').click()">
    <span class="icon">📸</span>
    <span class="photo-label">Carton Photo</span>
    <span class="done-badge">DONE</span>
  </button>

  <input
    type="file"
    id="fCarton"
    accept="image/*"
    capture="environment"
    style="display:none"
    onchange="processPhoto(this,'prevCarton','imgCarton','btnCarton','uploadCarton')">

  <img id="prevCarton" class="preview">
  <div class="upload-status" id="uploadCarton"></div>

</div>

<div class="card">

  <div class="card-title">Quantity</div>

  <label class="required-label">Qty</label>

  <input type="number" id="qty" min="1" value="1">

</div>

<button
  class="submit-btn blocked"
  id="submitBtn"
  onclick="submitData()"
  disabled>
  SUBMIT PACKING DATA
</button>

<div id="status"></div>

<script>

const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL";

let html5QrCode = null;
let activeField = null;
let masterData = null;

let matchState = {
  bag:null,
  inner:null,
  outer:null
};

let photoData = {
  imgBag:null,
  imgInner:null,
  imgCarton:null
};

const requiredFields = [
  'packedBy',
  'checkerBy',
  'cartonId',
  'customer',
  'pi',
  'partNo',
  'bag',
  'inner',
  'outer',
  'qty'
];

document.querySelectorAll('input[type="text"]').forEach(inp => {

  inp.addEventListener('input', function(){

    const pos = this.selectionStart;

    this.value = this.value.toUpperCase();

    try{
      this.setSelectionRange(pos,pos);
    }catch(e){}

  });

});

requiredFields.forEach(id => {

  const el = document.getElementById(id);

  if(el){

    el.addEventListener('input', function(){

      this.classList.remove('required-empty');

      updateSubmitButton();
      updateSteps();

    });

  }

});

async function startScanner(fieldId){

  activeField = fieldId;

  document.getElementById('scanner-container').style.display = 'block';

  if(!html5QrCode){
    html5QrCode = new Html5Qrcode("reader");
  }

  try{

    if(html5QrCode.isScanning){
      await html5QrCode.stop();
    }

    await html5QrCode.start(
      { facingMode:"environment" },
      {
        fps:20,
        qrbox:250
      },
      async(decodedText) => {

        const val = decodedText.trim().toUpperCase();

        document.getElementById(activeField).value = val;

        await stopScanner();

        onBarcodeEntered(activeField,val);

      }
    );

  }catch(err){

    showStatus("Camera error: " + err.message,'error');

  }

}

async function stopScanner(){

  try{

    if(html5QrCode && html5QrCode.isScanning){
      await html5QrCode.stop();
    }

  }catch(e){}

  document.getElementById('scanner-container').style.display = 'none';

}

function focusField(id){
  document.getElementById(id).focus();
}

['bag','inner','outer'].forEach(id => {

  document.getElementById(id).addEventListener('change', function(){

    const val = this.value.trim().toUpperCase();

    this.value = val;

    onBarcodeEntered(id,val);

  });

});

async function onBarcodeEntered(fieldId,value){

  if(!value) return;

  if(fieldId === 'bag'){
    await lookupMaster(value);
  }else{
    checkBarcode(fieldId,value);
  }

  updateSubmitButton();
  updateSteps();

}

async function lookupMaster(barcode){

  if(barcode === 'NO'){

    matchState.bag = true;

    setBadge('bag','no-bc','No barcode accepted');

    document.getElementById('bag').className = 'no-barcode';

    return;
  }

  try{

    setBadge('bag','pending','Checking...');

    const url =
      SCRIPT_URL +
      '?action=lookup&barcode=' +
      encodeURIComponent(barcode);

    const response = await fetch(url);

    const result = await response.json();

    if(result.found){

      masterData = result;

      document.getElementById('partNo').value =
        (result.partNo || '').toUpperCase();

      const ok =
        barcode.toUpperCase() ===
        String(result.bagBarcode).toUpperCase();

      matchState.bag = ok;

      const el = document.getElementById('bag');

      el.classList.toggle('match',ok);
      el.classList.toggle('mismatch',!ok);

      setBadge(
        'bag',
        ok ? 'ok' : 'fail',
        ok ? 'Bag Match OK' : 'Wrong Bag Barcode'
      );

      const inner = document.getElementById('inner').value.trim();
      const outer = document.getElementById('outer').value.trim();

      if(inner){
        checkBarcode('inner',inner);
      }

      if(outer){
        checkBarcode('outer',outer);
      }

    }else{

      matchState.bag = false;

      setBadge('bag','fail','Barcode not found');

      document.getElementById('bag').classList.add('mismatch');

    }

  }catch(err){

    setBadge('bag','fail','Lookup error');

  }

}

function checkBarcode(fieldId,value){

  const el = document.getElementById(fieldId);

  if(value === 'NO'){

    matchState[fieldId] = true;

    el.className = 'no-barcode';

    setBadge(fieldId,'no-bc','No barcode accepted');

    return;
  }

  if(!masterData){

    setBadge(fieldId,'pending','Scan Bag first');

    matchState[fieldId] = null;

    return;
  }

  let expected = '';

  if(fieldId === 'inner'){
    expected = masterData.innerBarcode;
  }

  if(fieldId === 'outer'){
    expected = masterData.outerBarcode;
  }

  const ok =
    value.toUpperCase() ===
    String(expected).toUpperCase();

  matchState[fieldId] = ok;

  el.classList.toggle('match',ok);
  el.classList.toggle('mismatch',!ok);

  setBadge(
    fieldId,
    ok ? 'ok' : 'fail',
    ok ? 'Barcode Match OK' : 'Wrong Barcode'
  );

}

function setBadge(id,type,text){

  const badge = document.getElementById(id + 'Badge');

  badge.className = 'match-badge ' + type;

  badge.textContent = text;

}

function validateRequiredFields(){

  let allFilled = true;

  let firstEmpty = null;

  requiredFields.forEach(id => {

    const el = document.getElementById(id);

    if(!el.value.trim()){

      allFilled = false;

      el.classList.add('required-empty');

      if(!firstEmpty){
        firstEmpty = el;
      }

    }

  });

  return {
    allFilled,
    firstEmpty
  };

}

function updateSubmitButton(){

  const { allFilled } = validateRequiredFields();

  const allMatch =
    matchState.bag === true &&
    matchState.inner === true &&
    matchState.outer === true;

  const anyFail =
    matchState.bag === false ||
    matchState.inner === false ||
    matchState.outer === false;

  const btn = document.getElementById('submitBtn');

  const canSubmit = allFilled && allMatch;

  btn.disabled = !canSubmit;

  btn.className =
    'submit-btn ' +
    (canSubmit ? 'ready' : 'blocked');

  document.getElementById('blockerNotice').style.display =
    anyFail ? 'block' : 'none';

  document.getElementById('missingNotice').style.display =
    (!allFilled) ? 'block' : 'none';

}

function updateSteps(){

  const s = [

    !!(
      document.getElementById('packedBy').value &&
      document.getElementById('checkerBy').value
    ),

    !!document.getElementById('bag').value,

    !!(
      matchState.bag === true &&
      matchState.inner === true &&
      matchState.outer === true
    ),

    !!(
      photoData.imgBag &&
      photoData.imgInner &&
      photoData.imgCarton
    )

  ];

  s.forEach((done,i) => {

    const el = document.getElementById('step'+(i+1));

    el.className =
      'step ' +
      (
        done
          ? 'done'
          : (i === s.indexOf(false) ? 'active' : '')
      );

  });

}

function processPhoto(input,previewId,dataKey,btnId,statusId){

  if(!input.files || !input.files[0]) return;

  const file = input.files[0];

  const reader = new FileReader();

  reader.onload = function(e){

    document.getElementById(previewId).src = e.target.result;

    document.getElementById(previewId).style.display = 'block';

    document.getElementById(btnId).classList.add('has-photo');

    photoData[dataKey] = {
      base64:e.target.result.split(',')[1],
      filename:dataKey + '_' + Date.now() + '.jpg'
    };

    document.getElementById(statusId).textContent = 'Ready';

    document.getElementById(statusId).className = 'upload-status ok';

    updateSteps();

  };

  reader.readAsDataURL(file);

}

async function uploadPhoto(dataKey,statusId){

  const obj = photoData[dataKey];

  if(!obj) return '';

  try{

    document.getElementById(statusId).textContent = 'Uploading...';

    const response = await fetch(SCRIPT_URL,{

      method:'POST',

      headers:{
        'Content-Type':'text/plain'
      },

      body:JSON.stringify({
        action:'uploadPhoto',
        base64:obj.base64,
        filename:obj.filename
      })

    });

    const result = await response.json();

    if(result.success){

      document.getElementById(statusId).textContent = 'Saved';

      return result.url || '';

    }

    return '';

  }catch(err){

    document.getElementById(statusId).textContent = 'Upload Error';

    return '';

  }

}

function getFormattedDate(){

  const months = [
    'JAN','FEB','MAR','APR','MAY','JUN',
    'JUL','AUG','SEP','OCT','NOV','DEC'
  ];

  const now = new Date();

  return (
    String(now.getDate()).padStart(2,'0') +
    '/' +
    months[now.getMonth()] +
    '/' +
    now.getFullYear()
  );

}

async function submitData(){

  const { allFilled, firstEmpty } = validateRequiredFields();

  if(!allFilled){

    showStatus('Please fill all required fields','error');

    if(firstEmpty){
      firstEmpty.focus();
    }

    return;
  }

  const btn = document.getElementById('submitBtn');

  btn.disabled = true;

  btn.textContent = 'Uploading...';

  showStatus('Uploading photos...','info');

  const bagUrl = await uploadPhoto('imgBag','uploadBag');
  const innerUrl = await uploadPhoto('imgInner','uploadInner');
  const cartonUrl = await uploadPhoto('imgCarton','uploadCarton');

  const payload = {

    action:'submit',

    packedDate:getFormattedDate(),

    packedBy:document.getElementById('packedBy').value,
    checkerBy:document.getElementById('checkerBy').value,

    cartonId:document.getElementById('cartonId').value,

    customer:document.getElementById('customer').value,

    pi:document.getElementById('pi').value,

    partNo:document.getElementById('partNo').value,

    bag:document.getElementById('bag').value,
    inner:document.getElementById('inner').value,
    outer:document.getElementById('outer').value,

    qty:document.getElementById('qty').value,

    bagMatch:matchState.bag,
    innerMatch:matchState.inner,
    outerMatch:matchState.outer,

    imgBagUrl:bagUrl,
    imgInnerUrl:innerUrl,
    imgCartonUrl:cartonUrl

  };

  try{

    const response = await fetch(SCRIPT_URL,{

      method:'POST',

      headers:{
        'Content-Type':'text/plain'
      },

      body:JSON.stringify(payload)

    });

    const result = await response.json();

    if(result.success){

      showStatus('Saved Successfully','success');

      setTimeout(() => {
        location.reload();
      },2000);

    }else{

      throw new Error(result.error || 'Submit failed');

    }

  }catch(err){

    showStatus(err.message,'error');

    btn.disabled = false;

    btn.textContent = 'RETRY SUBMIT';

  }

}

function showStatus(msg,type){

  const s = document.getElementById('status');

  s.textContent = msg;

  s.className = type;

}

</script>
