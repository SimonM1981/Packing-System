<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MG Multi-Part Packing</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
* { box-sizing: border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:16px; min-height:100vh; }
h1 { text-align:center; color:#90caf9; margin:12px 0 4px; font-size:1.5rem; }
.subtitle { text-align:center; color:#888; font-size:0.85rem; margin-bottom:20px; }
.card { background:#1e1e1e; border:1px solid #333; border-radius:12px; padding:16px; margin-bottom:16px; }
.card-title { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#666; margin-bottom:12px; }
label { display:block; margin:10px 0 5px; font-weight:600; color:#90caf9; font-size:0.9rem; }
input[type="text"],input[type="number"] { width:100%; padding:11px 12px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:16px; text-transform:uppercase; }
input[type="number"] { text-transform:none; }
input::placeholder { text-transform:none; color:#555; }
input:focus { outline:none; border-color:#90caf9; }
input.match { border-color:#4caf50 !important; background:#1a2e1a; }
input.mismatch { border-color:#f44336 !important; background:#2e1a1a; }
input.no-barcode{ border-color:#ff9800 !important; background:#2e2200; }
input.required-empty { border-color:#ff5722 !important; box-shadow: 0 0 0 2px rgba(255,87,34,0.3); }
.scan-row { display:flex; gap:8px; align-items:center; }
.scan-row input { flex:1; }
button { background:#3f51b5; color:white; border:none; padding:11px 14px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:0.88rem; white-space:nowrap; flex-shrink:0; }
button.type-btn { background:#455a64; }
button:disabled { opacity:0.4; cursor:not-allowed; }
button.danger { background:#b71c1c; }
button.success { background:#2e7d32; }
.match-badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:700; margin-top:5px; min-height:26px; }
.match-badge.ok { background:#1b5e20; color:#a5d6a7; }
.match-badge.fail { background:#b71c1c; color:#ef9a9a; }
.match-badge.pending { background:#333; color:#888; }
.match-badge.no-bc { background:#4a3000; color:#ffcc80; }
#scanner-container { margin:12px 0; text-align:center; display:none; }
#reader { width:100%; max-width:480px; margin:0 auto; border:2px solid #444; border-radius:10px; overflow:hidden; background:#000; }
.photo-btn { width:100%; padding:15px; margin:8px 0; font-size:1rem; background:#37474f; border-radius:10px; border:none; color:white; cursor:pointer; text-align:left; display:flex; align-items:center; gap:10px; }
.photo-btn .icon { font-size:1.3rem; }
.photo-btn .photo-label { flex:1; }
.photo-btn .done-badge { background:#2e7d32; color:#a5d6a7; font-size:0.75rem; font-weight:700; padding:2px 8px; border-radius:10px; display:none; }
.photo-btn.has-photo .done-badge { display:inline; }
.preview { width:100%; max-height:140px; object-fit:cover; border-radius:8px; margin-top:6px; display:none; border:1px solid #555; }
.submit-btn { width:100%; padding:18px; font-size:1.1rem; font-weight:bold; border-radius:10px; border:none; cursor:pointer; margin-top:8px; }
.submit-btn.ready { background:#2e7d32; color:white; }
.submit-btn.blocked { background:#333; color:#666; cursor:not-allowed; }
#status { margin:12px 0; padding:12px; border-radius:8px; font-weight:bold; text-align:center; display:none; }
#status.success { background:#2e7d32; color:white; display:block; }
#status.error { background:#c62828; color:white; display:block; }
#status.info { background:#1565c0; color:white; display:block; }
.auto-filled { font-size:0.75rem; color:#4caf50; margin-top:3px; display:none; }
.blocker-notice { background:#b71c1c; color:#ef9a9a; border-radius:8px; padding:10px 14px; font-size:0.85rem; font-weight:600; margin-top:10px; display:none; }
.step-bar { display:flex; gap:6px; margin-bottom:14px; }
.step { flex:1; height:4px; border-radius:2px; background:#333; transition:background 0.3s; }
.step.done { background:#4caf50; }
.step.active { background:#90caf9; }
.hint { color:#777; font-size:0.82rem; margin-top:6px; }
.upload-status { font-size:0.78rem; color:#aaa; margin-top:4px; min-height:18px; }
.upload-status.ok { color:#4caf50; }
.upload-status.err { color:#f44336; }
.required-label::after { content:" *"; color:#ff5722; }
.missing-notice { background:#4a2000; color:#ffab91; border-radius:8px; padding:10px 14px; font-size:0.85rem; font-weight:600; margin-top:10px; display:none; }

/* === PART ROW STYLES === */
.part-section { background:#161616; border:1px solid #444; border-radius:12px; padding:16px; margin-bottom:16px; position:relative; }
.part-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid #333; }
.part-title { font-size:1rem; font-weight:700; color:#ffb74d; }
.part-num-badge { background:#333; color:#ffb74d; padding:4px 12px; border-radius:20px; font-size:0.85rem; font-weight:bold; }
.remove-part-btn { background:#b71c1c; padding:6px 12px; font-size:0.8rem; }
.part-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
.part-grid .full-width { grid-column: 1 / -1; }
@media (max-width: 600px) { .part-grid { grid-template-columns: 1fr; } }
.add-part-btn { width:100%; padding:16px; background:#1a237e; color:white; border:none; border-radius:10px; font-weight:bold; font-size:1rem; cursor:pointer; margin-bottom:16px; display:flex; align-items:center; justify-content:center; gap:10px; }
.add-part-btn:hover { background:#283593; }
.qty-input { max-width:120px; }

/* Carton photos vs Part photos */
.carton-photo-section { border-left:4px solid #90caf9; }
.part-photo-section { border-left:4px solid #ffb74d; }
</style>
</head>
<body>
<h1>MG Multi-Part Packing</h1>
<p class="subtitle">Pack Multiple Parts in One Carton</p>

<div class="step-bar">
  <div class="step" id="step1"></div>
  <div class="step" id="step2"></div>
  <div class="step" id="step3"></div>
  <div class="step" id="step4"></div>
</div>

<!-- STAFF & CARTON INFO -->
<div class="card">
  <div class="card-title">Carton Header Info</div>
  <label class="required-label">Packed By</label>
  <div class="scan-row"><input type="text" id="packedBy" placeholder="Name or scan ID"><button onclick="startScanner('packedBy')">SCAN</button><button class="type-btn" onclick="focusField('packedBy')">TYPE</button></div>
  
  <label class="required-label">Packing Team</label>
  <div class="scan-row"><input type="text" id="checkerBy" placeholder="Team name or scan ID"><button onclick="startScanner('checkerBy')">SCAN</button><button class="type-btn" onclick="focusField('checkerBy')">TYPE</button></div>
  
  <label class="required-label">Carton ID</label>
  <div class="scan-row"><input type="text" id="cartonId" placeholder="Scan or type Carton ID"><button onclick="startScanner('cartonId')">SCAN</button><button class="type-btn" onclick="focusField('cartonId')">TYPE</button></div>
  
  <label class="required-label">Customer Name</label>
  <div class="scan-row"><input type="text" id="customer" placeholder="Type Customer Name"><button onclick="startScanner('customer')">SCAN</button><button class="type-btn" onclick="focusField('customer')">TYPE</button></div>
</div>

<!-- CARTON-LEVEL PHOTOS -->
<div class="card carton-photo-section">
  <div class="card-title">Carton Photos (Shared)</div>
  <p class="hint">These photos apply to the whole carton</p>
  
  <button class="photo-btn" id="btnCartonOuter" onclick="document.getElementById('fCartonOuter').click()">
    <span class="icon">📦</span><span class="photo-label">Outer Carton / Label</span><span class="done-badge">DONE</span>
  </button>
  <input type="file" id="fCartonOuter" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevCartonOuter','imgCartonOuter','btnCartonOuter','uploadCartonOuter')">
  <img id="prevCartonOuter" class="preview"><div class="upload-status" id="uploadCartonOuter"></div>
  
  <button class="photo-btn" id="btnCartonInner" onclick="document.getElementById('fCartonInner').click()">
    <span class="icon">📋</span><span class="photo-label">Carton Inner Layout</span><span class="done-badge">DONE</span>
  </button>
  <input type="file" id="fCartonInner" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevCartonInner','imgCartonInner','btnCartonInner','uploadCartonInner')">
  <img id="prevCartonInner" class="preview"><div class="upload-status" id="uploadCartonInner"></div>
</div>

<!-- DYNAMIC PARTS CONTAINER -->
<div id="partsContainer"></div>

<button class="add-part-btn" onclick="addPartRow()">➕ ADD PART TO CARTON</button>

<div class="blocker-notice" id="blockerNotice">Mismatch detected in one or more parts — submission blocked.</div>
<div class="missing-notice" id="missingNotice">Please fill in all required fields marked with *</div>

<div id="scanner-container">
  <div id="reader"></div>
  <button onclick="stopScanner()" style="margin-top:10px;background:#555;width:100%;">Close Scanner</button>
</div>

<button class="submit-btn blocked" id="submitBtn" onclick="submitData()" disabled>SUBMIT MULTI-PART PACKING</button>
<div id="status"></div>

<script>
// UPDATE THIS URL after deploying Codemulti.gs
const SCRIPT_URL = "https://script.google.com/macros/s/YOUR_MULTI_SCRIPT_ID/exec";

let html5QrCode = null;
let activeField = null;
let partCounter = 0;
let partsData = {}; // keyed by partId

// Carton-level photos
let cartonPhotos = { imgCartonOuter: null, imgCartonInner: null };

// Required header fields
const headerFields = ['packedBy', 'checkerBy', 'cartonId', 'customer'];

// Auto uppercase
document.querySelectorAll('input[type="text"]').forEach(inp => {
  inp.addEventListener('input', function() {
    const pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    try { this.setSelectionRange(pos,pos); } catch(e){}
  });
});

// Header field validation
headerFields.forEach(id => {
  const el = document.getElementById(id);
  if (el) {
    el.addEventListener('blur', validateAll);
    el.addEventListener('input', function() { this.classList.remove('required-empty'); validateAll(); });
  }
});

function generatePartId() {
  return 'part_' + (++partCounter) + '_' + Date.now();
}

function addPartRow() {
  const partId = generatePartId();
  const container = document.getElementById('partsContainer');
  
  const div = document.createElement('div');
  div.className = 'part-section';
  div.id = 'section_' + partId;
  div.innerHTML = `
    <div class="part-header">
      <span class="part-title">Part #${partCounter}</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="part-num-badge" id="badge_${partId}">PENDING</span>
        <button class="remove-part-btn danger" onclick="removePartRow('${partId}')">REMOVE</button>
      </div>
    </div>
    <div class="part-grid">
      <div class="full-width">
        <label class="required-label">P/I No.</label>
        <div class="scan-row"><input type="text" id="pi_${partId}" placeholder="Type P/I No." onchange="lookupPartMaster('${partId}')"><button onclick="startScanner('pi_${partId}')">SCAN</button><button class="type-btn" onclick="focusField('pi_${partId}')">TYPE</button></div>
      </div>
      <div class="full-width">
        <label class="required-label">Part No.</label>
        <div class="scan-row"><input type="text" id="partNo_${partId}" placeholder="Auto-filled or scan/type" onchange="lookupPartMaster('${partId}')"><button onclick="startScanner('partNo_${partId}')">SCAN</button><button class="type-btn" onclick="focusField('partNo_${partId}')">TYPE</button></div>
        <div class="auto-filled" id="partNoNote_${partId}" style="display:none;">Auto-filled from master register</div>
      </div>
      <div>
        <label class="required-label">Bag Barcode</label>
        <div class="scan-row"><input type="text" id="bag_${partId}" placeholder="Scan, type, or NO" onchange="onPartBarcodeEntered('${partId}','bag')"><button onclick="startScanner('bag_${partId}')">SCAN</button><button class="type-btn" onclick="focusField('bag_${partId}')">TYPE</button></div>
        <div class="match-badge pending" id="bagBadge_${partId}">Not checked</div>
      </div>
      <div>
        <label class="required-label">Inner Box Barcode</label>
        <div class="scan-row"><input type="text" id="inner_${partId}" placeholder="Scan, type, or NO" onchange="onPartBarcodeEntered('${partId}','inner')"><button onclick="startScanner('inner_${partId}')">SCAN</button><button class="type-btn" onclick="focusField('inner_${partId}')">TYPE</button></div>
        <div class="match-badge pending" id="innerBadge_${partId}">Not checked</div>
      </div>
      <div>
        <label class="required-label">Outer Box Barcode</label>
        <div class="scan-row"><input type="text" id="outer_${partId}" placeholder="Scan, type, or NO" onchange="onPartBarcodeEntered('${partId}','outer')"><button onclick="startScanner('outer_${partId}')">SCAN</button><button class="type-btn" onclick="focusField('outer_${partId}')">TYPE</button></div>
        <div class="match-badge pending" id="outerBadge_${partId}">Not checked</div>
      </div>
      <div>
        <label class="required-label">Qty (pcs)</label>
        <input type="number" id="qty_${partId}" class="qty-input" min="1" value="1">
      </div>
    </div>
    
    <div style="margin-top:12px; padding-top:12px; border-top:1px solid #333;">
      <div class="card-title" style="margin-bottom:8px;">Part Photos</div>
      <button class="photo-btn" id="btnBag_${partId}" onclick="document.getElementById('fBag_${partId}').click()">
        <span class="icon">📸</span><span class="photo-label">Bag with Part</span><span class="done-badge">DONE</span>
      </button>
      <input type="file" id="fBag_${partId}" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevBag_${partId}','imgBag_${partId}','btnBag_${partId}','uploadBag_${partId}')">
      <img id="prevBag_${partId}" class="preview"><div class="upload-status" id="uploadBag_${partId}"></div>
      
      <button class="photo-btn" id="btnInner_${partId}" onclick="document.getElementById('fInner_${partId}').click()">
        <span class="icon">📸</span><span class="photo-label">Inner Box / Label</span><span class="done-badge">DONE</span>
      </button>
      <input type="file" id="fInner_${partId}" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevInner_${partId}','imgInner_${partId}','btnInner_${partId}','uploadInner_${partId}')">
      <img id="prevInner_${partId}" class="preview"><div class="upload-status" id="uploadInner_${partId}"></div>
    </div>
  `;
  
  container.appendChild(div);
  
  // Initialize part data
  partsData[partId] = {
    masterData: null,
    matchState: { bag: null, inner: null, outer: null },
    photos: { imgBag: null, imgInner: null }
  };
  
  validateAll();
  updateSteps();
}

function removePartRow(partId) {
  const el = document.getElementById('section_' + partId);
  if (el) el.remove();
  delete partsData[partId];
  validateAll();
  updateSteps();
}

// ── SCANNER ──────────────────────────────────────────────
async function startScanner(fieldId) {
  activeField = fieldId;
  document.getElementById('scanner-container').style.display = 'block';
  if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
  try {
    if (html5QrCode.isScanning) await html5QrCode.stop();
    await html5QrCode.start({ facingMode:"environment" }, { fps:20, qrbox:250 }, (decoded) => {
      const val = decoded.trim().toUpperCase();
      const tf = activeField;
      document.getElementById(tf).value = val;
      stopScanner();
      // Trigger change event manually
      document.getElementById(tf).dispatchEvent(new Event('change'));
    });
  } catch(err) { showStatus("Camera error: "+err.message,'error'); stopScanner(); }
}

function stopScanner() {
  if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().catch(()=>{});
  document.getElementById('scanner-container').style.display = 'none';
  activeField = null;
}

function focusField(id) { document.getElementById(id).focus(); }

// ── MASTER LOOKUP ─────────────────────────────────────────
async function lookupPartMaster(partId) {
  const pi = document.getElementById('pi_' + partId).value.trim();
  const partNo = document.getElementById('partNo_' + partId).value.trim();
  
  if (!pi || !partNo) return;
  
  try {
    const url = SCRIPT_URL + '?action=lookup&pi=' + encodeURIComponent(pi) + '&partNo=' + encodeURIComponent(partNo);
    const resp = await fetch(url);
    const result = await resp.json();
    
    if (result.found) {
      partsData[partId].masterData = result;
      document.getElementById('partNo_' + partId).value = String(result.partNo || "").toUpperCase();
      document.getElementById('partNoNote_' + partId).style.display = 'block';
      
      // Auto-check if barcodes already entered
      const bagVal = document.getElementById('bag_' + partId).value.trim();
      const innerVal = document.getElementById('inner_' + partId).value.trim();
      const outerVal = document.getElementById('outer_' + partId).value.trim();
      
      if (bagVal) checkPartBarcode(partId, 'bag', bagVal);
      if (innerVal) checkPartBarcode(partId, 'inner', innerVal);
      if (outerVal) checkPartBarcode(partId, 'outer', outerVal);
    }
  } catch(err) {
    console.log('Lookup error:', err);
  }
  validateAll();
}

// ── BARCODE CHECKING ──────────────────────────────────────
function onPartBarcodeEntered(partId, field) {
  const val = document.getElementById(field + '_' + partId).value.trim().toUpperCase();
  if (!val) return;
  checkPartBarcode(partId, field, val);
  validateAll();
  updateSteps();
}

function checkPartBarcode(partId, field, value) {
  const pd = partsData[partId];
  const el = document.getElementById(field + '_' + partId);
  
  if (value === 'NO') {
    pd.matchState[field] = true;
    el.className = 'no-barcode';
    setPartBadge(partId, field, 'no-bc', 'No barcode — accepted');
    return;
  }
  
  if (!pd.masterData) {
    // Try lookup first
    lookupPartMaster(partId).then(() => {
      if (pd.masterData) {
        checkPartBarcode(partId, field, value);
      } else {
        setPartBadge(partId, field, 'pending', 'Enter P/I & Part No. first');
        pd.matchState[field] = null;
      }
      validateAll();
    });
    return;
  }
  
  const expected = field === 'bag' ? pd.masterData.bagBarcode : 
                   field === 'inner' ? pd.masterData.innerBarcode : pd.masterData.outerBarcode;
  const ok = String(value).toUpperCase() === String(expected).toUpperCase();
  pd.matchState[field] = ok;
  
  el.classList.remove('no-barcode');
  el.classList.toggle('match', ok);
  el.classList.toggle('mismatch', !ok);
  setPartBadge(partId, field, ok ? 'ok' : 'fail', ok ? 'Match — ' + field + ' OK' : 'Mismatch — Wrong ' + field);
}

function setPartBadge(partId, field, type, text) {
  const b = document.getElementById(field + 'Badge_' + partId);
  if (b) {
    b.className = 'match-badge ' + type;
    b.textContent = text;
  }
  // Update part overall badge
  updatePartBadge(partId);
}

function updatePartBadge(partId) {
  const pd = partsData[partId];
  const badge = document.getElementById('badge_' + partId);
  if (!badge) return;
  
  const allOk = pd.matchState.bag === true && pd.matchState.inner === true && pd.matchState.outer === true;
  const anyFail = pd.matchState.bag === false || pd.matchState.inner === false || pd.matchState.outer === false;
  
  if (allOk) {
    badge.textContent = 'VERIFIED';
    badge.style.background = '#1b5e20';
    badge.style.color = '#a5d6a7';
  } else if (anyFail) {
    badge.textContent = 'MISMATCH';
    badge.style.background = '#b71c1c';
    badge.style.color = '#ef9a9a';
  } else {
    badge.textContent = 'PENDING';
    badge.style.background = '#333';
    badge.style.color = '#ffb74d';
  }
}

// ── VALIDATION ────────────────────────────────────────────
function validateAll() {
  let allFilled = true;
  let anyFail = false;
  
  // Check header fields
  headerFields.forEach(id => {
    const el = document.getElementById(id);
    if (!el.value.trim()) {
      allFilled = false;
      el.classList.add('required-empty');
    } else {
      el.classList.remove('required-empty');
    }
  });
  
  // Check parts
  const partIds = Object.keys(partsData);
  if (partIds.length === 0) allFilled = false;
  
  partIds.forEach(pid => {
    const pd = partsData[pid];
    const fields = ['pi', 'partNo', 'bag', 'inner', 'outer'];
    fields.forEach(f => {
      const el = document.getElementById(f + '_' + pid);
      if (!el.value.trim()) {
        allFilled = false;
        el.classList.add('required-empty');
      } else {
        el.classList.remove('required-empty');
      }
    });
    
    const qtyEl = document.getElementById('qty_' + pid);
    if (!qtyEl.value || qtyEl.value < 1) {
      allFilled = false;
    }
    
    // Check match state
    const ms = pd.matchState;
    if (ms.bag === false || ms.inner === false || ms.outer === false) anyFail = true;
    if (ms.bag !== true || ms.inner !== true || ms.outer !== true) allFilled = false;
  });
  
  // Check carton photos
  if (!cartonPhotos.imgCartonOuter || !cartonPhotos.imgCartonInner) allFilled = false;
  
  const btn = document.getElementById('submitBtn');
  const canSubmit = allFilled && !anyFail && partIds.length > 0;
  
  btn.className = 'submit-btn ' + (canSubmit ? 'ready' : 'blocked');
  btn.disabled = !canSubmit;
  
  document.getElementById('blockerNotice').style.display = anyFail ? 'block' : 'none';
  document.getElementById('missingNotice').style.display = (!allFilled && (canSubmit || anyFail)) ? 'block' : 'none';
  
  return canSubmit;
}

function updateSteps() {
  const s1 = !!(document.getElementById('packedBy').value && document.getElementById('checkerBy').value);
  const s2 = !!(document.getElementById('cartonId').value && document.getElementById('customer').value);
  
  let s3 = true;
  let s4 = true;
  const partIds = Object.keys(partsData);
  
  if (partIds.length === 0) { s3 = false; s4 = false; }
  else {
    partIds.forEach(pid => {
      const pd = partsData[pid];
      if (pd.matchState.bag !== true || pd.matchState.inner !== true || pd.matchState.outer !== true) s3 = false;
      if (!pd.photos.imgBag || !pd.photos.imgInner) s4 = false;
    });
  }
  
  const cartonPhotosOk = cartonPhotos.imgCartonOuter && cartonPhotos.imgCartonInner;
  if (!cartonPhotosOk) s4 = false;
  
  const steps = [s1, s2, s3, s4];
  steps.forEach((done, i) => {
    const el = document.getElementById('step' + (i + 1));
    el.className = 'step ' + (done ? 'done' : (i === steps.indexOf(false) ? 'active' : ''));
  });
}

// ── PHOTO HANDLING ────────────────────────────────────────
function processPhoto(input, previewId, dataKey, btnId, statusId) {
  if (!input.files || !input.files[0]) return;
  const statusEl = document.getElementById(statusId);
  statusEl.textContent = 'Compressing...';
  const img = new Image();
  const url = URL.createObjectURL(input.files[0]);
  img.onload = function() {
    const MAX = 1024;
    let w = img.width, h = img.height;
    if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const compressed = canvas.toDataURL('image/jpeg', 0.7);
    document.getElementById(previewId).src = compressed;
    document.getElementById(previewId).style.display = 'block';
    document.getElementById(btnId).classList.add('has-photo');
    
    // Store in correct location
    if (dataKey.startsWith('imgCarton')) {
      cartonPhotos[dataKey] = { base64: compressed.split(',')[1], filename: dataKey + '_' + Date.now() + '.jpg' };
    } else {
      // Extract partId from dataKey (format: imgBag_part_XXX)
      const match = dataKey.match(/^img(Bag|Inner)_(part_.+)$/);
      if (match) {
        const type = match[1].toLowerCase(); // bag or inner
        const partId = match[2];
        if (partsData[partId]) {
          partsData[partId].photos['img' + match[1]] = { base64: compressed.split(',')[1], filename: dataKey + '_' + Date.now() + '.jpg' };
        }
      }
    }
    
    statusEl.textContent = 'Ready';
    statusEl.className = 'upload-status ok';
    updateSteps();
  };
  img.src = url;
}

async function uploadPhoto(dataObj, statusId) {
  if (!dataObj) return "";
  const statusEl = document.getElementById(statusId);
  statusEl.textContent = 'Uploading...';
  try {
    const resp = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'uploadPhoto', base64: dataObj.base64, filename: dataObj.filename })
    });
    const result = await resp.json();
    if (result.success) {
      statusEl.textContent = 'Saved';
      return result.url;
    } else throw new Error(result.error);
  } catch(err) {
    statusEl.textContent = 'Drive Error';
    statusEl.className = 'upload-status err';
    return "";
  }
}

// ── DATE FORMATTER ────────────────────────────────────────
function getFormattedDate() {
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const now = new Date();
  return String(now.getDate()).padStart(2, '0') + '/' + months[now.getMonth()] + '/' + now.getFullYear();
}

// ── SUBMIT ────────────────────────────────────────────────
async function submitData() {
  if (!validateAll()) {
    showStatus('Please complete all required fields and fix mismatches', 'error');
    return;
  }
  
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Uploading Photos...';
  showStatus('Uploading photos to Drive...', 'info');
  
  // Upload carton photos
  const cartonOuterUrl = await uploadPhoto(cartonPhotos.imgCartonOuter, 'uploadCartonOuter');
  const cartonInnerUrl = await uploadPhoto(cartonPhotos.imgCartonInner, 'uploadCartonInner');
  
  // Upload part photos and build parts array
  const partIds = Object.keys(partsData);
  const parts = [];
  
  for (const pid of partIds) {
    const pd = partsData[pid];
    const bagUrl = await uploadPhoto(pd.photos.imgBag, 'uploadBag_' + pid);
    const innerUrl = await uploadPhoto(pd.photos.imgInner, 'uploadInner_' + pid);
    
    parts.push({
      pi: document.getElementById('pi_' + pid).value.trim(),
      partNo: document.getElementById('partNo_' + pid).value.trim(),
      bag: document.getElementById('bag_' + pid).value.trim(),
      inner: document.getElementById('inner_' + pid).value.trim(),
      outer: document.getElementById('outer_' + pid).value.trim(),
      qty: document.getElementById('qty_' + pid).value,
      bagMatch: pd.matchState.bag,
      innerMatch: pd.matchState.inner,
      outerMatch: pd.matchState.outer,
      imgBagUrl: bagUrl,
      imgInnerUrl: innerUrl
    });
  }
  
  const payload = {
    action: 'submitMulti',
    packedDate: getFormattedDate(),
    packedBy: document.getElementById('packedBy').value.trim(),
    checkerBy: document.getElementById('checkerBy').value.trim(),
    cartonId: document.getElementById('cartonId').value.trim(),
    customer: document.getElementById('customer').value.trim(),
    imgCartonOuterUrl: cartonOuterUrl,
    imgCartonInnerUrl: cartonInnerUrl,
    parts: parts
  };
  
  try {
    const resp = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const res = await resp.json();
    if (res.success) {
      showStatus('Success! Multi-part packing saved. Rows: ' + res.rows.join(', '), 'success');
      setTimeout(() => location.reload(), 3000);
    } else {
      throw new Error(res.error || 'Unknown server error');
    }
  } catch(e) {
    showStatus('Submit Error: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'RETRY SUBMIT';
  }
}

function showStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = type;
}
