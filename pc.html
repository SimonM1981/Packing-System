<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>MG Packing System</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:16px; min-height:100vh; }
    h1 { text-align:center; color:#90caf9; margin:12px 0 4px; font-size:1.5rem; }
    
    /* TAB STYLING */
    .main-tabs { display:flex; background:#161616; margin-bottom:15px; border-radius:12px; overflow:hidden; border:1px solid #333; }
    .main-tab { flex:1; padding:15px; text-align:center; cursor:pointer; font-weight:bold; color:#666; transition: 0.3s; border-bottom: 3px solid transparent; }
    .main-tab.active { color:#90caf9; border-bottom-color:#90caf9; background:#1a1a1a; }
    #fixCount { background:#f44336; color:white; padding:2px 7px; border-radius:10px; font-size:0.75rem; margin-left:5px; }

    /* REJECTED LIST */
    .fix-item { background:#1e1e1e; border:1px solid #333; border-left:5px solid #f44336; padding:16px; border-radius:12px; margin-bottom:12px; cursor:pointer; }

    .card { background:#1e1e1e; border:1px solid #333; border-radius:12px; padding:16px; margin-bottom:16px; }
    .card-title { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#666; margin-bottom:12px; }
    label { display:block; margin:10px 0 5px; font-weight:600; color:#90caf9; font-size:0.9rem; }
    
    input[type="text"], input[type="number"] { width:100%; padding:11px 12px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:16px; text-transform:uppercase; }
    input[type="number"] { text-transform:none; }
    input:focus { outline:none; border-color:#90caf9; }
    
    /* STATUS COLORS */
    input.match      { border-color:#4caf50 !important; background:#1a2e1a; }
    input.mismatch   { border-color:#f44336 !important; background:#2e1a1a; }
    input.no-barcode { border-color:#ff9800 !important; background:#2e2200; }
    input.required-empty { border-color:#ff5722 !important; box-shadow: 0 0 0 2px rgba(255,87,34,0.3); }

    .scan-row { display:flex; gap:8px; align-items:center; }
    .scan-row input { flex:1; }
    button { background:#3f51b5; color:white; border:none; padding:11px 14px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:0.88rem; white-space:nowrap; }
    button.type-btn { background:#455a64; }
    
    .match-badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:700; margin-top:5px; min-height:26px; }
    .match-badge.ok      { background:#1b5e20; color:#a5d6a7; }
    .match-badge.fail    { background:#b71c1c; color:#ef9a9a; }
    .match-badge.pending { background:#333; color:#888; }
    .match-badge.no-bc   { background:#4a3000; color:#ffcc80; }

    #reader { width:100%; max-width:480px; margin:0 auto; border:2px solid #444; border-radius:10px; overflow:hidden; background:#000; }
    
    .photo-btn { width:100%; padding:15px; margin:8px 0; font-size:1rem; background:#37474f; border-radius:10px; border:none; color:white; cursor:pointer; text-align:left; display:flex; align-items:center; gap:10px; }
    .photo-btn .done-badge { background:#2e7d32; color:#a5d6a7; font-size:0.75rem; font-weight:700; padding:2px 8px; border-radius:10px; display:none; }
    .photo-btn.has-photo .done-badge { display:inline; }
    
    .preview { width:100%; max-height:250px; object-fit:contain; border-radius:8px; margin-top:10px; display:none; border:1px solid #555; background:#000; }
    
    .submit-btn { width:100%; padding:18px; font-size:1.1rem; font-weight:bold; border-radius:10px; border:none; cursor:pointer; margin-top:8px; }
    .submit-btn.ready   { background:#2e7d32; color:white; }
    .submit-btn.blocked { background:#333; color:#666; cursor:not-allowed; }
    
    #status { margin:12px 0; padding:12px; border-radius:8px; font-weight:bold; text-align:center; display:none; }
    #status.success { background:#2e7d32; color:white; display:block; }
    #status.error   { background:#c62828; color:white; display:block; }
    #status.info    { background:#1565c0; color:white; display:block; }
    
    .step-bar { display:flex; gap:6px; margin-bottom:14px; }
    .step { flex:1; height:4px; border-radius:2px; background:#333; }
    .step.done   { background:#4caf50; }
    .step.active { background:#90caf9; }
    .required-label::after { content:" *"; color:#ff5722; }
    .blocker-notice, .missing-notice { border-radius:8px; padding:10px; font-size:0.85rem; font-weight:600; margin-top:10px; display:none; }
    .blocker-notice { background:#b71c1c; color:#ef9a9a; }
    .missing-notice { background:#4a2000; color:#ffab91; }
  </style>
</head>
<body>

<h1>MG Packing System</h1>

<div class="main-tabs">
  <div class="main-tab active" id="tabNew" onclick="switchMainTab('new')">NEW ENTRY</div>
  <div class="main-tab" id="tabFix" onclick="switchMainTab('fix')">FIX REJECTED <span id="fixCount" style="display:none;">0</span></div>
</div>

<div id="fixListContainer" style="display:none;">
  <div id="rejectedItemsList">
    <p style="text-align:center; padding:20px; color:#666;">Scanning for rejected items...</p>
  </div>
</div>

<div id="formContainer">
  <div class="step-bar">
    <div class="step" id="step1"></div><div class="step" id="step2"></div>
    <div class="step" id="step3"></div><div class="step" id="step4"></div>
  </div>

  <div class="card">
    <div class="card-title">Staff Info</div>
    <label class="required-label">Packed By</label>
    <div class="scan-row"><input type="text" id="packedBy" placeholder="Name"><button onclick="startScanner('packedBy')">SCAN</button><button class="type-btn" onclick="focusField('packedBy')">TYPE</button></div>
    <label class="required-label">Packing Team</label>
    <div class="scan-row"><input type="text" id="checkerBy" placeholder="Team"><button onclick="startScanner('checkerBy')">SCAN</button><button class="type-btn" onclick="focusField('checkerBy')">TYPE</button></div>
  </div>

  <div class="card">
    <div class="card-title">Order Info</div>
    <label class="required-label">Carton ID</label>
    <div class="scan-row"><input type="text" id="cartonId" placeholder="Scan Carton ID"><button onclick="startScanner('cartonId')">SCAN</button></div>
    <label class="required-label">Customer Name</label>
    <div class="scan-row"><input type="text" id="customer" placeholder="Customer"><button onclick="startScanner('customer')">SCAN</button></div>
    <label class="required-label">P/I No.</label>
    <div class="scan-row"><input type="text" id="pi" placeholder="P/I No."><button onclick="startScanner('pi')">SCAN</button></div>
    <label class="required-label">Part No.</label>
    <div class="scan-row"><input type="text" id="partNo" placeholder="Part Number"><button onclick="startScanner('partNo')">SCAN</button></div>
  </div>

  <div class="card">
    <div class="card-title">Barcode Verification</div>
    
    <label class="required-label">1. Bag Barcode</label>
    <div class="scan-row"><input type="text" id="bag" placeholder="Scan or NO"><button onclick="startScanner('bag')">SCAN</button></div>
    <div class="match-badge pending" id="bagBadge">Not checked yet</div>

    <label class="required-label">2. Inner Box Barcode</label>
    <div class="scan-row"><input type="text" id="inner" placeholder="Scan or NO"><button onclick="startScanner('inner')">SCAN</button></div>
    <div class="match-badge pending" id="innerBadge">Not checked yet</div>

    <label class="required-label">3. Outer Carton Barcode</label>
    <div class="scan-row"><input type="text" id="outer" placeholder="Scan or NO"><button onclick="startScanner('outer')">SCAN</button></div>
    <div class="match-badge pending" id="outerBadge">Not checked yet</div>

    <div class="blocker-notice" id="blockerNotice">Barcode Mismatch - Fix to Submit</div>
    <div class="missing-notice" id="missingNotice">Missing required fields *</div>
    
    <div id="scanner-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000; padding:20px;">
      <div id="reader"></div>
      <button onclick="stopScanner()" style="width:100%; padding:20px; background:#444; margin-top:20px; font-size:1.2rem;">CANCEL SCAN</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Photos</div>
    
    <button class="photo-btn" id="btnBag" onclick="document.getElementById('fBag').click()">📸 Bag with Part <span class="done-badge">DONE</span></button>
    <input type="file" id="fBag" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevBag','imgBag','btnBag')">
    <img id="prevBag" class="preview">

    <button class="photo-btn" id="btnInner" onclick="document.getElementById('fInner').click()">📸 Inner Box Label <span class="done-badge">DONE</span></button>
    <input type="file" id="fInner" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevInner','imgInner','btnInner')">
    <img id="prevInner" class="preview">

    <button class="photo-btn" id="btnCarton" onclick="document.getElementById('fCarton').click()">📸 Outer Carton Label <span class="done-badge">DONE</span></button>
    <input type="file" id="fCarton" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevCarton','imgCarton','btnCarton')">
    <img id="prevCarton" class="preview">
  </div>

  <div class="card">
    <label class="required-label">Qty (pcs)</label>
    <input type="number" id="qty" min="1" value="1">
  </div>

  <button class="submit-btn blocked" id="submitBtn" onclick="submitData()" disabled>SUBMIT PACKING DATA</button>
  <div id="status"></div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJNbH09bwWqsO0lnM8j_xHA7ALfPFKpSjSFwUK4SRugrHqMWIhds7KhyUHN7kXR28/exec";
  
  let html5QrCode = null;
  let activeField = null;
  let masterData = null;
  let matchState = { bag: null, inner: null, outer: null };
  let photoData = { imgBag: null, imgInner: null, imgCarton: null };
  let editingRow = null;
  let existingPhotos = { bag: "", inner: "", carton: "" };

  const requiredFields = ['packedBy', 'checkerBy', 'cartonId', 'customer', 'pi', 'partNo', 'bag', 'inner', 'outer', 'qty'];

  // --- TAB & REJECTED ITEM LOGIC ---
  function switchMainTab(mode) {
    document.getElementById('tabNew').classList.toggle('active', mode==='new');
    document.getElementById('tabFix').classList.toggle('active', mode==='fix');
    document.getElementById('formContainer').style.display = (mode==='new' ? 'block' : 'none');
    document.getElementById('fixListContainer').style.display = (mode==='fix' ? 'block' : 'none');
    if(mode==='fix') loadRejectedItems();
  }

  async function loadRejectedItems() {
    const listDiv = document.getElementById('rejectedItemsList');
    listDiv.innerHTML = '<p style="text-align:center; padding:20px; color:#666;">Loading rejected items...</p>';
    try {
      const resp = await fetch(SCRIPT_URL + '?action=records');
      const data = await resp.json();
      const rejected = data.records.filter(r => (r.status||'').includes('Rejected'));
      
      document.getElementById('fixCount').textContent = rejected.length;
      document.getElementById('fixCount').style.display = rejected.length > 0 ? 'inline' : 'none';

      listDiv.innerHTML = rejected.map(r => `
        <div class="fix-item" onclick='editRejectedItem(${JSON.stringify(r).replace(/'/g, "&apos;")})'>
          <div style="font-weight:bold; color:#ffb74d;">${r.customer}</div>
          <div style="font-size:0.8rem; margin-top:4px;">PI: ${r.pi} | Carton: ${r.cartonId}</div>
          <div style="background:#2e1a1a; padding:8px; border-radius:6px; margin-top:8px; color:#ef9a9a; font-size:0.8rem;">
            <strong>REJECT REASON:</strong> ${r.remarks || 'No remarks provided'}
          </div>
        </div>
      `).join('') || '<p style="text-align:center; padding:40px; color:#666;">No rejected items found.</p>';
    } catch(e) { listDiv.innerHTML = '<p style="color:red; text-align:center;">Error loading rejected items.</p>'; }
  }

  function editRejectedItem(r) {
    editingRow = r.row;
    
    // Store existing photo URLs
    existingPhotos.bag = r.imgBagUrl || "";
    existingPhotos.inner = r.imgInnerUrl || "";
    existingPhotos.carton = r.imgCartonUrl || "";

    // Fill in the data
    document.getElementById('packedBy').value = r.packedBy || '';
    document.getElementById('checkerBy').value = r.checkerBy || '';
    document.getElementById('cartonId').value = r.cartonId || '';
    document.getElementById('customer').value = r.customer || '';
    document.getElementById('pi').value = r.pi || '';
    document.getElementById('partNo').value = r.partNo || '';
    document.getElementById('bag').value = r.bag || '';
    document.getElementById('inner').value = r.inner || '';
    document.getElementById('outer').value = r.outer || '';
    document.getElementById('qty').value = r.qty || 1;
    
    // SHOW PREVIOUS PHOTOS IMMEDIATELY
    if (r.imgBagUrl) {
      const p = document.getElementById('prevBag'); p.src = r.imgBagUrl; p.style.display = 'block';
      document.getElementById('btnBag').classList.add('has-photo');
    }
    if (r.imgInnerUrl) {
      const p = document.getElementById('prevInner'); p.src = r.imgInnerUrl; p.style.display = 'block';
      document.getElementById('btnInner').classList.add('has-photo');
    }
    if (r.imgCartonUrl) {
      const p = document.getElementById('prevCarton'); p.src = r.imgCartonUrl; p.style.display = 'block';
      document.getElementById('btnCarton').classList.add('has-photo');
    }

    document.getElementById('submitBtn').textContent = "RE-SUBMIT (ROW " + r.row + ")";
    switchMainTab('new');
    
    // Crucial: Re-trigger matching for the loaded values
    onBarcodeEntered('bag', r.bag); 
  }

  // --- SCANNING & MATCHING LOGIC ---
  document.querySelectorAll('input[type="text"]').forEach(inp => {
    inp.addEventListener('input', function() { this.value = this.value.toUpperCase(); });
  });

  async function startScanner(fieldId) {
    activeField = fieldId;
    document.getElementById('scanner-container').style.display = 'block';
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    try {
      await html5QrCode.start({ facingMode:"environment" }, { fps:20, qrbox:250 }, (decoded) => {
        const val = decoded.trim().toUpperCase();
        document.getElementById(activeField).value = val;
        stopScanner();
        onBarcodeEntered(activeField, val);
      });
    } catch(err) { stopScanner(); }
  }

  function stopScanner() { if (html5QrCode) html5QrCode.stop(); document.getElementById('scanner-container').style.display = 'none'; }
  function focusField(id) { document.getElementById(id).focus(); }

  ['bag','inner','outer'].forEach(id => {
    document.getElementById(id).addEventListener('change', function() {
      onBarcodeEntered(id, this.value.trim().toUpperCase());
    });
  });

  async function onBarcodeEntered(id, val) {
    if (!val) return;
    if (id === 'bag') {
      await lookupMaster(val);
    } else {
      checkBarcode(id, val);
    }
    updateSubmitButton();
    updateSteps();
  }

  async function lookupMaster(barcode) {
    if (barcode === 'NO') {
      matchState.bag = true;
      document.getElementById('bag').className = 'no-barcode';
      setBadge('bag', 'no-bc', 'No Barcode (Accepted)');
      return;
    }
    
    setBadge('bag', 'pending', 'Searching Master...');
    try {
      const resp = await fetch(SCRIPT_URL + '?action=lookup&barcode=' + encodeURIComponent(barcode));
      const result = await resp.json();
      
      if (result.found) {
        masterData = result;
        document.getElementById('partNo').value = masterData.partNo.toUpperCase();
        matchState.bag = true;
        document.getElementById('bag').className = 'match';
        setBadge('bag', 'ok', 'Match Found');
        
        // If other barcodes already have values, re-check them against new masterData
        const iv = document.getElementById('inner').value.trim();
        const ov = document.getElementById('outer').value.trim();
        if (iv) checkBarcode('inner', iv);
        if (ov) checkBarcode('outer', ov);
      } else {
        masterData = null;
        matchState.bag = false;
        document.getElementById('bag').className = 'mismatch';
        setBadge('bag', 'fail', 'Not in Master List');
      }
    } catch(e) { setBadge('bag', 'fail', 'Error connecting'); }
  }

  function checkBarcode(id, val) {
    if (val === 'NO') {
      matchState[id] = true;
      document.getElementById(id).className = 'no-barcode';
      setBadge(id, 'no-bc', 'No Barcode (Accepted)');
      return;
    }
    
    if (!masterData) {
      setBadge(id, 'pending', 'Scan Bag first');
      return;
    }
    
    const expected = (id === 'inner' ? masterData.innerBarcode : masterData.outerBarcode);
    const ok = (String(val).toUpperCase() === String(expected).toUpperCase());
    
    matchState[id] = ok;
    document.getElementById(id).className = ok ? 'match' : 'mismatch';
    setBadge(id, ok ? 'ok' : 'Match OK' : 'Mismatch Error');
  }

  function setBadge(id, type, text) {
    const b = document.getElementById(id + 'Badge');
    b.className = 'match-badge ' + type;
    b.textContent = text;
  }

  // --- PHOTO LOGIC ---
  function processPhoto(input, prevId, key, btnId) {
    if (!input.files || !input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      const imgEl = document.getElementById(prevId);
      imgEl.src = e.target.result;
      imgEl.style.display = 'block';
      document.getElementById(btnId).classList.add('has-photo');
      photoData[key] = { base64: e.target.result.split(',')[1], filename: key + '_' + Date.now() + '.jpg' };
      updateSubmitButton();
      updateSteps();
    };
    reader.readAsDataURL(input.files[0]);
  }

  async function uploadPhoto(dataKey) {
    const obj = photoData[dataKey];
    if (!obj) return ""; 
    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'uploadPhoto', base64: obj.base64, filename: obj.filename })
      });
      const res = await resp.json();
      return res.success ? res.url : "";
    } catch (err) { return ""; }
  }

  // --- VALIDATION & SUBMIT ---
  function updateSubmitButton() {
    const allFilled = requiredFields.every(id => document.getElementById(id).value.trim() !== "");
    const allMatch = (matchState.bag === true && matchState.inner === true && matchState.outer === true);
    
    const btn = document.getElementById('submitBtn');
    btn.disabled = !(allFilled && allMatch);
    btn.className = 'submit-btn ' + (btn.disabled ? 'blocked' : 'ready');
    
    document.getElementById('blockerNotice').style.display = (allFilled && !allMatch) ? 'block' : 'none';
    document.getElementById('missingNotice').style.display = (!allFilled) ? 'block' : 'none';
  }

  function updateSteps() {
    const s = [
      !!(document.getElementById('packedBy').value && document.getElementById('checkerBy').value),
      !!(document.getElementById('bag').value),
      !!(matchState.bag && matchState.inner && matchState.outer),
      (!!photoData.imgBag || !!existingPhotos.bag) && (!!photoData.imgInner || !!existingPhotos.inner) && (!!photoData.imgCarton || !!existingPhotos.carton)
    ];
    s.forEach((done, i) => {
      document.getElementById('step' + (i + 1)).className = 'step ' + (done ? 'done' : '');
    });
  }

  async function submitData() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = "UPLOADING DATA...";
    showStatus("Processing...", "info");

    // Upload new photos if taken, else use existing ones
    const urls = {
      bag: photoData.imgBag ? await uploadPhoto('imgBag') : existingPhotos.bag,
      inner: photoData.imgInner ? await uploadPhoto('imgInner') : existingPhotos.inner,
      carton: photoData.imgCarton ? await uploadPhoto('imgCarton') : existingPhotos.carton
    };

    const payload = {
      action: 'submit',
      row: editingRow, // Will be null for new entries
      packedBy: document.getElementById('packedBy').value,
      checkerBy: document.getElementById('checkerBy').value,
      cartonId: document.getElementById('cartonId').value,
      customer: document.getElementById('customer').value,
      pi: document.getElementById('pi').value,
      partNo: document.getElementById('partNo').value,
      bag: document.getElementById('bag').value,
      inner: document.getElementById('inner').value,
      outer: document.getElementById('outer').value,
      qty: document.getElementById('qty').value,
      imgBagUrl: urls.bag,
      imgInnerUrl: urls.inner,
      imgCartonUrl: urls.carton,
      status: 'Pending'
    };

    try {
      const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
      const res = await resp.json();
      if (res.success) {
        showStatus("Data Saved Successfully!", "success");
        setTimeout(() => location.reload(), 2000);
      }
    } catch(e) {
      showStatus("Error Saving Data", "error");
      btn.disabled = false;
      btn.textContent = "SUBMIT PACKING DATA";
    }
  }

  function showStatus(msg, type) {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = type;
  }

  // Initial check
  loadRejectedItems();
</script>
</body>
</html>
