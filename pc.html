<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>MG Packing System</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:16px; min-height:100vh; }
    h1 { text-align:center; color:#90caf9; margin:12px 0 4px; font-size:1.5rem; }
    .subtitle { text-align:center; color:#888; font-size:0.85rem; margin-bottom:20px; }
    
    .tab-bar { display:flex; gap:4px; margin-bottom:16px; border-bottom:2px solid #333; padding-bottom:4px; }
    .tab-btn { flex:1; padding:12px; background:#1e1e1e; border:1px solid #333; border-radius:8px 8px 0 0; color:#888; font-weight:600; cursor:pointer; font-size:0.85rem; text-align:center; }
    .tab-btn.active { background:#3f51b5; color:white; border-color:#3f51b5; }
    .tab-btn .badge { background:#c62828; color:white; font-size:0.7rem; padding:2px 6px; border-radius:10px; margin-left:4px; display:none; }
    .tab-btn .badge.show { display:inline; }
    
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    
    .card { background:#1e1e1e; border:1px solid #333; border-radius:12px; padding:16px; margin-bottom:16px; }
    .card-title { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#666; margin-bottom:12px; }
    label { display:block; margin:10px 0 5px; font-weight:600; color:#90caf9; font-size:0.9rem; }
    input[type="text"], input[type="number"] { width:100%; padding:11px 12px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:16px; text-transform:uppercase; }
    
    .scan-row { display:flex; gap:8px; align-items:center; }
    .scan-row input { flex:1; }
    button { background:#3f51b5; color:white; border:none; padding:11px 14px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:0.88rem; }
    
    /* BADGES */
    .match-badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:700; margin-top:5px; min-height:26px; }
    .match-badge.ok { background:#1b5e20; color:#a5d6a7; }
    .match-badge.fail { background:#b71c1c; color:#ef9a9a; }
    .match-badge.pending { background:#333; color:#888; }
    
    /* PHOTOS */
    .photo-btn { width:100%; padding:15px; margin:8px 0; background:#37474f; border-radius:10px; border:none; color:white; cursor:pointer; text-align:left; display:flex; align-items:center; gap:10px; }
    .photo-btn.has-photo .done-badge { display:inline; background:#2e7d32; padding:2px 8px; border-radius:10px; font-size:0.7rem; }
    .done-badge { display:none; }
    .preview { width:100%; max-height:180px; object-fit:contain; border-radius:8px; margin-top:10px; display:none; border:1px solid #555; background:#000; }

    /* OVERLAYS */
    #scanner-container { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000; padding:20px; }
    #status { margin:12px 0; padding:12px; border-radius:8px; font-weight:bold; text-align:center; display:none; }
    #status.info { background:#1565c0; display:block; color:white; }
    #status.success { background:#2e7d32; display:block; color:white; }
    #status.error { background:#c62828; display:block; color:white; }

    .submit-btn { width:100%; padding:18px; font-size:1.1rem; font-weight:bold; border-radius:10px; border:none; cursor:pointer; margin-top:8px; }
    .submit-btn.ready { background:#2e7d32; color:white; }
    .submit-btn.blocked { background:#333; color:#666; cursor:not-allowed; }
    
    .reject-item { background:#2a2a2a; border-left:5px solid #f44336; padding:15px; margin-bottom:10px; border-radius:8px; cursor:pointer; }
  </style>
</head>
<body>

<h1>MG Packing System</h1>
<p class="subtitle" id="pageSubtitle">Packer Entry</p>

<div class="tab-bar">
  <button class="tab-btn active" id="tabPacker" onclick="switchTab('packer')">📦 Packer</button>
  <button class="tab-btn" id="tabReject" onclick="switchTab('reject')">🔧 Fix Reject <span class="badge" id="rejectBadge">0</span></button>
</div>

<!-- PACKER TAB -->
<div id="packerTab" class="tab-content active">
  <div class="card">
    <div class="card-title">Staff & Order</div>
    <label>Packed By</label>
    <div class="scan-row"><input type="text" id="packedBy"><button onclick="startScanner('packedBy')">SCAN</button></div>
    <label>Carton ID</label>
    <div class="scan-row"><input type="text" id="cartonId"><button onclick="startScanner('cartonId')">SCAN</button></div>
  </div>

  <div class="card">
    <div class="card-title">Verification</div>
    <label>1. Bag Barcode</label>
    <div class="scan-row"><input type="text" id="bag" onchange="lookupMaster(this.value)"><button onclick="startScanner('bag')">SCAN</button></div>
    <div id="bagBadge" class="match-badge pending">Not Checked</div>

    <label>2. Inner Barcode</label>
    <div class="scan-row"><input type="text" id="inner" onchange="checkMatch('inner', this.value)"><button onclick="startScanner('inner')">SCAN</button></div>
    <div id="innerBadge" class="match-badge pending">Not Checked</div>
  </div>

  <div class="card">
    <div class="card-title">Photos</div>
    <button class="photo-btn" id="btnBag" onclick="document.getElementById('fBag').click()">📸 Bag Photo <span class="done-badge">DONE</span></button>
    <input type="file" id="fBag" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevBag','imgBag','btnBag')">
    <img id="prevBag" class="preview">
  </div>

  <button class="submit-btn blocked" id="submitBtn" onclick="submitData()" disabled>SUBMIT DATA</button>
</div>

<!-- REJECT TAB -->
<div id="rejectTab" class="tab-content">
  <div id="rejectList"></div>
</div>

<!-- SCANNER OVERLAY -->
<div id="scanner-container">
  <div id="reader"></div>
  <button onclick="stopScanner()" style="width:100%; padding:20px; background:#444; margin-top:20px;">CANCEL</button>
</div>

<div id="status"></div>

<script>
  const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE";
  let html5QrCode = null;
  let masterData = null;
  let editingRow = null;
  let matchState = { bag: false, inner: false };
  let photoData = { imgBag: null };

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    document.getElementById(tab + 'Tab').classList.add('active');
    if(tab === 'reject') loadRejects();
  }

  async function startScanner(fId) {
    document.getElementById('scanner-container').style.display = 'block';
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode:"environment" }, { fps:20, qrbox:250 }, (txt) => {
      const val = txt.trim().toUpperCase();
      document.getElementById(fId).value = val;
      stopScanner();
      if(fId === 'bag') lookupMaster(val);
      else if(fId === 'inner') checkMatch('inner', val);
      validate();
    }).catch(() => stopScanner());
  }

  function stopScanner() { if(html5QrCode) html5QrCode.stop(); document.getElementById('scanner-container').style.display='none'; }

  async function lookupMaster(barcode) {
    const badge = document.getElementById('bagBadge');
    badge.className = 'match-badge pending'; badge.textContent = 'Searching...';
    try {
      const r = await fetch(SCRIPT_URL + "?action=lookup&barcode=" + encodeURIComponent(barcode));
      const res = await r.json();
      if (res.found) {
        masterData = res;
        matchState.bag = true;
        updateBadge('bagBadge', 'ok', 'Match OK');
      } else {
        matchState.bag = false;
        updateBadge('bagBadge', 'fail', 'Not Found');
      }
    } catch(e) { updateBadge('bagBadge', 'fail', 'Error'); }
    validate();
  }

  function checkMatch(id, val) {
    if(!masterData) return;
    const ok = val === masterData.innerBarcode;
    matchState[id] = ok;
    updateBadge(id+'Badge', ok?'ok':'fail', ok?'Match OK':'Mismatch');
    validate();
  }

  function updateBadge(id, cls, txt) {
    const b = document.getElementById(id);
    b.className = 'match-badge ' + cls; b.textContent = txt;
  }

  function processPhoto(input, prevId, key, btnId) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById(prevId);
      img.src = e.target.result; img.style.display = 'block';
      document.getElementById(btnId).classList.add('has-photo');
      photoData[key] = e.target.result.split(',')[1];
      validate();
    };
    reader.readAsDataURL(input.files[0]);
  }

  function validate() {
    const btn = document.getElementById('submitBtn');
    const ok = matchState.bag && matchState.inner && document.getElementById('packedBy').value;
    btn.disabled = !ok;
    btn.className = 'submit-btn ' + (ok ? 'ready' : 'blocked');
  }

  async function loadRejects() {
    const list = document.getElementById('rejectList');
    list.innerHTML = "Loading...";
    const r = await fetch(SCRIPT_URL + "?action=records");
    const data = await r.json();
    const rejects = data.records.filter(x => x.status.includes("Rejected"));
    document.getElementById('rejectBadge').textContent = rejects.length;
    document.getElementById('rejectBadge').style.display = rejects.length ? 'inline' : 'none';
    
    list.innerHTML = rejects.map(item => `
      <div class="reject-item" onclick='editReject(${JSON.stringify(item)})'>
        <strong>${item.cartonId}</strong> - ${item.customer}<br>
        <small style="color:#ef9a9a">${item.remarks}</small>
      </div>
    `).join('') || "No rejects found.";
  }

  function editReject(item) {
    editingRow = item.row;
    document.getElementById('packedBy').value = item.packedBy;
    document.getElementById('cartonId').value = item.cartonId;
    document.getElementById('bag').value = item.bag;
    document.getElementById('inner').value = item.inner;
    
    if(item.imgBagUrl) {
      const prev = document.getElementById('prevBag');
      prev.src = item.imgBagUrl; prev.style.display = 'block';
      document.getElementById('btnBag').classList.add('has-photo');
    }
    
    switchTab('packer');
    document.getElementById('submitBtn').textContent = "FIX & RESUBMIT";
    lookupMaster(item.bag);
  }

  async function submitData() {
    // Implement your POST logic here
    showStatus("Submitting...", "info");
    // ... fetch logic ...
  }

  function showStatus(txt, cls) {
    const s = document.getElementById('status');
    s.textContent = txt; s.className = cls; s.style.display = 'block';
  }
</script>
</body>
</html>
