<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>MG Packing System</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:#e0e0e0; margin:0; padding:16px; min-height:100vh; }
    h1 { text-align:center; color:#90caf9; margin:12px 0 4px; font-size:1.5rem; }
    .subtitle { text-align:center; color:#888; font-size:0.85rem; margin-bottom:20px; }
    
    /* TABS FOR PACKER */
    .main-tabs { display:flex; background:#161616; margin-bottom:15px; border-radius:8px; overflow:hidden; border:1px solid #333; }
    .main-tab { flex:1; padding:15px; text-align:center; cursor:pointer; font-weight:bold; color:#666; border-bottom: 3px solid transparent; }
    .main-tab.active { color:#90caf9; border-bottom-color:#90caf9; background:#1a1a1a; }
    #fixCount { background:#f44336; color:white; padding:2px 6px; border-radius:10px; font-size:0.7rem; margin-left:5px; }

    .card { background:#1e1e1e; border:1px solid #333; border-radius:12px; padding:16px; margin-bottom:16px; }
    .card-title { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#666; margin-bottom:12px; }
    label { display:block; margin:10px 0 5px; font-weight:600; color:#90caf9; font-size:0.9rem; }
    input[type="text"],input[type="number"] { width:100%; padding:11px 12px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white; font-size:16px; text-transform:uppercase; }
    input.match { border-color:#4caf50 !important; background:#1a2e1a; }
    input.mismatch { border-color:#f44336 !important; background:#2e1a1a; }
    input.no-barcode{ border-color:#ff9800 !important; background:#2e2200; }
    .scan-row { display:flex; gap:8px; align-items:center; }
    .scan-row input { flex:1; }
    button { background:#3f51b5; color:white; border:none; padding:11px 14px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:0.88rem; }
    .match-badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:700; margin-top:5px; }
    .match-badge.ok { background:#1b5e20; color:#a5d6a7; }
    .match-badge.fail { background:#b71c1c; color:#ef9a9a; }
    .photo-btn { width:100%; padding:15px; margin:8px 0; background:#37474f; border-radius:10px; border:none; color:white; display:flex; align-items:center; gap:10px; }
    .preview { width:100%; max-height:140px; object-fit:cover; border-radius:8px; margin-top:6px; display:none; }
    .submit-btn { width:100%; padding:18px; font-size:1.1rem; font-weight:bold; border-radius:10px; border:none; cursor:pointer; margin-top:8px; }
    .submit-btn.ready { background:#2e7d32; color:white; }
    .submit-btn.blocked { background:#333; color:#666; cursor:not-allowed; }
    #status { margin:12px 0; padding:12px; border-radius:8px; font-weight:bold; text-align:center; display:none; }
    #status.success { background:#2e7d32; color:white; display:block; }
    #status.error { background:#c62828; color:white; display:block; }
  </style>
</head>
<body>

<h1>MG Packing System</h1>
<div class="main-tabs">
  <div class="main-tab active" id="tabNew" onclick="switchMainTab('new')">NEW ENTRY</div>
  <div class="main-tab" id="tabFix" onclick="switchMainTab('fix')">FIX REJECTED <span id="fixCount" style="display:none;">0</span></div>
</div>

<div id="fixListContainer" style="display:none;">
  <div id="rejectedItemsList"></div>
</div>

<div id="formContainer">
  <div class="card">
    <div class="card-title">Staff Info</div>
    <label>Packed By</label>
    <div class="scan-row"><input type="text" id="packedBy"><button onclick="startScanner('packedBy')">SCAN</button></div>
    <label>Packing Team</label>
    <div class="scan-row"><input type="text" id="checkerBy"><button onclick="startScanner('checkerBy')">SCAN</button></div>
  </div>

  <div class="card">
    <div class="card-title">Order Info</div>
    <label>Carton ID</label>
    <div class="scan-row"><input type="text" id="cartonId"><button onclick="startScanner('cartonId')">SCAN</button></div>
    <label>Customer Name</label>
    <input type="text" id="customer">
    <label>P/I No.</label>
    <input type="text" id="pi">
    <label>Part No.</label>
    <input type="text" id="partNo">
  </div>

  <div class="card">
    <div class="card-title">Barcode Verification</div>
    <label>1. Bag Barcode</label>
    <div class="scan-row"><input type="text" id="bag"><button onclick="startScanner('bag')">SCAN</button></div>
    <div class="match-badge" id="bagBadge">Pending</div>
    <label>2. Inner Box Barcode</label>
    <div class="scan-row"><input type="text" id="inner"><button onclick="startScanner('inner')">SCAN</button></div>
    <div class="match-badge" id="innerBadge">Pending</div>
    <label>3. Outer Carton Barcode</label>
    <div class="scan-row"><input type="text" id="outer"><button onclick="startScanner('outer')">SCAN</button></div>
    <div class="match-badge" id="outerBadge">Pending</div>
  </div>

  <div class="card">
    <div class="card-title">Photos</div>
    <button class="photo-btn" onclick="document.getElementById('fBag').click()">📸 Bag Photo</button>
    <input type="file" id="fBag" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevBag','imgBag')">
    <img id="prevBag" class="preview">

    <button class="photo-btn" onclick="document.getElementById('fInner').click()">📸 Inner Photo</button>
    <input type="file" id="fInner" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevInner','imgInner')">
    <img id="prevInner" class="preview">

    <button class="photo-btn" onclick="document.getElementById('fCarton').click()">📸 Carton Photo</button>
    <input type="file" id="fCarton" accept="image/*" capture="environment" style="display:none" onchange="processPhoto(this,'prevCarton','imgCarton')">
    <img id="prevCarton" class="preview">
  </div>

  <div class="card">
    <label>Qty (pcs)</label>
    <input type="number" id="qty" value="1">
  </div>

  <button class="submit-btn blocked" id="submitBtn" onclick="submitData()" disabled>SUBMIT PACKING DATA</button>
  <div id="status"></div>

  <div id="scanner-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000;">
    <div id="reader" style="width:100%;"></div>
    <button onclick="stopScanner()" style="width:100%; padding:20px;">CLOSE SCANNER</button>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJNbH09bwWqsO0lnM8j_xHA7ALfPFKpSjSFwUK4SRugrHqMWIhds7KhyUHN7kXR28/exec";
  let html5QrCode = null;
  let activeField = null;
  let masterData = null;
  let matchState = { bag:null, inner:null, outer:null };
  let photoData = { imgBag:null, imgInner:null, imgCarton:null };
  let editingRow = null;

  function switchMainTab(mode) {
    document.getElementById('tabNew').classList.toggle('active', mode==='new');
    document.getElementById('tabFix').classList.toggle('active', mode==='fix');
    document.getElementById('formContainer').style.display = mode==='new' ? 'block' : 'none';
    document.getElementById('fixListContainer').style.display = mode==='fix' ? 'block' : 'none';
    if(mode==='fix') loadRejectedItems();
    else if(!editingRow) resetForm();
  }

  async function loadRejectedItems() {
    const listDiv = document.getElementById('rejectedItemsList');
    listDiv.innerHTML = '<p style="text-align:center;">Loading...</p>';
    const resp = await fetch(SCRIPT_URL + '?action=records');
    const data = await resp.json();
    const rejected = data.records.filter(r => (r.status||'').includes('Rejected'));
    
    document.getElementById('fixCount').textContent = rejected.length;
    document.getElementById('fixCount').style.display = rejected.length > 0 ? 'inline' : 'none';

    listDiv.innerHTML = rejected.map(r => `
      <div class="card" style="border-left:5px solid #f44336;" onclick="editItem(${JSON.stringify(r).replace(/"/g, '&quot;')})">
        <div style="font-weight:bold; color:#90caf9;">${r.customer}</div>
        <div style="font-size:0.8rem; color:#888;">PI: ${r.pi} | Carton: ${r.cartonId}</div>
        <div style="background:#2e1a1a; padding:8px; border-radius:6px; margin-top:8px; color:#ef9a9a; font-size:0.8rem;">
          <strong>REASON:</strong> ${r.remarks || 'Check photos/labels'}
        </div>
      </div>
    `).join('') || '<p style="text-align:center; padding:20px;">No rejected items.</p>';
  }

  function editItem(r) {
    editingRow = r.row;
    document.getElementById('packedBy').value = r.packedBy;
    document.getElementById('checkerBy').value = r.checkerBy;
    document.getElementById('cartonId').value = r.cartonId;
    document.getElementById('customer').value = r.customer;
    document.getElementById('pi').value = r.pi;
    document.getElementById('partNo').value = r.partNo;
    document.getElementById('bag').value = r.bag;
    document.getElementById('inner').value = r.inner;
    document.getElementById('outer').value = r.outer;
    document.getElementById('qty').value = r.qty;
    document.getElementById('submitBtn').textContent = "RE-SUBMIT CORRECTED DATA";
    switchMainTab('new');
    onBarcodeEntered('bag', r.bag);
  }

  function resetForm() {
    editingRow = null;
    document.querySelectorAll('input').forEach(i => i.value = '');
    document.getElementById('qty').value = 1;
    document.getElementById('submitBtn').textContent = "SUBMIT PACKING DATA";
  }

  // Existing Scanner & Logic
  async function startScanner(id) {
    activeField = id;
    document.getElementById('scanner-container').style.display = 'block';
    if(!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    await html5QrCode.start({ facingMode:"environment" }, { fps:10, qrbox:250 }, (decoded) => {
      document.getElementById(activeField).value = decoded.toUpperCase();
      onBarcodeEntered(activeField, decoded);
      stopScanner();
    });
  }
  function stopScanner() { if(html5QrCode) html5QrCode.stop(); document.getElementById('scanner-container').style.display='none'; }

  async function onBarcodeEntered(id, val) {
    if(id==='bag') {
      const r = await fetch(SCRIPT_URL+'?action=lookup&barcode='+val);
      masterData = await r.json();
      if(masterData.found) {
        document.getElementById('partNo').value = masterData.partNo;
        matchState.bag = true;
        updateBadge('bag', true);
      }
    }
    updateSubmitBtn();
  }

  function updateBadge(id, ok) {
    const b = document.getElementById(id+'Badge');
    b.className = 'match-badge ' + (ok ? 'ok' : 'fail');
    b.textContent = ok ? 'MATCH OK' : 'MISMATCH';
  }

  function processPhoto(input, prevId, key) {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById(prevId).src = e.target.result;
      document.getElementById(prevId).style.display = 'block';
      photoData[key] = { base64: e.target.result.split(',')[1], filename: key+'_'+Date.now()+'.jpg' };
      updateSubmitBtn();
    };
    reader.readAsDataURL(input.files[0]);
  }

  function updateSubmitBtn() {
    const btn = document.getElementById('submitBtn');
    const ready = document.getElementById('cartonId').value && document.getElementById('bag').value;
    btn.disabled = !ready;
    btn.className = 'submit-btn ' + (ready ? 'ready' : 'blocked');
  }

  async function submitData() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = "SAVING...";
    
    // Upload photos logic here (same as your original)
    // Send payload including editingRow if present
    const payload = {
      action: 'submit',
      row: editingRow, // If this has a value, Apps Script updates the row
      packedBy: document.getElementById('packedBy').value,
      checkerBy: document.getElementById('checkerBy').value,
      cartonId: document.getElementById('cartonId').value,
      customer: document.getElementById('customer').value,
      pi: document.getElementById('pi').value,
      partNo: document.getElementById('partNo').value,
      bag: document.getElementById('bag').value,
      inner: document.getElementById('inner').value,
      outer: document.getElementById('outer').value,
      qty: document.getElementById('qty').value,
      status: 'Pending' // Reset to pending for checker to see it again
    };

    const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) });
    const res = await resp.json();
    if(res.success) {
      alert("Submitted successfully!");
      location.reload();
    }
  }
</script>
</body>
</html>
