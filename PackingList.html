// ── Match Badge (Per-Part) ───────────────────────────────────
function setMatchBadgeOnCard(partIdx, which, state) {
  const badge = document.getElementById(`match-badge-${partIdx}-${which}`);
  const input = document.getElementById(`f-${which}-${partIdx}`);
  if (!badge || !input) return;
  input.className = '';
  badge.style.display = '';
  if (state === null) { badge.style.display='none'; return; }
  if (state === true) { badge.textContent='\u2705 MATCH'; badge.className='match-badge ok'; input.className='match-ok'; }
  else if (state === false) { badge.textContent='\u274C MISMATCH'; badge.className='match-badge fail'; input.className='match-fail'; }
  else if (state === 'error') { badge.textContent='\u26A0 CANNOT VERIFY'; badge.className='match-badge checking'; input.className='match-amber'; }
  else if (state === 'no') { badge.textContent='NO BARCODE'; badge.className='match-badge no-bc'; input.className='match-amber'; }
  else if (state === 'checking') { badge.textContent='CHECKING...'; badge.className='match-badge checking'; }
  else if (state === 'no-server') { badge.textContent='\u26A0 SERVER OFFLINE'; badge.className='match-badge checking'; input.className='match-amber'; }
}

// ── Submit Button State ──────────────────────────────────────
function updateSubmitBtn() {
  const btn = document.getElementById('btn-submit');
  const mismatchWarn = document.getElementById('mismatch-warn');
  const serverWarn = document.getElementById('server-warn');
  const hint = document.getElementById('verify-hint');
  if (!btn) return;

  let hasMismatch = false;
  let hasNoServer = false;
  let allVerified = true;
  const isKit = formState.cartonType === 'kit';

  formState.parts.forEach(p => {
    // For kit: only check bag barcode per part
    // For non-kit: check bag, inner, outer per part
    const checks = isKit ? ['bag'] : ['bag','inner','outer'];
    checks.forEach(w => {
      const m = p[`${w}Match`];
      if (m === false) hasMismatch = true;
      if (m === 'no-server') hasNoServer = true;
      const done = m===true || m==='no' || m==='error' || m==='no-server';
      if (!done) allVerified = false;
    });
  });

  // Kit mode: also check carton-level inner/outer
  if (isKit) {
    ['inner','outer'].forEach(w => {
      const m = formState[`carton${w.charAt(0).toUpperCase() + w.slice(1)}Match`];
      if (m === false) hasMismatch = true;
      if (m === 'no-server') hasNoServer = true;
      const done = m===true || m==='no' || m==='error' || m==='no-server';
      if (!done) allVerified = false;
    });
  }

  if (mismatchWarn) mismatchWarn.classList.toggle('hidden', !hasMismatch);

  // Show server warning when GAS can't be reached
  if (serverWarn) {
    if (hasNoServer && !hasMismatch) {
      serverWarn.classList.remove('hidden');
      serverWarn.innerHTML = '<svg><use href="#ic-alert"/></svg><div><strong>Server offline</strong> \u2014 Barcodes cannot be verified. Entry will be validated server-side on submit. Make sure GAS URL is configured.</div>';
    } else {
      serverWarn.classList.add('hidden');
    }
  }

  if (hint) hint.style.display = allVerified ? 'none' : '';

  // STRICT: Only block on actual mismatch, allow submit when server is offline
  btn.disabled = hasMismatch || !allVerified;
}

// ── Photo Handling ───────────────────────────────────────────
async function handlePhoto(which, input) {
  const file = input.files[0];
  if (!file) return;
  const dataUri = await compressImage(file);
  formState.photos[which] = dataUri;
  renderPhotoThumb(which, dataUri);
  input.value = '';
}
function renderPhotoThumb(which, dataUri) {
  const btn = document.getElementById('photo-btn-' + which);
  const thumb = document.getElementById('photo-thumb-' + which);
  if (btn) btn.classList.add('has-photo');
  if (thumb) {
    thumb.innerHTML = `<img class="photo-thumb" src="${dataUri}" alt="Photo" onclick="openLightbox('${dataUri}')" />`;
  }
}

function cancelForm() {
  resetFormState();
  renderListDetail();
}

// ═══════════════════════════════════════════════════════════════
//  SUBMIT ENTRY (Multi-Part)
// ═══════════════════════════════════════════════════════════════
async function submitEntry(isEdit) {
  const list = LISTS.find(l => l.listRef === currentListId);
  if (!list) { toast('List not found', 'error'); return; }
  const cartonId = (document.getElementById('f-cartonId')||{}).value?.trim() || '';
  if (!cartonId) { toast('Carton ID is required', 'error'); return; }

  // Apply kit-mode PI/Qty to all parts before validation
  if (formState.cartonType === 'kit') {
    const kitPi = (document.getElementById('f-cartonPi')||{}).value?.trim().toUpperCase() || formState.cartonPi;
    const kitQty = (document.getElementById('f-cartonQty')||{}).value || formState.cartonQty;
    if (!kitPi) { toast('PI No is required for Kit mode', 'error'); return; }
    if (!kitQty || parseInt(kitQty) < 1) { toast('Qty is required for Kit mode', 'error'); return; }
    formState.cartonPi = kitPi;
    formState.cartonQty = kitQty;
    formState.parts.forEach(p => { p.pi = kitPi; p.qty = kitQty; });
  }

  // Validate parts
  const isKit = formState.cartonType === 'kit';
  for (let i = 0; i < formState.parts.length; i++) {
    const p = formState.parts[i];
    if (!p.partNo) { toast(`Part ${i+1}: Part No is required`, 'error'); return; }
    // STRICT: Check for bag barcode mismatch
    if (p.bagMatch === false) { toast(`Part ${i+1}: Bag barcode mismatch. Cannot submit.`, 'error'); return; }
    // For non-kit: also check inner/outer per part
    if (!isKit) {
      if (!p.qty || parseInt(p.qty) < 1) { toast(`Part ${i+1}: Qty must be at least 1`, 'error'); return; }
      if (p.innerMatch === false || p.outerMatch === false) {
        toast(`Part ${i+1}: Barcode mismatch detected. Cannot submit.`, 'error'); return;
      }
    }
  }
  // Kit mode: validate shared inner/outer
  if (isKit) {
    if (formState.cartonInnerMatch === false) { toast('Inner box barcode mismatch. Cannot submit.', 'error'); return; }
    if (formState.cartonOuterMatch === false) { toast('Outer carton barcode mismatch. Cannot submit.', 'error'); return; }
  }

  const btn = document.getElementById('btn-submit');
  const lbl = document.getElementById('btn-submit-label');
  if (btn) btn.disabled = true;
  if (lbl) lbl.textContent = 'Saving...';

  // Helper: "NO" means no barcode → store as empty string in Sheet
  const cleanBarcode = v => (v||'').toUpperCase() === 'NO' ? '' : (v||'');
  const matchBool = m => m===true || m==='no';

  async function maybeUpload(dataUri, filename) {
    if (!dataUri || !dataUri.startsWith('data:')) return dataUri || '';
    if (!GAS_URL) return dataUri;
    try {
      const res = await gasPost({ action:'uploadPhoto', base64: dataUri, filename });
      return (res && res.url) ? res.url : dataUri;
    } catch { return dataUri; }
  }

  // Upload photos: kit = 3 carton-level photos; non-kit = per-part photos from first part
  let imgBagUrl, imgInnerUrl, imgCartonUrl;
  if (isKit) {
    // Kit: upload 3 carton-level photos
    [imgBagUrl, imgInnerUrl, imgCartonUrl] = await Promise.all([
      maybeUpload(formState.cartonPhotos.allParts, `kit_allparts_${cartonId}_${Date.now()}.jpg`),
      maybeUpload(formState.cartonPhotos.innerBox, `kit_inner_${cartonId}_${Date.now()}.jpg`),
      maybeUpload(formState.cartonPhotos.cartonLabel, `kit_carton_${cartonId}_${Date.now()}.jpg`),
    ]);
  } else {
    // Non-kit: use first part's per-part photos as carton-level
    const firstPart = formState.parts[0];
    const firstPhotos = firstPart.photos || { bag:null, inner:null, outer:null };
    [imgBagUrl, imgInnerUrl, imgCartonUrl] = await Promise.all([
      maybeUpload(firstPhotos.bag, `bag_${cartonId}_${Date.now()}.jpg`),
      maybeUpload(firstPhotos.inner, `inner_${cartonId}_${Date.now()}.jpg`),
      maybeUpload(firstPhotos.outer, `carton_${cartonId}_${Date.now()}.jpg`),
    ]);
  }

  const now = new Date().toISOString();

  // Get existing cartons from GAS for CTN number calculation
  const existingCartons = await gasGetCartons(list.listRef);
  const existingMax = existingCartons.reduce((m,c)=>{
    const n=parseInt((c.cartonRef||'').replace('CTN-',''));
    return isNaN(n)?m:Math.max(m,n);
  },0);
  const nextNum = existingMax + (isEdit ? 0 : 1);
  const cartonRef = isEdit && pendingEditRow?.cartonRef
    ? pendingEditRow.cartonRef
    : 'CTN-' + String(nextNum).padStart(3,'0');

  // Build parts array
  let parts;
  if (isKit) {
    const kitPi = (formState.cartonPi||'').toUpperCase();
    const kitQty = parseInt(formState.cartonQty) || 1;
    parts = formState.parts.map(p => ({
      partNo: p.partNo.toUpperCase(),
      pi: kitPi, qty: kitQty,
      bag: cleanBarcode(p.bag),
      inner: cleanBarcode(formState.cartonInner),
      outer: cleanBarcode(formState.cartonOuter),
      bagMatch: matchBool(p.bagMatch),
      innerMatch: matchBool(formState.cartonInnerMatch),
      outerMatch: matchBool(formState.cartonOuterMatch),
    }));
  } else {
    parts = formState.parts.map(p => ({
      partNo: p.partNo.toUpperCase(),
      pi: (p.pi||'').toUpperCase(),
      qty: parseInt(p.qty) || 1,
      bag: cleanBarcode(p.bag),
      inner: cleanBarcode(p.inner),
      outer: cleanBarcode(p.outer),
      bagMatch: matchBool(p.bagMatch),
      innerMatch: matchBool(p.innerMatch),
      outerMatch: matchBool(p.outerMatch),
      photos: p.photos || { bag:null, inner:null, outer:null },
    }));
  }

  // Save carton to GAS "Cartons" sheet
  const cartonRow = isEdit && pendingEditRow?.row ? pendingEditRow.row : null;
  const cartonSaveData = {
    row: cartonRow, listRef: list.listRef, cartonRef, cartonId,
    cartonType: formState.cartonType,
    cartonPI: formState.cartonPi,
    cartonQty: formState.cartonQty,
    parts, imgBagUrl, imgInnerUrl, imgCartonUrl,
    createdAt: now, status: 'pending'
  };
  if (isKit) {
    cartonSaveData.cartonInner = cleanBarcode(formState.cartonInner);
    cartonSaveData.cartonOuter = cleanBarcode(formState.cartonOuter);
    cartonSaveData.cartonInnerMatch = matchBool(formState.cartonInnerMatch);
    cartonSaveData.cartonOuterMatch = matchBool(formState.cartonOuterMatch);
  }
  const cartonRes = await gasSaveCarton(cartonSaveData);
  const savedRow = cartonRes && cartonRes.row ? cartonRes.row : cartonRow;

  // Submit to Packing Log for checker view
  let gasRows = [];
  if (GAS_URL) {
    try {
      if (isKit) {
        // KIT: ONE Packing Log row with combined part numbers
        const allPartNos = parts.map(p => p.partNo).join(', ');
        const combinedBag = parts.map(p => p.bag).filter(Boolean).join(', ') || '';
        if (isEdit && pendingEditRow?.gasRows && pendingEditRow.gasRows.length > 0) {
          await gasPost({ action:'resubmit', row: pendingEditRow.gasRows[0],
            cartonId, cartonRef,
            customer: list.customer, packedBy: list.createdBy, checkerBy: '',
            partNo: allPartNos, pi: formState.cartonPi||'', qty: formState.cartonQty||1,
            bag: combinedBag, inner: cleanBarcode(formState.cartonInner), outer: cleanBarcode(formState.cartonOuter),
            bagMatch: true, innerMatch: matchBool(formState.cartonInnerMatch), outerMatch: matchBool(formState.cartonOuterMatch),
            imgBagUrl, imgInnerUrl, imgCartonUrl,
          });
          gasRows = pendingEditRow.gasRows;
        } else {
          const res = await gasPost({ action:'submit',
            cartonId, cartonRef, partNo: allPartNos, pi: formState.cartonPi||'', qty: formState.cartonQty||1,
            bag: combinedBag, inner: cleanBarcode(formState.cartonInner), outer: cleanBarcode(formState.cartonOuter),
            bagMatch: true, innerMatch: matchBool(formState.cartonInnerMatch), outerMatch: matchBool(formState.cartonOuterMatch),
            imgBagUrl, imgInnerUrl, imgCartonUrl,
            customer: list.customer, packedBy: list.createdBy, checkerBy: '', packedDate: '',
          });
          if (res && res.row) gasRows.push(res.row);
        }
      } else {
        // NON-KIT: each part as separate row in Packing Log
        if (isEdit && pendingEditRow?.gasRows && pendingEditRow.gasRows.length > 0) {
          for (let i = 0; i < pendingEditRow.gasRows.length; i++) {
            const rp = parts[i] || parts[0];
            await gasPost({ action:'resubmit', row: pendingEditRow.gasRows[i],
              cartonId, cartonRef,
              customer: list.customer, packedBy: list.createdBy, checkerBy: '',
              partNo: rp.partNo||'', pi: rp.pi||'', qty: rp.qty||1,
              bag: rp.bag||'', inner: rp.inner||'', outer: rp.outer||'',
              bagMatch: rp.bagMatch, innerMatch: rp.innerMatch, outerMatch: rp.outerMatch,
              imgBagUrl, imgInnerUrl, imgCartonUrl,
            });
          }
          gasRows = pendingEditRow.gasRows;
        } else {
          for (const part of parts) {
            const res = await gasPost({ action:'submit',
              cartonId, cartonRef, partNo: part.partNo, pi: part.pi, qty: part.qty,
              bag: part.bag, inner: part.inner, outer: part.outer,
              bagMatch: part.bagMatch, innerMatch: part.innerMatch, outerMatch: part.outerMatch,
              imgBagUrl, imgInnerUrl, imgCartonUrl,
              customer: list.customer, packedBy: list.createdBy, checkerBy: '', packedDate: '',
            });
            if (res && res.row) gasRows.push(res.row);
          }
        }
      }
    } catch(e) { console.warn('GAS Packing Log submit warning:', e); }
  }

  // Store the Cartons row number for future edits
  if (savedRow) {
    LIST_CARTONS[list.listRef] = await gasGetCartons(list.listRef);
  }

  resetFormState();
  renderListDetail();

  const banner = document.getElementById('success-banner');
  if (banner) {
    banner.classList.remove('hidden');
    banner.innerHTML = `<div class="alert alert-success" style="margin-bottom:12px">
      <svg><use href="#ic-check"/></svg>
      <div><strong>${isEdit?'Resubmitted':'Saved'} \u2014 ${cartonRef}</strong><br/>
      <span class="text-sm">Carton ID: ${escHtml(cartonId)} \u2014 ${parts.length} part(s) \u2014 ${list.listRef}</span></div>
      <button class="btn-icon" style="margin-left:auto" onclick="this.closest('.alert').parentElement.classList.add('hidden')"><svg style="width:12px;height:12px"><use href="#ic-x"/></svg></button>
    </div>`;
  }
}

// ═══════════════════════════════════════════════════════════════
//  CHECKER VIEW
// ═══════════════════════════════════════════════════════════════
let checkerFilter = 'pending';
let checkerSearch = '';
let checkerRecords = [];
let currentCheckerRecord = null;
let checkerViewMode = 'review'; // 'review' | 'stamp'
let stampSearch = '';
let stampRecordsCache = [];
// In-memory cache for checker records (no localStorage)
const checkerRecordCache = new Map();

function cacheCheckerRecords(records) {
  records.forEach(r => { if (r.row) checkerRecordCache.set(r.row, r); });
}
function getCachedCheckerRecord(row) {
  return checkerRecordCache.get(row) || null;
}

let checkerAuthenticated = false;

function showCheckerPasswordGate() {
  const el = document.getElementById('page-checker');
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
      <div style="max-width:360px;width:100%;text-align:center">
        <svg style="width:48px;height:48px;color:var(--primary);margin-bottom:16px;opacity:.6"><use href="#ic-lock"/></svg>
        <div style="font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Checker Access</div>
        <div style="font-size:12px;color:var(--muted-fg);margin-bottom:20px">Enter password to access the checker view.</div>
        <div style="display:flex;gap:8px">
          <input type="password" id="checker-pw" placeholder="Password..." style="flex:1" onkeydown="if(event.key==='Enter')checkCheckerPassword()" />
          <button class="btn btn-primary" onclick="checkCheckerPassword()">Enter</button>
        </div>
        <div id="checker-pw-error" style="color:var(--danger);font-size:12px;margin-top:10px;font-weight:600;display:none">Incorrect password. Try again.</div>
      </div>
    </div>`;
}

function checkCheckerPassword() {
  const pw = document.getElementById('checker-pw')?.value || '';
  if (pw === 'MG2026') {
    checkerAuthenticated = true;
    renderCheckerContent();
  } else {
    const err = document.getElementById('checker-pw-error');
    if (err) { err.style.display = ''; err.textContent = 'Incorrect password. Try again.'; }
    const input = document.getElementById('checker-pw');
    if (input) { input.value = ''; input.focus(); }
  }
}

async function renderChecker() {
  if (!checkerAuthenticated) {
    showCheckerPasswordGate();
    return;
  }
  renderCheckerContent();
}

async function renderCheckerContent() {
  const el = document.getElementById('page-checker');
  const isReview = checkerViewMode === 'review';
  const isStamp = checkerViewMode === 'stamp';

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title"><svg><use href="#ic-check-sq"/></svg>Checker View</div>
        <div class="page-subtitle">${isReview?'Review submissions and approve or reject.':'Mark verified cartons as physically stamped.'}</div>
      </div>
      <div class="gap-8">
        ${isStamp ? `
        <div class="search-wrap">
          <svg><use href="#ic-search"/></svg>
          <input type="text" id="stamp-search" placeholder="Search customer, carton, part, PI..." style="width:220px" oninput="stampSearch=this.value;renderStampCards(stampRecordsCache||[],'')" />
        </div>` : `
        <div class="search-wrap">
          <svg><use href="#ic-search"/></svg>
          <input type="text" id="checker-search" placeholder="Search customer, carton, part, PI..." style="width:200px" oninput="checkerSearch=this.value;renderCheckerTable()" />
        </div>`}
        <button class="btn ${isReview?'btn-primary':'btn-outline'} btn-sm" onclick="checkerViewMode='review';renderCheckerContent();">
          <svg><use href="#ic-check-sq"/></svg>Review
        </button>
        <button class="btn ${isStamp?'btn-primary':'btn-outline'} btn-sm" onclick="checkerViewMode='stamp';renderCheckerContent();">
          <svg><use href="#ic-stamp"/></svg>Stamp
        </button>
        <button class="btn btn-outline btn-sm" onclick="${isReview?'loadCheckerRecords()':'loadStampRecords()'}"><svg><use href="#ic-refresh"/></svg>Refresh</button>
        <button class="btn btn-outline btn-sm" onclick="checkerAuthenticated=false;showCheckerPasswordGate();"><svg><use href="#ic-lock"/></svg>Lock</button>
      </div>
    </div>
    <div id="checker-stats" class="stat-grid" style="margin-bottom:20px"></div>
    <div id="checker-table-wrap"><div class="pulse text-muted text-sm">Loading...</div></div>
    <div id="checker-modal-wrap"></div>`;

  if (isReview) {
    await loadCheckerRecords();
  } else {
    await loadStampRecords();
  }
}

async function loadCheckerRecords() {
  checkerRecords = [];
  let errorMsg = '';
  if (GAS_URL) {
    try {
      const res = await gasGet({ action:'records' });
      if (res && res.records) {
        checkerRecords = res.records;
        allRecords = res.records;
        cacheCheckerRecords(res.records); // Cache for offline view detail
      }
      else if (res && res.error) errorMsg = 'Server error: ' + res.error;
      else errorMsg = 'No records from server.';
    } catch(e) { errorMsg = 'Connection failed.'; }
  } else { errorMsg = 'GAS_URL not configured.'; }
  renderCheckerStats();
  renderCheckerTable(errorMsg);
}

async function loadStampRecords() {
  let records = [];
  let errorMsg = '';
  if (GAS_URL) {
    try {
      const res = await gasGet({ action: 'records' });
      if (res && res.records) {
        cacheCheckerRecords(res.records);
        records = res.records.filter(r => {
          const s = (r.status || '').toLowerCase();
          return s.includes('verified') || s.includes('approved');
        });
      }
      else if (res && res.error) errorMsg = 'Server error: ' + res.error;
      else errorMsg = 'No records from server.';
    } catch(e) { errorMsg = 'Connection failed.'; }
  } else { errorMsg = 'GAS_URL not configured.'; }
  stampRecordsCache = records;
  renderStampStats(records);
  renderStampCards(records, errorMsg);
}

function renderStampStats(records) {
  const el = document.getElementById('checker-stats');
  if (!el) return;
  const stamped = records.filter(r => (r.stamped||'') === 'Y' || r.stamped === true || r.stamped === 'true').length;
  const pending = records.length - stamped;
  el.innerHTML = `
    <div class="stat-card"><div class="label">Total Verified</div><div class="value">${records.length}</div></div>
    <div class="stat-card"><div class="label" style="color:var(--amber)">Pending Stamp</div><div class="value" style="color:var(--amber)">${pending}</div></div>
    <div class="stat-card"><div class="label" style="color:var(--primary)">Stamped</div><div class="value text-primary">${stamped}</div></div>`;
}

function renderStampCards(records, errorMsg) {
  const wrap = document.getElementById('checker-table-wrap');
  if (!wrap) return;
  if (errorMsg) { wrap.innerHTML = '<div class="empty-state"><svg><use href="#ic-alert"/></svg><p>' + errorMsg + '</p></div>'; return; }
  // Apply search filter: customer, cartonId, partNo, PI
  let filtered = records;
  if (stampSearch) {
    const q = stampSearch.toLowerCase();
    filtered = records.filter(r =>
      (r.customer || '').toLowerCase().includes(q) ||
      (r.cartonId || '').toLowerCase().includes(q) ||
      (r.partNo || '').toLowerCase().includes(q) ||
      (r.pi || '').toLowerCase().includes(q)
    );
  }
  if (filtered.length === 0) { wrap.innerHTML = '<div class="empty-state"><svg><use href="#ic-stamp"/></svg><p>' + (stampSearch ? 'No matches for "' + escHtml(stampSearch) + '"' : 'No verified cartons waiting to be stamped') + '</p></div>'; return; }

  wrap.innerHTML = '<div style="display:flex;flex-direction:column;gap:10px">' + filtered.map(r => {
    const isStamped = (r.stamped||'') === 'Y' || r.stamped === true || r.stamped === 'true';
    const stampInfo = r.stampedAt ? `at ${fmtDate(r.stampedAt)}` : '';
    const statusHtml = isStamped
      ? `<div style="font-size:0.8rem;color:var(--primary);margin-top:8px;font-weight:700">Stamped by: ${escHtml(r.stampedBy || '')} ${stampInfo}</div>` : '';
    return `<div class="record-card ${isStamped?'approved':''}" style="border-left:4px solid ${isStamped?'var(--primary)':'var(--amber)'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-weight:800;font-size:1.05rem;color:${isStamped?'var(--primary)':'var(--amber)'}">${escHtml(r.customer || 'Unknown')}</div>
        <span class="badge" style="background:${isStamped?'var(--primary-dim)':'var(--amber-dim)'};color:${isStamped?'var(--primary)':'var(--amber)'};border-color:${isStamped?'var(--primary-border)':'var(--amber-border)'}">${isStamped?'STAMPED':'PENDING STAMP'}</span>
      </div>
      <div style="font-size:0.85rem;color:var(--muted-fg);margin-bottom:6px">
        <strong>PI:</strong> ${escHtml(r.pi || '\u2014')} | <strong>Carton:</strong> ${escHtml(r.cartonId || '\u2014')} | <strong>Part:</strong> ${escHtml(r.partNo || '\u2014')}
      </div>
      <div style="display:flex;gap:12px;font-size:0.8rem;color:var(--muted-fg);margin-bottom:4px">
        <span><strong>Qty:</strong> ${r.qty || '0'} pcs</span>
        <span><strong>Packed:</strong> ${escHtml(r.packedBy || '\u2014')}</span>
        <span><strong>Checked:</strong> ${escHtml(r.checker || '\u2014')}</span>
      </div>
      ${isStamped ? `<div style="font-size:0.8rem;color:var(--primary);margin-top:8px;font-weight:700">Stamped by: ${escHtml(r.stampedBy || '')} ${stampInfo}</div>` : ''}
      <div style="display:flex;gap:8px;margin-top:12px">
        ${!isStamped ? `<button class="btn btn-primary btn-sm" onclick="stampRecord(${r.row})"><svg><use href="#ic-stamp"/></svg>Stamp Verified</button>` : ''}
        <button class="btn btn-outline btn-sm" onclick="openCheckerDetail(${r.row})"><svg><use href="#ic-zoom"/></svg>View Detail</button>
      </div>
    </div>`;
  }).join('') + '</div>';
}

function renderCheckerStats() {
  const total = checkerRecords.length;
  const pending = checkerRecords.filter(r => !r.status || r.status.toLowerCase() === '').length;
  const approved = checkerRecords.filter(r => (r.status||'').toLowerCase().includes('verified')).length;
  const rejected = checkerRecords.filter(r => (r.status||'').toLowerCase().includes('rejected')).length;

  const el = document.getElementById('checker-stats');
  if (!el) return;
  el.innerHTML = [
    { label: 'Total', value: total, icon: 'ic-box', color: 'var(--muted-fg)' },
    { label: 'Pending', value: pending, icon: 'ic-clock', color: 'var(--amber)' },
    { label: 'Approved', value: approved, icon: 'ic-check', color: 'var(--primary)' },
    { label: 'Rejected', value: rejected, icon: 'ic-alert', color: 'var(--danger)' },
  ].map(s => `
    <div class="stat-card">
      <svg class="icon" style="color:${s.color}"><use href="#${s.icon}"/></svg>
      <div class="label">${s.label}</div>
      <div class="value" style="color:${s.color}">${s.value}</div>
    </div>`).join('');
}

function getThumbUrl(url, size) {
  if (!url) return '';
  // Base64 data URIs: return as-is (don't treat as Google Drive ID)
  if (url.startsWith('data:')) return url;
  // Google Drive URLs: extract file ID for thumbnail
  if (url.includes('drive.google.com') || url.includes('googleusercontent')) {
    const m = url.match(/[-\w]{25,}/);
    if (m) return `https://drive.google.com/thumbnail?id=${m[0]}&sz=w${size}`;
  }
  return url;
}

function renderCheckerTable(errorMsg) {
  let recs = checkerRecords;
  if (checkerFilter !== 'all') {
    recs = recs.filter(r => {
      const s = (r.status||'').toLowerCase();
      if (checkerFilter === 'pending') return !s || s === '' || s === 'pending';
      if (checkerFilter === 'approved') return s.includes('verified');
      if (checkerFilter === 'rejected') return s.includes('rejected');
      return true;
    });
  }
  if (checkerSearch) {
    const q = checkerSearch.toLowerCase();
    recs = recs.filter(r =>
      (r.cartonId||'').toLowerCase().includes(q) ||
      (r.cartonRef||'').toLowerCase().includes(q) ||
      (r.customer||'').toLowerCase().includes(q) ||
      (r.partNo||'').toLowerCase().includes(q) ||
      (r.packedBy||'').toLowerCase().includes(q)
    );
  }

  const wrap = document.getElementById('checker-table-wrap');
  if (!wrap) return;
  if (recs.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><svg><use href="#ic-check-sq"/></svg><p>' + (errorMsg || 'No records found') + '</p></div>';
    return;
  }

  wrap.innerHTML = '<div style="display:flex;flex-direction:column;gap:10px">' + recs.map(r => {
    const s = (r.status||'').toLowerCase();
    const isApproved = s.includes('verified');
    const isRejected = s.includes('rejected');
    const statusColor = isApproved ? 'var(--primary)' : isRejected ? 'var(--danger)' : 'var(--amber)';
    const statusBg = isApproved ? 'var(--primary-dim)' : isRejected ? 'var(--danger-dim)' : 'var(--amber-dim)';
    const statusBorder = isApproved ? 'var(--primary-border)' : isRejected ? 'var(--danger-border)' : 'var(--amber-border)';
    const statusText = isApproved ? 'APPROVED' : isRejected ? 'REJECTED' : 'PENDING';

    const photos = [];
    if (r.imgBagUrl) photos.push({url: r.imgBagUrl, lbl: 'Bag'});
    if (r.imgInnerUrl) photos.push({url: r.imgInnerUrl, lbl: 'Inner'});
    if (r.imgCartonUrl) photos.push({url: r.imgCartonUrl, lbl: 'Carton'});

    const photoHtml = photos.length > 0
      ? '<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">' + photos.map(p => {
          const thumb = getThumbUrl(p.url, 200);
          return `<img src="${thumb}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer" onclick="event.stopPropagation();openLightbox('${p.url}')" loading="lazy" />`;
        }).join('') + '</div>'
      : '';

    // Barcode match indicators
    const bagOk   = r.bagMatch === true   || r.bagMatch === 'true'   || String(r.bag||'')   === '';
    const innerOk = r.innerMatch === true || r.innerMatch === 'true' || String(r.inner||'') === '';
    const outerOk = r.outerMatch === true || r.outerMatch === 'true' || String(r.outer||'') === '';

    return `<div class="record-card ${isRejected?'rejected':isApproved?'approved':''}" style="border-left:4px solid ${statusColor}" ${r.row != null ? `onclick="openCheckerDetail(${r.row})"` : ''}>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-weight:800;font-size:1.05rem;color:${statusColor}">${escHtml(r.customer||'Unknown')}</div>
        <span class="badge" style="background:${statusBg};color:${statusColor};border-color:${statusBorder}">${statusText}</span>
      </div>
      <div style="font-size:0.85rem;color:var(--muted-fg);margin-bottom:6px">
        <strong>PI:</strong> ${escHtml(r.pi||'\u2014')} | <strong>Carton:</strong> ${escHtml(r.cartonId||'\u2014')} | <strong>Part:</strong> ${escHtml(r.partNo||'\u2014')}
      </div>
      <div style="display:flex;gap:12px;font-size:0.8rem;color:var(--muted-fg);margin-bottom:4px">
        <span><strong>Qty:</strong> ${r.qty||'0'} pcs</span>
        <span><strong>Packed:</strong> ${escHtml(r.packedBy||'\u2014')}</span>
        <span>${fmtDate(r.timestamp||r.createdAt)}</span>
      </div>
      <div style="display:flex;gap:10px;font-size:0.75rem;margin-top:6px">
        <span style="color:${bagOk?'var(--primary)':'var(--danger)'}">Bag ${bagOk?'\u2705':'\u274C'}</span>
        <span style="color:${innerOk?'var(--primary)':'var(--danger)'}">Inner ${innerOk?'\u2705':'\u274C'}</span>
        <span style="color:${outerOk?'var(--primary)':'var(--danger)'}">Outer ${outerOk?'\u2705':'\u274C'}</span>
      </div>
      ${isRejected && r.remarks ? `<div style="font-size:0.8rem;color:var(--danger);margin-top:8px;font-style:italic;background:var(--danger-dim);padding:8px;border-radius:6px;border:1px solid var(--danger-border)">${escHtml(r.remarks)}</div>` : ''}
      ${photoHtml}
    </div>`;
  }).join('') + '</div>';
}

// ── Checker Detail Modal ─────────────────────────────────────
async function openCheckerDetail(rowNum) {
  // 1. Try in-memory cache first
  const cached = getCachedCheckerRecord(rowNum);
  if (cached) {
    currentCheckerRecord = cached;
    showCheckerDetailModal(cached);
    return;
  }
  // 2. Fetch from GAS
  try {
    const res = await gasGet({ action: 'record', row: rowNum });
    if (!res || res.error) { toast('Failed to load record', 'error'); return; }
    currentCheckerRecord = res;
    checkerRecordCache.set(rowNum, res);
    showCheckerDetailModal(res);
  } catch { toast('Error loading record', 'error'); }
}

function showCheckerDetailModal(r) {
  const s = (r.status||'').toLowerCase();
  const isApproved = s.includes('verified');

  const wrap = document.getElementById('checker-modal-wrap');

  const photos = [
    {lbl:'Bag Photo', url:r.imgBagUrl},
    {lbl:'Inner Photo', url:r.imgInnerUrl},

  const photoSection = photos.length ? `

        const thumb = getThumbUrl(p.url, 400);
        return `<div style="text-align:center;cursor:pointer" onclick="openLightbox('${p.url}')">

  const barcodes = [
    {lbl:'Bag Barcode', val:r.bag, match:r.bagMatch===true||r.bagMatch==='true'},
    {lbl:'Inner Barcode', val:r.inner, match:r.innerMatch===true||r.innerMatch==='true'},
    {lbl:'Outer Barcode', val:r.outer, match:r.outerMatch===true||r.outerMatch==='true'}

  const barcodeSection = `
    <div class="section-title">Barcode Verification</div>
    <div style="margin-bottom:16px">
      ${barcodes.map(b => {
        const isNo = String(b.val||'').toUpperCase() === 'NO';

  const isStamped = (r.stamped||'') === 'Y' || r.stamped === true || r.stamped === 'true';
  const stampSection = isApproved ? `
    <div class="section-title">Stamping</div>
    <div style="margin-bottom:16px">
      ${isStamped

  const verdictSection = isPending ? `

    <div style="display:flex;gap:10px;margin-bottom:12px">

        <svg><use href="#ic-check"/></svg>Approve

      <button class="btn btn-danger-outline" style="flex:1" id="btnReject" onclick="checkerSelectVerdict('Rejected')">

      </button>

      <label class="form-label">Checker Name <span class="req">*</span></label>

        </div>
        <button class="btn-icon" onclick="closeCheckerDetail()"><svg style="width:14px;height:14px"><use href="#ic-x"/></svg></button>
      </div>

function closeCheckerDetail() {
  document.getElementById('checker-modal-wrap').innerHTML = '';
  currentCheckerRecord = null;
  selectedCheckerVerdict = null;
}

let selectedCheckerVerdict = null;
function checkerSelectVerdict(verdict) {
  selectedCheckerVerdict = verdict;
  const btnA = document.getElementById('btnApprove');
  const btnR = document.getElementById('btnReject');
  if (btnA) { btnA.className = verdict==='Approved'?'btn btn-primary':'btn btn-outline'; btnA.style.flex='1'; }
  if (btnR) { btnR.className = verdict==='Rejected'?'btn btn-danger':'btn btn-danger-outline'; btnR.style.flex='1'; }
}

async function checkerSubmitVerdict() {
  const name = document.getElementById('checker-name').value.trim();
  const remarks = document.getElementById('checker-remarks').value.trim();
  if (!name) { toast('Please enter Checker Name', 'error'); return; }
  if (!selectedCheckerVerdict) { toast('Please select Approve or Reject', 'error'); return; }

  const btn = document.getElementById('btnSubmitVerdict');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }

  const statusStr = selectedCheckerVerdict === 'Approved' ? 'Verified \u2705' : 'Rejected \u274C';

  try {
    const res = await gasPost({
      action: 'verify', row: currentCheckerRecord.row,
      checker: name.toUpperCase(), status: statusStr, remarks: remarks.toUpperCase()
    });
    if (res && res.success) {
      toast(`Record ${selectedCheckerVerdict.toLowerCase()}d \u2705`, 'success');
      closeCheckerDetail();
      await loadCheckerRecords();
    } else { throw new Error(res?.error || 'Unknown error'); }
  } catch(e) {
    toast('Submit failed: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Submit Decision'; }
  }
}

async function checkerMarkStamped(row) {
  const staff = prompt('ENTER STAMPING STAFF NAME:');
  if (!staff) return;
  try {
    const res = await gasPost({ action: 'stamp', row: row, staff: staff.toUpperCase() });
    if (res && res.success) {
      toast('Stamped successfully \u2705', 'success');
      closeCheckerDetail();
      checkerViewMode = 'stamp';
      await renderCheckerContent();
    } else { throw new Error(res?.error || 'Unknown error'); }
  } catch(e) { toast('Stamp failed: ' + e.message, 'error'); }
}

async function stampRecord(row) {
  const staff = prompt('ENTER STAMPING STAFF NAME:');
  if (!staff) return;
  try {
    const res = await gasPost({ action: 'stamp', row: row, staff: staff.toUpperCase() });
    if (res && res.success) {
      toast('Stamped successfully \u2705', 'success');
      checkerViewMode = 'stamp';
      await renderCheckerContent();
    } else { throw new Error(res?.error || 'Unknown error'); }
  } catch(e) { toast('Stamp failed: ' + e.message, 'error'); }
}

          <div class="form-group" style="margin-bottom:14px">
            <label class="form-label">Reason for Transfer <span class="req">*</span></label>
            <textarea id="tf-reason" rows="2" placeholder="e.g. Customer refused partial delivery..."></textarea>

          <div class="section-title">Select Cartons to Transfer</div>

function closeTransferForm() {
  const el = document.getElementById('transfer-modal-wrap');
  if (el) el.remove();
}

function toggleTransferDest() {
  const type = document.getElementById('tf-dest-type').value;
  const isNew = type === 'new';
  document.getElementById('tf-new-ref-wrap').style.display = isNew ? '' : 'none';
  document.getElementById('tf-existing-info').style.display = isNew ? 'none' : '';
}

async function submitTransferRequest() {
  const list = LISTS.find(l => l.listRef === currentListId);
  if (!list) return;
  const checkboxes = document.querySelectorAll('.tf-checkbox:checked');
  if (checkboxes.length === 0) { toast('Please select at least one carton', 'error'); return; }

  const destType = document.getElementById('tf-dest-type').value;
  const newRef = destType === 'new' ? document.getElementById('tf-new-ref').value.trim() : destType;
  const newPrefix = document.getElementById('tf-new-prefix').value.trim().toUpperCase();
  const reason = document.getElementById('tf-reason').value.trim();

  if (!newPrefix) { toast('New Carton ID Prefix is required', 'error'); return; }
  if (!reason) { toast('Reason is required', 'error'); return; }

  const cartons = LIST_CARTONS[list.listRef] || [];
  const selectedCartons = [];
  checkboxes.forEach(cb => {
    const idx = parseInt(cb.dataset.index);
    if (cartons[idx]) {
      selectedCartons.push({
        cartonRef: cartons[idx].cartonRef,
        cartonId: cartons[idx].cartonId,
        parts: cartons[idx].parts,
        cartonPi: cartons[idx].cartonPi,
        row: cartons[idx].row  // GAS row number for direct lookup
      });
    }
  });

  try {
    const res = await gasPost({
      action: 'createTransfer',
      fromListRef: list.listRef,
      toListRef: newRef,
      cartons: selectedCartons,
      newPrefix: newPrefix,
      reason: reason,
      requestedBy: list.createdBy || 'Staff'
    });
    if (res && res.success) {
      closeTransferForm();
      toast('Transfer request ' + res.transferId + ' submitted for approval', 'success');
    } else {
      throw new Error(res?.error || 'Unknown error');
    }
  } catch(e) {
    toast('Transfer submit failed: ' + e.message, 'error');
  }
}

      <div class="stat-card"><div class="label">Total</div><div class="value">${reqs.length}</div></div>
      <div class="stat-card"><div class="label" style="color:var(--amber)">Pending</div><div class="value" style="color:var(--amber)">${reqs.filter(r => r.status === 'pending').length}</div></div>
      <div class="stat-card"><div class="label" style="color:var(--primary)">Approved</div><div class="value text-primary">${reqs.filter(r => r.status === 'approved').length}</div></div>
      <div class="stat-card"><div class="label" style="color:var(--danger)">Rejected</div><div class="value text-danger">${reqs.filter(r => r.status === 'rejected').length}</div></div>
    </div>
    ${reqs.length === 0 ? '<div class="empty-state"><svg><use href="#ic-transfer"/></svg><p>No transfer requests yet</p></div>' :
      '<div style="display:flex;flex-direction:column;gap:12px">' + reqs.map(r => {
        const isPending = r.status === 'pending';
        const isApproved = r.status === 'approved';
        return `<div class="record-card ${isPending ? '' : isApproved ? 'approved' : 'rejected'}" style="border-left:4px solid ${isPending ? 'var(--amber)' : isApproved ? 'var(--primary)' : 'var(--danger)'}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div><div style="font-weight:800;font-size:1.05rem">${escHtml(r.transferId)}</div><div class="text-xs text-muted">By ${escHtml(r.requestedBy)} \u2014 ${fmtDate(r.requestedAt)}</div></div>
            <span class="badge ${isPending ? 'badge-amber' : isApproved ? 'badge-green' : 'badge-red'}">${r.status.toUpperCase()}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;font-size:12px">
            <div style="background:var(--muted);padding:10px;border-radius:8px"><div class="text-xs text-muted">From</div><div class="font-bold">${escHtml(r.fromListRef)}</div><div class="text-xs">${escHtml(r.fromListCustomer || '')}</div></div>
            <div style="background:var(--muted);padding:10px;border-radius:8px"><div class="text-xs text-muted">To</div><div class="font-bold">${escHtml(r.toListRef)}</div><div class="text-xs">Prefix: <strong>${escHtml(r.newPrefix)}</strong></div></div>
          </div>
          <div style="font-size:12px;margin-bottom:10px"><strong>Cartons (${r.cartons.length}):</strong> ${r.cartons.map(c => `<span class="badge badge-muted" style="margin:2px">${escHtml(c.cartonId)}</span>`).join('')}</div>
          <div style="background:var(--amber-dim);padding:10px;border-radius:8px;font-size:12px;margin-bottom:10px"><strong>Reason:</strong> ${escHtml(r.reason)}</div>
          ${r.rejectReason ? `<div class="alert alert-danger" style="margin-bottom:10px;font-size:12px"><strong>Rejected:</strong> ${escHtml(r.rejectReason)}</div>` : ''}
          ${isApproved ? `<div style="font-size:12px;color:var(--primary)"><strong>Approved by:</strong> ${escHtml(r.approvedBy)} \u2014 ${fmtDate(r.approvedAt)}</div>` : ''}
          ${isPending ? `
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn btn-primary" style="flex:1" onclick="approveTransfer(${r.row}, '${r.toListRef}')"><svg><use href="#ic-check"/></svg>Approve</button>
            <button class="btn btn-danger-outline" style="flex:1" onclick="rejectTransfer(${r.row})"><svg><use href="#ic-file-x"/></svg>Reject</button>
          </div>` : ''}
        </div>`;
      }).join('') + '</div>'}
  `;
}

async function approveTransfer(transferRow, toListRef) {
  const manager = prompt('ENTER MANAGER NAME TO APPROVE:');
  if (!manager) return;
  try {
    const res = await gasPost({ action: 'approveTransfer', transferRow: transferRow, manager: manager.toUpperCase() });
    if (res && res.success) {
      toast('Transfer approved. New list: ' + (res.toListRef || toListRef), 'success');
      renderTransfer();
    } else {
      throw new Error(res?.error || 'Unknown error');
    }
  } catch(e) {
    toast('Approve failed: ' + e.message, 'error');
  }
}

async function rejectTransfer(transferRow) {
  const manager = prompt('ENTER MANAGER NAME TO REJECT:');
  if (!manager) return;
  const reason = prompt('ENTER REJECTION REASON:');
  if (!reason) return;
  try {
    const res = await gasPost({ action: 'rejectTransfer', transferRow: transferRow, manager: manager.toUpperCase(), reason: reason.toUpperCase() });
    if (res && res.success) {
      toast('Transfer rejected', 'error');
      renderTransfer();
    } else {
      throw new Error(res?.error || 'Unknown error');
    }
  } catch(e) {
    toast('Reject failed: ' + e.message, 'error');
  }
}



// ═══════════════════════════════════════════════════════════════
//  MASTER REGISTER
// ═══════════════════════════════════════════════════════════════
const LS_MASTER = 'mg_master_records_v2';
let masterRecords = [];
function loadMasterRecords() {
  try { masterRecords = JSON.parse(localStorage.getItem(LS_MASTER)||'[]'); } catch{ masterRecords=[]; }
}
function saveMasterRecords() { localStorage.setItem(LS_MASTER, JSON.stringify(masterRecords)); }

function renderMaster() {
  loadMasterRecords();
  const el = document.getElementById('page-master');
  renderMasterContent(el, '');
}

function renderMasterContent(el, searchVal) {
  const filtered = masterRecords.filter(r =>
    !searchVal ||
    (r.partNo||'').toLowerCase().includes(searchVal) ||
    (r.customer||'').toLowerCase().includes(searchVal) ||
    (r.pi||'').toLowerCase().includes(searchVal)
  );

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title"><svg><use href="#ic-db"/></svg>Master Register</div>
        <div class="page-subtitle">Barcode validation database \u2014 CRITICAL for matching.</div>
      </div>
      <div class="gap-8">
        <div class="search-wrap">
          <svg><use href="#ic-search"/></svg>
          <input type="text" id="master-search" placeholder="Search part / customer / PI..." style="width:200px" value="${searchVal}"
            oninput="renderMasterContent(document.getElementById('page-master'),this.value.toLowerCase())" />
        </div>
        <button class="btn btn-primary btn-sm" onclick="showAddMasterModal()"><svg><use href="#ic-plus"/></svg>Add</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="table-responsive">
        <thead><tr>
          <th>Part No</th><th>Customer</th><th>PI</th><th>Bag Barcode</th><th>Inner Barcode</th><th>Outer Barcode</th><th></th>
        </tr></thead>
        <tbody>
        ${filtered.length===0 ? `<tr><td colspan="7"><div class="empty-state"><svg><use href="#ic-db"/></svg><p>No records \u2014 add your first barcode set</p></div></td></tr>` :
          filtered.map((r,i)=>`<tr>
            <td data-label="Part No" class="font-bold text-primary">${escHtml(r.partNo)}</td>
            <td data-label="Customer">${escHtml(r.customer)}</td>
            <td data-label="PI" class="text-muted text-xs">${escHtml(r.pi||'\u2014')}</td>
            <td data-label="Bag" class="text-xs" style="font-family:var(--font-mono)">${escHtml(r.bagBarcode)}</td>
            <td data-label="Inner" class="text-xs" style="font-family:var(--font-mono)">${escHtml(r.innerBarcode)}</td>
            <td data-label="Outer" class="text-xs" style="font-family:var(--font-mono)">${escHtml(r.outerBarcode)}</td>
            <td><button class="btn-icon" onclick="deleteMasterRecord(${i})" title="Delete"><svg style="width:13px;height:13px;color:var(--danger)"><use href="#ic-trash"/></svg></button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div id="add-master-modal-wrap"></div>`;
}

function showAddMasterModal() {
  const wrap = document.getElementById('add-master-modal-wrap');
  wrap.innerHTML = `<div class="modal-backdrop" onclick="if(event.target===this)this.remove()">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div class="modal-title"><svg style="width:16px;height:16px"><use href="#ic-db"/></svg>Add Master Record</div>
        <button class="btn-icon" onclick="this.closest('.modal-backdrop').remove()"><svg style="width:14px;height:14px"><use href="#ic-x"/></svg></button>
      </div>
      <div class="modal-body" style="display:flex;flex-direction:column;gap:12px">
        <div class="form-group"><label class="form-label">Customer <span class="req">*</span></label><input type="text" id="mr-customer" placeholder="e.g. ABC Corp" /></div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Part No <span class="req">*</span></label><input type="text" id="mr-partNo" placeholder="e.g. P12345" /></div>
          <div class="form-group"><label class="form-label">PI (Optional)</label><input type="text" id="mr-pi" placeholder="e.g. 12345/26" /></div>
        </div>
        <div class="form-group"><label class="form-label">Bag Barcode <span class="req">*</span></label><input type="text" id="mr-bag" placeholder="Scan or type..." /></div>
        <div class="form-group"><label class="form-label">Inner Barcode <span class="req">*</span></label><input type="text" id="mr-inner" placeholder="Scan or type..." /></div>
        <div class="form-group"><label class="form-label">Outer Barcode <span class="req">*</span></label><input type="text" id="mr-outer" placeholder="Scan or type..." /></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" style="flex:1" onclick="this.closest('.modal-backdrop').remove()">Cancel</button>
        <button class="btn btn-primary" style="flex:1" onclick="saveMasterRecord()">Save Record</button>
      </div>
    </div>
  </div>`;
}

function saveMasterRecord() {
  const customer = document.getElementById('mr-customer')?.value.trim();
  const partNo = document.getElementById('mr-partNo')?.value.trim().toUpperCase();
  const pi = document.getElementById('mr-pi')?.value.trim().toUpperCase() || '';
  const bag = document.getElementById('mr-bag')?.value.trim().toUpperCase();
  const inner = document.getElementById('mr-inner')?.value.trim().toUpperCase();
  const outer = document.getElementById('mr-outer')?.value.trim().toUpperCase();
  if (!customer||!partNo||!bag||!inner||!outer) { toast('Fill all required fields','error'); return; }
  loadMasterRecords();
  masterRecords.push({ customer, partNo, pi, bagBarcode:bag, innerBarcode:inner, outerBarcode:outer, createdAt:new Date().toISOString() });
  saveMasterRecords();
  toast('Master record saved','success');
  document.querySelector('#add-master-modal-wrap .modal-backdrop')?.remove();
  renderMaster();
}

function deleteMasterRecord(i) {
  if (!confirm('Delete this master record?')) return;
  loadMasterRecords();
  masterRecords.splice(i,1);
  saveMasterRecords();
  toast('Record deleted');
  renderMaster();
}

// ═══════════════════════════════════════════════════════════════
//  REJECT LIST
// ═══════════════════════════════════════════════════════════════
async function renderRejects() {
  const el = document.getElementById('page-rejects');
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title" style="color:var(--danger)"><svg style="color:var(--danger)"><use href="#ic-alert"/></svg>Reject List</div>
        <div class="page-subtitle">Cartons rejected by checker \u2014 must be corrected and resubmitted.</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="renderRejects()"><svg><use href="#ic-refresh"/></svg>Refresh</button>
    </div>
    <div id="reject-content"><div class="pulse text-muted text-sm">Loading...</div></div>`;

  // Fetch rejected entries from Packing Log directly
  let rejected = [];
  if (GAS_URL) {
    try {
      const res = await gasGet({ action: 'records' });
      if (res && res.records) {
        rejected = res.records.filter(r =>
          (r.status || '').toLowerCase().includes('rejected')
        );
      }
    } catch (e) { console.warn('Failed to fetch Packing Log for rejects', e); }
  }

  // Build cartonId -> listRef map by scanning all cartons
  const lists = await gasGetPackingLists();
  const listMap = new Map();
  const cartonToList = new Map(); // cartonId -> listRef
  for (const list of lists) {
    listMap.set(list.listRef, list);
    try {
      const cartons = await gasGetCartons(list.listRef);
      cartons.forEach(c => {
        if (c.cartonId) cartonToList.set(c.cartonId, list.listRef);
      });
    } catch (e) { /* skip */ }
  }

  const el2 = document.getElementById('reject-content');
  el2.innerHTML = `
    <div class="stat-grid" style="max-width:300px;margin-bottom:20px">
      <div class="stat-card"><div class="label">Total Rejected</div><div class="value text-danger">${rejected.length}</div></div>
    </div>
    <div class="table-wrap">
      <table class="table-responsive">
        <thead><tr>
          <th>Carton ID</th><th>Customer / PI</th><th>Part No.</th><th>Qty</th><th>Reason</th><th>Checker</th><th>Action</th>
        </tr></thead>
        <tbody>
        ${rejected.length===0 ? `<tr><td colspan="7"><div class="empty-state"><svg><use href="#ic-alert"/></svg><p>No rejected entries \u2014 great job!</p></div></td></tr>` :
          rejected.map(r=>{
            const lr = cartonToList.get(r.cartonId || '') || '';
            return `<tr class="rejected">
              <td data-label="Carton ID"><div class="font-bold text-danger text-sm">${escHtml(r.cartonId||'\u2014')}</div></td>
              <td data-label="Customer"><div class="text-sm">${escHtml(r.customer||'\u2014')}</div><div class="text-xs text-muted">${escHtml(r.pi||'\u2014')}</div></td>
              <td data-label="Part No."><div class="font-bold text-sm">${escHtml(r.partNo||'\u2014')}</div></td>
              <td data-label="Qty" style="text-align:center;font-weight:700">${escHtml(r.qty||'\u2014')}</td>
              <td data-label="Reason"><div class="text-xs text-danger" style="font-style:italic;max-width:180px">${escHtml(r.remarks||'No reason')}</div></td>
              <td data-label="Checker" class="text-xs text-muted">${escHtml(r.checker||'\u2014')}</td>
              <td data-label="Action">
                ${lr ? `<button class="btn btn-outline btn-xs" onclick="nav('list-detail','${lr}')">
                  <svg><use href="#ic-edit"/></svg>Edit
                </button>` : '<span class="text-xs text-muted">-</span>'}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────────────
LISTS = []; // Will be populated from GAS on page load
nav('dashboard');
</script>
